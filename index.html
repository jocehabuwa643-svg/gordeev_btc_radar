<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const Shield = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 4.81 17 6 19 6a1 1 0 0 1 1 1z"/></svg>;
        const Cpu = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>;
        const Globe = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
        const Clock = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const TrendingUp = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const Radar = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/><path d="M4 5.49A10 10 0 0 0 5.3 19.38"/><path d="M20 8.74A10 10 0 0 1 17.38 20"/><path d="M16 8a6 6 0 0 0-8.5-1.5"/><path d="M7.5 16.5a6 6 0 0 0 9.2-.5"/><path d="M12 12v.01"/></svg>;
        const Zap = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;

        const ASSETS = [
          { pair: 'BTC/USDT', symbol: 'BTCUSDT', name: 'Bitcoin' }
        ];

        const FALLBACK_BTC_NEWS = [
          "Крупный капитал формирует пулы ликвидности за локальными экстремумами.",
          "Паттерн снятия ликвидности (SMC) подтверждает смену структуры рынка.",
          "Зафиксирован ложный пробой диапазона с последующим CHoCH.",
          "Маркетмейкер собирает стопы розничных трейдеров перед разворотом."
        ];

        const STRATEGY_1M_CONFIG = {
            NORMAL: {
                modeId: 'NORMAL',
                minScore: 60,
                minSweepAtrRatio: 0.10,
                minReclaimAtrRatio: 0.12,
                maxImpulseAtrRatio: 1.5,
                cooldownCandles: 4,
                minConfirmBodyRatio: 0.35
            },
            REINFORCED: {
                modeId: 'REINFORCED',
                minScore: 72,
                minSweepAtrRatio: 0.12,
                minReclaimAtrRatio: 0.15,
                maxImpulseAtrRatio: 1.35,
                cooldownCandles: 6,
                minConfirmBodyRatio: 0.40
            }
        };

        const SESSION_CONFIG = {
            startingBalance: 10000,
            baseStake: 300, 
            payoutPercent: 0.70,
            martingaleLadder: [300, 750, 1830]
        };

        const TRADE_LEDGER_KEY = 'gordeev_trade_ledger_v1';

        function loadTradeLedger() {
            try {
                const raw = localStorage.getItem(TRADE_LEDGER_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch (e) {
                console.error('LOAD LEDGER ERROR', e);
                return [];
            }
        }

        function saveTradeLedger(trades) {
            try {
                localStorage.setItem(TRADE_LEDGER_KEY, JSON.stringify(trades));
            } catch (e) {
                console.error('SAVE LEDGER ERROR', e);
            }
        }

        function buildTradeId(trade) {
            return [
                trade.signalTime || 'na',
                trade.direction || 'na'
            ].join('_');
        }

        function reconcileTrades(persistedTrades, reconstructedTrades) {
            const map = new Map();

            reconstructedTrades.forEach((trade) => {
                const id = trade.tradeId || buildTradeId(trade);
                map.set(id, { ...trade, tradeId: id, source: 'backtest' });
            });

            persistedTrades.forEach((trade) => {
                const id = trade.tradeId || buildTradeId(trade);
                map.set(id, { ...trade, tradeId: id, source: 'live' });
            });

            return Array.from(map.values()).sort((a, b) => (a.signalTime || 0) - (b.signalTime || 0));
        }

        function summarizeTradesFromLedger(trades, startingBalance = 10000) {
            let balance = startingBalance;
            let wins = 0;
            let losses = 0;
            let cancelled = 0;

            const normalized = trades.map((trade) => {
                const pnl = Number(trade.pnl || 0);
                balance += pnl;

                if (trade.result === 'WIN') wins++;
                else if (trade.result === 'LOSS') losses++;
                else if (trade.result === 'CANCELLED') cancelled++;

                return { ...trade, balanceAfterDerived: balance };
            });

            return {
                trades: normalized,
                wins, losses, cancelled,
                totalPnL: normalized.reduce((sum, t) => sum + Number(t.pnl || 0), 0),
                endingBalance: balance
            };
        }

        function appendCompletedTrade(ledger, trade) {
            const normalized = {
                ...trade,
                tradeId: trade.tradeId || buildTradeId(trade),
                source: 'live'
            };

            const exists = ledger.some(t => t.tradeId === normalized.tradeId);
            if (exists) {
                return ledger.map(t => t.tradeId === normalized.tradeId ? normalized : t);
            }

            const next = [...ledger, normalized].sort((a, b) => (a.signalTime || 0) - (b.signalTime || 0));
            saveTradeLedger(next);
            return next;
        }

        const ScannerAPI = {
          async getCandles(symbol, count = 1000, interval = '1m') { 
            const urls = [
                `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api1.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api2.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://data-api.binance.vision/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`
            ];
            
            for (let url of urls) {
                try {
                    let response = await fetch(url);
                    if (response.ok) {
                        const data = await response.json();
                        const mapped = data.map(d => ({
                            time: d[0] / 1000,
                            open: parseFloat(d[1]),
                            high: parseFloat(d[2]),
                            low: parseFloat(d[3]),
                            close: parseFloat(d[4]),
                            volume: parseFloat(d[5])
                        }));
                        
                        const unique = new Map();
                        mapped.forEach(c => unique.set(c.time, c));
                        return Array.from(unique.values()).sort((a, b) => a.time - b.time);
                    }
                } catch(e) { continue; }
            }
            throw new Error("API BINANCE НЕДОСТУПЕН");
          }
        };

        const formatPrice = (p) => {
            if (!p && p !== 0) return '0.00';
            if (p >= 1000) return p.toFixed(2);
            if (p >= 10) return p.toFixed(3);
            if (p >= 1) return p.toFixed(4);
            return p.toFixed(5);
        };

        function calcLiquidityZones(data, period = 8) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) {
                    res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low });
                    continue;
                }
                let high = -Infinity;
                let low = Infinity;
                for (let j = 1; j <= period; j++) {
                    high = Math.max(high, data[i - j].high);
                    low = Math.min(low, data[i - j].low);
                }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;
        }

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { 
                    res.push({time: data[i].time, value: data[i].high - data[i].low}); 
                    continue; 
                }
                let sumTR = 0;
                let count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j];
                    const prevC = data[i - j - 1];
                    let tr = Math.max(
                        c.high - c.low,
                        Math.abs(c.high - prevC.close),
                        Math.abs(c.low - prevC.close)
                    );
                    sumTR += tr;
                    count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;
        }

        function createMartingaleState(config = SESSION_CONFIG) {
            return {
                ladderIndex: 0,
                currentStake: config.martingaleLadder[0],
                blocked: false,
                reason: null
            };
        }

        function getTradePnL(result, stake, config = SESSION_CONFIG) {
            if (result === 'WIN') return Math.round(stake * config.payoutPercent); 
            if (result === 'LOSS') return -stake; 
            return 0; 
        }

        function updateMartingaleAfterTrade(result, state, balance, config = SESSION_CONFIG) {
            if (result === 'WIN' || result === 'CANCELLED') {
                return {
                    ladderIndex: 0,
                    currentStake: config.martingaleLadder[0],
                    blocked: false,
                    reason: null
                };
            }

            if (result === 'LOSS') {
                const nextIndex = state.ladderIndex + 1;

                if (nextIndex >= config.martingaleLadder.length) {
                    return {
                        ladderIndex: 0,
                        currentStake: config.martingaleLadder[0],
                        blocked: true,
                        reason: 'Достигнут лимит лестницы мартингейла'
                    };
                }

                const nextStake = config.martingaleLadder[nextIndex];

                if (nextStake > balance) {
                    return {
                        ladderIndex: 0,
                        currentStake: config.martingaleLadder[0],
                        blocked: true,
                        reason: 'Недостаточно баланса для шага мартингейла'
                    };
                }

                return {
                    ladderIndex: nextIndex,
                    currentStake: nextStake,
                    blocked: false,
                    reason: null
                };
            }
            return state;
        }

        function buildTradeFinanceRecord(trade, balanceBefore, martingaleState, sessionConfig = SESSION_CONFIG) {
            const stake = martingaleState.currentStake;
            const pnl = getTradePnL(trade.result, stake, sessionConfig);
            const balanceAfter = balanceBefore + pnl;

            return {
                ...trade,
                stake,
                martingaleStep: martingaleState.ladderIndex,
                pnl,
                balanceBefore,
                balanceAfter
            };
        }

        function detectImpulseTrap(candle, atr, config) {
            const candleSize = Math.max(candle.high - candle.low, 0.0001);
            return candleSize > atr * config.maxImpulseAtrRatio;
        }

        function validateConfirmationCandle(candle, direction, config) {
            const candleSize = Math.max(candle.high - candle.low, 0.0001);
            const bodySize = Math.abs(candle.close - candle.open);
            const bodyRatio = bodySize / candleSize;

            if (bodyRatio < config.minConfirmBodyRatio) return false;
            if (direction === 'CALL' && candle.close <= candle.open) return false;
            if (direction === 'PUT' && candle.close >= candle.open) return false;

            return true;
        }

        function suppressDuplicateSignals(lastSignalIndex, currentIndex, config) {
            if (lastSignalIndex == null || lastSignalIndex === -999) return false;
            return (currentIndex - lastSignalIndex) < config.cooldownCandles;
        }

        function detectLiquiditySweep1M(data, idx, zonesArr, atrArr, config, logCallback = null) {
            if (idx < 2 || !data[idx] || !zonesArr[idx] || !atrArr[idx] || !zonesArr[idx - 1]) {
                return { isCall: false, isPut: false, score: 0, reason: 'not_enough_data', sweepLevel: null };
            }

            const curr = data[idx];
            const prev = data[idx - 1];
            const prePrev = data[idx - 2];
            const zone = zonesArr[idx - 1]; 
            const atr = atrArr[idx].value || 0.0001;

            const candleSize = Math.max(curr.high - curr.low, 0.0001);
            const bodySize = Math.abs(curr.close - curr.open);
            const topWick = curr.high - Math.max(curr.open, curr.close);
            const bottomWick = Math.min(curr.open, curr.close) - curr.low;

            const isChoppyRange = (zone.upper - zone.lower) < atr * 0.55;

            const putSweep = (curr.high > zone.upper && curr.close < zone.upper) || 
                             (prev.high > zone.upper && prev.close >= zone.upper && curr.close < zone.upper);

            const callSweep = (curr.low < zone.lower && curr.close > zone.lower) || 
                              (prev.low < zone.lower && prev.close <= zone.lower && curr.close > zone.lower);

            let score = 0;
            let isCall = false;
            let isPut = false;
            let reason = '';
            let sweepLevel = null;

            const getSetupCandles = (isPutSweep) => {
                if (isPutSweep) {
                    if (curr.high > zone.upper && curr.close < zone.upper) return { sweepCandle: curr, confirmCandle: curr };
                    return { sweepCandle: prev, confirmCandle: curr };
                } else {
                    if (curr.low < zone.lower && curr.close > zone.lower) return { sweepCandle: curr, confirmCandle: curr };
                    return { sweepCandle: prev, confirmCandle: curr };
                }
            };

            if (putSweep) {
                sweepLevel = zone.upper;
                const { sweepCandle, confirmCandle } = getSetupCandles(true);
                
                const sweepDepth = sweepCandle.high - sweepLevel;
                const reclaimStrength = sweepLevel - confirmCandle.close;

                score += 20;
                const confirms = [];
                const penalties = [];

                if (sweepDepth >= atr * config.minSweepAtrRatio) {
                    score += 15; confirms.push('Deep Sweep');
                } else {
                    score -= 20; penalties.push('Shallow Sweep');
                }

                if (reclaimStrength >= atr * config.minReclaimAtrRatio) {
                    score += 20; confirms.push('Strong Reclaim');
                } else {
                    score -= 20; penalties.push('Weak Reclaim');
                }

                const swCandleSize = Math.max(sweepCandle.high - sweepCandle.low, 0.0001);
                const swTopWick = sweepCandle.high - Math.max(sweepCandle.open, sweepCandle.close);
                if (swTopWick >= swCandleSize * 0.35) {
                    score += 15; confirms.push('Rejection Wick');
                }

                if (validateConfirmationCandle(confirmCandle, 'PUT', config)) {
                    score += 20; confirms.push('Valid Confirm');
                } else {
                    score -= 25; penalties.push('Bad Confirm Candle');
                }

                if (confirmCandle.close < prev.low || confirmCandle.close < prePrev.low) {
                    score += 15; confirms.push('MSS');
                }

                if (detectImpulseTrap(sweepCandle, atr, config)) {
                    score -= 30; penalties.push('Impulse Trap');
                }

                if (isChoppyRange) {
                    score -= 25; penalties.push('Chop/Noisy');
                }

                reason = `[+] ${confirms.join(', ')} | [-] ${penalties.join(', ')}`;

                if (score >= config.minScore) isPut = true;
            }

            if (callSweep && !isPut) {
                sweepLevel = zone.lower;
                const { sweepCandle, confirmCandle } = getSetupCandles(false);

                const sweepDepth = sweepLevel - sweepCandle.low;
                const reclaimStrength = confirmCandle.close - sweepLevel;

                score += 20;
                const confirms = [];
                const penalties = [];

                if (sweepDepth >= atr * config.minSweepAtrRatio) {
                    score += 15; confirms.push('Deep Sweep');
                } else {
                    score -= 20; penalties.push('Shallow Sweep');
                }

                if (reclaimStrength >= atr * config.minReclaimAtrRatio) {
                    score += 20; confirms.push('Strong Reclaim');
                } else {
                    score -= 20; penalties.push('Weak Reclaim');
                }

                const swCandleSize = Math.max(sweepCandle.high - sweepCandle.low, 0.0001);
                const swBottomWick = Math.min(sweepCandle.open, sweepCandle.close) - sweepCandle.low;
                if (swBottomWick >= swCandleSize * 0.35) {
                    score += 15; confirms.push('Rejection Wick');
                }

                if (validateConfirmationCandle(confirmCandle, 'CALL', config)) {
                    score += 20; confirms.push('Valid Confirm');
                } else {
                    score -= 25; penalties.push('Bad Confirm Candle');
                }

                if (confirmCandle.close > prev.high || confirmCandle.close > prePrev.high) {
                    score += 15; confirms.push('MSS');
                }

                if (detectImpulseTrap(sweepCandle, atr, config)) {
                    score -= 30; penalties.push('Impulse Trap');
                }

                if (isChoppyRange) {
                    score -= 25; penalties.push('Chop/Noisy');
                }

                reason = `[+] ${confirms.join(', ')} | [-] ${penalties.join(', ')}`;

                if (score >= config.minScore) isCall = true;
            }

            if (logCallback) {
                if (isPut) logCallback(curr.time, 'PUT', 'ПРИНЯТ', `Score: ${score}/${config.minScore} | ${reason}`, config.modeId);
                else if (isCall) logCallback(curr.time, 'CALL', 'ПРИНЯТ', `Score: ${score}/${config.minScore} | ${reason}`, config.modeId);
            }

            return { isCall, isPut, score, reason, sweepLevel };
        }

              utterance.lang = 'ru-RU';
              utterance.rate = 0.95; 
              utterance.pitch = 0.95;

              let resolved = false;
              const finish = () => {
                  if (resolved) return;
                  resolved = true;
                  isSpeakingRef.current = false;
                  if (nextItem.resolve) nextItem.resolve();
                  setTimeout(() => processSpeechQueue(), 300);
              };

              utterance.onend = finish;
              utterance.onerror = finish;

              try {

                  finish();

          }, []);

          useEffect(() => {
            fetchNews();
            const newsInterval = setInterval(fetchNews, 20 * 60 * 1000); 
            return () => clearInterval(newsInterval);
          }, []);

          const addLog = useCallback((msg, isAi = false) => {
            setLogs(p => [msg, ...p].slice(0, 15)); 
          }, []);

          // --- TRADE VISUALIZATION LOOP (OVERLAY) ---
          useEffect(() => {
            if (!isStarted) return;
            let animationFrameId;

            const syncOverlays = () => {
                if (chartInstance.current && candleSeries.current && tradeBoxesContainerRef.current) {
                    const timeScale = chartInstance.current.timeScale();
                    const series = candleSeries.current;

                    let html = '';
                    tradesRef.current.forEach(trade => {
                        let startX = null;
                        let endX = null;

                        try {
                            if (trade.signalTime) startX = timeScale.timeToCoordinate(trade.signalTime);
                            if (trade.exitTime) endX = timeScale.timeToCoordinate(trade.exitTime);
                        } catch (e) {}

                        if (startX === null) return; 

                        if (endX === null) {
                            let currentExitTime = trade.exitTime;
                            if (!currentExitTime) {
                                currentExitTime = trade.signalTime + 300;
                            }
                            const timeDiff = currentExitTime - trade.signalTime;
                            
                            let p1 = null, p2 = null;
                            try {
                                p1 = timeScale.timeToCoordinate(trade.signalTime);
                                p2 = timeScale.timeToCoordinate(trade.signalTime - 60); 
                            } catch(e) {}

                            if (p1 !== null && p2 !== null) {
                                const candleW = Math.abs(p1 - p2);
                                endX = startX + (timeDiff / 60) * candleW;
                            } else {
                                endX = startX + 40; 
                            }
                        }

                        const boxLeft = startX; 
                        const boxRight = endX;
                        const boxWidth = Math.max(boxRight - boxLeft, 2);

                        const padding = (trade.maxHigh - trade.minLow) * 0.1;
                        const topY = series.priceToCoordinate(trade.maxHigh + padding);
                        const bottomY = series.priceToCoordinate(trade.minLow - padding);

                        if (topY === null || bottomY === null) return;

                        const boxHeight = Math.max(bottomY - topY, 4);
                        const isWin = trade.result === 'WIN';
                        const isCancelled = trade.result === 'CANCELLED';
                        const isPending = trade.result === 'PENDING';
                        
                        let baseColor = '148, 163, 184'; 
                        let tagText = 'C';
                        if (isWin) { baseColor = '14, 165, 233'; tagText = 'W'; } 
                        if (trade.result === 'LOSS') { baseColor = '244, 63, 94'; tagText = 'L'; } 
                        if (isPending) { baseColor = '245, 158, 11'; tagText = '...'; } 

                        let entryX = null;
                        try {
                            if (trade.entryTime) entryX = timeScale.timeToCoordinate(trade.entryTime);
                        } catch(e) {}
                        
                        if (entryX === null) {
                            let p1 = null, p2 = null;
                            try {
                                p1 = timeScale.timeToCoordinate(trade.signalTime);
                                p2 = timeScale.timeToCoordinate(trade.signalTime - 60); 
                            } catch(e) {}
                            if (p1 !== null && p2 !== null) {
                                const candleW = Math.abs(p1 - p2);
                                entryX = startX + 2 * candleW;
                            } else {
                                entryX = startX + boxWidth * 0.2;
                            }
                        }

                        trade.screenLeft = boxLeft;
                        trade.screenRight = boxRight;
                        trade.screenTop = topY;
                        trade.screenBottom = bottomY;

                        html += `
                            <div class="trade-box" data-id="${trade.id}" style="position:absolute; left:${boxLeft}px; top:${topY}px; width:${boxWidth}px; height:${boxHeight}px; background: rgba(${baseColor}, 0.1); border: 1px solid rgba(${baseColor}, 0.6); border-radius: 4px; pointer-events: none; z-index: 5; transition: background 0.3s; box-shadow: 0 0 10px rgba(${baseColor}, 0.1);">
                                <div style="position:absolute; left:-3px; top:50%; transform:translateY(-50%); width:6px; height:6px; border-radius:50%; background:rgb(${baseColor}); box-shadow: 0 0 5px rgb(${baseColor});"></div>
                                ${!isCancelled ? `<div style="position:absolute; left:${Math.max(0, entryX - boxLeft)}px; top:0; bottom:0; border-left: 1px dashed rgba(${baseColor}, 0.8);"></div>` : ''}
                                <div style="position:absolute; right: -6px; top: -10px; font-size: 9px; font-weight: 800; color: white; background: rgb(${baseColor}); padding: 2px 5px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; text-shadow: 0 1px 2px rgba(0,0,0,0.5);">
                                    ${tagText}
                                </div>
                            </div>
                        `;
                    });
                    tradeBoxesContainerRef.current.innerHTML = html;
                }
                animationFrameId = requestAnimationFrame(syncOverlays);
            };

            syncOverlays();
            return () => cancelAnimationFrame(animationFrameId);
          }, [isStarted, viewMode]);

          // --- TOOLTIP HOVER LOGIC ---
          useEffect(() => {
            if (!isStarted || !chartInstance.current) return;
            
            const handleCrosshairMove = (param) => {
                const tooltip = document.getElementById('chart-tooltip');
                if (!tooltip) return;

                if (!param.point || !param.time) {
                    tooltip.style.opacity = '0';
                    return;
                }

                const x = param.point.x;
                const y = param.point.y;

                const hoveredTrade = tradesRef.current.find(t => 
                    x >= t.screenLeft && x <= t.screenRight &&
                    y >= t.screenTop && y <= t.screenBottom
                );

                if (hoveredTrade) {
                    const isWin = hoveredTrade.result === 'WIN';
                    const isPending = hoveredTrade.result === 'PENDING';
                    const isCancelled = hoveredTrade.result === 'CANCELLED';
                    
                    let colorClass = 'text-slate-400';
                    if (isWin) colorClass = 'text-cyan-400';
                    if (hoveredTrade.result === 'LOSS') colorClass = 'text-rose-400';
                    if (isPending) colorClass = 'text-amber-400';

                    const sigTime = hoveredTrade.signalTime ? new Date(hoveredTrade.signalTime * 1000).toLocaleTimeString('ru-RU') : '--:--';
                    const entTime = hoveredTrade.entryTime ? new Date(hoveredTrade.entryTime * 1000).toLocaleTimeString('ru-RU') : '--:--';
                    const extTime = hoveredTrade.exitTime ? new Date(hoveredTrade.exitTime * 1000).toLocaleTimeString('ru-RU') : '--:--';

                    tooltip.innerHTML = `
                        <div class="font-bold border-b border-slate-600/50 pb-1 mb-2 text-center ${colorClass} uppercase tracking-widest text-[11px]">${hoveredTrade.direction} • ${hoveredTrade.result}</div>
                        <div class="flex justify-between gap-6 mt-1">
                            <span class="text-slate-400">Сигнал (1M):</span>
                            <span class="font-mono font-bold text-slate-200">${sigTime}</span>
                        </div>
                        ${!isCancelled ? `
                        <div class="flex justify-between gap-6 mt-1">
                            <span class="text-slate-400">Вход (1M):</span>
                            <span class="font-mono font-bold text-slate-200">${entTime} @ ${hoveredTrade.entryPrice ? formatPrice(hoveredTrade.entryPrice) : '---'}</span>
                        </div>
                        <div class="flex justify-between gap-6 mt-1">
                            <span class="text-slate-400">Выход (1M):</span>
                            <span class="font-mono font-bold text-slate-200">${isPending ? '--:--' : extTime} @ ${hoveredTrade.exitPrice ? formatPrice(hoveredTrade.exitPrice) : '---'}</span>
                        </div>
                        <div class="border-t border-slate-600/50 pt-1 mt-2 flex justify-between gap-6">
                            <span class="text-slate-400">Ставка:</span>
                            <span class="font-mono font-bold text-slate-200">${hoveredTrade.stake} ₽ (Шаг ${hoveredTrade.martingaleStep})</span>
                        </div>
                        <div class="flex justify-between gap-6 mt-1">
                            <span class="text-slate-400">PnL:</span>
                            <span class="font-mono font-bold ${hoveredTrade.pnl > 0 ? 'text-emerald-400' : (hoveredTrade.pnl < 0 ? 'text-rose-400' : 'text-slate-400')}">${hoveredTrade.pnl > 0 ? '+' : ''}${hoveredTrade.pnl} ₽</span>
                        </div>
                        ` : `
                        <div class="flex justify-between gap-6 mt-1">
                            <span class="text-slate-400">Отмена:</span>
                            <span class="font-mono font-bold text-rose-300 text-right w-32 break-words leading-tight">${hoveredTrade.cancelReason}</span>
                        </div>`}
                    `;
                    
                    tooltip.style.left = `${x}px`;
                    tooltip.style.top = `${hoveredTrade.screenTop - 15}px`;
                    tooltip.style.opacity = '1';
                } else {
                    tooltip.style.opacity = '0';
                }
            };

            chartInstance.current.subscribeCrosshairMove(handleCrosshairMove);
            return () => {
                if (chartInstance.current) chartInstance.current.unsubscribeCrosshairMove(handleCrosshairMove);
            }
          }, [isStarted, viewMode]);

          const safeSetMarkers = (markersArr) => {
              if (!candleSeries.current) return;
              try {
                  const sorted = [...markersArr].sort((a, b) => a.time - b.time);
                  candleSeries.current.setMarkers(sorted);
              } catch (e) {}
          };

          const initChart = async () => {
            if (!chartContainerRef.current) return;
            if (!window.LightweightCharts) {
              await new Promise(resolve => {
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js';
                script.onload = resolve; document.head.appendChild(script);
              });
            }

            if (chartInstance.current) return;

            try {
                const mainChart = window.LightweightCharts.createChart(chartContainerRef.current, {
                  autoSize: true,
                  layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#475569', fontFamily: 'JetBrains Mono' },
                  grid: { vertLines: { color: 'rgba(148, 163, 184, 0.2)' }, horzLines: { color: 'rgba(148, 163, 184, 0.2)' } },
                  timeScale: { borderVisible: false, timeVisible: true, secondsVisible: false },
                  rightPriceScale: { borderVisible: false }
                });

                candleSeries.current = mainChart.addCandlestickSeries({ 
                  upColor: '#0ea5e9', 
                  downColor: '#ef4444', 
                  borderVisible: true, 
                  borderUpColor: '#0ea5e9', 
                  borderDownColor: '#ef4444', 
                  wickUpColor: '#0ea5e9', 
                  wickDownColor: '#ef4444'
                });

                chartInstance.current = mainChart;
            } catch(e) {}
          };

          const clearChartExtras = () => {
              if (!chartInstance.current || !candleSeries.current) return;
              priceLinesRef.current.forEach(l => { try { candleSeries.current.removePriceLine(l); } catch(e){} });
              priceLinesRef.current = [];
              extraSeriesRef.current.forEach(s => { try { chartInstance.current.removeSeries(s); } catch(e){} });
              extraSeriesRef.current = [];
          };

          const drawIndicators = (upperData, lowerData) => {
              clearChartExtras();
              let upperSeries, lowerSeries;
              try {
                  upperSeries = chartInstance.current.addLineSeries({ 
                      color: 'rgba(244, 63, 94, 0.5)', lineWidth: 2, lineStyle: 2, title: 'BUY LIQUIDITY' 
                  });
                  upperSeries.setData(upperData);
                  extraSeriesRef.current.push(upperSeries);

                  lowerSeries = chartInstance.current.addLineSeries({ 
                      color: 'rgba(16, 185, 129, 0.5)', lineWidth: 2, lineStyle: 2, title: 'SELL LIQUIDITY' 
                  });
                  lowerSeries.setData(lowerData);
                  extraSeriesRef.current.push(lowerSeries);
              } catch(e) {}
              return { upperSeries, lowerSeries };
          };

          const updateStatus = (phase, colorClass) => {
              setAppPhase(phase);
              setStatusColorClass(colorClass);
          };

          const calculateMetricsReal = (data, isCall) => {
              if (!data || data.length < 50) return { structure: 50, liquidity: 50, buyPressure: 50 };
              const recentData = data.slice(-50);
              let greenVol = 0; let redVol = 0;
              recentData.forEach(d => {
                  if (d.close >= d.open) greenVol += d.volume; else redVol += d.volume;
              });
              const totalVol = greenVol + redVol || 1;
              const pressure = Math.round((greenVol / totalVol) * 100);
              
              const lastPrices = recentData.map(d => d.close);
              const maxP = Math.max(...lastPrices);
              const minP = Math.min(...lastPrices);
              const currentP = lastPrices[lastPrices.length-1];
              const position = maxP - minP === 0 ? 50 : ((currentP - minP) / (maxP - minP)) * 100;
              
              let liquidityScore = 50;
              if (isCall && position < 20) liquidityScore = 90;
              if (!isCall && position > 80) liquidityScore = 90;

              return { structure: isCall ? 85 : 15, liquidity: liquidityScore, buyPressure: pressure };
          };

          // --- АУДИТ И ПОДСЧЕТ ЛЕДЖЕРА ---
          const auditLedger = (startBal, tradesArr) => {
              let calcPnl = 0;
              let calcWins = 0;
              let calcLosses = 0;
              let calcCancels = 0;
              tradesArr.forEach(t => {
                  calcPnl += t.pnl || 0;
                  if (t.result === 'WIN') calcWins++;
                  if (t.result === 'LOSS') calcLosses++;
                  if (t.result === 'CANCELLED') calcCancels++;
              });
              
              const isValid = (calcWins + calcLosses + calcCancels === tradesArr.length);
              if (isValid) {
                  addLog(`CONSISTENCY CHECK: OK | Сделок: ${tradesArr.length} | PnL: ${calcPnl} ₽`, true);
              } else {
                  addLog(`CONSISTENCY CHECK: FAIL | Несовпадение данных!`, true);
              }

              const balance = startBal + calcPnl;
              return { balance, pnl: calcPnl, wins: calcWins, losses: calcLosses, cancels: calcCancels };
          };

          const logTradeToJournal = (trade, currentBal) => {
              const timeStr = new Date(trade.signalTime * 1000).toLocaleTimeString('ru-RU');
              if (trade.result === 'WIN' || trade.result === 'LOSS') {
                  const sign = trade.pnl > 0 ? '+' : '';
                  addLog(`[${timeStr}] ${trade.result}: ${sign}${trade.pnl} ₽ | Баланс: ${currentBal} ₽`);
              } else {
                  addLog(`[${timeStr}] CANCELLED: ${trade.cancelReason}`);
              }
          };

          const runTerminalEngine = async () => {
            if (engineActive.current) return;
            engineActive.current = true;
            tradesRef.current = [];

            let currentBalance = SESSION_CONFIG.startingBalance;
            let mState = createMartingaleState(SESSION_CONFIG);
            
            let lastEvaluatedTimeLive = 0;
            let lastLoggedRejectTime = 0;
            let lastBackgroundNewsTime = Date.now();

            const runBacktestPhase = async () => {
                if (audioCtx.current && audioCtx.current.state === 'suspended') {
                    await audioCtx.current.resume();
                }

                setAppStage('backtest');
                await enqueueSpeech('Институциональный алгоритм активирован. Запущен анализ пулов ликвидности Smart Money на 1-минутном таймфрейме за последние 12 часов.');
                await new Promise(r => setTimeout(r, 500)); 

                updateStatus('БЭКТЕСТ: АНАЛИЗ SMC ИСТОРИИ...', 'text-cyan-600');
                addLog(`ЗАПУСК ПОИСКА: СНЯТИЕ ЛИКВИДНОСТИ ЗА 12 ЧАСОВ (1M)...`);

                const curAsset = ASSETS[0];
                let data1m;
                
                try {
                    data1m = await ScannerAPI.getCandles(curAsset.symbol, 1000, '1m');
                } catch (err) {
                    throw new Error("Ошибка загрузки истории: " + err.message);
                }
                
                if (!data1m || data1m.length < 150) {
                    throw new Error("Недостаточно данных от биржи.");
                }

                setSparklines(prev => ({...prev, [curAsset.symbol]: data1m}));
                currentPrice.current = data1m[data1m.length - 1].close;

                const liqZones = calcLiquidityZones(data1m, 15); 
                const atrSeries = calcATRSeries(data1m, 14); 

                const upperData = liqZones.map(i => ({time: i.time, value: i.upper}));
                const lowerData = liqZones.map(i => ({time: i.time, value: i.lower}));

                const maxEvalIdx = data1m.length - 7; 
                const startEvalIdx = Math.max(15, maxEvalIdx - 720 + 1); 

                strategyMode.current = 'NORMAL';
                let simStrategyMode = 'NORMAL';
                let simLastTradeIdx = -999; 

                const persistedLedger = loadTradeLedger();
                const persistedRecent = persistedLedger.filter(t => t.signalTime >= data1m[startEvalIdx].time);
                
                const historicalTrades = [];

                for (let idx = startEvalIdx; idx <= maxEvalIdx; idx++) {
                    const config = STRATEGY_1M_CONFIG[simStrategyMode];
                    
                    if (suppressDuplicateSignals(simLastTradeIdx, idx, config)) continue;

                    const { isCall, isPut, sweepLevel } = detectLiquiditySweep1M(
                        data1m, idx, liqZones, atrSeries, config, null
                    );

                    if (isCall || isPut) {
                        simLastTradeIdx = idx;
                        
                        const signalTime = data1m[idx].time; 
                        const prepCandle = data1m[idx + 1];
                        
                        let cancelled = false;
                        let cancelReason = "";
                        
                        if (isPut && prepCandle.high > sweepLevel) {
                            cancelled = true; cancelReason = "Импульс против сигнала в 1M окне";
                        }
                        if (isCall && prepCandle.low < sweepLevel) {
                            cancelled = true; cancelReason = "Импульс против сигнала в 1M окне";
                        }
                        if (mState.blocked) {
                            cancelled = true; cancelReason = mState.reason;
                        }

                        const entryPrice = prepCandle.open;
                        let exitPrice = data1m[idx + 6].close; 
                        
                        let result = 'CANCELLED';
                        let maxH = prepCandle.high;
                        let minL = prepCandle.low;

                        if (!cancelled) {
                            const executionCandles = data1m.slice(idx + 1, idx + 7);
                            if (executionCandles.length > 0) {
                                maxH = Math.max(...executionCandles.map(c => c.high));
                                minL = Math.min(...executionCandles.map(c => c.low));
                                
                                const isWin = (isCall && exitPrice > entryPrice) || (isPut && exitPrice < entryPrice) || (exitPrice === entryPrice);
                                result = isWin ? 'WIN' : 'LOSS';
                                
                                simStrategyMode = isWin ? 'NORMAL' : 'REINFORCED';
                            }
                        } else {
                            simStrategyMode = 'NORMAL'; 
                        }
                        
                        const trade = {
                            tradeId: buildTradeId({signalTime, direction: isCall ? 'CALL' : 'PUT'}),
                            signalTime: signalTime,
                            entryTime: prepCandle.time, 
                            exitTime: data1m[idx + 6].time, 
                            signalPrice: data1m[idx].close,
                            entryPrice: entryPrice, 
                            exitPrice: cancelled ? null : exitPrice,
                            direction: isCall ? 'CALL' : 'PUT',
                            result: result,
                            cancelReason,
                            maxHigh: maxH,
                            minLow: minL
                        };

                        const financeRecord = buildTradeFinanceRecord(trade, currentBalance, mState, SESSION_CONFIG);
                        currentBalance = financeRecord.balanceAfter;
                        mState = updateMartingaleAfterTrade(result, mState, currentBalance, SESSION_CONFIG);

                        historicalTrades.push(financeRecord);
                    }
                }

                // RECONCILIATION
                const reconciled = reconcileTrades(persistedRecent, historicalTrades);
                tradesRef.current = reconciled;

                const stats = auditLedger(SESSION_CONFIG.startingBalance, reconciled);

                setSessionData({
                    balance: stats.balance,
                    stake: mState.currentStake,
                    step: mState.ladderIndex,
                    pnl: stats.pnl,
                    wins: stats.wins,
                    losses: stats.losses,
                    cancels: stats.cancels
                });

                strategyMode.current = simStrategyMode;
                setStrategyModeUI(simStrategyMode);
                
                lastEvaluatedTimeLive = data1m[data1m.length - 2].time; 

                setAsset(curAsset);
                setViewMode('DETAIL');
                await initChart();
                if (candleSeries.current) {
                    try {
                        candleSeries.current.setData(data1m); 
                        markersRef.current = reconciled.map(t => ({
                            time: t.signalTime,
                            position: t.direction === 'CALL' ? 'belowBar' : 'aboveBar',
                            color: t.direction === 'CALL' ? '#0ea5e9' : '#f43f5e',
                            shape: t.direction === 'CALL' ? 'arrowUp' : 'arrowDown',
                            size: 1
                        }));
                        if (markersRef.current.length > 0) {
                            safeSetMarkers(markersRef.current);
                        }
                        drawIndicators(upperData, lowerData);
                        chartInstance.current.timeScale().fitContent();
                    } catch(err) {}
                }

                setAppStage('backtest_summary');
                const total = stats.wins + stats.losses;
                if (total > 0 || stats.cancels > 0) {
                    playSound('win');
                    const pnlText = stats.pnl > 0 ? `плюс ${stats.pnl}` : (stats.pnl < 0 ? `минус ${Math.abs(stats.pnl)}` : `ноль`);
                    const announceText = `За последние 12 часов стратегия зафиксировала ${total + stats.cancels} ситуаций. Плюсовых ${stats.wins}, убыточных ${stats.losses}, отменённых ${stats.cancels}. При торговле с базовой ставкой 300 рублей итоговый результат составил бы ${pnlText} рублей. Итоговый баланс составил бы ${stats.balance} рублей.`;
                    addLog(`БЭКТЕСТ ЗАВЕРШЕН. ИТОГ: ${pnlText} ₽`, true);
                    await enqueueSpeech(announceText);
                } else {
                    addLog(`БЭКТЕСТ ЗА 12H: СДЕЛКИ НЕ НАЙДЕНЫ.`, true);
                    await enqueueSpeech(`Бэктест завершен. Сделок не найдено.`);
                }

                setAppStage('waiting_voice_end');
                await new Promise(r => setTimeout(r, 1000));

                await enqueueSpeech('Перехожу к живому сканированию рынка.');
                
                updateStatus('СКАНИРОВАНИЕ ЛИКВИДНОСТИ 1M...', 'text-slate-500');
                setViewMode('SCREENER');
                setAppStage('scanning');
                await new Promise(r => setTimeout(r, 1000));
            };

            const runLiveScanCycle = async (liveTradesArr) => {
                try {
                    updateStatus('СКАНИРОВАНИЕ ЛИКВИДНОСТИ 1M...', 'text-slate-700');
                    setViewMode('SCREENER');
                    setSignal(null);
                    
                    const cur = ASSETS[0];
                    if (!engineActive.current) return;
                    setScanIndex(0); 
                    playSound('scan');
                    
                    let data1mLive = null;
                    try {
                        data1mLive = await ScannerAPI.getCandles(cur.symbol, 1000, '1m'); 
                    } catch(e) {
                        return;
                    }
                    
                    if (data1mLive && data1mLive.length > 150) {
                        setSparklines(prev => ({...prev, [cur.symbol]: data1mLive}));

                        const lastIdx = data1mLive.length - 1;
                        const closedIdx = lastIdx - 1; 
                        currentPrice.current = data1mLive[lastIdx].close; 

                        const liqZones = calcLiquidityZones(data1mLive, 15); 
                        const atrSeries = calcATRSeries(data1mLive, 14);    

                        const liqMap = new Map();
                        liqZones.forEach(z => liqMap.set(z.time, z));
                        const upperData = [];
                        const lowerData = [];
                        data1mLive.forEach(c => {
                            const zone = liqMap.get(c.time);
                            if (zone) {
                                upperData.push({ time: c.time, value: zone.upper });
                                lowerData.push({ time: c.time, value: zone.lower });
                            }
                        });

                        const currentClosedTime = data1mLive[closedIdx].time;
                        
                        let isCall = false;
                        let isPut = false;

                        const config = STRATEGY_1M_CONFIG[strategyMode.current];
                        
                        // Determine last live trade index for duplicate suppression
                        let lastLiveTradeIdx = -999;
                        const recentLiveTrades = tradesRef.current.filter(t => t.source === 'live');
                        if (recentLiveTrades.length > 0) {
                            const lastTradeTime = recentLiveTrades[recentLiveTrades.length - 1].signalTime;
                            lastLiveTradeIdx = data1mLive.findIndex(c => c.time === lastTradeTime);
                        }

                        if (currentClosedTime !== lastEvaluatedTimeLive && !suppressDuplicateSignals(lastLiveTradeIdx, closedIdx, config)) {
                            lastEvaluatedTimeLive = currentClosedTime;

                            const liveLogger = (t, dir, status, reason) => {
                                if (status === 'ОТКЛОНЁН' && t !== lastLoggedRejectTime) {
                                    addLog(`ПРОПУСК 1M (${dir}): ${reason.substring(0, 45)}...`, true);

                            };

                            const { isCall: callSignal, isPut: putSignal, sweepLevel } = detectLiquiditySweep1M(
                                data1mLive, closedIdx, liqZones, atrSeries, config, liveLogger
                            );

                            if ((callSignal || putSignal)) {
                                isCall = callSignal;
                                isPut = putSignal;
                                
                                const tradeBase = {
                                    tradeId: buildTradeId({signalTime: currentClosedTime, direction: isCall ? 'CALL' : 'PUT'}),

                                };
                                
                                await handleConfirmedSignal(cur, data1mLive, closedIdx, isCall, isPut, sweepLevel, tradeBase, liveTradesArr);
                            }
                        }
                    }
                    
                    if (engineActive.current && appStageRef.current === 'scanning') {
                        if (Date.now() - lastBackgroundNewsTime > 10 * 60 * 1000) {

                    tradeBase.entryTime = Math.floor(Date.now() / 1000);
