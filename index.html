<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC PRO MAX 5M | SLAVA GORDEEV</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&family=Oswald:wght@300;500;700&display=swap');
        
        body { margin: 0; padding: 0; background: #f0f2f5; color: #1e293b; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        .oswald-font { font-family: 'Oswald', sans-serif; letter-spacing: 0.05em; text-transform: uppercase; }
        
        .silver-text {
            background: linear-gradient(180deg, #ffffff 0%, #94a3b8 50%, #475569 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
        }

        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .ticker-wrapper { display: flex; width: max-content; animation: ticker 40s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .premium-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-radius: 2rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Zap = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;

        const ScannerAPI = {
          async getCandles(symbol, limit = 150, interval = '5m') {
            try {
              const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
              const data = await res.json();
              return data.map(d => ({
                time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]),
                low: parseFloat(d[3]), close: parseFloat(d[4]), volume: parseFloat(d[5])
              }));
            } catch(e) { return []; }
          }
        };

        const Speedometer = ({ value, label, color = "#3b82f6" }) => {
          const angle = -90 + (value / 100) * 180;
          return (
            <div className="flex flex-col items-center flex-1">
              <svg viewBox="0 0 100 60" className="w-12 h-8 overflow-visible">
                <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#e2e8f0" strokeWidth="6" strokeLinecap="round" />
                <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke={color} strokeWidth="6" strokeLinecap="round" strokeDasharray="125.6" strokeDashoffset={125.6 - (value/100)*125.6} style={{transition:'0.8s'}} />
                <circle cx="50" cy="50" r="4" fill={color} />
              </svg>
              <div className="text-lg font-black mt-1 text-slate-800">{Math.round(value)}</div>
              <div className="text-[8px] text-slate-400 font-bold uppercase tracking-widest">{label}</div>
            </div>
          );
        };

        const App = () => {
          const [isStarted, setIsStarted] = useState(false);
          const [phase, setPhase] = useState("СИНХРОНИЗАЦИЯ...");
          const [stats, setStats] = useState({ wins: 0, losses: 0, wr: 0 });
          const [signal, setSignal] = useState(null);
          const [timer, setTimer] = useState(null);
          const [price, setPrice] = useState(0);

          const chartContainer = useRef(null);
          const chart = useRef(null);
          const series = useRef(null);
          const engineActive = useRef(false);
          const markers = useRef([]);

          const speak = (text) => new Promise(resolve => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ru-RU'; u.rate = 1.0; u.onend = resolve;
            window.speechSynthesis.speak(u);
          });

          const runEngine = async () => {
            if (engineActive.current) return;
            engineActive.current = true;

            await speak("Система Слава Гордеев Пятый уровень активирована. Начинаю бэктест пятиминутного графика за последний час.");
            setPhase("БЭКТЕСТ 5M (1H)...");

            const history = await ScannerAPI.getCandles('BTCUSDT', 100, '5m');
            if (history.length > 50) {
              setPrice(history[history.length - 1].close);

              if (!chart.current && chartContainer.current) {
                chart.current = LightweightCharts.createChart(chartContainer.current, {
                  layout: { background: { color: 'white' }, textColor: '#64748b' },
                  grid: { vertLines: { visible: false }, horzLines: { color: '#f1f5f9' } },
                  timeScale: { borderVisible: false, timeVisible: true }
                });
                series.current = chart.current.addCandlestickSeries({ upColor: '#3b82f6', downColor: '#ef4444' });
                series.current.setData(history);
              }

              let wins = 0; let losses = 0;
              // Бэктест последних 15-20 свечей (около часа 5-минуток)
              const startIdx = history.length - 30;
              const endIdx = history.length - 4; // 15 мин = 3 свечи 5м

              for (let i = startIdx; i <= endIdx; i++) {
                const candle = history[i];
                const prev = history.slice(i - 10, i);
                const high = Math.max(...prev.map(c => c.high));
                const low = Math.min(...prev.map(c => c.low));

                let type = null;
                if (candle.high > high && candle.close < high) type = 'PUT';
                if (candle.low < low && candle.close > low) type = 'CALL';

                if (type) {
                  const entry = candle.close;
                  const exit = history[i + 3].close; // 3 свечи по 5м = 15м
                  const isWin = type === 'CALL' ? exit > entry : exit < entry;
                  
                  markers.current.push({ time: candle.time, position: type === 'CALL' ? 'belowBar' : 'aboveBar', color: type === 'CALL' ? '#3b82f6' : '#ef4444', shape: type === 'CALL' ? 'arrowUp' : 'arrowDown', text: 'ВХОД (5M)' });
                  markers.current.push({ time: history[i+3].time, position: isWin ? (type === 'CALL' ? 'aboveBar' : 'belowBar') : (type === 'CALL' ? 'aboveBar' : 'belowBar'), color: isWin ? '#10b981' : '#94a3b8', shape: 'circle', text: isWin ? 'ВИН (+)' : 'ЛОСС (-)' });
                  if (isWin) wins++; else losses++;
                  i += 3;
                }
              }

              const wr = (wins + losses) > 0 ? Math.round((wins / (wins + losses)) * 100) : 0;
              setStats({ wins, losses, wr });
              series.current.setMarkers(markers.current);

              await speak(`Бэктест завершен. На пятиминутках найдено ${wins+losses} реальных ситуаций. Винрейт за час составил ${wr} процентов.`);
              await speak("Перехожу к сканированию рынка. График активен.");

              while (engineActive.current) {
                setPhase("СКАНЕР: АНАЛИЗ 5-МИНУТ...");
                const live = await ScannerAPI.getCandles('BTCUSDT', 100, '5m');
                if (live.length > 0) {
                  const last = live[live.length - 1];
                  setPrice(last.close);
                  series.current.update(last);

                  const prev = live.slice(-15, -1);
                  const prevHigh = Math.max(...prev.map(c => c.high));
                  const prevLow = Math.min(...prev.map(c => c.low));

                  let liveType = null;
                  if (last.high > prevHigh && last.close < prevHigh) liveType = 'PUT';
                  if (last.low < prevLow && last.close > prevLow) liveType = 'CALL';

                  if (liveType) {
                    markers.current.push({ time: last.time, position: liveType === 'CALL' ? 'belowBar' : 'aboveBar', color: liveType === 'CALL' ? '#3b82f6' : '#ef4444', shape: liveType === 'CALL' ? 'arrowUp' : 'arrowDown', text: 'СИГНАЛ 5M' });
                    series.current.setMarkers(markers.current);
                    
                    setPhase(`ГОТОВЬТЕ: BTC (15 МИН)`);
                    await speak(`Внимание! Снятие ликвидности на пятиминутном графике. Подготовьте Биткоин. Время пятнадцать минут. Направление на ${liveType === 'CALL' ? 'повышение' : 'понижение'}.`);

                    let cancel = false;
                    for (let s = 5; s > 0; s--) {
                        setPhase(`СНАЙПЕР: ПРОВЕРКА... ${s}С`);
                        await new Promise(r => setTimeout(r, 1000));
                        const check = await ScannerAPI.getCandles('BTCUSDT', 1, '5m');
                        if (liveType === 'PUT' && check[0].close > prevHigh) cancel = true;
                        if (liveType === 'CALL' && check[0].close < prevLow) cancel = true;
                    }

                    if (cancel) {
                        setPhase("ОТМЕНА: ЛОЖНЫЙ ИМПУЛЬС");
                        await speak("Отмена. Цена ушла выше зоны интереса. Продолжаю поиск.");
                    } else {
                        setPhase("СИГНАЛ АКТИВЕН (5M)");
                        setSignal({ type: liveType, entry: last.close });
                        await speak("Вход подтвержден! Время экспирации пятнадцать минут. Жмите кнопку!");
                        let exp = 15 * 60;
                        while(exp > 0) { setTimer(exp); await new Promise(r => setTimeout(r, 1000)); exp--; }
                        setTimer(null); setSignal(null);
                        
                        const result = await ScannerAPI.getCandles('BTCUSDT', 1, '5m');
                        const isWin = liveType === 'CALL' ? result[0].close > last.close : result[0].close < last.close;
                        markers.current.push({ time: result[0].time, position: isWin ? 'aboveBar' : 'belowBar', color: isWin ? '#10b981' : '#94a3b8', shape: 'circle', text: isWin ? 'ВИН (+)' : 'ЛОСС (-)' });
                        series.current.setMarkers(markers.current);
                        if (isWin) {
                            setStats(p => ({ ...p, wins: p.wins + 1, wr: Math.round(((p.wins+1)/(p.wins+p.losses+1))*100) }));
                            await speak("Профит! Пятиминутная стратегия отработала идеально.");
                        } else {
                            setStats(p => ({ ...p, losses: p.losses + 1, wr: Math.round((p.wins/(p.wins+p.losses+1))*100) }));
                            await speak("Минус. Рынок пробил зону ликвидности.");
                        }
                    }
                  }
                }
                await new Promise(r => setTimeout(r, 10000)); // Сканируем 5м реже
              }
            }
          };

          if (!isStarted) {
            return (
              <div className="h-screen flex items-center justify-center bg-slate-100">
                <div className="premium-card p-12 text-center max-w-sm w-full">
                  <div className="w-20 h-20 bg-blue-500 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-lg"><Zap size={40} className="text-white" /></div>
                  <h1 className="text-4xl font-black text-slate-800 oswald-font leading-none mb-2">КРИПТО ЯДРО<br/><span className="text-blue-600">PRO MAX 5M</span></h1>
                  <p className="text-[10px] text-slate-400 font-bold tracking-[0.3em] uppercase mb-12">Institutional SMC Strategy</p>
                  <button onClick={() => { setIsStarted(true); runEngine(); }} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold oswald-font tracking-widest">ЗАПУСТИТЬ ТЕРМИНАЛ</button>
                </div>
              </div>
            );
          }

          return (
            <div className="h-screen flex flex-col">
              <div className="h-8 glass-panel overflow-hidden flex items-center shrink-0 border-b border-slate-200 bg-white">
                <div className="bg-slate-900 h-full px-4 text-[10px] font-black text-white flex items-center oswald-font tracking-widest z-10">РАДАР СЕТИ</div>
                <div className="ticker-wrapper text-[10px] text-slate-500 font-bold oswald-font">
                  {[...Array(2)].map((_, i) => <div key={i} className="flex gap-10 px-10"><span>• СНЯТИЕ ЛИКВИДНОСТИ НА ТАЙМФРЕЙМЕ 5M...</span><span>• ЭКСПИРАЦИЯ СДЕЛОК: 15 МИНУТ...</span><span>• РАЗРАБОТКА: SLAVA GORDEEV EDITION</span></div>)}
                </div>
              </div>

              <header className="px-6 py-4 flex justify-between items-center bg-white border-b border-slate-200">
                <div className="flex items-center gap-3">
                  <Zap size={28} className="text-blue-600" />
                  <div className="flex flex-col">
                    <h1 className="text-xl font-bold oswald-font leading-none italic">ТЕРМИНАЛ <span className="text-blue-600">PRO MAX</span></h1>
                    <span className="silver-text text-[11px] mt-1 tracking-widest uppercase">SLAVA GORDEEV</span>
                  </div>
                </div>
                <div className="px-4 py-1.5 bg-blue-50 text-blue-600 rounded-xl text-xs font-black oswald-font border border-blue-100 uppercase">{phase}</div>
              </header>

              <main className="flex-1 flex flex-col p-3 gap-3 overflow-hidden relative">
                <div className="flex-1 premium-card relative overflow-hidden flex flex-col p-4 bg-white">
                    <div className="flex justify-between items-center mb-4 relative z-10">
                        <div><div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Live 5M Analysis</div><div className="text-3xl font-black text-slate-800 oswald-font">BITCOIN PRO</div></div>
                        <div className="text-right text-xs font-bold text-slate-500 uppercase bg-slate-100 px-3 py-1 rounded-lg">SCAN: <span className="text-blue-600">5M</span> | EXP: <span className="text-blue-600">15M</span></div>
                    </div>
                    <div ref={chartContainer} className="flex-1 border border-slate-100 rounded-2xl overflow-hidden shadow-inner"></div>
                    
                    <div className="absolute bottom-6 left-6 right-6 p-6 bg-white/95 backdrop-blur-md border border-slate-200 rounded-[2.5rem] flex justify-between items-center shadow-2xl">
                        <div className="flex gap-6 flex-1">
                            <Speedometer value={85} label="СТРУКТУРА 5M" />
                            <Speedometer value={92} label="ЛИКВИДНОСТЬ" color="#06b6d4" />
                            <Speedometer value={stats.wr > 0 ? stats.wr : 50} label="ВИНРЕЙТ" color="#6366f1" />
                            <Speedometer value={stats.wins > 0 ? 90 : 10} label="SMART MONEY" color="#8b5cf6" />
                        </div>
                        <div className="w-[1px] h-12 bg-slate-200 mx-8"></div>
                        <div className="text-center">
                            <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">СИСТЕМНЫЙ ВИНРЕЙТ</div>
                            <div className={`text-4xl font-black oswald-font ${stats.wr >= 50 ? 'text-emerald-500' : 'text-slate-800'}`}>{stats.wr}%</div>
                        </div>
                    </div>
                </div>
              </main>

              <footer className="h-10 bg-white border-t border-slate-200 px-6 flex items-center justify-between text-[10px] font-black text-slate-400 uppercase tracking-widest">
                <div>СИСТЕМА БЕЗОПАСНОСТИ АКТИВНА • 5M ALGORITHM</div>
                <div className="text-blue-600 font-bold">LICENSE: SLAVA GORDEEV PRO MAX</div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
