<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BTC PRO MAX AI</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;overflow:hidden;background:#0f172a}
.os{font-family:'Orbitron',monospace}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:0.5}}
.puls{animation:pulse2 2s infinite}
@keyframes scan{0%{box-shadow:0 0 0 0 rgba(59,130,246,0.3)}70%{box-shadow:0 0 0 8px rgba(59,130,246,0)}100%{box-shadow:0 0 0 0 rgba(59,130,246,0)}}
.scanning{animation:scan 2s infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ===== API ===== */
const fetchCandles=async(sym,lim,iv)=>{
  try{
    const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${iv}&limit=${lim}`);
    const d=await r.json();
    if(!Array.isArray(d))return[];
    return d.map(c=>({time:Math.floor(c[0]/1000),open:+c[1],high:+c[2],low:+c[3],close:+c[4],volume:+c[5]}));
  }catch(e){return[];}
};

/* ===== INDICATORS ===== */
const calcEMA=(data,period)=>{
  if(data.length<period)return[];
  const k=2/(period+1);const result=[];
  let sum=0;
  for(let i=0;i<period;i++)sum+=data[i].close;
  result[period-1]=sum/period;
  for(let i=period;i<data.length;i++)result[i]=data[i].close*k+result[i-1]*(1-k);
  return result;
};

const calcATR=(data,period)=>{
  if(data.length<period+1)return 0;
  let sum=0;
  for(let i=data.length-period;i<data.length;i++){
    const h=data[i].high,l=data[i].low,pc=data[i-1]?data[i-1].close:data[i].open;
    sum+=Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc));
  }
  return sum/period;
};

const calcRSI=(data,period)=>{
  if(data.length<period+1)return 50;
  let gain=0,loss=0;
  for(let i=data.length-period;i<data.length;i++){
    const d=data[i].close-data[i-1].close;
    if(d>0)gain+=d;else loss-=d;
  }
  const ag=gain/period,al=loss/period;
  if(al===0)return 100;
  return 100-100/(1+ag/al);
};

const calcAvgVol=(data,period)=>{
  if(data.length<period)return 0;
  let s=0;
  for(let i=data.length-period;i<data.length;i++)s+=data[i].volume;
  return s/period;
};

/* ===== ANALYZE ===== */
const PS=20;

const analyzeCandle=(candles,idx)=>{
  if(idx<PS+1||idx<201)return null;
  const c=candles[idx];
  const prev=candles[idx-1];
  const zone=candles.slice(idx-PS,idx);
  const hi=Math.max(...zone.map(z=>z.high));
  const lo=Math.min(...zone.map(z=>z.low));
  const a=calcATR(candles.slice(0,idx+1),14);
  const r=calcRSI(candles.slice(0,idx+1),14);
  if(a===0)return null;

  const body=Math.abs(c.open-c.close);
  const range=c.high-c.low;
  if(range===0||body/range<0.45)return null;

  const av=calcAvgVol(candles.slice(0,idx+1),20);
  if(av>0&&c.volume<av*1.2)return null;

  const e5=calcEMA(candles.slice(0,idx+1),50);
  const e2=calcEMA(candles.slice(0,idx+1),200);
  const ce5=e5[e5.length-1];
  const ce2=e2[e2.length-1];
  const maxSweep=a*2.5;

  // PUT
  if(c.high>hi&&c.close<hi&&c.close<c.open){
    const sw=c.high-hi;
    if(sw>maxSweep||sw<a*0.05)return null;
    if(ce5&&ce2&&ce5>ce2*1.005)return null;
    if(r<45)return null;
    if(prev.high>hi*0.998)return null;
    return{type:'PUT',hi,lo,atr:a,rsi:r};
  }

  // CALL
  if(c.low<lo&&c.close>lo&&c.close>c.open){
    const sw=lo-c.low;
    if(sw>maxSweep||sw<a*0.05)return null;
    if(ce5&&ce2&&ce5<ce2*0.995)return null;
    if(r>55)return null;
    if(prev.low<lo*1.002)return null;
    return{type:'CALL',hi,lo,atr:a,rsi:r};
  }

  return null;
};

/* ===== SPEAK ===== */
let speaking=false;
const say=(text)=>new Promise(ok=>{
  if(!window.speechSynthesis)return ok();
  const go=()=>{
    if(speaking){setTimeout(go,300);return;}
    speaking=true;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ru-RU';u.rate=1.05;
    u.onend=()=>{speaking=false;ok();};
    u.onerror=()=>{speaking=false;ok();};
    window.speechSynthesis.speak(u);
  };
  go();
});

/* ===== APP ===== */
const App=()=>{
  const[started,setStarted]=useState(false);
  const[phase,setPhase]=useState('ОЖИДАНИЕ');
  const[price,setPrice]=useState(0);
  const[stats,setStats]=useState({w:0,l:0});
  const[signal,setSignal]=useState(null);
  const[timer,setTimer]=useState(null);
  const[rsiVal,setRsiVal]=useState(50);

  const chartBox=useRef(null);
  const chartRef=useRef(null);
  const seriesRef=useRef(null);
  const running=useRef(false);
  const markers=useRef([]);

  const wr=stats.w+stats.l>0?Math.round(stats.w/(stats.w+stats.l)*100):0;

  const initChart=(data)=>{
    if(chartRef.current||!chartBox.current)return;
    chartRef.current=LightweightCharts.createChart(chartBox.current,{
      autoSize:true,
      layout:{background:{color:'#ffffff'},textColor:'#64748b',fontSize:11},
      grid:{vertLines:{visible:false},horzLines:{color:'#f1f5f9'}},
      timeScale:{borderVisible:false,timeVisible:true,secondsVisible:false}
    });
    seriesRef.current=chartRef.current.addCandlestickSeries({
      upColor:'#3b82f6',downColor:'#ef4444',
      borderUpColor:'#3b82f6',borderDownColor:'#ef4444',
      wickUpColor:'#3b82f6',wickDownColor:'#ef4444'
    });
    seriesRef.current.setData(data);
  };

  const backtest=(data)=>{
    let w=0,l=0;
    const start=Math.max(PS+201,data.length-100);
    for(let i=start;i<=data.length-4;i++){
      const r=analyzeCandle(data,i);
      if(!r)continue;
      markers.current.push({
        time:data[i].time,
        position:r.type==='CALL'?'belowBar':'aboveBar',
        color:'#f59e0b',
        shape:r.type==='CALL'?'arrowUp':'arrowDown',
        text:'⚡'
      });
      const end=Math.min(i+3,data.length-1);
      const isWin=r.type==='CALL'?data[end].close>data[i+1].open:data[end].close<data[i+1].open;
      markers.current.push({
        time:data[end].time,
        position:isWin?'aboveBar':'belowBar',
        color:isWin?'#10b981':'#f43f5e',
        shape:'square',
        text:isWin?'W':'L'
      });
      if(isWin)w++;else l++;
      i+=3;
    }
    markers.current.sort((a,b)=>a.time-b.time);
    if(seriesRef.current)seriesRef.current.setMarkers(markers.current);
    setStats({w,l});
    return{w,l};
  };

  const liveLoop=async()=>{
    while(running.current){
      try{
        setPhase('СКАНИРОВАНИЕ');
        const data=await fetchCandles('BTCUSDT',300,'5m');
        if(data.length<250){await new Promise(r=>setTimeout(r,5000));continue;}

        const last=data[data.length-1];
        setPrice(last.close);
        setRsiVal(Math.round(calcRSI(data,14)));

        try{seriesRef.current.update(last);}catch(e){}

        const result=analyzeCandle(data,data.length-1);

        if(result){
          setSignal({type:result.type,entry:last.close,status:'CHECK'});
          setPhase('ПРОВЕРКА');
          await say(`Сигнал! ${result.type==='CALL'?'Вверх':'Вниз'}`);

          for(let s=3;s>0;s--){
            setPhase(`ПРОВЕРКА ${s}`);
            await new Promise(r=>setTimeout(r,1000));
          }

          setSignal({type:result.type,entry:last.close,status:'ACTIVE'});
          setPhase('СДЕЛКА');
          await say('Вход! Открывайте сделку!');

          markers.current.push({
            time:last.time,
            position:result.type==='CALL'?'belowBar':'aboveBar',
            color:'#f59e0b',
            shape:result.type==='CALL'?'arrowUp':'arrowDown',
            text:'⚡LIVE'
          });
          markers.current.sort((a,b)=>a.time-b.time);
          seriesRef.current.setMarkers(markers.current);

          let exp=900;
          while(exp>0&&running.current){
            setTimer(exp);
            await new Promise(r=>setTimeout(r,1000));
            exp--;
            if(exp%15===0){
              try{const p=await fetchCandles('BTCUSDT',2,'1m');
              if(p.length>0)setPrice(p[p.length-1].close);}catch(e){}
            }
          }
          setTimer(null);

          try{
            const rd=await fetchCandles('BTCUSDT',2,'5m');
            if(rd.length>0){
              const ec=rd[rd.length-1];
              const isWin=result.type==='CALL'?ec.close>last.close:ec.close<last.close;
              setStats(p=>({w:p.w+(isWin?1:0),l:p.l+(isWin?0:1)}));
              await say(isWin?'Профит!':'Минус');
            }
          }catch(e){}
          setSignal(null);
        }
      }catch(e){console.error(e);}
      await new Promise(r=>setTimeout(r,5000));
    }
  };

  const startSystem=async()=>{
    setStarted(true);
    running.current=true;
    try{new(window.AudioContext||window.webkitAudioContext)().resume();}catch(e){}

    setPhase('ЗАГРУЗКА');
    await say('Система запущена');

    const data=await fetchCandles('BTCUSDT',500,'5m');
    if(data.length<250){setPhase('ОШИБКА API');return;}

    setPrice(data[data.length-1].close);
    initChart(data);

    const bt=backtest(data);
    const total=bt.w+bt.l;
    const wrr=total>0?Math.round(bt.w/total*100):0;
    await say(`Бэктест завершён. ${total} сигналов. Винрейт ${wrr} процентов`);

    liveLoop();
  };

  /* === RENDER === */
  if(!started)return(
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#0f172a,#1e3a5f,#0f172a)',flexDirection:'column'}}>
      <div className="os" style={{fontSize:48,color:'#fff',marginBottom:8}}>BTC PRO MAX</div>
      <div style={{color:'#60a5fa',fontSize:16,marginBottom:40}}>AI TRADING SYSTEM V2</div>
      <button onClick={startSystem} style={{background:'#2563eb',color:'#fff',border:'none',padding:'16px 48px',borderRadius:16,fontSize:20,cursor:'pointer',fontWeight:900}}>
        🚀 ЗАПУСТИТЬ
      </button>
      <div style={{color:'#64748b',fontSize:11,marginTop:20}}>5-FILTER ENGINE • BTCUSDT • 5min</div>
    </div>
  );

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#f8fafc'}}>

      {/* HEADER */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 16px',background:'#fff',borderBottom:'1px solid #e2e8f0'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:'#3b82f6'}} className="puls"/>
          <span className="os" style={{fontSize:16,fontWeight:900}}>BTC PRO MAX AI</span>
          <span style={{fontSize:10,background:'#f1f5f9',padding:'2px 8px',borderRadius:99,color:'#64748b',fontWeight:700}}>{phase}</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <span style={{fontSize:18,fontWeight:900}}>${price?price.toFixed(2):'...'}</span>
          {timer!==null&&<span style={{fontSize:12,background:'#fef3c7',color:'#92400e',padding:'2px 10px',borderRadius:8,fontWeight:700}}>
            ⏱ {Math.floor(timer/60)}:{String(timer%60).padStart(2,'0')}
          </span>}
        </div>
      </div>

      {/* BODY */}
      <div style={{flex:1,display:'flex',overflow:'hidden',padding:12,gap:12}}>

        {/* LEFT */}
        <div style={{width:240,display:'flex',flexDirection:'column',gap:12}}>

          {/* SIGNAL */}
          <div className="card" style={{padding:16,textAlign:'center',background:signal?(signal.type==='CALL'?'#ecfdf5':'#fef2f2'):'#fff'}}>
            <div style={{fontSize:10,color:'#94a3b8',fontWeight:700}}>СИГНАЛ</div>
            {signal?(
              <div>
                <div className="os" style={{fontSize:32,color:signal.type==='CALL'?'#10b981':'#ef4444',marginTop:4}}>
                  {signal.type==='CALL'?'📈 CALL':'📉 PUT'}
                </div>
                <div style={{fontSize:11,color:'#64748b',marginTop:4}}>ВХОД: ${signal.entry?.toFixed(2)}</div>
                <div style={{fontSize:10,color:signal.status==='ACTIVE'?'#10b981':'#f59e0b',fontWeight:700,marginTop:4}}>
                  {signal.status==='ACTIVE'?'✅ АКТИВЕН':'🔄 ПРОВЕРКА'}
                </div>
              </div>
            ):(<div style={{fontSize:28,color:'#cbd5e1',padding:8}}>—</div>)}
          </div>

          {/* STATS */}
          <div className="card" style={{padding:16}}>
            <div style={{fontSize:10,color:'#94a3b8',fontWeight:700,marginBottom:8}}>СТАТИСТИКА</div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
              <span style={{color:'#10b981',fontWeight:900}}>WIN: {stats.w}</span>
              <span style={{color:'#ef4444',fontWeight:900}}>LOSS: {stats.l}</span>
            </div>
            <div style={{width:'100%',background:'#f1f5f9',borderRadius:99,height:8,marginBottom:4}}>
              <div style={{width:`${wr}%`,background:wr>=65?'#10b981':wr>=50?'#f59e0b':'#ef4444',height:8,borderRadius:99,transition:'width 0.5s'}}/>
            </div>
            <div className="os" style={{textAlign:'center',fontSize:24,color:wr>=65?'#10b981':wr>=50?'#f59e0b':'#ef4444',fontWeight:900}}>
              {wr}%
            </div>
          </div>

          {/* RSI */}
          <div className="card" style={{padding:16,textAlign:'center'}}>
            <div style={{fontSize:10,color:'#94a3b8',fontWeight:700}}>RSI (14)</div>
            <div className="os" style={{fontSize:28,color:rsiVal>60?'#ef4444':rsiVal<40?'#10b981':'#3b82f6',fontWeight:900}}>
              {rsiVal}
            </div>
          </div>

          {/* FILTERS */}
          <div className="card" style={{padding:12}}>
            <div style={{fontSize:10,color:'#94a3b8',fontWeight:700,marginBottom:8}}>5 ФИЛЬТРОВ</div>
            {['Sweep Detect','Body Ratio','Volume x1.2','EMA Trend','RSI Filter'].map((f,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:signal?'#10b981':'#cbd5e1'}}/>
                <span style={{fontSize:10,color:'#64748b',flex:1}}>{f}</span>
                <span style={{fontSize:9,fontWeight:700,color:signal?'#10b981':'#94a3b8'}}>{signal?'✓':'—'}</span>
              </div>
            ))}
          </div>
        </div>

        {/* CHART */}
        <div className="card" style={{flex:1}}>
          <div ref={chartBox} style={{width:'100%',height:'100%'}}/>
        </div>
      </div>

      {/* FOOTER */}
      <div style={{display:'flex',justifyContent:'space-between',padding:'6px 16px',background:'#fff',borderTop:'1px solid #e2e8f0'}}>
        <span style={{fontSize:9,color:'#94a3b8'}}>BINANCE BTCUSDT • 5m • 5-FILTER</span>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <div style={{width:5,height:5,borderRadius:'50%',background:'#10b981'}} className="puls"/>
          <span style={{fontSize:9,color:'#94a3b8'}}>LIVE</span>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
