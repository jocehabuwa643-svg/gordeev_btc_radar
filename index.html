    <style>

        @keyframes menu-expand {

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const Shield = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 4.81 17 6 19 6a1 1 0 0 1 1 1z"/></svg>;
        const Cpu = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>;
        const Globe = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
        const Clock = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const TrendingUp = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const Radar = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/><path d="M4 5.49A10 10 0 0 0 5.3 19.38"/><path d="M20 8.74A10 10 0 0 1 17.38 20"/><path d="M16 8a6 6 0 0 0-8.5-1.5"/><path d="M7.5 16.5a6 6 0 0 0 9.2-.5"/><path d="M12 12v.01"/></svg>;
        const Zap = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;

        const ASSETS = [
          { pair: 'BTC/USDT', symbol: 'BTCUSDT', name: 'Bitcoin', voiceName: 'биткоин' }
        ];

        const FALLBACK_BTC_NEWS = [
          "Крупный капитал формирует пулы ликвидности за локальными экстремумами.",
          "Паттерн снятия ликвидности (SMC) подтверждает смену структуры рынка.",
          "Зафиксирован ложный пробой диапазона с последующим CHoCH.",
          "Маркетмейкер собирает стопы розничных трейдеров перед разворотом."
        ];

        // --- ADAPTIVE STRATEGY CONFIGURATION (CLEAN CORE SMC) ---
        const STRATEGY_CONFIG = {
            NORMAL: {
                modeId: 'NORMAL',
                minScore: 55,
                requireMSS: false,         // Слом структуры желателен, но не обязателен при сильном rejection
                impulseTrapThreshold: 1.5, // Порог импульса (в ATR), после которого нужен сильный Reject
            },
            REINFORCED: {
                modeId: 'REINFORCED',
                minScore: 70,
                requireMSS: true,          // В усиленном режиме СЛОМ СТРУКТУРЫ ОБЯЗАТЕЛЕН
                impulseTrapThreshold: 1.3, // В усиленном режиме мы боимся резких пробоев сильнее
            }
        };

        const ScannerAPI = {
          async getCandles(symbol, count = 250, interval = '5m') { 
            const urls = [
                `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api1.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api2.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://data-api.binance.vision/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`
            ];
            
            for (let url of urls) {
                try {
                    let response = await fetch(url);
                    if (response.ok) {
                        const data = await response.json();
                        const mapped = data.map(d => ({
                            time: d[0] / 1000,
                            open: parseFloat(d[1]),
                            high: parseFloat(d[2]),
                            low: parseFloat(d[3]),
                            close: parseFloat(d[4]),
                            volume: parseFloat(d[5])
                        }));
                        
                        const unique = new Map();
                        mapped.forEach(c => unique.set(c.time, c));
                        return Array.from(unique.values()).sort((a, b) => a.time - b.time);
                    }
                } catch(e) { continue; }
            }
            throw new Error("API BINANCE НЕДОСТУПЕН");
          }
        };

        const formatPrice = (p) => {
            if (!p && p !== 0) return '0.00';
            if (p >= 1000) return p.toFixed(2);
            if (p >= 10) return p.toFixed(3);
            if (p >= 1) return p.toFixed(4);
            return p.toFixed(5);
        };

        function calcLiquidityZones(data, period = 15) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) {
                    res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low });
                    continue;
                }
                let high = -Infinity;
                let low = Infinity;
                for (let j = 1; j <= period; j++) {
                    high = Math.max(high, data[i - j].high);
                    low = Math.min(low, data[i - j].low);
                }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;
        }

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { 
                    res.push({time: data[i].time, value: data[i].high - data[i].low}); 
                    continue; 
                }
                let sumTR = 0;
                let count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j];
                    const prevC = data[i - j - 1];
                    let tr = Math.max(
                        c.high - c.low,
                        Math.abs(c.high - prevC.close),
                        Math.abs(c.low - prevC.close)
                    );
                    sumTR += tr;
                    count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;
        }

        // --- ЧИСТОЕ ЯДРО SMC (Liquidity Sweep, Reclaim & Confirmation) ---
        function evaluateSweepSetup(data, idx, zonesArr, atrArr, config, logCallback = null) {
            if (idx < 2 || !zonesArr || !atrArr || !zonesArr[idx] || !zonesArr[idx - 1] || !atrArr[idx]) {
                return { isCall: false, isPut: false };
            }

            const curr = data[idx];
            const prev = data[idx - 1];
            const prePrev = data[idx - 2];

            const currZones = zonesArr[idx];
            const prevZones = zonesArr[idx - 1];
            const cAtr = atrArr[idx].value || 0.0001;

            const candleStats = (c) => {
                const size = Math.max(c.high - c.low, 0.0001);
                const body = Math.abs(c.close - c.open);
                const topWick = c.high - Math.max(c.open, c.close);
                const bottomWick = Math.min(c.open, c.close) - c.low;

                return {
                    size,
                    body,
                    topWick,
                    bottomWick,
                    isBull: c.close > c.open,
                    isBear: c.close < c.open,
                };
            };

            const isChoppyRange = (currZones.upper - currZones.lower) < cAtr * 0.55;

            let putCandidate = null;
            let callCandidate = null;

            // --- PUT: same candle sweep + reclaim
            if (curr.high > currZones.upper && curr.close < currZones.upper) {
                putCandidate = {
                    sweepCandle: curr,
                    confirmCandle: curr,
                    sweepLevel: currZones.upper,
                    mode: 'same_candle'
                };
            }
            // --- PUT: previous candle swept old pool, current candle reclaimed old level
            else if (
                prev.high > prevZones.upper &&
                prev.close >= prevZones.upper &&
                curr.close < prevZones.upper
            ) {
                putCandidate = {
                    sweepCandle: prev,
                    confirmCandle: curr,
                    sweepLevel: prevZones.upper,
                    mode: 'two_candle_reclaim'
                };
            }

            // --- CALL: same candle sweep + reclaim
            if (curr.low < currZones.lower && curr.close > currZones.lower) {
                callCandidate = {
                    sweepCandle: curr,
                    confirmCandle: curr,
                    sweepLevel: currZones.lower,
                    mode: 'same_candle'
                };
            }
            // --- CALL: previous candle swept old pool, current candle reclaimed old level
            else if (
                prev.low < prevZones.lower &&
                prev.close <= prevZones.lower &&
                curr.close > prevZones.lower
            ) {
                callCandidate = {
                    sweepCandle: prev,
                    confirmCandle: curr,
                    sweepLevel: prevZones.lower,
                    mode: 'two_candle_reclaim'
                };
            }

            const threshold = config.minScore;
            let isPut = false;
            let isCall = false;

            const logResult = (time, dir, status, confirms, penalties, score, modeId) => {
                if (!logCallback) return;
                logCallback(
                    time,
                    dir,
                    status,
                    `[${modeId}] Score: ${score}/${threshold} | [+] ${confirms.join(', ') || '—'} | [-] ${penalties.join(', ') || '—'}`
                );
            };

            // ---------------- PUT ----------------
            if (putCandidate) {
                const sweepStats = candleStats(putCandidate.sweepCandle);
                const confirmStats = candleStats(putCandidate.confirmCandle);

                const sweepDepth = putCandidate.sweepCandle.high - putCandidate.sweepLevel;
                const reclaimDistance = putCandidate.sweepLevel - putCandidate.confirmCandle.close;
                const structureShift =
                    putCandidate.confirmCandle.close < prev.low ||
                    putCandidate.confirmCandle.close < prePrev.low;

                // Защита от импульсной ловушки (Анти-импульс)
                const isImpulseTrap = sweepStats.size > cAtr * config.impulseTrapThreshold;

                let score = 20;
                const confirms = ['Sweep+Reclaim'];
                const penalties = [];

                if (sweepDepth >= cAtr * 0.08) {
                    score += 10;
                    confirms.push('SweepDepth');
                } else {
                    score -= 10;
                    penalties.push('Мелкий sweep');
                }

                if (sweepStats.topWick >= sweepStats.size * 0.35) {
                    score += 20;
                    confirms.push('Rejection');
                }

                if (confirmStats.isBear && confirmStats.body >= confirmStats.size * 0.35) {
                    score += 20;
                    confirms.push('BearDisplacement');
                }

                if (reclaimDistance >= cAtr * 0.10) {
                    score += 15;
                    confirms.push('SolidReclaim');
                } else {
                    score -= 10;
                    penalties.push('Слабый возврат');
                }

                if (structureShift) {
                    score += 20;
                    confirms.push('MSS');
                } else {
                    if (config.requireMSS) {
                        score -= 40;
                        penalties.push('Нет слома (Обязательно в REINFORCED)');
                    } else {
                        score -= 10;
                        penalties.push('Нет слома');
                    }
                }

                // Логика защиты от ловушки на резких выстрелах вверх
                if (isImpulseTrap) {
                    if (sweepStats.topWick < sweepStats.size * 0.4 && confirmStats.body < confirmStats.size * 0.4) {
                        score -= 40;
                        penalties.push('ИМПУЛЬСНАЯ ЛОВУШКА (опасно)');
                    } else {
                        score += 10;
                        confirms.push('Импульс поглощен');
                    }
                }

                // Дополнительные штрафы для REINFORCED
                if (config.modeId === 'REINFORCED' && putCandidate.mode === 'two_candle_reclaim' && !confirmStats.isBear) {
                    score -= 25;
                    penalties.push('Слабое подтверждение (REINFORCED)');
                }

                if (isChoppyRange) {
                    score -= 20;
                    penalties.push('Шум/узкий канал');
                }

                if (score >= threshold) {
                    isPut = true;
                    logResult(curr.time, 'PUT', 'ПРИНЯТ', confirms, penalties, score, config.modeId);
                } else {
                    logResult(curr.time, 'PUT', 'ОТКЛОНЁН', confirms, penalties, score, config.modeId);
                }
            }

            // ---------------- CALL ----------------
            if (callCandidate && !isPut) {
                const sweepStats = candleStats(callCandidate.sweepCandle);
                const confirmStats = candleStats(callCandidate.confirmCandle);

                const sweepDepth = callCandidate.sweepLevel - callCandidate.sweepCandle.low;
                const reclaimDistance = callCandidate.confirmCandle.close - callCandidate.sweepLevel;
                const structureShift =
                    callCandidate.confirmCandle.close > prev.high ||
                    callCandidate.confirmCandle.close > prePrev.high;

                // Защита от импульсной ловушки (Анти-импульс)
                const isImpulseTrap = sweepStats.size > cAtr * config.impulseTrapThreshold;

                let score = 20;
                const confirms = ['Sweep+Reclaim'];
                const penalties = [];

                if (sweepDepth >= cAtr * 0.08) {
                    score += 10;
                    confirms.push('SweepDepth');
                } else {
                    score -= 10;
                    penalties.push('Мелкий sweep');
                }

                if (sweepStats.bottomWick >= sweepStats.size * 0.35) {
                    score += 20;
                    confirms.push('Rejection');
                }

                if (confirmStats.isBull && confirmStats.body >= confirmStats.size * 0.35) {
                    score += 20;
                    confirms.push('BullDisplacement');
                }

                if (reclaimDistance >= cAtr * 0.10) {
                    score += 15;
                    confirms.push('SolidReclaim');
                } else {
                    score -= 10;
                    penalties.push('Слабый возврат');
                }

                if (structureShift) {
                    score += 20;
                    confirms.push('MSS');
                } else {
                    if (config.requireMSS) {
                        score -= 40;
                        penalties.push('Нет слома (Обязательно в REINFORCED)');
                    } else {
                        score -= 10;
                        penalties.push('Нет слома');
                    }
                }

                // Логика защиты от ловушки на резких проливах вниз
                if (isImpulseTrap) {
                    if (sweepStats.bottomWick < sweepStats.size * 0.4 && confirmStats.body < confirmStats.size * 0.4) {
                        score -= 40;
                        penalties.push('ИМПУЛЬСНАЯ ЛОВУШКА (опасно)');
                    } else {
                        score += 10;
                        confirms.push('Импульс поглощен');
                    }
                }

                // Дополнительные штрафы для REINFORCED
                if (config.modeId === 'REINFORCED' && callCandidate.mode === 'two_candle_reclaim' && !confirmStats.isBull) {
                    score -= 25;
                    penalties.push('Слабое подтверждение (REINFORCED)');
                }

                if (isChoppyRange) {
                    score -= 20;
                    penalties.push('Шум/узкий канал');
                }

                if (score >= threshold) {
                    isCall = true;
                    logResult(curr.time, 'CALL', 'ПРИНЯТ', confirms, penalties, score, config.modeId);
                } else {
                    logResult(curr.time, 'CALL', 'ОТКЛОНЁН', confirms, penalties, score, config.modeId);
                }
            }

            return { isCall, isPut };
        }

        const App = () => {
          const [isStarted, setIsStarted] = useState(false);

          const [metrics, setMetrics] = useState({ structure: 50, liquidity: 50, filterLevel: 60, smartMoney: 0, buyPressure: 50 });
          const [newsHeadlines, setNewsHeadlines] = useState(["ОБНОВЛЕНИЕ ДАННЫХ BTC..."]);
          const [tradeStats, setTradeStats] = useState({ wins: 0, losses: 0, winRate: 0 });
          
          const [statusColorClass, setStatusColorClass] = useState('text-slate-800');
          
          const chartContainerRef = useRef(null);

          const fullNewsPool = useRef([...FALLBACK_BTC_NEWS]);

          useEffect(() => {

          const fetchNews = async () => {

                  let btcItems = [];
                  for(let u of urls) {

                                  .filter(item => /биткоин|btc|bitcoin/i.test(item.title))

          useEffect(() => {

          useEffect(() => {

          const addLog = useCallback((msg, isAi = false) => {
            const prefix = isAi ? 'SMC АНАЛИЗ:' : 'СИСТЕМА:';
            setLogs(p => [`${prefix} ${msg}`, ...p].slice(0, 8)); 
          }, []);

          const playSound = (type) => {
            if (!audioCtx.current) return;
            const ctx = audioCtx.current;
            if (ctx.state === 'suspended') ctx.resume();
            
            const playTone = (freq, oscType, dur, vol, delay = 0) => {
                try {
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = oscType;
                    o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
                    g.gain.setValueAtTime(0, ctx.currentTime + delay);
                    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(ctx.currentTime + delay);
                    o.stop(ctx.currentTime + delay + dur);
                } catch (e) {}
            };

            if (type === 'scan') playTone(1200 + Math.random()*300, 'sine', 0.03, 0.005);
            if (type === 'found') { playTone(600, 'triangle', 0.1, 0.03); playTone(800, 'triangle', 0.1, 0.03, 0.1); }
            if (type === 'tf_change') playTone(800, 'sine', 0.1, 0.02);
            if (type === 'start') { 
                playTone(523.25, 'sine', 0.4, 0.03); 
                playTone(659.25, 'sine', 0.5, 0.03, 0.1); 
                playTone(783.99, 'sine', 0.6, 0.04, 0.2); 
            }
            if (type === 'win') { 
                playTone(523.25, 'triangle', 0.4, 0.04); 
                playTone(659.25, 'triangle', 0.5, 0.04, 0.1); 
                playTone(783.99, 'triangle', 0.8, 0.05, 0.2); 
            }
            if (type === 'loss') { 
                playTone(300, 'sawtooth', 0.4, 0.03); 
                playTone(250, 'sawtooth', 0.6, 0.04, 0.2); 
            }
            if (type === 'cancel') {
                playTone(400, 'square', 0.1, 0.04); 
                playTone(300, 'square', 0.2, 0.04, 0.15); 
            }
          };

          const speak = (text) => new Promise(res => {
            if (!window.speechSynthesis) return res();
            window.speechSynthesis.cancel(); 
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ru-RU'; 
            u.rate = 1.05; 
            u.pitch = 0.95; 
            
            let resolved = false;
            let fallbackTimer;

            const resolveOnce = () => {
                if (!resolved) {
                    resolved = true;
                    clearTimeout(fallbackTimer);
                    setTimeout(res, 200); 
                }
            };

            u.onend = resolveOnce; 
            u.onerror = resolveOnce;
            
            try {
                window.speechSynthesis.speak(u);
            } catch(e) { resolveOnce(); }
            
            fallbackTimer = setTimeout(resolveOnce, Math.max(3000, text.length * 80)); 
          });

          // --- TRADE VISUALIZATION LOOP ---
          useEffect(() => {
            if (!isStarted) return;
            let animationFrameId;

            const syncOverlays = () => {
                if (chartInstance.current && candleSeries.current && tradeBoxesContainerRef.current) {
                    const timeScale = chartInstance.current.timeScale();
                    const series = candleSeries.current;

                    let html = '';
                    tradesRef.current.forEach(trade => {
                        const startX = timeScale.timeToCoordinate(trade.signalTime);
                        let endX = timeScale.timeToCoordinate(trade.exitTime);

                        if (startX === null) return; 

                        if (endX === null) {
                            const timeDiff = trade.exitTime - trade.signalTime;
                            const p1 = timeScale.timeToCoordinate(trade.signalTime);
                            const p2 = timeScale.timeToCoordinate(trade.signalTime - 300);
                            if (p1 !== null && p2 !== null) {
                                const candleW = Math.abs(p1 - p2);
                                endX = startX + (timeDiff / 300) * candleW;
                            } else {
                                endX = startX + 40; 
                            }
                        }

                        const boxLeft = startX; 
                        const boxRight = endX;
                        const boxWidth = Math.max(boxRight - boxLeft, 2);

                        const padding = (trade.maxHigh - trade.minLow) * 0.1;
                        const topY = series.priceToCoordinate(trade.maxHigh + padding);
                        const bottomY = series.priceToCoordinate(trade.minLow - padding);

                        if (topY === null || bottomY === null) return;

                        const boxHeight = Math.max(bottomY - topY, 4);
                        const isWin = trade.result === 'WIN';
                        const isPending = trade.result === 'PENDING';
                        
                        let baseColor = '148, 163, 184'; // slate
                        if (isWin) baseColor = '14, 165, 233'; // cyan
                        if (trade.result === 'LOSS') baseColor = '244, 63, 94'; // rose
                        if (isPending) baseColor = '245, 158, 11'; // amber

                        let entryX = timeScale.timeToCoordinate(trade.entryTime) || (startX + boxWidth * 0.2);

                        trade.screenLeft = boxLeft;
                        trade.screenRight = boxRight;
                        trade.screenTop = topY;
                        trade.screenBottom = bottomY;

                        // МИНИМАЛИСТИЧНЫЙ ДИЗАЙН РАМКИ
                        html += `
                            <div class="trade-box" data-id="${trade.id}" style="position:absolute; left:${boxLeft}px; top:${topY}px; width:${boxWidth}px; height:${boxHeight}px; background: rgba(${baseColor}, 0.08); border: 1px solid rgba(${baseColor}, 0.5); border-radius: 4px; pointer-events: none; z-index: 5; transition: background 0.3s;">
                                <!-- Dotted Entry Line -->
                                <div style="position:absolute; left:${Math.max(0, entryX - boxLeft)}px; top:0; bottom:0; border-left: 1px dotted rgba(${baseColor}, 0.8);"></div>
                                
                                <!-- Clean Compact Tag -->
                                <div style="position:absolute; right: 2px; bottom: 2px; font-size: 10px; font-weight: 800; color: rgba(${baseColor}, 1); font-family: 'JetBrains Mono', monospace; text-shadow: 0 1px 3px rgba(0,0,0,0.5);">
                                    ${isPending ? '...' : (isWin ? 'W' : 'L')}
                                </div>
                            </div>
                        `;
                    });
                    tradeBoxesContainerRef.current.innerHTML = html;
                }
                animationFrameId = requestAnimationFrame(syncOverlays);
            };

            syncOverlays();
            return () => cancelAnimationFrame(animationFrameId);
          }, [isStarted, viewMode]);

          // --- TOOLTIP HOVER LOGIC ---
          useEffect(() => {
            if (!isStarted || !chartInstance.current) return;
            
            const handleCrosshairMove = (param) => {
                const tooltip = document.getElementById('chart-tooltip');
                if (!tooltip) return;

                if (!param.point || !param.time) {
                    tooltip.style.opacity = '0';
                    return;
                }

                const x = param.point.x;
                const y = param.point.y;

                const hoveredTrade = tradesRef.current.find(t => 
                    x >= t.screenLeft && x <= t.screenRight &&
                    y >= t.screenTop && y <= t.screenBottom
                );

                if (hoveredTrade) {
                    const isWin = hoveredTrade.result === 'WIN';
                    const isPending = hoveredTrade.result === 'PENDING';
                    let colorClass = 'text-slate-400';
                    if (isWin) colorClass = 'text-cyan-400';
                    if (hoveredTrade.result === 'LOSS') colorClass = 'text-rose-400';
                    if (isPending) colorClass = 'text-amber-400';

                    const sigTime = new Date(hoveredTrade.signalTime * 1000).toLocaleTimeString('ru-RU');
                    const entTime = new Date(hoveredTrade.entryTime * 1000).toLocaleTimeString('ru-RU');
                    const extTime = new Date(hoveredTrade.exitTime * 1000).toLocaleTimeString('ru-RU');

                    tooltip.innerHTML = `
                        <div class="font-bold border-b border-slate-600/50 pb-1 mb-2 text-center ${colorClass} uppercase tracking-widest text-[11px]">${hoveredTrade.direction} • ${hoveredTrade.result}</div>
                        <div class="flex justify-between gap-6 mt-1">
                            <span class="text-slate-400">Сигнал:</span>
                            <span class="font-mono font-bold text-slate-200">${sigTime}</span>
                        </div>
                        <div class="flex justify-between gap-6 mt-1">
                            <span class="text-slate-400">Вход:</span>
                            <span class="font-mono font-bold text-slate-200">${entTime} @ ${formatPrice(hoveredTrade.entryPrice)}</span>
                        </div>
                        <div class="flex justify-between gap-6 mt-1">
                            <span class="text-slate-400">Выход:</span>
                            <span class="font-mono font-bold text-slate-200">${isPending ? '--:--' : extTime} @ ${formatPrice(hoveredTrade.exitPrice)}</span>
                        </div>
                    `;
                    
                    tooltip.style.left = `${x}px`;
                    tooltip.style.top = `${hoveredTrade.screenTop - 15}px`;
                    tooltip.style.opacity = '1';
                } else {
                    tooltip.style.opacity = '0';
                }
            };

            chartInstance.current.subscribeCrosshairMove(handleCrosshairMove);
            return () => {
                if (chartInstance.current) chartInstance.current.unsubscribeCrosshairMove(handleCrosshairMove);
            }
          }, [isStarted, viewMode]);

          const safeSetMarkers = (markersArr) => {
              if (!candleSeries.current) return;
              try {
                  const sorted = [...markersArr].sort((a, b) => a.time - b.time);
                  candleSeries.current.setMarkers(sorted);
              } catch (e) {
                  console.error("Ошибка установки маркеров на график", e);
              }
          };

          const initChart = async () => {
            if (!chartContainerRef.current) return;
            if (!window.LightweightCharts) {
              await new Promise(resolve => {
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js';
                script.onload = resolve; document.head.appendChild(script);
              });
            }

            if (chartInstance.current) {
                return;
            }

            try {
                const mainChart = window.LightweightCharts.createChart(chartContainerRef.current, {
                  autoSize: true,
                  layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#475569', fontFamily: 'JetBrains Mono' },
                  grid: { vertLines: { color: 'rgba(148, 163, 184, 0.2)' }, horzLines: { color: 'rgba(148, 163, 184, 0.2)' } },
                  timeScale: { borderVisible: false, timeVisible: true, secondsVisible: false },
                  rightPriceScale: { borderVisible: false }
                });

                candleSeries.current = mainChart.addCandlestickSeries({ 
                  upColor: '#0ea5e9', 
                  downColor: '#ef4444', 
                  borderVisible: true, 
                  borderUpColor: '#0ea5e9', 
                  borderDownColor: '#ef4444', 
                  wickUpColor: '#0ea5e9', 
                  wickDownColor: '#ef4444'
                });

                chartInstance.current = mainChart;
            } catch(e) {
                console.error("Ошибка инициализации графика", e);
                addLog("ОШИБКА ГРАФИКА: Сбой отрисовки интерфейса", true);
            }
          };

          const clearChartExtras = () => {
              if (!chartInstance.current || !candleSeries.current) return;
              
              priceLinesRef.current.forEach(l => {
                  try { candleSeries.current.removePriceLine(l); } catch(e){}
              });
              priceLinesRef.current = [];
              
              extraSeriesRef.current.forEach(s => {
                  try { chartInstance.current.removeSeries(s); } catch(e){}
              });
              extraSeriesRef.current = [];
          };

          const drawIndicators = (upperData, lowerData) => {
              clearChartExtras();
              let upperSeries, lowerSeries;
              
              try {
                  upperSeries = chartInstance.current.addLineSeries({ 
                      color: 'rgba(244, 63, 94, 0.5)', 
                      lineWidth: 2, 
                      lineStyle: 2, 
                      title: 'BUY LIQUIDITY' 
                  });
                  upperSeries.setData(upperData);
                  extraSeriesRef.current.push(upperSeries);

                  lowerSeries = chartInstance.current.addLineSeries({ 
                      color: 'rgba(16, 185, 129, 0.5)', 
                      lineWidth: 2, 
                      lineStyle: 2, 
                      title: 'SELL LIQUIDITY' 
                  });
                  lowerSeries.setData(lowerData);
                  extraSeriesRef.current.push(lowerSeries);
              } catch(e) {
                  console.error("Ошибка отрисовки индикаторов", e);
              }
              
              return { upperSeries, lowerSeries };
          };

          const drawEntryLine = (price) => {
            if (!candleSeries.current) return;
            try {
                const line = candleSeries.current.createPriceLine({
                    price: price,
                    color: '#1d4ed8',
                    lineWidth: 2,
                    lineStyle: 3,
                    axisLabelVisible: true,
                    title: `ВХОД 5M`
                });
                priceLinesRef.current.push(line);
            } catch(e) {}
          };

          const updateStatus = (phase, colorClass) => {
              setAppPhase(phase);
              setStatusColorClass(colorClass);
          };

          const calculateMetricsReal = (data, isCall) => {
              if (!data || data.length < 50) return { structure: 50, liquidity: 50, buyPressure: 50 };
              
              const recentData = data.slice(-50);
              let greenVol = 0; let redVol = 0;
              recentData.forEach(d => {
                  if (d.close >= d.open) greenVol += d.volume;
                  else redVol += d.volume;
              });
              const totalVol = greenVol + redVol || 1;
              const pressure = Math.round((greenVol / totalVol) * 100);
              
              const lastPrices = recentData.map(d => d.close);
              const maxP = Math.max(...lastPrices);
              const minP = Math.min(...lastPrices);
              const currentP = lastPrices[lastPrices.length-1];
              const position = maxP - minP === 0 ? 50 : ((currentP - minP) / (maxP - minP)) * 100;
              
              let liquidityScore = 50;
              if (isCall && position < 20) liquidityScore = 90;
              if (!isCall && position > 80) liquidityScore = 90;

              return {
                  structure: isCall ? 85 : 15,
                  liquidity: liquidityScore,
                  buyPressure: pressure
              };
          };

          const runTerminalEngine = async () => {
            if (engineActive.current) return;
            engineActive.current = true;
            tradesRef.current = [];

            if (audioCtx.current && audioCtx.current.state === 'suspended') {
                await audioCtx.current.resume();
            }

            let lastCancelledTime = 0;
            let lastEvaluatedTime = 0;

            await speak('Институциональный алгоритм активирован. Запущен анализ пулов ликвидности Smart Money на 5-минутном таймфрейме за последние 12 часов.');
            await new Promise(r => setTimeout(r, 500)); 

            updateStatus('БЭКТЕСТ: АНАЛИЗ SMC ИСТОРИИ...', 'text-cyan-600');
            addLog(`ЗАПУСК ПОИСКА: СНЯТИЕ ЛИКВИДНОСТИ ЗА 12 ЧАСОВ (5M)...`, true);

            const curAsset = ASSETS[0];
            let initialData;
            try {
                initialData = await ScannerAPI.getCandles(curAsset.symbol, 200, '5m');
            } catch (err) {
                addLog("ОШИБКА: " + err.message, true);
                updateStatus('ОШИБКА API BINANCE', 'text-rose-600');
                await speak('Ошибка связи с криптобиржей Бинанс. Соединение прервано.');
                engineActive.current = false;
                setIsStarted(false);
                return;
            }
            
            if (initialData && initialData.length > 150) {
                setSparklines(prev => ({...prev, [curAsset.symbol]: initialData}));
                currentPrice.current = initialData[initialData.length - 1].close;

                const liqZones = calcLiquidityZones(initialData, 15); 
                const atrSeries = calcATRSeries(initialData, 14); 

                const upperData = liqZones.map(i => ({time: i.time, value: i.upper}));
                const lowerData = liqZones.map(i => ({time: i.time, value: i.lower}));

                let historicalWins = 0;
                let historicalLosses = 0;
                let rawCandidatesCount = 0;
                let acceptedSignalsCount = 0;

                const maxEvalIdx = initialData.length - 3;
                const startEvalIdx = Math.max(15, maxEvalIdx - 144 + 1); 

                strategyMode.current = 'NORMAL';
                let simStrategyMode = 'NORMAL';
                let lastTradeTime = 0; // Инициализация Cooldown-трекера

                console.log("=== ЗАПУСК АУДИТА БЭКТЕСТА (PURE SMC) ===");

                for (let idx = startEvalIdx; idx <= maxEvalIdx; idx++) {
                    const currTime = initialData[idx].time;

                    // DUPLICATE SUPPRESSION (Охлаждение 4 свечи = 20 минут)
                    if (currTime - lastTradeTime < 4 * 300) {
                        continue; 
                    }

                    const backtestLogger = (t, dir, status, reason) => {
                        rawCandidatesCount++;
                        if (status === 'ПРИНЯТ') acceptedSignalsCount++;
                        const dateStr = new Date(t * 1000).toLocaleTimeString('ru-RU');
                        console.log(`[BACKTEST PIPELINE] ${dateStr} | ${dir} | ${status} | ${reason}`);
                    };

                    const { isCall, isPut } = evaluateSweepSetup(
                        initialData,
                        idx,
                        liqZones,
                        atrSeries,
                        STRATEGY_CONFIG[simStrategyMode],
                        backtestLogger
                    );

                    if (isCall || isPut) {
                        lastTradeTime = currTime; // ФИКСИРУЕМ ВРЕМЯ ПОСЛЕДНЕЙ СДЕЛКИ

                        const entryPrice = initialData[idx].close;
                        const exitPrice = initialData[idx + 1].close; 
                        let isWin = false;

                        if ((isCall && exitPrice > entryPrice) || (isPut && exitPrice < entryPrice) || exitPrice === entryPrice) {
                            isWin = true;
                        }

                        const maxH = Math.max(initialData[idx].high, initialData[idx+1].high);
                        const minL = Math.min(initialData[idx].low, initialData[idx+1].low);

                        // КОМПАКТНЫЙ МАРКЕР НА ГРАФИКЕ БЕЗ ТЕКСТА
                        markersRef.current.push({
                            time: currTime,
                            position: isCall ? 'belowBar' : 'aboveBar',
                            color: isCall ? '#0ea5e9' : '#f43f5e',
                            shape: isCall ? 'arrowUp' : 'arrowDown',
                            size: 1
                        });

                        tradesRef.current.push({
                            id: Math.random(),
                            signalTime: currTime,
                            entryTime: initialData[idx+1].time, 
                            exitTime: initialData[idx+1].time + 300, 
                            entryPrice,
                            exitPrice,
                            direction: isCall ? 'CALL' : 'PUT',
                            result: isWin ? 'WIN' : 'LOSS',
                            maxHigh: maxH,
                            minLow: minL
                        });

                        if (isWin) {
                            historicalWins++;
                            simStrategyMode = 'NORMAL';
                        } else {
                            historicalLosses++;
                            simStrategyMode = 'REINFORCED';
                        }
                    }
                }
                
                console.log(`=== АУДИТ ПАЙПЛАЙНА ЗАВЕРШЕН ===`);
                console.log(`Кандидатов найдено (Sweep + Reclaim): ${rawCandidatesCount}`);
                console.log(`Прошли скоринг-фильтр (Accepted): ${acceptedSignalsCount}`);

                const total = historicalWins + historicalLosses;
                const wr = total > 0 ? Math.round((historicalWins / total) * 100) : 0;
                
                statsRef.current.wins = historicalWins;
                statsRef.current.losses = historicalLosses;
                setTradeStats({ wins: historicalWins, losses: historicalLosses, winRate: wr });

                strategyMode.current = simStrategyMode;
                setStrategyModeUI(simStrategyMode);
                
                lastEvaluatedTime = initialData[initialData.length - 2].time; 

                if (total > 0) {
                    addLog(`БЭКТЕСТ (ДЕТЕРМИНИРОВАННЫЙ): НАЙДЕНО ПАТТЕРНОВ ${total}, ВИНРЕЙТ ${wr}%`, true);
                } else {
                    addLog(`БЭКТЕСТ ЗА 12H: SFP ПАТТЕРНЫ НЕ НАЙДЕНЫ.`, true);
                }

                setAsset(curAsset);
                setViewMode('DETAIL');
                await initChart();
                if (candleSeries.current) {
                    try {
                        candleSeries.current.setData(initialData);
                        if (markersRef.current.length > 0) {
                            safeSetMarkers(markersRef.current);
                        }
                        drawIndicators(upperData, lowerData);
                        chartInstance.current.timeScale().fitContent();
                    } catch(err) {
                        console.error("Ошибка при установке истории:", err);
                    }
                }

                if (total > 0) {
                    playSound('win');
                    await speak(`Бэктест 12 часов завершен. Чистая стратегия SFP на 5 минутах отработала ${total} раз. Винрейт ${wr} процентов. Перехожу к живому сканированию рынка.`);
                } else {
                    await speak(`Бэктест завершен. За последние 12 часов подтвержденных SFP паттернов не найдено. Перехожу к живому сканированию рынка.`);
                }

                updateStatus('ИЗУЧЕНИЕ РЕАЛЬНОЙ ИСТОРИИ...', 'text-slate-500');
                await new Promise(r => setTimeout(r, 6000));

                await speak('Запускаю радар поиска новой ликвидности.');
                setViewMode('SCREENER');
                await new Promise(r => setTimeout(r, 1000));
            } else {
                addLog("ОШИБКА: НЕТ ДАННЫХ ОТ БИРЖИ", true);
                updateStatus('ОШИБКА API BINANCE', 'text-rose-600');
                await speak('Недостаточно данных для запуска. Попробуйте перезапустить.');
                engineActive.current = false;
                setIsStarted(false);
                return;
            }
            
            // ОСНОВНОЙ ЛАЙВ-ЦИКЛ
            let logsThrottle = 0;
            let lastBackgroundNewsTime = Date.now();
            let lastLoggedRejectTime = 0;
            let lastLiveTradeTime = lastEvaluatedTime; // Перенос счетчика Cooldown в Лайв

            while (engineActive.current) {
              try {
                  updateStatus('СКАНИРОВАНИЕ ЛИКВИДНОСТИ 5M...', 'text-slate-700');
                  setViewMode('SCREENER');
                  setSignal(null);
                  setCurrentTF('5M');
                  
                  setMetrics(prev => ({ ...prev, filterLevel: strategyMode.current === 'NORMAL' ? 55 : 70, smartMoney: 15 }));

                  let signalFound = false;

                  for(let cur of ASSETS) {
                    if (!engineActive.current) break;
                    setScanIndex(0); 
                    playSound('scan');
                    
                    const data = await ScannerAPI.getCandles(cur.symbol, 200, '5m'); 
                    
                    if (data && data.length > 150) {
                      setSparklines(prev => ({...prev, [cur.symbol]: data}));

                      const lastIdx = data.length - 1;
                      const closedIdx = lastIdx - 1; 
                      currentPrice.current = data[lastIdx].close; 

                      const liqZones = calcLiquidityZones(data, 15); 
                      const atrSeries = calcATRSeries(data, 14);    

                      const upperData = liqZones.map(i => ({time: i.time, value: i.upper}));
                      const lowerData = liqZones.map(i => ({time: i.time, value: i.lower}));

                      const currentClosedTime = data[closedIdx].time;
                      
                      let isCall = false;
                      let isPut = false;
                      let triggerCandleIdx = closedIdx;

                      // Duplicate Suppression in Live (Охлаждение 4 свечи)
                      const isCooldownActive = (currentClosedTime - lastLiveTradeTime) < (4 * 300);

                      if (currentClosedTime !== lastEvaluatedTime && !isCooldownActive) {
                          lastEvaluatedTime = currentClosedTime;

                          const currTime = data[closedIdx].time;
                          
                          const liveLogger = (t, dir, status, reason) => {
                              if (status === 'ОТКЛОНЁН' && t !== lastLoggedRejectTime) {
                                  addLog(`ПРОПУСК (${dir}): ${reason.substring(0, 45)}...`, true);
                                  lastLoggedRejectTime = t;
                              }
                          };

                          const { isCall: callSignal, isPut: putSignal } = evaluateSweepSetup(
                              data,
                              closedIdx,
                              liqZones,
                              atrSeries,
                              STRATEGY_CONFIG[strategyMode.current],
                              liveLogger
                          );

                          if ((callSignal || putSignal) && currTime !== lastCancelledTime) {
                              signalFound = true;
                              isCall = callSignal;
                              isPut = putSignal;
                              triggerCandleIdx = closedIdx;
                              lastLiveTradeTime = currentClosedTime; // Обновляем время последней сделки
                              
                              activeLiveTradeRef.current = {
                                  id: Math.random(),
                                  signalTime: currTime,
                                  entryTime: Date.now() / 1000, 
                                  exitTime: (Date.now() / 1000) + 300, 
                                  entryPrice: currentPrice.current,
                                  exitPrice: currentPrice.current,
                                  direction: isCall ? 'CALL' : 'PUT',
                                  result: 'PENDING',
                                  maxHigh: data[closedIdx].high,
                                  minLow: data[closedIdx].low
                              };
                          }
                      }

                      if (signalFound) {
                          setAsset(cur);
                          setViewMode('DETAIL');
                          
                          const realMetrics = calculateMetricsReal(data, isCall);
                          setMetrics(prev => ({ 
                              ...prev, 
                              structure: realMetrics.structure, 
                              liquidity: realMetrics.liquidity, 
                              smartMoney: 85, 
                              buyPressure: realMetrics.buyPressure 
                          }));

                          await initChart();
                          playSound('found');
                          
                          if(candleSeries.current) {
                              try { 
                                  candleSeries.current.setData(data);
                                  
                                  // КОМПАКТНЫЙ МАРКЕР БЕЗ ТЕКСТА
                                  markersRef.current.push({
                                      time: data[triggerCandleIdx].time,
                                      position: isCall ? 'belowBar' : 'aboveBar',
                                      color: isCall ? '#0ea5e9' : '#f43f5e',
                                      shape: isCall ? 'arrowUp' : 'arrowDown',
                                      size: 1
                                  });
                                  if (markersRef.current.length > 0) {
                                      safeSetMarkers(markersRef.current);
                                  }
                              } catch (e) { console.error(e); }
                          }

                          drawIndicators(upperData, lowerData);
                          currentPrice.current = data[lastIdx].close;
                          
                          const directionText = isCall ? "повышение" : "понижение";
                          
                          updateStatus(`ГОТОВЬТЕ: BTC (5 МИН)`, 'text-cyan-600 font-bold animate-pulse');
                          addLog(`ЗАФИКСИРОВАН СИЛЬНЫЙ ПАТТЕРН SFP (5M)`, true);
                          addLog(`УСЛОВИЯ СКОРРИНГА ВЫПОЛНЕНЫ`, true);

                          await speak(`Внимание. Успешно подтверждено снятие ликвидности. Подготовьте Биткоин. Время экспирации пять минут. Направление на ${directionText}.`);

                          for(let w=6; w>0; w--) {
                              if (!engineActive.current) break;
                              updateStatus(`ОТКРЫВАЙТЕ БРОКЕРА... ${w}С`, 'text-cyan-600 font-bold');
                              playSound('scan');
                              await new Promise(r => setTimeout(r, 1000));
                          }

                          let tradeCancelled = false;
                          updateStatus('СНАЙПЕР: 1M ПОДТВЕРЖДЕНИЕ', 'text-slate-800 font-bold animate-pulse');
                          addLog(`ПРОВЕРКА ТЕХНИЧЕСКОГО СЛОЯ 1M...`, true);

                          for(let w=3; w>0; w--) {
                              if (!engineActive.current) break;
                              await new Promise(r => setTimeout(r, 1000));
                              try {
                                  const liveTechData = await ScannerAPI.getCandles(cur.symbol, 2, '1m');
                                  const liveTick = liveTechData[liveTechData.length - 1];
                                  if (liveTick) {
                                      currentPrice.current = liveTick.close;
                                      const currentZones = calcLiquidityZones(data, 15);
                                      const liveUpper = currentZones[currentZones.length-1].upper;
                                      const liveLower = currentZones[currentZones.length-1].lower;

                                      if (isPut && liveTick.close > liveUpper) tradeCancelled = true;
                                      if (isCall && liveTick.close < liveLower) tradeCancelled = true;
                                  }
                              } catch(e) {}
                          }

                          if (tradeCancelled && engineActive.current) {
                              lastCancelledTime = data[triggerCandleIdx].time; 
                              playSound('cancel');
                              updateStatus('ОТМЕНА: ИСТИННЫЙ ПРОБОЙ', 'text-rose-600 font-bold');
                              addLog(`СИГНАЛ ОТМЕНЕН: ЦЕНА ВЕРНУЛАСЬ (ФИЛЬТР 1M)`, true);
                              await speak("Внимание. Отмена сигнала. Зафиксировано резкое движение против нас на техническом слое. Возвращаюсь к радару.");
                              
                              activeLiveTradeRef.current = null; // Очищаем незапущенный трейд
                              await new Promise(r => setTimeout(r, 4000));
                              setViewMode('SCREENER');
                              updateStatus('ПЕРЕЗАПУСК СКАНИРОВАНИЯ...', 'text-slate-600');
                              await new Promise(r => setTimeout(r, 2000));
                              break; 
                          }

                          if (!engineActive.current) break;

                          lastCancelledTime = data[triggerCandleIdx].time;

                          playSound('start');
                          updateStatus('СИГНАЛ АКТИВЕН', 'text-blue-700 font-bold');
                          
                          const expMins = 5; 
                          
                          // ЗАПУСК LIVE TRADE ВИЗУАЛИЗАЦИИ
                          activeLiveTradeRef.current.entryTime = Date.now() / 1000;
                          activeLiveTradeRef.current.entryPrice = currentPrice.current;
                          activeLiveTradeRef.current.exitTime = (Date.now() / 1000) + (expMins * 60);
                          tradesRef.current.push(activeLiveTradeRef.current);

                          setSignal({ type: isCall ? 'CALL' : 'PUT', exp: expMins, entryPrice: currentPrice.current });

                          addLog(`СИГНАЛ ВЫПОЛНЕН: ВХОД ${isCall ? 'ВВЕРХ' : 'ВНИЗ'} НА 5 МИН.`, true);
                          speak(`Позиция подтверждена. Вход на ${directionText}! Время экспирации пять минут. Жмите кнопку!`);

                          let newsReadInThisTrade = false;
                          const readOneRealBtcNews = () => {
                             if(fullNewsPool.current.length === 0) {
                                 fetchNews(); 
                                 return;
                             }
                             const idx = Math.floor(Math.random() * fullNewsPool.current.length);
                             const textToRead = fullNewsPool.current.splice(idx, 1)[0].toLowerCase(); 
                             
                             try {
                                 if(window.speechSynthesis && !window.speechSynthesis.speaking) {

                    </div>
                  </div>

                  <div className="flex-1 flex flex-col p-3 md:p-4 gap-3 md:gap-4 overflow-y-hidden relative z-10">
                    
                    <div className="grid grid-cols-4 gap-2 glass-card rounded-2xl p-2 shrink-0 border-white bg-white/80">
                       <Speedometer value={metrics.structure} label="СТРУКТУРА" colorHex="#d97706" />
                       <Speedometer value={metrics.liquidity} label="ЛИКВИДНОСТЬ" colorHex="#2563eb" glow={true} />
                       <Speedometer value={metrics.filterLevel} label="SCORE ПОРОГ" colorHex={strategyModeUI === 'REINFORCED' ? '#f43f5e' : '#6366f1'} />
                       <Speedometer value={metrics.smartMoney} label="SMART MONEY" colorHex="#06b6d4" />
                    </div>

                    <div className="glass-card border border-white rounded-2xl p-3 flex flex-col gap-1 shrink-0 bg-white/80 shadow-sm">
                        <div className="flex justify-between text-[9px] md:text-[10px] font-bold text-slate-500 tracking-widest uppercase">
                            <span className="text-emerald-600">Покупатели</span>
                            <span>Order Flow Pressure</span>
                            <span className="text-rose-600">Продавцы</span>
                        </div>
                        <div className="w-full h-3 bg-slate-200 rounded-full overflow-hidden flex relative shadow-[inset_0_1px_3px_rgba(0,0,0,0.1)]">
                            <div className="h-full bg-emerald-500 transition-all duration-500" style={{width: `${metrics.buyPressure}%`}}></div>
                            <div className="h-full bg-rose-500 transition-all duration-500" style={{width: `${100 - metrics.buyPressure}%`}}></div>
                        </div>
                    </div>

                    <div className="flex gap-3 h-28 md:h-32 shrink-0">
                      <div className={`w-[35%] border rounded-2xl flex flex-col items-center justify-center relative transition-all duration-500 glass-card bg-white/90 ${appPhase === 'СИГНАЛ АКТИВЕН' ? 'border-cyan-400 shadow-[0_0_20px_rgba(34,211,238,0.4)]' : 'border-white'}`}>
                        {signal ? (
                          <VolumetricArrow type={signal.type} />
                        ) : (
                          <div className="flex flex-col items-center opacity-40">
                              <Radar size={32} className="text-slate-600 mb-2" />
                              <span className="text-[10px] md:text-xs tracking-widest font-bold text-slate-600 oswald-font">СТАТУС</span>
                          </div>
                        )}
                      </div>
                      
                      <div className="w-[65%] rounded-2xl overflow-hidden glass-card p-1.5 bg-white border-white shadow-inner flex">
                        <OrderBookDepth price={currentPrice.current} />
                        <HftTape price={currentPrice.current} />
                      </div>
                    </div>

                    <div className={`glass-card border rounded-3xl p-4 md:p-5 flex flex-col gap-3 shrink-0 relative overflow-hidden transition-all duration-700 bg-white/90 ${
                        (tradeStats.wins + tradeStats.losses) > 0 
                            ? (tradeStats.winRate >= 50 ? 'border-cyan-400 shadow-[0_10px_30px_rgba(14,165,233,0.2)]' : 'border-rose-400 shadow-[0_10px_30px_rgba(225,29,72,0.15)]') 
                            : 'border-white'
                    }`}>
                       <div className="absolute -right-4 -top-4 w-20 h-20 bg-gradient-to-br from-slate-100 to-slate-200 rounded-full blur-2xl pointer-events-none"></div>
                       <div className="flex justify-between items-center z-10 relative">
                           <span className="text-xs md:text-sm text-slate-600 tracking-widest font-bold flex items-center gap-2 leading-none oswald-font">
                              <TrendingUp size={18} className={(tradeStats.wins + tradeStats.losses) > 0 ? (tradeStats.winRate >= 50 ? "text-cyan-600" : "text-rose-600") : "text-slate-500"} /> 
                              ВИНРЕЙТ СИСТЕМЫ
                           </span>
                           <span className={`text-3xl md:text-4xl font-black tracking-wider ios-text leading-none oswald-font ${
                               (tradeStats.wins + tradeStats.losses) > 0 ? (tradeStats.winRate >= 50 ? "text-cyan-600" : "text-rose-600") : "text-slate-800"
                           }`}>
                             {tradeStats.winRate}%
                           </span>
                       </div>
                       
                       <div className="w-full h-4 bg-slate-200 rounded-full flex overflow-hidden relative shadow-[inset_0_2px_5px_rgba(0,0,0,0.06)] mt-2 border border-white">
                           <div 
                             className="h-full bg-gradient-to-r from-blue-600 to-cyan-400 transition-all duration-1000 ease-out relative"
                             style={{ 
                                 width: `${(tradeStats.wins + tradeStats.losses) > 0 ? (tradeStats.wins / (tradeStats.wins + tradeStats.losses)) * 100 : 50}%`,
                                 boxShadow: tradeStats.winRate >= 50 ? '0 0 15px rgba(14,165,233,0.6)' : 'none'
                             }}
                           >
                              {tradeStats.winRate >= 50 && <div className="absolute inset-0 bg-white/40 w-full animate-pulse"></div>}
                           </div>
                           <div 
                             className="h-full bg-gradient-to-r from-rose-600 to-rose-400 transition-all duration-1000 ease-out relative"
                             style={{ 
                                 width: `${(tradeStats.wins + tradeStats.losses) > 0 ? (tradeStats.losses / (tradeStats.wins + tradeStats.losses)) * 100 : 50}%`,
                                 boxShadow: tradeStats.winRate < 50 && (tradeStats.wins + tradeStats.losses) > 0 ? '0 0 15px rgba(225,29,72,0.6)' : 'none'
                             }}
                           >
                              {tradeStats.winRate < 50 && (tradeStats.wins + tradeStats.losses) > 0 && <div className="absolute inset-0 bg-white/40 w-full animate-pulse"></div>}
                           </div>
                       </div>

                       <div className="flex justify-between items-center z-10 relative mt-2 oswald-font">
                           <div className="flex flex-col bg-slate-100/80 px-3 py-1.5 rounded-lg border border-slate-200">
                               <span className="text-[9px] md:text-[10px] text-slate-500 tracking-widest font-bold uppercase">ПРОФИТ</span>
                               <span className="text-xl md:text-2xl text-cyan-700 font-black ios-text leading-none mt-0.5">{tradeStats.wins}</span>
                           </div>
                           <div className="flex flex-col items-end bg-slate-100/80 px-3 py-1.5 rounded-lg border border-slate-200">
                               <span className="text-[9px] md:text-[10px] text-slate-500 tracking-widest font-bold uppercase">УБЫТОК</span>
                               <span className="text-xl md:text-2xl text-rose-600 font-black ios-text leading-none mt-0.5">{tradeStats.losses}</span>
                           </div>
                       </div>
                    </div>

                    <div className="glass-card rounded-2xl p-4 flex justify-between items-center shrink-0 relative overflow-hidden shadow-md border-white bg-gradient-to-r from-white to-cyan-50/80">
                       <div className="absolute right-0 top-0 bottom-0 w-2/3 bg-[radial-gradient(ellipse_at_right,_rgba(14,165,233,0.1),_transparent)] pointer-events-none"></div>
                       <div className="flex flex-col relative z-10">
                          <span className="text-[9px] md:text-[10px] text-slate-500 tracking-widest font-bold leading-none uppercase">ЦЕНА ВХОДА</span>
                          <span className="text-xl md:text-2xl text-slate-900 mt-2 font-black mono-font leading-none drop-shadow-sm">
                            {signal && signal.entryPrice ? formatPrice(signal.entryPrice) : '---.-----'}
                          </span>
                       </div>
                       <div className="flex flex-col items-end relative z-10">
                          <span className="text-[9px] md:text-[10px] text-slate-500 tracking-widest flex items-center gap-1.5 font-bold leading-none uppercase">
                            <Clock size={12} className="text-cyan-600"/> ЭКСПИРАЦИЯ
                          </span>
                          <span className="text-3xl md:text-4xl text-cyan-700 mt-1 font-black mono-font tracking-wider leading-none drop-shadow-sm">
                            {countdown !== null ? `${Math.floor(countdown/60)}:${(countdown%60).toString().padStart(2,'0')}` : (signal && signal.exp ? `0${signal.exp}:00` : '--:--')}
                          </span>
                       </div>
                    </div>

                    <div ref={logsContainerRef} className="flex-1 glass-card rounded-2xl p-4 overflow-hidden flex flex-col justify-start gap-2 border-white bg-white shadow-[inset_0_2px_15px_rgba(0,0,0,0.02)]">
                      {logs.map((l, i) => (
                        <div key={i} className={`text-[10px] md:text-xs leading-snug tracking-widest font-semibold mono-font ${i === 0 ? 'text-slate-900 font-bold border-l-4 border-cyan-500 pl-2 bg-cyan-50/50 py-1 rounded-r shadow-sm' : 'text-slate-500 pl-2'}`}>
                          {l}
                        </div>
                      ))}
                    </div>
                    
                  </div>
                </div>
              </main>

              <footer className="h-auto md:h-12 py-2 md:py-0 border-t border-white/50 flex flex-row items-center justify-between px-4 md:px-6 shrink-0 glass-panel z-40 bg-white/90 relative">
                <div className="flex items-center gap-2 text-slate-500 text-[10px] md:text-xs tracking-widest font-bold uppercase oswald-font">
                  <Shield size={14} className="text-cyan-600 hidden sm:block" /> 
                  <span className="hidden sm:inline">256-BIT ШИФРОВАНИЕ СИСТЕМЫ • СОЕДИНЕНИЕ БЕЗОПАСНО</span>
                  <span className="inline sm:hidden">ЗАЩИТА АКТИВНА</span>
                </div>
                
                <div className="hidden md:flex flex-col items-center absolute left-1/2 -translate-x-1/2 mt-0.5 cursor-default pointer-events-none">
                    <span className="text-sm font-black tracking-[0.2em] uppercase oswald-font silver-text">SLAVA GORDEEV</span>
                </div>

                <div className="flex items-center gap-3 oswald-font relative z-10">
                  <span className="text-slate-500 text-[10px] md:text-xs tracking-widest font-bold hidden sm:block uppercase">ЛИЦЕНЗИЯ:</span>
                  <span className="text-white text-[10px] md:text-xs px-3 py-1.5 rounded-lg bg-slate-900 tracking-widest font-bold text-center shadow-[0_4px_10px_rgba(15,23,42,0.2)] border border-slate-700">
                    КРИПТО ИНВЕСТ PRO MAX
                  </span>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
