    @keyframes scannerFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .scanner-chart { flex: 1; position: relative; border-radius: 24px; overflow: hidden; background: rgba(255,255,255,.44); border: 1px solid rgba(226,232,240,.7); box-shadow: inset 0 0 30px rgba(14,165,233,.06); }
    .scanner-chart::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(14,165,233,.06) 1px, transparent 1px), linear-gradient(90deg,rgba(14,165,233,.06) 1px, transparent 1px); background-size: 12px 12px; }

    .trade-point { width: 9px; height: 9px; border-radius: 50%; background: #fff; border: 2px solid #3b82f6; z-index: 20; box-shadow: 0 0 10px rgba(59,130,246,.55); }

    .trade-badge.win { background: rgba(16,185,129,.95); border: 1px solid #34d399; }
    .trade-badge.loss { background: rgba(244,63,94,.95); border: 1px solid #fb7185; }
    .trade-tooltip { position: absolute; z-index: 999; pointer-events: none; min-width: 240px; padding: 14px 16px; border-radius: 16px; background: rgba(255,255,255,.94); border: 1px solid rgba(226,232,240,1); box-shadow: 0 18px 38px rgba(15,23,42,.16); backdrop-filter: blur(18px); transform: translate(-50%,-110%); font-size: 12px; }
    .tip-row { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; }
    .tip-row span { color: #64748b; }
    .tip-row b { font-family: 'JetBrains Mono'; text-align: right; }

    .speedo { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; padding-top: 4px; }

    .debug-grid div { display: flex; justify-content: space-between; gap: 10px; }

    .maintenance-screen { position: fixed; inset: 0; z-index: 999999; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(circle at 30% 20%, rgba(14,165,233,.22), transparent 34%), linear-gradient(135deg,#f8fbff,#eaf3fb 45%,#fff); }
    .maintenance-card { width: min(620px,94vw); text-align: center; padding: clamp(30px,5vw,58px); border-radius: 34px; background: rgba(255,255,255,.78); border: 1px solid rgba(255,255,255,.9); box-shadow: 0 32px 96px rgba(15,23,42,.16); backdrop-filter: blur(24px); }

<body>
<div id="root"></div>

<script type="text/babel">
  const { useCallback, useEffect, useMemo, useRef, useState } = React;

  const MAINTENANCE_MODE = false; // Поставь true, если нужно временно закрыть утилиту плашкой обновления.

  function safeNumber(value, fallback = 0) {
    const n = Number(value);
    return Number.isFinite(n) ? n : fallback;
  }
  function clamp(value, min, max) { return Math.max(min, Math.min(max, safeNumber(value, min))); }
  function normalizeCandleTimeMs(time) {
    const n = Number(time);
    if (!Number.isFinite(n)) return null;
    return n < 1e12 ? n * 1000 : n;
  }
  function formatRub(value) { return `${Math.round(safeNumber(value, 0)).toLocaleString('ru-RU')} ₽`; }
  function formatPrice(value) {
    const n = safeNumber(value, 0);
    if (n >= 1000) return n.toFixed(2);
    if (n >= 10) return n.toFixed(3);
    if (n >= 1) return n.toFixed(4);
    return n.toFixed(5);
  }
  function formatTime(ms) {
    const t = normalizeCandleTimeMs(ms);
    if (!t) return 'нет данных';
    return new Date(t).toLocaleString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

  const STRATEGY_RUNTIME_CONFIG = {
    mode: 'PINE_EQUIVALENT_5M_QUALITY_BALANCED',
    symbol: 'BTCUSDT',
    timeframe: '5m',
    timeframeMs: 5 * 60 * 1000,
    historicalLookbackHours: 12,
    expiryMinutes: 25,
    expiryCandles: 5,
    allowOverlappingHistoricalTrades: false,

    lookback: 24,
    atrLen: 14,
    useChoch: false,
    chochLookback: 3,
    chochMode: 'Close',
    confirmOnClose: true,
    minSweepATR: 0.05,
    minReclaimATR: 0.05,
    minBodyRatio: 0.14,
    maxRangeATR: 3.00,
    minWickRatio: 0.20,
    requireBodyDir: false,
    blockDoubleSweep: false,
    cooldownBars: 5,
    blockSamePoolSignals: true,
    samePoolDistanceATR: 0.50,
    usePoolEdgeFilter: true,
    poolEdgePercent: 0.38,
    useLateEntryValidation: true,
    lateEntryMaxMoveATR: 0.25,

    explanationDelaySeconds: 3,
    traderPrepSeconds: 3,
    totalEntryDelaySeconds: 6,
    catchUpClosedCandles: 3,
    signalDebug: true,

    demoBalance: 50000,
    baseStake: 500,
    payout: 0.70,
    martingaleLadder: [500, 1215, 2950, 7165],
    maxMartingaleSteps: 4,
    referralUrl: 'https://intrade31.bar/311164',
    authorName: 'SLAVA GORDEEV'
  };

  const APP_STAGE = {
    IDLE: 'IDLE',
    SPLASH: 'SPLASH',
    ANALYSIS: 'ANALYSIS',
    LIVE_SCAN: 'LIVE_SCAN',
    SIGNAL_FLOW: 'SIGNAL_FLOW'
  };

  const announcedLiveSignalIds = new Set();

  function buildSignalId({ symbol, timeframe, candleTimeMs, direction }) {
    return `${symbol}_${timeframe}_${Number(candleTimeMs)}_${direction}`;
  }

  function calcAtrAtIndex(candles, index, period) {
    if (!Array.isArray(candles) || index < period) return 0;
    let sum = 0;
    let count = 0;
    for (let j = 0; j < period; j++) {
      const c = candles[index - j];
      const p = candles[index - j - 1];
      if (!c || !p) continue;
      const high = safeNumber(c.high);
      const low = safeNumber(c.low);
      const prevClose = safeNumber(p.close);
      const tr = Math.max(high - low, Math.abs(high - prevClose), Math.abs(low - prevClose));
      if (Number.isFinite(tr)) { sum += tr; count++; }
    }
    return count ? sum / count : 0;
  }

  function getClosedCandles(candles, now = Date.now(), timeframeMs = STRATEGY_RUNTIME_CONFIG.timeframeMs) {
    return (candles || []).filter(c => {
      const openTime = normalizeCandleTimeMs(c.time);
      return openTime && openTime + timeframeMs <= now;
    });
  }

  function evaluateStrategySignal(candles, index, cfg = STRATEGY_RUNTIME_CONFIG, lastSignalState = null) {
    const neutral = { structure: 50, liquidity: 50, atr: 50, confidence: 50 };
    if (!Array.isArray(candles) || index < cfg.lookback + cfg.atrLen + 2) {
      return { isBuy: false, isSell: false, rawBuy: false, rawSell: false, reclaimBuy: false, reclaimSell: false, reason: 'NOT_ENOUGH_DATA', scores: neutral };
    }

    const candle = candles[index];
    const prevBars = candles.slice(index - cfg.lookback, index);
    const high = Number(candle.high), low = Number(candle.low), open = Number(candle.open), close = Number(candle.close);
    const upperPool = Math.max(...prevBars.map(c => Number(c.high)));
    const lowerPool = Math.min(...prevBars.map(c => Number(c.low)));
    const atr = calcAtrAtIndex(candles, index, cfg.atrLen);

    if (![high, low, open, close, upperPool, lowerPool, atr].every(Number.isFinite) || atr <= 0) {
      return { isBuy: false, isSell: false, rawBuy: false, rawSell: false, reclaimBuy: false, reclaimSell: false, upperPool, lowerPool, atr, reason: 'BAD_NUMERIC_DATA', scores: neutral };
    }

    const safeRange = Math.max(high - low, 0.00000001);
    const bodySize = Math.abs(close - open);
    const bodyRatio = bodySize / safeRange;
    const upperWick = high - Math.max(open, close);
    const lowerWick = Math.min(open, close) - low;
    const upperWickRatio = upperWick / safeRange;
    const lowerWickRatio = lowerWick / safeRange;
    const rawSell = high > upperPool;
    const rawBuy = low < lowerPool;
    const reclaimSell = rawSell && close < upperPool;
    const reclaimBuy = rawBuy && close > lowerPool;

    const sweepUpDepth = high - upperPool;
    const reclaimDown = upperPool - close;
    const sweepDownDepth = lowerPool - low;
    const reclaimUp = close - lowerPool;

    const rangeOk = safeRange <= atr * cfg.maxRangeATR;
    const sellBodyOk = !cfg.requireBodyDir || close < open;
    const buyBodyOk = !cfg.requireBodyDir || close > open;
    const sellWickOk = !cfg.minWickRatio || upperWickRatio >= cfg.minWickRatio;
    const buyWickOk = !cfg.minWickRatio || lowerWickRatio >= cfg.minWickRatio;
    const poolRange = Math.max(upperPool - lowerPool, 0.00000001);
    const closePosition = (close - lowerPool) / poolRange;
    const buyEdgeOk = !cfg.usePoolEdgeFilter || closePosition <= cfg.poolEdgePercent;
    const sellEdgeOk = !cfg.usePoolEdgeFilter || closePosition >= (1 - cfg.poolEdgePercent);

    const doubleSweep = reclaimSell && reclaimBuy;
    const sideOk = !(cfg.blockDoubleSweep && doubleSweep);

    const normalizedSignalState = (typeof lastSignalState === 'number')
      ? { index: lastSignalState }
      : (lastSignalState || {});
    const lastSignalIndex = Number.isFinite(Number(normalizedSignalState.index)) ? Number(normalizedSignalState.index) : null;
    const cooldownOk = lastSignalIndex === null || index - lastSignalIndex > cfg.cooldownBars;

    const sameBuyPoolBlocked = !!cfg.blockSamePoolSignals && Number.isFinite(Number(normalizedSignalState.lastBuyPool)) && Math.abs(lowerPool - Number(normalizedSignalState.lastBuyPool)) <= atr * cfg.samePoolDistanceATR;
    const sameSellPoolBlocked = !!cfg.blockSamePoolSignals && Number.isFinite(Number(normalizedSignalState.lastSellPool)) && Math.abs(upperPool - Number(normalizedSignalState.lastSellPool)) <= atr * cfg.samePoolDistanceATR;

    let sellChoch = true, buyChoch = true;
    if (cfg.useChoch) {
      const chochBars = candles.slice(index - cfg.chochLookback, index);
      const prevLow = Math.min(...chochBars.map(c => Number(c.low)));
      const prevHigh = Math.max(...chochBars.map(c => Number(c.high)));
      if (cfg.chochMode === 'Close') { sellChoch = close < prevLow; buyChoch = close > prevHigh; }
      else { sellChoch = low < prevLow; buyChoch = high > prevHigh; }
    }

    const sellFilters = reclaimSell && sweepUpDepth >= atr * cfg.minSweepATR && reclaimDown >= atr * cfg.minReclaimATR && bodyRatio >= cfg.minBodyRatio && rangeOk && sellBodyOk && sellWickOk && sellEdgeOk && sideOk && cooldownOk && !sameSellPoolBlocked;
    const buyFilters = reclaimBuy && sweepDownDepth >= atr * cfg.minSweepATR && reclaimUp >= atr * cfg.minReclaimATR && bodyRatio >= cfg.minBodyRatio && rangeOk && buyBodyOk && buyWickOk && buyEdgeOk && sideOk && cooldownOk && !sameBuyPoolBlocked;
    const isSell = sellFilters && sellChoch;
    const isBuy = buyFilters && buyChoch;

    let reason = 'NO_SIGNAL';
    if (!rawBuy && !rawSell) reason = 'NO_RAW_SWEEP';
    else if (rawBuy && !reclaimBuy) reason = 'BUY_NO_RECLAIM';
    else if (rawSell && !reclaimSell) reason = 'SELL_NO_RECLAIM';
    else if (reclaimBuy && sameBuyPoolBlocked) reason = 'BUY_SAME_POOL_BLOCKED';
    else if (reclaimSell && sameSellPoolBlocked) reason = 'SELL_SAME_POOL_BLOCKED';
    else if (reclaimBuy && !buyEdgeOk) reason = 'BUY_MIDDLE_RANGE_BLOCKED';
    else if (reclaimSell && !sellEdgeOk) reason = 'SELL_MIDDLE_RANGE_BLOCKED';
    else if (reclaimBuy && !buyWickOk) reason = 'BUY_WEAK_SWEEP_WICK';
    else if (reclaimSell && !sellWickOk) reason = 'SELL_WEAK_SWEEP_WICK';
    else if (reclaimBuy && !buyFilters) reason = 'BUY_FILTERED';
    else if (reclaimSell && !sellFilters) reason = 'SELL_FILTERED';
    else if (isBuy) reason = 'FINAL_BUY';
    else if (isSell) reason = 'FINAL_SELL';

    const sweepD = Math.max(0, rawSell ? sweepUpDepth : rawBuy ? sweepDownDepth : 0);
    const reclaimD = Math.max(0, rawSell ? reclaimDown : rawBuy ? reclaimUp : 0);
    let structure = Math.floor(clamp((bodyRatio / cfg.minBodyRatio) * 50, 20, 100));
    let liquidity = Math.floor(clamp(((sweepD / (atr * cfg.minSweepATR || 1)) + (reclaimD / (atr * cfg.minReclaimATR || 1))) * 25, rawBuy || rawSell ? 20 : 0, 100));
    let atrScore = Math.floor(clamp(100 - (safeRange / (atr * cfg.maxRangeATR)) * 100, 10, 100));
    if (!rawBuy && !rawSell) liquidity = Math.min(50, liquidity);
    const confidence = Math.floor(clamp(structure * .3 + liquidity * .4 + atrScore * .3, 0, 100));

    return { isBuy, isSell, rawBuy, rawSell, reclaimBuy, reclaimSell, upperPool, lowerPool, atr, bodyRatio, upperWickRatio, lowerWickRatio, closePosition, buyEdgeOk, sellEdgeOk, buyWickOk, sellWickOk, sameBuyPoolBlocked, sameSellPoolBlocked, sweepUpDepth, sweepDownDepth, reclaimUp, reclaimDown, rangeOk, buyFilters, sellFilters, cooldownOk, reason, scores: { structure, liquidity, atr: atrScore, confidence } };
  }

  function buildSignalReason({ direction }) {
    if (direction === 'BUY' || direction === 'CALL') return 'Цена сняла нижнюю ликвидность и закрылась обратно выше границы пула.';
    if (direction === 'SELL' || direction === 'PUT') return 'Цена сняла верхнюю ликвидность и закрылась обратно ниже границы пула.';
    return 'Сигнал по стратегии снятия ликвидности.';
  }

  function evaluateTradeResult(direction, entryPrice, exitPrice) {
    const entry = Number(entryPrice), exit = Number(exitPrice);
    if (!Number.isFinite(entry) || !Number.isFinite(exit)) return 'CANCELLED';
    if (direction === 'BUY' || direction === 'CALL') return exit > entry ? 'WIN' : 'LOSS';
    if (direction === 'SELL' || direction === 'PUT') return exit < entry ? 'WIN' : 'LOSS';
    return 'CANCELLED';
  }

  function calculateTradePnl(result, stake, payout = STRATEGY_RUNTIME_CONFIG.payout) {
    const s = safeNumber(stake, STRATEGY_RUNTIME_CONFIG.baseStake);
    if (result === 'WIN') return Math.round(s * payout);
    if (result === 'LOSS') return -s;
    return 0;
  }

  function getStakeByMartingaleIndex(index) {
    const i = clamp(index, 0, STRATEGY_RUNTIME_CONFIG.martingaleLadder.length - 1);
    return STRATEGY_RUNTIME_CONFIG.martingaleLadder[i] || STRATEGY_RUNTIME_CONFIG.baseStake;
  }
  function getNextMartingaleIndex(result, currentIndex) {
    const i = safeNumber(currentIndex, 0);
    if (result === 'WIN') return 0;
    if (result === 'LOSS') return i < STRATEGY_RUNTIME_CONFIG.martingaleLadder.length - 1 ? i + 1 : 0;
    return 0;
  }

  function buildHistoricalTradeFromSignal({ candles, signalIndex, signalResult, direction, cfg }) {
    const signalCandle = candles[signalIndex];
    if (!signalCandle) return null;
    const entryIndex = signalIndex + 1;
    const exitIndex = entryIndex + cfg.expiryCandles;
    const entryCandle = candles[entryIndex];
    const exitCandle = candles[exitIndex];
    const signalTime = normalizeCandleTimeMs(signalCandle.time);

    const base = {
      tradeId: buildSignalId({ symbol: cfg.symbol, timeframe: cfg.timeframe, candleTimeMs: signalTime, direction }),
      mode: 'historical', direction, timeframe: cfg.timeframe, expiryMinutes: cfg.expiryMinutes,
      signalTime, signalPrice: Number(signalCandle.close), signalHigh: Number(signalCandle.high), signalLow: Number(signalCandle.low), atr: signalResult.atr,
      reason: buildSignalReason({ direction }), debug: signalResult, entryDelaySeconds: cfg.totalEntryDelaySeconds
    };

    if (!entryCandle || !exitCandle) {
      return { ...base, result: 'CANCELLED', cancelReason: 'NOT_ENOUGH_FUTURE_CANDLES', entryTime: entryCandle ? normalizeCandleTimeMs(entryCandle.time) : null, entryPrice: entryCandle ? Number(entryCandle.open) : null, exitTime: null, exitPrice: null, state: 'TRADE_CLOSED' };
    }

    const entryTime = normalizeCandleTimeMs(entryCandle.time);
    const exitTime = normalizeCandleTimeMs(exitCandle.time);
    const entryPrice = Number(entryCandle.open);
    const exitPrice = Number(exitCandle.close);
    const result = evaluateTradeResult(direction, entryPrice, exitPrice);
    return { ...base, entryTime, entryPrice, entrySource: 'historical_next_5m_open', exitTime, exitPrice, result, state: 'TRADE_CLOSED' };
  }

  function applyMoneyManagementToTrades(rawTrades, cfg) {
    let balance = cfg.demoBalance;
    let mgIndex = 0;
    return rawTrades.map((trade, index) => {
      const stageUsed = mgIndex + 1;
      const balanceBefore = balance;
      if (trade.result === 'CANCELLED') return { ...trade, stake: 0, martingaleStep: stageUsed, pnl: 0, balanceBefore, balanceAfter: balance };
      const stake = getStakeByMartingaleIndex(mgIndex);
      const pnl = calculateTradePnl(trade.result, stake, cfg.payout);
      balance += pnl;
      mgIndex = getNextMartingaleIndex(trade.result, mgIndex);
      return { ...trade, tradeId: trade.tradeId || `trade-${index}`, stake, martingaleStep: stageUsed, pnl, balanceBefore, balanceAfter: balance };
    });
  }

  function buildHistoricalBacktest12h(candles, cfg) {
    const now = Date.now();
    const lookbackHours = safeNumber(cfg.historicalLookbackHours, 12);
    const windowStart = now - lookbackHours * 60 * 60 * 1000;
    const closed = getClosedCandles(candles, now, cfg.timeframeMs);
    const rawTrades = [];
    let lastSignalState = { index: null, lastBuyPool: null, lastSellPool: null };
    let lastScores = { structure: 50, liquidity: 50, atr: 50, confidence: 50 };

    const stats = { candlesLoaded: candles.length, closedCandles: closed.length, candlesInWindow: 0, rawBuy: 0, rawSell: 0, reclaimBuy: 0, reclaimSell: 0, finalBuy: 0, finalSell: 0, rejected: 0, rejectReasons: {}, builtTrades: 0, ledgerTrades: 0, renderedMarkers: 0 };

    for (let i = 0; i < closed.length; i++) {
      const candle = closed[i];
      const candleTimeMs = normalizeCandleTimeMs(candle.time);
      if (!candleTimeMs || candleTimeMs < windowStart) continue;
      stats.candlesInWindow++;

      const originalIndex = candles.findIndex(c => normalizeCandleTimeMs(c.time) === candleTimeMs);
      if (originalIndex < 0) continue;

      const result = evaluateStrategySignal(candles, originalIndex, cfg, lastSignalState);
      if (result.scores) lastScores = result.scores;
      if (result.rawBuy) stats.rawBuy++;
      if (result.rawSell) stats.rawSell++;
      if (result.reclaimBuy) stats.reclaimBuy++;
      if (result.reclaimSell) stats.reclaimSell++;

      const direction = result.isBuy ? 'BUY' : result.isSell ? 'SELL' : null;
      if (!direction) {
        if (result.rawBuy || result.rawSell || result.reclaimBuy || result.reclaimSell) {
          stats.rejected++;
          stats.rejectReasons[result.reason || 'NO_SIGNAL'] = (stats.rejectReasons[result.reason || 'NO_SIGNAL'] || 0) + 1;
        }
        continue;
      }

      if (direction === 'BUY') stats.finalBuy++;
      if (direction === 'SELL') stats.finalSell++;
      lastSignalState.index = originalIndex;
      if (direction === 'BUY') lastSignalState.lastBuyPool = result.lowerPool;
      if (direction === 'SELL') lastSignalState.lastSellPool = result.upperPool;

      const trade = buildHistoricalTradeFromSignal({ candles, signalIndex: originalIndex, signalResult: result, direction, cfg });
      if (trade) rawTrades.push(trade);

      // Если нужно строго не открывать новую сделку во время текущих 25 минут — поставь allowOverlappingHistoricalTrades: false.
      if (!cfg.allowOverlappingHistoricalTrades && trade && trade.result !== 'CANCELLED') {
        const exitTimeMs = trade.exitTime;
        const exitIdxInClosed = closed.findIndex(c => normalizeCandleTimeMs(c.time) >= exitTimeMs);
        if (exitIdxInClosed > i) i = exitIdxInClosed - 1;
      }
    }

    const financialTrades = applyMoneyManagementToTrades(rawTrades, cfg);
    stats.builtTrades = rawTrades.length;
    stats.ledgerTrades = financialTrades.length;

    const last = financialTrades[financialTrades.length - 1];
    const currentMgStep = last ? getNextMartingaleIndex(last.result, (last.martingaleStep || 1) - 1) : 0;

    console.log('Historical scan result', {
      rawSweepCount: stats.rawBuy + stats.rawSell,
      reclaimCount: stats.reclaimBuy + stats.reclaimSell,
      finalSignalCount: stats.finalBuy + stats.finalSell,
      builtTrades: stats.builtTrades,
      ledgerTrades: stats.ledgerTrades,
      wins: financialTrades.filter(t => t.result === 'WIN').length,
      losses: financialTrades.filter(t => t.result === 'LOSS').length,
      pnl: financialTrades.reduce((s, t) => s + safeNumber(t.pnl), 0),
      balance: financialTrades.length ? financialTrades[financialTrades.length - 1].balanceAfter : cfg.demoBalance
    });

    return { simulatedTrades: financialTrades, currentMgStep, lastScores, stats };
  }

  function calculateSessionStats(trades) {
    const confirmed = (trades || []).filter(t => t.result !== 'CANCELLED' && t.state === 'TRADE_CLOSED');
    const pnl = confirmed.reduce((s, t) => s + safeNumber(t.pnl, 0), 0);
    return {
      totalSignals: (trades || []).length,
      confirmedTrades: confirmed.length,
      cancelled: (trades || []).filter(t => t.result === 'CANCELLED').length,
      wins: confirmed.filter(t => t.result === 'WIN').length,

  }

  function checkRecentClosedSignals({ candles, symbol = 'BTCUSDT', cfg = STRATEGY_RUNTIME_CONFIG }) {
    if (!checkRecentClosedSignals.liveState) checkRecentClosedSignals.liveState = { index: null, lastBuyPool: null, lastSellPool: null };
    const closed = getClosedCandles(candles, Date.now(), cfg.timeframeMs);
    const recent = closed.slice(-(cfg.catchUpClosedCandles || 3));
    let latestDebug = null;
    for (const candle of recent) {
      const candleTimeMs = normalizeCandleTimeMs(candle.time);
      const index = candles.findIndex(c => normalizeCandleTimeMs(c.time) === candleTimeMs);
      if (index < 0) continue;
      const result = evaluateStrategySignal(candles, index, cfg, checkRecentClosedSignals.liveState);
      latestDebug = { candleTime: candleTimeMs, ...result, candle };
      if (result.isBuy || result.isSell) {
        const direction = result.isBuy ? 'BUY' : 'SELL';
        const signalId = buildSignalId({ symbol, timeframe: cfg.timeframe, candleTimeMs, direction });
        if (announcedLiveSignalIds.has(signalId)) continue;
        announcedLiveSignalIds.add(signalId);
        checkRecentClosedSignals.liveState.index = index;
        if (direction === 'BUY') checkRecentClosedSignals.liveState.lastBuyPool = result.lowerPool;
        if (direction === 'SELL') checkRecentClosedSignals.liveState.lastSellPool = result.upperPool;
        return { signal: { signalId, symbol, timeframe: cfg.timeframe, direction, signalTime: candleTimeMs, signalPrice: Number(candle.close), signalHigh: Number(candle.high), signalLow: Number(candle.low), atr: result.atr, reason: buildSignalReason({ direction }), debug: result, index }, debug: latestDebug };
      }
    }
    return { signal: null, debug: latestDebug };
  }

    const atr = safeNumber(trade.atr, 0);

  const ScannerAPI = {

      // КРИТИЧНО: Binance первым. Раньше первым был MEXC, из-за этого сигналы могли расходиться с графиком Binance.
      const urls = [

        `https://api.mexc.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`
      ];
      for (const url of urls) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) continue;
          const data = await res.json();
          if (!Array.isArray(data)) continue;
          const candles = data.map(d => ({ time: Math.floor(Number(d[0]) / 1000), open: Number(d[1]), high: Number(d[2]), low: Number(d[3]), close: Number(d[4]), volume: Number(d[5]) })).filter(c => [c.time, c.open, c.high, c.low, c.close].every(Number.isFinite));
          if (candles.length) return candles;
        } catch (e) { console.warn('Candle source failed:', url, e); }
      }
      return [];
    }
  };

  const speakQueue = [];
  let voiceBusy = false;
  function speakTextAsync(text, isActive = () => true) {
    return new Promise(resolve => {
      if (!('speechSynthesis' in window) || !isActive()) return resolve();
      speakQueue.push({ text, resolve });
      processSpeechQueue(isActive);
    });
  }
  function processSpeechQueue(isActive) {
    if (voiceBusy || !speakQueue.length) return;
    if (!isActive()) { while (speakQueue.length) speakQueue.shift().resolve(); return; }
    voiceBusy = true;
    const item = speakQueue.shift();
    const utterance = new SpeechSynthesisUtterance(item.text);
    utterance.lang = 'ru-RU'; utterance.rate = .92; utterance.pitch = .95;
    const done = () => { voiceBusy = false; item.resolve(); setTimeout(() => processSpeechQueue(isActive), 220); };
    const fallback = setTimeout(done, Math.min(9000, item.text.length * 95 + 1200));
    utterance.onend = () => { clearTimeout(fallback); done(); };
    utterance.onerror = () => { clearTimeout(fallback); done(); };
    try { window.speechSynthesis.speak(utterance); } catch (e) { clearTimeout(fallback); done(); }
  }

    const min = Math.min(...chartData.map(c => c.low));

    const range = max - min || 1;
    const width = 220, height = 90, cw = width / chartData.length;
    return <div className="scanner-chart">

          const x = i * cw;
          const w = cw * .68;
          const oY = height - ((c.open - min) / range) * height;
          const cY = height - ((c.close - min) / range) * height;

        if (xSig !== null && ySig !== null) {
          const arrow = document.createElement('div');
          arrow.className = 'trade-arrow';
          arrow.style.left = `${xSig}px`; arrow.style.top = `${ySig}px`;
          arrow.innerHTML = isBuy ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="3"><path d="M12 19V5M5 12l7-7 7 7"/></svg>` : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f43f5e" stroke-width="3"><path d="M12 5v14M5 12l7 7 7-7"/></svg>`;
          attach(arrow, xSig, ySig - 12);
        }
        if (xEntry !== null && yEntry !== null) {
          const p = document.createElement('div');
          p.className = 'trade-point';
          p.style.left = `${xEntry}px`; p.style.top = `${yEntry}px`;
          attach(p, xEntry, yEntry - 10);
        }
        if (xEntry !== null && xExit !== null && yEntry !== null && yExit !== null) {
          count++;
          const xLeft = Math.min(xEntry, xExit);
          const width = Math.max(8, Math.abs(xExit - xEntry));
          const top = Math.min(yEntry, yExit) - 16;
          const height = Math.max(18, Math.abs(yExit - yEntry) + 32);
          const box = document.createElement('div');
          box.className = `trade-box ${isClosed ? (isWin ? 'win' : 'loss') : 'win'}`;
          box.style.left = `${xLeft}px`; box.style.top = `${top}px`; box.style.width = `${width}px`; box.style.height = `${height}px`;
          attach(box, xLeft + width / 2, top - 8);
          if (isClosed) {
            const exit = document.createElement('div');
            exit.className = 'trade-point exit';
            exit.style.left = `${xExit}px`; exit.style.top = `${yExit}px`;
            attach(exit, xExit, yExit - 10);
            const badge = document.createElement('div');
            badge.className = `trade-badge ${isWin ? 'win' : 'loss'}`;
            badge.style.left = `${xExit}px`; badge.style.top = `${yExit}px`;
            badge.style.transform = isBuy ? 'translate(-50%, 16px)' : 'translate(-50%, calc(-100% - 16px))';
            badge.textContent = `${isWin ? 'WIN' : 'LOSS'} | ${isBuy ? 'BUY' : 'SELL'} ${t.pnl > 0 ? '+' : ''}${formatRub(t.pnl)}`;
            attach(badge, xExit, yExit - 10);
          }
        }
      }
      setRenderedMarkers(count);
    }, []);

    async function initChart() {
      if (!chartContainerRef.current || chartRef.current) return;
      await wait(50);
      if (!chartContainerRef.current || chartRef.current) return;
      const chart = LightweightCharts.createChart(chartContainerRef.current, {
        autoSize: true,
        layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#475569', fontFamily: 'JetBrains Mono' },
        grid: { vertLines: { color: 'rgba(148,163,184,.13)' }, horzLines: { color: 'rgba(148,163,184,.13)' } },
        timeScale: { borderVisible: false, timeVisible: true, secondsVisible: false },
        rightPriceScale: { borderVisible: false }
      });
      const candlesSeries = chart.addCandlestickSeries({ upColor: '#38bdf8', downColor: '#fb7185', borderUpColor: '#38bdf8', borderDownColor: '#fb7185', wickUpColor: '#38bdf8', wickDownColor: '#fb7185' });
      chartRef.current = chart;
      candleSeriesRef.current = candlesSeries;
      chart.timeScale().subscribeVisibleLogicalRangeChange(redrawOverlay);
      chart.timeScale().subscribeSizeChange(redrawOverlay);
      window.addEventListener('resize', redrawOverlay);
    }

    function clearExtraSeries() {
      if (!chartRef.current) return;
      extraSeriesRef.current.forEach(s => { try { chartRef.current.removeSeries(s); } catch(e) {} });
      extraSeriesRef.current = [];
    }
    function drawIndicators(data) {
      if (!chartRef.current) return;
      clearExtraSeries();
      const upper = [], lower = [];
      for (let i = STRATEGY_RUNTIME_CONFIG.lookback; i < data.length; i++) {
        const prev = data.slice(i - STRATEGY_RUNTIME_CONFIG.lookback, i);
        upper.push({ time: data[i].time, value: Math.max(...prev.map(c => c.high)) });
        lower.push({ time: data[i].time, value: Math.min(...prev.map(c => c.low)) });
      }
      const us = chartRef.current.addLineSeries({ color: 'rgba(244,63,94,.55)', lineWidth: 1, lineStyle: 2, title: 'UPPER POOL', lastValueVisible: true, priceLineVisible: false });
      us.setData(upper); extraSeriesRef.current.push(us);
      const ls = chartRef.current.addLineSeries({ color: 'rgba(16,185,129,.55)', lineWidth: 1, lineStyle: 2, title: 'LOWER POOL', lastValueVisible: true, priceLineVisible: false });
      ls.setData(lower); extraSeriesRef.current.push(ls);
    }

    function updateLiveCandleOnChart(candle) {
      if (!candle || !Number.isFinite(Number(candle.close))) return;
      const normalized = {
        time: Number(candle.time),
        open: Number(candle.open),
        high: Number(candle.high),
        low: Number(candle.low),
        close: Number(candle.close),
        volume: Number(candle.volume || 0)
      };

      currentPriceRef.current = normalized.close;
      setLivePrice(normalized.close);

      setCandles(prev => {
        const arr = Array.isArray(prev) ? [...prev] : [];
        const last = arr[arr.length - 1];
        if (last && Number(last.time) === Number(normalized.time)) {
          arr[arr.length - 1] = normalized;
        } else if (!last || Number(normalized.time) > Number(last.time)) {
          arr.push(normalized);
          if (arr.length > 500) arr.shift();
        }
        return arr;
      });

      if (candleSeriesRef.current) {
        try { candleSeriesRef.current.update(normalized); } catch(e) { console.warn('live chart update error', e); }
      }
      redrawOverlay();
    }

    function startLivePolling(symbol = STRATEGY_RUNTIME_CONFIG.symbol) {
      if (livePollingRef.current) clearInterval(livePollingRef.current);
      livePollingRef.current = setInterval(async () => {
        if (!engineActiveRef.current) return;
        try {
          const d = await ScannerAPI.getCandles(symbol, 2, '5m');
          if (d && d.length) updateLiveCandleOnChart(d[d.length - 1]);
        } catch(e) { console.warn('live polling error', e); }
      }, 2000);
    }

    function startLiveStream(symbol = STRATEGY_RUNTIME_CONFIG.symbol) {
      try { if (liveWsRef.current) liveWsRef.current.close(); } catch(e) {}
      const wsUrl = `wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@kline_5m`;
      try {
        const ws = new WebSocket(wsUrl);
        liveWsRef.current = ws;
        ws.onopen = () => addLog('LIVE STREAM: Binance BTCUSDT 5M подключён');
        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            const k = msg.k;
            if (!k) return;
            const candle = {
              time: Math.floor(Number(k.t) / 1000),
              open: Number(k.o),
              high: Number(k.h),
              low: Number(k.l),
              close: Number(k.c),
              volume: Number(k.v)
            };
            updateLiveCandleOnChart(candle);
          } catch(e) { console.warn('ws parse error', e); }
        };
        ws.onerror = () => {
          addLog('LIVE STREAM: ошибка WebSocket, включаю REST polling');
          startLivePolling(symbol);
        };
        ws.onclose = () => {
          if (engineActiveRef.current) setTimeout(() => { if (engineActiveRef.current) startLiveStream(symbol); }, 4000);
        };
      } catch(e) {
        addLog('LIVE STREAM: недоступен, включаю REST polling');
        startLivePolling(symbol);
      }
    }

    function stopLiveStreams() {
      try { if (liveWsRef.current) liveWsRef.current.close(); } catch(e) {}
      try { if (livePollingRef.current) clearInterval(livePollingRef.current); } catch(e) {}
      liveWsRef.current = null;
      livePollingRef.current = null;
    }

    useEffect(() => () => stopLiveStreams(), []);

    async function announceStats(s) {
      const pnlValue = Math.round(safeNumber(s.pnl, 0));
      const pnlAbs = Math.abs(pnlValue);
      const pnlWord = pnlValue >= 0 ? 'прибыль' : 'убыток';
      await speakTextAsync('Терминал Про Макс запущен. Активирован режим повышенного качества сигналов.', () => engineActiveRef.current);
      await speakTextAsync('Рабочая модель: график пять минут, экспирация двадцать пять минут, вход по стратегии снятия ликвидности.', () => engineActiveRef.current);
      await speakTextAsync('Это демонстрационный бэктест: расчёт выполнен для баланса пятьдесят тысяч рублей и базового входа пятьсот рублей.', () => engineActiveRef.current);
      await speakTextAsync(`За последние двенадцать часов найдено ${s.totalSignals} сигналов. Исполнено ${s.confirmedTrades} сделок. Плюсовых ${s.wins}, минусовых ${s.losses}.`, () => engineActiveRef.current);
      await speakTextAsync(`Итоговый результат с учётом мартингейла: ${pnlWord} ${pnlAbs} рублей. Итоговый баланс ${Math.round(s.finalBalance)} рублей.`, () => engineActiveRef.current);
      await speakTextAsync('Важно: результат считается с учётом мартингейла до четвёртого колена. После минусовой сделки следующий вход увеличивается, поэтому одна прибыльная сделка на старшем колене может перекрыть несколько предыдущих минусов.', () => engineActiveRef.current);
    }

    async function runInitialAnalysis() {
      if (engineActiveRef.current) return;
      engineActiveRef.current = true;
      setStage(APP_STAGE.ANALYSIS);
      setViewMode('DETAIL');
      setPhase('АНАЛИЗ 12 ЧАСОВ (5M)...');
      addLog('ЗАПУСК: QUALITY BALANCED 5M / 25M ENGINE');

      const data = await ScannerAPI.getCandles(STRATEGY_RUNTIME_CONFIG.symbol, 400, '5m');
      if (!data.length) { setPhase('ОШИБКА API'); addLog('НЕТ СВЯЗИ С БИРЖЕЙ'); return; }
      setCandles(data);
      currentPriceRef.current = data[data.length - 1].close;
      setLivePrice(currentPriceRef.current);
      await initChart();
      candleSeriesRef.current.setData(data);
      drawIndicators(data);

      const result = buildHistoricalBacktest12h(data, STRATEGY_RUNTIME_CONFIG);
      tradesRef.current = result.simulatedTrades;
      currentMgIndexRef.current = result.currentMgStep;
      setMetrics({ structure: result.lastScores.structure, liquidity: result.lastScores.liquidity, filterLevel: result.lastScores.atr, smartMoney: result.lastScores.confidence });
      setBacktestStats(result.stats);
      const newStats = calculateSessionStats(result.simulatedTrades);
      setStats(newStats);
      redrawOverlay();
      try { chartRef.current.timeScale().fitContent(); } catch(e) {}
      addLog(`БЭКТЕСТ: FINAL ${result.stats.finalBuy + result.stats.finalSell}, TRADES ${result.stats.ledgerTrades}, PNL ${newStats.pnl}`);
      setPhase('ОТЧЁТ АНАЛИТИКИ...');
      await announceStats(newStats);
      if (!engineActiveRef.current) return;
      startLiveStream(STRATEGY_RUNTIME_CONFIG.symbol);
      startLivePolling(STRATEGY_RUNTIME_CONFIG.symbol);
      setViewMode('SCREENER');
      setStage(APP_STAGE.LIVE_SCAN);
      setPhase('СКАНИРОВАНИЕ ЛИКВИДНОСТИ (5M)...');
    }

    async function handleLiveSignal(signalEvent, liveData) {
      setStage(APP_STAGE.SIGNAL_FLOW);
      setViewMode('DETAIL');
      setPhase('СИГНАЛ ОБНАРУЖЕН');
      addLog(`LIVE SIGNAL: ${signalEvent.direction}`);
      setCandles(liveData);
      currentPriceRef.current = liveData[liveData.length - 1].close;
      setLivePrice(currentPriceRef.current);
      if (candleSeriesRef.current) {
        candleSeriesRef.current.setData(liveData);
        drawIndicators(liveData);
      }
      const before = calculateSessionStats(tradesRef.current);
      const stake = getStakeByMartingaleIndex(currentMgIndexRef.current);
      const trade = createTradeObject({ signalId: signalEvent.signalId, direction: signalEvent.direction, signalTime: signalEvent.signalTime, signalPrice: signalEvent.signalPrice, signalHigh: signalEvent.signalHigh, signalLow: signalEvent.signalLow, atr: signalEvent.atr, stake, martingaleIndex: currentMgIndexRef.current, balanceBefore: before.finalBalance, state: 'SIGNAL_DETECTED' });
      tradesRef.current = [...tradesRef.current, trade];
      redrawOverlay();

      await speakTextAsync(`Внимание. Сигнал ${signalEvent.direction === 'BUY' ? 'вверх' : 'вниз'}. ${trade.reason}`, () => engineActiveRef.current);
      await speakTextAsync('Подготовьтесь. До входа три секунды.', () => engineActiveRef.current);
      setPhase('ПОДГОТОВКА 3 СЕКУНДЫ');
      for (let i = 3; i > 0; i--) { setCountdown(i); await wait(1000); }
      setCountdown(null);

      trade.state = 'TRADE_ACTIVE';
      trade.entryTime = Date.now();
      trade.entryPrice = currentPriceRef.current;
      trade.entrySource = 'live_after_6s';
      setSignal({ type: signalEvent.direction, exp: STRATEGY_RUNTIME_CONFIG.expiryMinutes, entryPrice: trade.entryPrice });
      setPhase('СИГНАЛ АКТИВЕН');
      redrawOverlay();

      let seconds = STRATEGY_RUNTIME_CONFIG.expiryMinutes * 60;
      while (seconds > 0 && engineActiveRef.current) {
        setCountdown(seconds);
        await wait(1000);
        seconds--;
        if (seconds % 10 === 0) {
          const d = await ScannerAPI.getCandles(STRATEGY_RUNTIME_CONFIG.symbol, 3, '5m');
          if (d.length) { updateLiveCandleOnChart(d[d.length - 1]); }
        }
      }
      setCountdown(null);
      const exitData = await ScannerAPI.getCandles(STRATEGY_RUNTIME_CONFIG.symbol, 2, '5m');
      const finalPrice = exitData.length ? exitData[exitData.length - 1].close : currentPriceRef.current;
      trade.exitTime = Date.now();
      trade.exitPrice = finalPrice;
      trade.result = evaluateTradeResult(trade.direction, trade.entryPrice, trade.exitPrice);
      trade.pnl = calculateTradePnl(trade.result, trade.stake);
      trade.balanceAfter = trade.balanceBefore + trade.pnl;
      trade.state = 'TRADE_CLOSED';
      currentMgIndexRef.current = getNextMartingaleIndex(trade.result, currentMgIndexRef.current);
      setStats(calculateSessionStats(tradesRef.current));
      setSignal(null);
      redrawOverlay();
      addLog(`${trade.result}: ${trade.direction}, PNL ${trade.pnl}`);
      await speakTextAsync(trade.result === 'WIN' ? `Плюс. Прибыль ${trade.pnl} рублей.` : 'Минус. Увеличиваю шаг мартингейла.', () => engineActiveRef.current);
      setStage(APP_STAGE.LIVE_SCAN);
      setViewMode('SCREENER');
      setPhase('СКАНИРОВАНИЕ ЛИКВИДНОСТИ (5M)...');
      lastNewsAtRef.current = Date.now();
    }

    useEffect(() => {
      if (stage !== APP_STAGE.LIVE_SCAN || !engineActiveRef.current) return;
      let cancelled = false;
      const loop = async () => {
        if (cancelled || stageRef.current !== APP_STAGE.LIVE_SCAN) return;
        try {
          const data = await ScannerAPI.getCandles(STRATEGY_RUNTIME_CONFIG.symbol, 400, '5m');
          if (data.length) {
            setCandles(data);
            currentPriceRef.current = data[data.length - 1].close;
            setLivePrice(currentPriceRef.current);
            updateLiveCandleOnChart(data[data.length - 1]);
            const { signal, debug } = checkRecentClosedSignals({ candles: data, symbol: STRATEGY_RUNTIME_CONFIG.symbol, cfg: STRATEGY_RUNTIME_CONFIG });
            if (debug) setDebugInfo(debug);
            if (candleSeriesRef.current && viewMode === 'DETAIL') { candleSeriesRef.current.setData(data); drawIndicators(data); redrawOverlay(); }
            if (signal && !cancelled) { await handleLiveSignal(signal, data); return; }
          }
          if (Date.now() - lastNewsAtRef.current > 10 * 60 * 1000 && !window.speechSynthesis?.speaking) {
            lastNewsAtRef.current = Date.now();
            const n = FALLBACK_NEWS[Math.floor(Math.random() * FALLBACK_NEWS.length)];
            await speakTextAsync(`Финансовая новость. Источник: ${n.source}. ${n.title}.`, () => engineActiveRef.current && stageRef.current === APP_STAGE.LIVE_SCAN);
          }
        } catch (e) { console.warn('Live loop error:', e); addLog('ПЕРЕЗАПУСК РАДАРА'); }
        if (!cancelled) setTimeout(loop, 7000);
      };
      loop();
      return () => { cancelled = true; };
    }, [stage, viewMode, redrawOverlay]);

    useEffect(() => {
      if (stage === APP_STAGE.SPLASH) {
        const t = setTimeout(() => runInitialAnalysis(), 1800);
        return () => clearTimeout(t);
      }
    }, [stage]);

    function startTerminal() {
      try { window.speechSynthesis?.cancel(); window.speechSynthesis?.speak(new SpeechSynthesisUtterance('')); } catch(e) {}
      setStage(APP_STAGE.SPLASH);
    }

    if (stage === APP_STAGE.IDLE) {
      return <div className="app-shell items-center justify-center">
        <div className="glass max-w-md w-[92vw] rounded-[2.5rem] p-9 md:p-12 text-center flex flex-col items-center">
          <div className="author-glow text-lg md:text-xl mb-6">SLAVA GORDEEV</div>
          <div className="w-20 h-20 mb-6 rounded-2xl bg-gradient-to-br from-slate-50 to-slate-200 border border-white flex items-center justify-center shadow-lg"><ZapIcon size={38} className="text-cyan-500" /></div>
          <h1 className="oswald text-4xl md:text-5xl leading-none font-black text-slate-800">КРИПТО ЯДРО<br/><span className="gradient-text">PRO MAX</span></h1>
          <p className="mt-3 mb-9 text-[11px] tracking-[.24em] text-slate-400 font-bold uppercase">SMC Pine Exact • 5M / 25M Fixed Engine</p>
          <button onClick={startTerminal} className="w-full py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-cyan-500 text-white oswald text-xl md:text-2xl font-bold tracking-widest shadow-[0_12px_30px_rgba(14,165,233,.3)] active:scale-95 transition">ЗАПУСК СИСТЕМЫ</button>
        </div>
      </div>;
    }

    return <div className="app-shell">
      {stage === APP_STAGE.SPLASH && <div className="maintenance-screen"><div className="maintenance-card"><ZapIcon size={40} className="text-cyan-500 mx-auto mb-6"/><div className="author-glow text-4xl md:text-6xl">SLAVA GORDEEV</div><div className="mt-4 text-[10px] tracking-[.3em] text-slate-500 font-bold uppercase">SMC Pine Exact / 5M Engine</div><div className="mt-8 w-56 h-1 bg-slate-200 rounded-full overflow-hidden mx-auto"><div className="h-full bg-cyan-400 animate-[pulse_1.5s_ease-in-out_infinite]"></div></div></div></div>}

      {tooltip && <div className="trade-tooltip" style={{ left: tooltip.x, top: tooltip.y }} dangerouslySetInnerHTML={{ __html: tooltipHtml }} />}

      <div className="ticker-bar glass-soft shrink-0">
        <div className="ticker-label oswald text-xs font-bold"><GlobeIcon className="text-cyan-400"/> РАДАР СЕТИ</div>
        <div className="overflow-hidden flex-1"><div className="ticker-track oswald text-xs font-bold text-slate-500 tracking-widest">
          {[0,1].map(block => <div key={block} className="flex gap-12 pr-12 whitespace-nowrap">{FALLBACK_NEWS.map((n,i) => <span key={`${block}-${i}`} className="flex items-center gap-2"><span className="w-1.5 h-1.5 rounded-full bg-cyan-400 shadow-[0_0_8px_rgba(6,182,212,.7)]"></span>{n.source}: {n.title}</span>)}</div>)}
        </div></div>
      </div>

      <header className="header shrink-0">
        <div>
          <h1 className="oswald text-3xl md:text-4xl font-black flex items-center gap-2 text-slate-800"><ZapIcon size={30} className="text-cyan-500"/> ТЕРМИНАЛ <span className="gradient-text">PRO MAX</span></h1>
          <div className="flex items-center gap-3 mt-1"><span className="author-glow text-xs bg-white/50 border border-slate-200 rounded px-2 py-0.5">SLAVA GORDEEV</span><span className="text-[9px] text-slate-400 tracking-[.22em] font-bold uppercase">SMC PINE QUALITY / 5M</span></div>
        </div>
        <div className="flex flex-col md:items-end gap-1"><div className="oswald text-xs md:text-sm text-white px-4 py-2 rounded-xl bg-gradient-to-r from-blue-500 to-cyan-500 font-bold tracking-widest shadow-md">{phase}</div><div className="flex items-center gap-4"><span className="text-[9px] text-slate-500 font-bold uppercase px-2 py-1 bg-white/60 border border-slate-200 rounded-full"><span className="inline-block w-1.5 h-1.5 rounded-full bg-emerald-400 mr-1 animate-pulse"></span>Синхронизация</span><LiveClock/></div></div>
      </header>

      <main className="main-layout">
        <section className="chart-card glass">
          <div className="price-card glass-soft">
            <div className="text-[10px] text-slate-400 tracking-widest font-bold uppercase flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>Bitcoin (5M)</div>
            <div className="oswald text-4xl md:text-5xl font-black text-slate-800 leading-none mt-2">{livePrice ? formatPrice(livePrice) : (currentPriceRef.current ? formatPrice(currentPriceRef.current) : '---')}</div>
          </div>

          <div className="chart-area">
            <div ref={chartContainerRef} className="chart-container"></div>
            <div ref={overlayRef} className="trade-overlay"></div>
          </div>

          <div className="scanner-layer" style={{ opacity: viewMode === 'SCREENER' ? 1 : 0, pointerEvents: viewMode === 'SCREENER' ? 'auto' : 'none' }}>
            <div className="scanner-card glass">
              <div className="flex justify-between items-start gap-4">
                <div className="flex items-center gap-4"><div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-cyan-400 text-white flex items-center justify-center text-4xl font-black shadow-lg">₿</div><div><h2 className="oswald text-4xl md:text-5xl font-black leading-none">BITCOIN</h2><span className="text-cyan-600 font-black tracking-[.22em] bg-cyan-50 border border-cyan-100 px-2 py-1 rounded-lg text-xs">BTC/USDT • 5M</span></div></div>
                <div className="hidden sm:flex items-center gap-2 px-3 py-2 rounded-xl bg-white/70 border border-slate-100 text-slate-600 font-bold text-xs tracking-widest uppercase"><span>Smart Money Scanner</span><RadarIcon className="text-cyan-500 animate-spin"/></div>
              </div>
              <PremiumScannerChart data={candles} isScanning={stage === APP_STAGE.LIVE_SCAN} phase={phase}/>
            </div>
          </div>
        </section>

        <aside className="side-panel glass">
          <div className="p-4 border-b border-white/70 bg-gradient-to-r from-blue-50/70 to-transparent text-center oswald font-bold tracking-widest text-slate-800">{phase}</div>
          <div className="side-scroll">
            <div className="broker-button-wrap shrink-0"><a className="broker-btn" href={STRATEGY_RUNTIME_CONFIG.referralUrl} target="_blank" rel="noopener noreferrer"><span className="text-[10px] tracking-[.24em] uppercase font-black opacity-90">Брокер для входа</span><span className="oswald text-2xl md:text-3xl font-black tracking-wide">ТОРГОВАТЬ ЗДЕСЬ</span><span className="text-sm font-bold">через брокера</span><span className="broker-cursor"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></span></a></div>

            {backtestStats && <div className="glass-soft rounded-2xl p-3 debug-grid mono">
              <div className="oswald text-cyan-600 font-bold tracking-widest mb-2 border-b border-slate-200 pb-1">ДИАГНОСТИКА СТРАТЕГИИ 12H</div>
              <div><span>Свечей в 12H:</span><b>{backtestStats.candlesInWindow}</b></div>
              <div><span>RAW Sweep:</span><b className="text-cyan-600">{backtestStats.rawBuy + backtestStats.rawSell}</b></div>
              <div><span>RECLAIM:</span><b className="text-blue-600">{backtestStats.reclaimBuy + backtestStats.reclaimSell}</b></div>
              <div><span>FINAL Signals:</span><b className="text-emerald-500">{backtestStats.finalBuy + backtestStats.finalSell}</b></div>
              <div className="border-t border-slate-100 pt-1 mt-1"><span>Built trades:</span><b>{backtestStats.builtTrades}</b></div>
              <div><span>Ledger trades:</span><b>{backtestStats.ledgerTrades}</b></div>
              <div><span>Rendered markers:</span><b>{renderedMarkers}</b></div>
              {Object.keys(backtestStats.rejectReasons || {}).length > 0 && <div className="mt-2 pt-2 border-t border-slate-100 flex-col items-stretch"><span className="text-slate-400">Частые причины:</span>{Object.entries(backtestStats.rejectReasons).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([r,c]) => <b key={r} className="text-amber-600 truncate">{r}: {c}</b>)}</div>}
              {debugInfo && <div className="mt-2 pt-2 border-t border-slate-100"><span>Live Reason:</span><b className="text-amber-600">{debugInfo.reason}</b></div>}
            </div>}

            <div className="glass-soft rounded-2xl p-3 grid grid-cols-4 gap-1"><Speedometer value={metrics.structure} label="Структура" color="#eab308"/><Speedometer value={metrics.liquidity} label="Ликвидность" color="#0ea5e9" glow/><Speedometer value={metrics.filterLevel} label="ATR фильтр" color="#8b5cf6"/><Speedometer value={metrics.smartMoney} label="Smart Money" color="#06b6d4"/></div>

            <div className="grid grid-cols-[.8fr_1.2fr] gap-3 h-28">
              <div className="glass-soft rounded-2xl flex items-center justify-center">{signal ? <div className="text-5xl">{signal.type === 'BUY' ? '⬆️' : '⬇️'}</div> : <div className="opacity-30 flex flex-col items-center"><RadarIcon size={28}/><span className="oswald text-xs mt-1">СТАТУС</span></div>}</div>
              <div className="glass-soft rounded-2xl p-4 flex flex-col justify-center"><span className="text-[10px] text-slate-400 tracking-widest font-bold uppercase">Баланс 12H</span><span className="oswald text-3xl font-black text-slate-800">{formatRub(stats.finalBalance)}</span><span className={`text-sm font-black ${stats.pnl >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{stats.pnl > 0 ? '+' : ''}{formatRub(stats.pnl)} PNL</span></div>
            </div>

            <div className="glass-soft rounded-2xl p-4"><div className="flex justify-between items-center"><span className="oswald text-slate-500 font-bold tracking-widest text-xs">СТАТИСТИКА</span><span className="oswald text-xs font-black text-slate-600">12 ЧАСОВ</span></div><div className="grid grid-cols-2 gap-3 mt-3"><div className="bg-white/60 rounded-xl p-3"><span className="text-[9px] text-slate-400 font-bold uppercase">Профит</span><div className="oswald text-2xl font-black text-emerald-500">{stats.wins}</div></div><div className="bg-white/60 rounded-xl p-3 text-right"><span className="text-[9px] text-slate-400 font-bold uppercase">Убыток</span><div className="oswald text-2xl font-black text-rose-500">{stats.losses}</div></div></div></div>

            <div className="glass-soft rounded-2xl p-4 flex justify-between items-center"><div><span className="text-[10px] text-slate-400 tracking-widest font-bold uppercase">Цена входа</span><div className="mono text-lg font-black text-slate-700">{signal?.entryPrice ? formatPrice(signal.entryPrice) : '---.-----'}</div></div><div className="text-right"><span className="text-[10px] text-slate-400 tracking-widest font-bold uppercase">Экспирация</span><div className="mono text-2xl font-black text-cyan-600">{countdown !== null ? `${Math.floor(countdown/60)}:${String(countdown%60).padStart(2,'0')}` : '--:--'}</div></div></div>

            <div className="glass-soft rounded-2xl p-3 mono text-[10px] text-slate-500 min-h-[80px]">{logs.length ? logs.map((l,i)=><div key={i} className="py-0.5 border-b border-slate-100 last:border-b-0">{l}</div>) : 'Логи системы...'}</div>
          </div>
        </aside>
      </main>

      <footer className="flex justify-between items-center text-[10px] text-slate-400 font-bold tracking-widest uppercase px-4 py-2 shrink-0"><span>256-BIT ШИФРОВАНИЕ СИСТЕМЫ • СОЕДИНЕНИЕ БЕЗОПАСНО</span><span className="bg-slate-800 text-white rounded-lg px-3 py-1">КРИПТО ИНВЕСТ PRO MAX</span></footer>
    </div>;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
