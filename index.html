<!DOCTYPE html>
<html lang="ru">
<head>

      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #f8fafc;
      color: #0f172a;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;

    .oswald { font-family: 'Oswald', sans-serif; letter-spacing: .06em; text-transform: uppercase; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .raj { font-family: 'Rajdhani', sans-serif; }

    .app {
      width: 100%;
      height: 100dvh;
      max-width: 1680px;
      margin: 0 auto;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 8%, rgba(14,165,233,.16), transparent 28%),
        radial-gradient(circle at 85% 85%, rgba(37,99,235,.09), transparent 34%),

    }

    .app::before {

      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .55;
      background-image:
        linear-gradient(rgba(14,165,233,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14,165,233,.035) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, #000 0%, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at center, #000 0%, transparent 80%);
    }

    .glass {
      background: rgba(255,255,255,.74);
      border: 1px solid rgba(255,255,255,.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 16px 42px rgba(15,23,42,.07),
        inset 0 1px 0 rgba(255,255,255,.92);
    }

    .glass-soft {
      background: rgba(255,255,255,.62);
      border: 1px solid rgba(255,255,255,.86);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 8px 24px rgba(15,23,42,.045),
        inset 0 1px 0 rgba(255,255,255,.85);
    }

    .author-shimmer {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      letter-spacing: .35em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #94a3b8 0%, #f8fafc 25%, #475569 50%, #f8fafc 75%, #94a3b8 100%);
      background-size: 220% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shimmer 7s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: -220% center; }
      100% { background-position: 220% center; }
    }

    .top-ticker {
      height: 31px;
      border-radius: 0 0 16px 16px;
      overflow: hidden;
      z-index: 10;
      display: flex;
      align-items: center;
    }

    .ticker-label {
      height: 100%;
      min-width: 135px;
      padding: 0 16px;
      border-radius: 0 0 16px 0;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .12em;
      box-shadow: 8px 0 22px rgba(15,23,42,.12);
    }

    .ticker-track {
      display: flex;
      width: max-content;
      animation: ticker 40s linear infinite;
      white-space: nowrap;
    }

    @keyframes ticker {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .header {
      height: 70px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      gap: 12px;
      flex-shrink: 0;
    }

    .title-main {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(28px, 3vw, 42px);
      line-height: .95;
      font-weight: 800;
      letter-spacing: .055em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title-main span {
      background: linear-gradient(135deg, #1d4ed8, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-pill {
      padding: 9px 18px;
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #06b6d4);

      font-size: 13px;
      font-family: 'Oswald', sans-serif;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      box-shadow: 0 10px 26px rgba(14,165,233,.22);
      white-space: nowrap;
    }

    .main {
      z-index: 10;
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.78fr) minmax(330px, .86fr);
      gap: 12px;
      overflow: hidden;
    }

    .chart-card {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border-radius: 28px;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    .chart-top-info {
      position: absolute;
      left: 26px;
      top: 24px;
      z-index: 20;
      border-radius: 22px;
      padding: 13px 18px;
      min-width: 220px;
    }

    .chart-price {
      font-family: 'Oswald', sans-serif;
      font-weight: 800;
      letter-spacing: .05em;
      color: #0f172a;
      font-size: clamp(36px, 4vw, 58px);
      line-height: .9;
    }

    .chart-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      border-radius: 22px;
      overflow: hidden;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(255,255,255,.92);
      box-shadow: inset 0 1px 18px rgba(15,23,42,.035);
      margin-top: 82px;

    #chart {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .trade-overlay {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      overflow: hidden;
    }

    .trade-box {
      position: absolute;
      pointer-events: auto;
      cursor: pointer;
      border-radius: 9px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,.75);
      box-shadow:
        0 6px 18px rgba(15,23,42,.08),
        inset 0 1px 0 rgba(255,255,255,.72);
    }

    .trade-box.win {
      background: linear-gradient(180deg, rgba(16,185,129,.24), rgba(16,185,129,.055));
      border-color: rgba(16,185,129,.50);
    }

    .trade-box.loss {
      background: linear-gradient(180deg, rgba(244,63,94,.22), rgba(244,63,94,.05));
      border-color: rgba(244,63,94,.48);
    }

    .trade-box.active {
      background: linear-gradient(180deg, rgba(14,165,233,.22), rgba(14,165,233,.055));
      border-color: rgba(14,165,233,.50);
      animation: activeBox 1.2s ease-in-out infinite;
    }

    @keyframes activeBox {
      0%, 100% { box-shadow: 0 8px 22px rgba(14,165,233,.12), inset 0 1px 0 rgba(255,255,255,.78); }
      50% { box-shadow: 0 8px 32px rgba(14,165,233,.24), inset 0 1px 0 rgba(255,255,255,.95); }
    }

    .pt {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      cursor: pointer;
      z-index: 11;
      background: white;
      box-shadow: 0 0 14px rgba(15,23,42,.20);
    }

    .pt.entry {
      border: 2px solid #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,.10), 0 0 16px rgba(37,99,235,.28);
    }

    .pt.exit {
      border: 2px solid #8b5cf6;
      box-shadow: 0 0 0 4px rgba(139,92,246,.10), 0 0 16px rgba(139,92,246,.28);
    }

    .signal-arrow {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      cursor: pointer;
      z-index: 14;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      border: 1px solid rgba(255,255,255,.98);
      box-shadow: 0 10px 24px rgba(15,23,42,.16), inset 0 1px 0 rgba(255,255,255,.9);

      color: #10b981;
      border-color: rgba(16,185,129,.42);
      box-shadow: 0 10px 24px rgba(16,185,129,.20), inset 0 1px 0 rgba(255,255,255,.92);

    .signal-arrow.sell {
      color: #f43f5e;
      border-color: rgba(244,63,94,.42);
      box-shadow: 0 10px 24px rgba(244,63,94,.20), inset 0 1px 0 rgba(255,255,255,.92);
    }

    .marker-label {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      cursor: pointer;
      z-index: 15;
      white-space: nowrap;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(226,232,240,.92);
      color: #0f172a;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: .08em;
      box-shadow: 0 8px 18px rgba(15,23,42,.10);

    .marker-label.sell { color: #e11d48; }
    .marker-label.entry { color: #2563eb; }
    .marker-label.exit { color: #7c3aed; }

    .badge {
      position: absolute;
      transform: translate(-50%, -120%);
      pointer-events: auto;
      cursor: pointer;
      z-index: 14;
      white-space: nowrap;
      padding: 5px 8px;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 900;
      color: white;
      box-shadow: 0 8px 20px rgba(15,23,42,.18);

    .badge.win { background: rgba(16,185,129,.96); }
    .badge.loss { background: rgba(244,63,94,.96); }
    .badge.active { background: rgba(14,165,233,.96); }

    .tooltip {

      z-index: 99999;

      max-width: 315px;
      padding: 14px 15px;
      border-radius: 18px;
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(226,232,240,.95);
      box-shadow: 0 18px 44px rgba(15,23,42,.18);
      backdrop-filter: blur(20px);
      pointer-events: none;
      font-size: 12px;
    }

    .tooltip-title {
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(15,23,42,.08);
      padding-bottom: 8px;
      margin-bottom: 7px;
    }

    .tooltip-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 3px 0;
    }

    .tooltip-row span { color: #64748b; font-weight: 600; }
    .tooltip-row b { font-family: 'JetBrains Mono', monospace; color: #0f172a; text-align: right; }

    .right {
      min-height: 0;
      overflow: hidden;
      border-radius: 28px;
      display: flex;
      flex-direction: column;
    }

    .right-head {
      height: 55px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,.8);
      font-family: 'Oswald', sans-serif;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-size: 17px;
      color: #0f172a;
      text-align: center;
      padding: 0 10px;
    }

    .right-body {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      padding: 12px;
      display: grid;
      grid-template-rows: auto auto auto auto 1fr;
      gap: 10px;
    }

    .broker {
      min-height: 74px;
      border-radius: 22px;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      box-shadow: 0 16px 34px rgba(14,165,233,.26);
      border: 1px solid rgba(255,255,255,.45);
    }

    .broker::after {
      content: "➤";
      position: absolute;
      right: 20px;
      bottom: 16px;
      font-size: 26px;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,.24));
      animation: brokerTap 3s ease-in-out infinite;
    }

    @keyframes brokerTap {
      0% { transform: translate(18px, 12px) scale(.95); opacity: 0; }
      15% { opacity: 1; }
      40% { transform: translate(0, 0) scale(1); opacity: 1; }
      50% { transform: translate(-2px, 2px) scale(.82); opacity: 1; }
      62% { transform: translate(0, 0) scale(1.05); opacity: 1; }
      100% { transform: translate(18px, 12px) scale(.95); opacity: 0; }
    }

    .broker small { font-size: 10px; letter-spacing: .22em; text-transform: uppercase; font-weight: 900; opacity: .9; }
    .broker strong { font-family: 'Oswald', sans-serif; font-size: 28px; letter-spacing: .04em; line-height: 1; text-transform: uppercase; }

    .gauges {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 10px;
      border-radius: 22px;
    }

    .gauge { text-align: center; min-width: 0; }

    .gauge-arc {
      height: 30px;
      border-radius: 50px 50px 0 0;
      border-top: 5px solid #e2e8f0;
      border-left: 5px solid #e2e8f0;
      border-right: 5px solid #e2e8f0;
      position: relative;
      margin: 0 auto 3px;
      width: 52px;
    }

    .gauge-needle {
      position: absolute;
      left: 50%;
      bottom: -3px;
      width: 3px;
      height: 26px;
      border-radius: 99px;
      transform-origin: bottom center;
      background: #0ea5e9;
      box-shadow: 0 0 10px rgba(14,165,233,.35);
    }

    .gauge-val { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 800; line-height: 1; }
    .gauge-label { font-size: 8px; letter-spacing: .08em; color: #94a3b8; font-weight: 900; text-transform: uppercase; white-space: nowrap; }

    .scanner {
      border-radius: 22px;
      padding: 10px 12px;
      overflow: hidden;
      position: relative;
      height: 128px;
    }

    .scanner-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      color: #0891b2;
      text-transform: uppercase;
      letter-spacing: .09em;
      margin-bottom: 7px;

    .mini-chart {
      position: relative;
      height: 82px;
      border-radius: 15px;
      overflow: hidden;
      background: rgba(248,250,252,.7);
      border: 1px solid rgba(226,232,240,.65);

    .mini-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(14,165,233,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14,165,233,.07) 1px, transparent 1px);
      background-size: 10px 10px;
    }

    .scan-beam {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 28%;
      left: 0;
      background: linear-gradient(90deg, transparent, rgba(34,211,238,.18), rgba(34,211,238,.38));
      border-right: 2px solid rgba(34,211,238,.9);
      box-shadow: 4px 0 20px rgba(34,211,238,.35);
      animation: scanMove 2.4s ease-in-out infinite;
      z-index: 5;
    }

    @keyframes scanMove {
      from { transform: translateX(-110%); opacity: .2; }
      12% { opacity: 1; }
      88% { opacity: 1; }
      to { transform: translateX(390%); opacity: .2; }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .stat-card {
      border-radius: 20px;
      padding: 12px;
      min-height: 78px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat-label { font-size: 9px; letter-spacing: .12em; color: #94a3b8; font-weight: 900; text-transform: uppercase; }
    .stat-value { font-family: 'Oswald', sans-serif; font-size: 31px; line-height: 1; font-weight: 800; color: #0f172a; }

    .logbox {
      border-radius: 20px;
      padding: 10px 12px;
      min-height: 0;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      line-height: 1.45;
      color: #64748b;
    }

    .footer {
      height: 28px;
      flex-shrink: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #94a3b8;
      font-size: 10px;
      letter-spacing: .12em;
      font-weight: 900;
      text-transform: uppercase;
      padding: 0 12px;
    }

    .start-screen {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background:
        radial-gradient(circle at 30% 10%, rgba(14,165,233,.22), transparent 32%),
        radial-gradient(circle at 70% 85%, rgba(37,99,235,.15), transparent 36%),
        linear-gradient(135deg, #f8fbff, #eaf3fb 45%, #ffffff);
    }

    .start-card {
      width: min(520px, 94vw);
      border-radius: 34px;
      padding: 42px;
      text-align: center;
    }

    .start-title {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(42px, 9vw, 72px);
      line-height: .86;
      font-weight: 800;
      letter-spacing: .045em;
      text-transform: uppercase;
      margin: 12px 0;
    }

    .start-btn {
      width: 100%;
      border: 0;
      border-radius: 22px;
      padding: 17px;
      margin-top: 26px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      box-shadow: 0 16px 34px rgba(14,165,233,.28);
      font-family: 'Oswald', sans-serif;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .maintenance {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #f8fbff, #eaf3fb, #fff);

    .maintenance h1 {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(42px, 8vw, 78px);
      line-height: .9;
      text-align: center;
      margin: 0 0 18px;
    }

    @media (max-width: 980px) {
      html, body { overflow: auto; }
      .app { height: auto; min-height: 100dvh; overflow: visible; }
      .header { height: auto; min-height: 66px; align-items: flex-start; flex-direction: column; }
      .status-pill { width: 100%; text-align: center; font-size: 12px; }
      .main { display: flex; flex-direction: column; overflow: visible; }
      .chart-card { height: 58dvh; min-height: 470px; }
      .right { overflow: visible; }
      .right-body { overflow: visible; display: flex; flex-direction: column; }
      .footer { height: auto; padding-bottom: 8px; }
      .chart-top-info { left: 16px; top: 16px; min-width: 190px; }

    @media (max-width: 520px) {
      .app { padding: 6px; gap: 6px; }
      .ticker-label { min-width: 115px; font-size: 10px; padding: 0 11px; }
      .title-main { font-size: 27px; }
      .chart-card { min-height: 430px; }
      .chart-price { font-size: 38px; }
      .right-head { font-size: 14px; }

      .gauges { gap: 4px; padding: 8px 5px; }
      .gauge-arc { width: 42px; }
      .gauge-label { font-size: 7px; }
    }
  </style>
</head>

      "РБК: индекс страха и жадности указывает на перекупленность",
      "ForkLog: объём торгов на криптобиржах вырос за сутки",
      "BitsMedia: институционалы продолжают аккумулировать стейблкоины"
    ];

    function safeNumber(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, safeNumber(value, 0)));
    }

    function formatRub(value) {
      return `${Math.round(safeNumber(value, 0)).toLocaleString("ru-RU")} ₽`;
    }

    function formatPrice(value) {
      const n = safeNumber(value, 0);
      if (n >= 1000) return n.toFixed(2);
      if (n >= 10) return n.toFixed(3);
      if (n >= 1) return n.toFixed(4);
      return n.toFixed(5);
    }

    function normalizeCandleTimeMs(time) {
      const n = Number(time);
      if (!Number.isFinite(n)) return null;
      return n < 1e12 ? n * 1000 : n;
    }

    function formatDateTime(ms) {
      const t = normalizeCandleTimeMs(ms);
      if (!t) return "—";
      return new Date(t).toLocaleString("ru-RU", {
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function calcAtrAtIndex(candles, index, period) {
      if (!Array.isArray(candles) || index < period + 1) return 0;
      let sum = 0;
      let count = 0;
      for (let i = index - period + 1; i <= index; i++) {
        const c = candles[i];
        const p = candles[i - 1];
        if (!c || !p) continue;
        const tr = Math.max(
          safeNumber(c.high) - safeNumber(c.low),
          Math.abs(safeNumber(c.high) - safeNumber(p.close)),
          Math.abs(safeNumber(c.low) - safeNumber(p.close))
        );
        sum += tr;
        count++;
      }
      return count ? sum / count : 0;
    }

    function getClosedCandles(candles, now = Date.now()) {
      return candles.filter(c => {
        const t = normalizeCandleTimeMs(c.time);
        return t && t + CFG.timeframeMs <= now;
      });
    }

    function basicScores() {
      return { structure: 50, liquidity: 50, atr: 50, confidence: 50 };
    }

    function calculateScores(x) {
      const liqRaw = (x.rawBuy || x.rawSell) ? 64 : 28;
      const reclaim = (x.reclaimBuy || x.reclaimSell) ? 24 : 0;
      const liquidity = clamp(liqRaw + reclaim, 0, 100);
      const structure = clamp((x.bodyRatio / CFG.minBodyRatio) * 52, 20, 100);
      const atr = clamp(100 - (x.range / (x.atr * CFG.maxRangeATR)) * 70, 8, 100);
      const confidence = clamp(structure * .28 + liquidity * .44 + atr * .28, 0, 100);
      return {
        structure: Math.round(structure),
        liquidity: Math.round(liquidity),
        atr: Math.round(atr),
        confidence: Math.round(confidence)
      };
    }

    function buildRejectReason(x) {
      if (!x.rangeOk) return "RANGE_TOO_BIG";
      if (!x.bodyOk) return "BODY_TOO_SMALL";
      if (x.buyWickOk === false || x.sellWickOk === false) return "WEAK_SWEEP_WICK";
      if (x.buyEdgeOk === false || x.sellEdgeOk === false) return "MIDDLE_RANGE";
      if (!x.cooldownOk) return "COOLDOWN";
      if (!x.samePoolOk) return "SAME_POOL_BLOCK";
      return "FILTERED";
    }

    function evaluateSignal(candles, index, state = {}) {
      if (!Array.isArray(candles) || index < CFG.lookback + CFG.atrLen + 2) {
        return { isBuy: false, isSell: false, reason: "NOT_ENOUGH_DATA", scores: basicScores() };
      }

      const c = candles[index];
      const high = safeNumber(c.high);
      const low = safeNumber(c.low);
      const open = safeNumber(c.open);
      const close = safeNumber(c.close);

      const prev = candles.slice(index - CFG.lookback, index);
      const upperPool = Math.max(...prev.map(x => safeNumber(x.high)));
      const lowerPool = Math.min(...prev.map(x => safeNumber(x.low)));
      const atr = calcAtrAtIndex(candles, index, CFG.atrLen);

      if (![high, low, open, close, upperPool, lowerPool, atr].every(Number.isFinite) || atr <= 0) {
        return { isBuy: false, isSell: false, reason: "BAD_DATA", scores: basicScores() };
      }

      const range = Math.max(high - low, 0.00000001);
      const body = Math.abs(close - open);
      const bodyRatio = body / range;

      const upperWick = high - Math.max(open, close);
      const lowerWick = Math.min(open, close) - low;
      const upperWickRatio = upperWick / range;
      const lowerWickRatio = lowerWick / range;

      const rawSell = high > upperPool;
      const rawBuy = low < lowerPool;

      const reclaimSell = rawSell && close < upperPool;
      const reclaimBuy = rawBuy && close > lowerPool;

      const sweepUpDepth = high - upperPool;
      const sweepDownDepth = lowerPool - low;
      const reclaimDown = upperPool - close;
      const reclaimUp = close - lowerPool;

      const rangeOk = range <= atr * CFG.maxRangeATR;
      const bodyOk = bodyRatio >= CFG.minBodyRatio;

      const sellWickOk = upperWickRatio >= CFG.minWickRatio;
      const buyWickOk = lowerWickRatio >= CFG.minWickRatio;

      const poolRange = Math.max(upperPool - lowerPool, 0.00000001);
      const positionInPool = (close - lowerPool) / poolRange;

      const buyEdgeOk = !CFG.blockMiddleRange || positionInPool <= CFG.edgeZonePercent;
      const sellEdgeOk = !CFG.blockMiddleRange || positionInPool >= 1 - CFG.edgeZonePercent;

      const cooldownOk = state.lastSignalIndex == null || index - state.lastSignalIndex > CFG.cooldownBars;

      let samePoolBuyOk = true;
      let samePoolSellOk = true;

      if (CFG.blockSamePoolSignals) {
        if (state.lastBuyPool != null && Math.abs(lowerPool - state.lastBuyPool) <= atr * CFG.samePoolDistanceATR) {
          samePoolBuyOk = false;
        }
        if (state.lastSellPool != null && Math.abs(upperPool - state.lastSellPool) <= atr * CFG.samePoolDistanceATR) {
          samePoolSellOk = false;
        }
      }

      const buyFilters =
        reclaimBuy &&
        sweepDownDepth >= atr * CFG.minSweepATR &&
        reclaimUp >= atr * CFG.minReclaimATR &&
        bodyOk &&
        rangeOk &&
        buyWickOk &&
        buyEdgeOk &&
        cooldownOk &&
        samePoolBuyOk;

      const sellFilters =
        reclaimSell &&
        sweepUpDepth >= atr * CFG.minSweepATR &&
        reclaimDown >= atr * CFG.minReclaimATR &&
        bodyOk &&
        rangeOk &&
        sellWickOk &&
        sellEdgeOk &&
        cooldownOk &&
        samePoolSellOk;

      const isBuy = buyFilters;
      const isSell = sellFilters;

      let reason = "NO_SIGNAL";
      if (!rawBuy && !rawSell) reason = "NO_RAW_SWEEP";
      else if (rawBuy && !reclaimBuy) reason = "BUY_NO_RECLAIM";
      else if (rawSell && !reclaimSell) reason = "SELL_NO_RECLAIM";
      else if (reclaimBuy && !buyFilters) reason = buildRejectReason({
        rangeOk,
        bodyOk,
        buyWickOk,
        buyEdgeOk,
        cooldownOk,
        samePoolOk: samePoolBuyOk
      });
      else if (reclaimSell && !sellFilters) reason = buildRejectReason({
        rangeOk,
        bodyOk,
        sellWickOk,
        sellEdgeOk,
        cooldownOk,
        samePoolOk: samePoolSellOk
      });
      else if (isBuy) reason = "FINAL_BUY";
      else if (isSell) reason = "FINAL_SELL";

      const scores = calculateScores({
        rawBuy,
        rawSell,
        reclaimBuy,
        reclaimSell,
        bodyRatio,
        range,
        atr,
        sweepUpDepth,
        sweepDownDepth,
        reclaimUp,
        reclaimDown
      });

      return {
        isBuy,
        isSell,
        rawBuy,
        rawSell,
        reclaimBuy,
        reclaimSell,
        upperPool,
        lowerPool,
        atr,
        bodyRatio,
        rangeOk,
        bodyOk,
        buyWickOk,
        sellWickOk,
        buyEdgeOk,
        sellEdgeOk,
        cooldownOk,
        samePoolBuyOk,
        samePoolSellOk,
        reason,
        scores
      };
    }

    function buildSignalReason(direction) {
      if (direction === "BUY") return "Сигнал вверх. Цена сняла нижнюю ликвидность и вернулась выше пула.";
      if (direction === "SELL") return "Сигнал вниз. Цена сняла верхнюю ликвидность и закрылась ниже пула.";
      return "Сигнал по снятию ликвидности.";
    }

    function resultOfTrade(direction, entry, exit) {
      if (!Number.isFinite(entry) || !Number.isFinite(exit)) return "CANCELLED";
      if (direction === "BUY") return exit > entry ? "WIN" : "LOSS";
      if (direction === "SELL") return exit < entry ? "WIN" : "LOSS";
      return "CANCELLED";
    }

    function applyMoney(trades) {
      let balance = CFG.demoBalance;
      let mg = 0;

      return trades.map((t, index) => {
        const stage = mg + 1;
        const stake = CFG.martingaleLadder[mg] || CFG.baseStake;
        const before = balance;
        let pnl = 0;

        if (t.result === "WIN") {
          pnl = Math.round(stake * CFG.payout);
          mg = 0;
        } else if (t.result === "LOSS") {
          pnl = -stake;
          mg = mg < CFG.martingaleLadder.length - 1 ? mg + 1 : 0;
        }

        balance = before + pnl;

        return {
          ...t,
          tradeId: t.tradeId || `trade_${index}`,
          stake,
          martingaleStep: stage,
          pnl,
          balanceBefore: before,
          balanceAfter: balance
        };
      });
    }

    function buildHistoricalBacktest(candles) {
      const now = Date.now();
      const windowStart = now - CFG.historicalLookbackHours * 60 * 60 * 1000;
      const closed = getClosedCandles(candles, now);

      const rawTrades = [];
      const stats = {
        candlesLoaded: candles.length,
        candlesInWindow: 0,
        rawBuy: 0,
        rawSell: 0,
        reclaimBuy: 0,
        reclaimSell: 0,
        finalBuy: 0,
        finalSell: 0,
        rejected: 0,
        rejectReasons: {}
      };

      const scanState = {
        lastSignalIndex: null,
        lastBuyPool: null,
        lastSellPool: null
      };

      let nextTradeAllowedIndex = 0;
      let lastScores = basicScores();

      for (let i = 0; i < closed.length; i++) {
        const c = closed[i];
        const t = normalizeCandleTimeMs(c.time);
        if (!t || t < windowStart) continue;

        stats.candlesInWindow++;

        const index = candles.findIndex(x => normalizeCandleTimeMs(x.time) === t);
        if (index < 0) continue;

        const res = evaluateSignal(candles, index, scanState);
        lastScores = res.scores || lastScores;

        if (res.rawBuy) stats.rawBuy++;
        if (res.rawSell) stats.rawSell++;
        if (res.reclaimBuy) stats.reclaimBuy++;
        if (res.reclaimSell) stats.reclaimSell++;

        const direction = res.isBuy ? "BUY" : res.isSell ? "SELL" : null;

        if (!direction) {
          if (res.rawBuy || res.rawSell || res.reclaimBuy || res.reclaimSell) {
            stats.rejected++;
            stats.rejectReasons[res.reason] = (stats.rejectReasons[res.reason] || 0) + 1;
          }
          continue;
        }

        if (index < nextTradeAllowedIndex) {
          stats.rejected++;
          stats.rejectReasons["TRADE_ALREADY_ACTIVE"] = (stats.rejectReasons["TRADE_ALREADY_ACTIVE"] || 0) + 1;
          continue;
        }

        if (direction === "BUY") stats.finalBuy++;
        if (direction === "SELL") stats.finalSell++;

        const signalCandle = candles[index];
        const entryIndex = index + 1;
        const exitIndex = entryIndex + CFG.expiryCandles;

        const entryCandle = candles[entryIndex];
        const exitCandle = candles[exitIndex];

        const signalTime = normalizeCandleTimeMs(signalCandle.time);

        const base = {
          tradeId: `${CFG.symbol}_${CFG.timeframe}_${signalTime}_${direction}`,
          mode: "historical",
          direction,
          signalTime,
          signalPrice: safeNumber(signalCandle.close),
          signalHigh: safeNumber(signalCandle.high),
          signalLow: safeNumber(signalCandle.low),
          atr: res.atr,
          reason: buildSignalReason(direction),
          debug: res,
          state: "TRADE_CLOSED",
          entryDelaySeconds: 6
        };

        if (entryCandle && exitCandle) {
          const entryTime = normalizeCandleTimeMs(entryCandle.time);
          const exitTime = normalizeCandleTimeMs(exitCandle.time);
          const entryPrice = safeNumber(entryCandle.open);
          const exitPrice = safeNumber(exitCandle.close);
          const result = resultOfTrade(direction, entryPrice, exitPrice);

          rawTrades.push({
            ...base,
            entryTime,
            entryChartTime: entryTime,
            entryPrice,
            exitTime,
            exitPrice,
            result
          });

          scanState.lastSignalIndex = index;
          if (direction === "BUY") scanState.lastBuyPool = res.lowerPool;
          if (direction === "SELL") scanState.lastSellPool = res.upperPool;
          nextTradeAllowedIndex = exitIndex;
        }
      }

      const trades = applyMoney(rawTrades);
      const pnl = trades.reduce((s, t) => s + safeNumber(t.pnl), 0);

      stats.builtTrades = rawTrades.length;
      stats.ledgerTrades = trades.length;
      stats.pnl = pnl;

      return { trades, stats, lastScores };
    }

    function buildStats(trades) {
      const closed = trades.filter(t => t.result === "WIN" || t.result === "LOSS");
      const wins = closed.filter(t => t.result === "WIN").length;
      const losses = closed.filter(t => t.result === "LOSS").length;
      const pnl = closed.reduce((s, t) => s + safeNumber(t.pnl), 0);

      return {
        totalSignals: trades.length,
        confirmedTrades: closed.length,
        wins,
        losses,
        pnl,
        finalBalance: CFG.demoBalance + pnl
      };
    }

    const API = {
      async getCandles(symbol = CFG.symbol, count = 900, interval = CFG.timeframe) {
        const urls = [
          `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
          `https://api.mexc.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`
        ];

        for (const url of urls) {
          try {
            const r = await fetch(url, { cache: "no-store" });
            if (!r.ok) continue;
            const data = await r.json();
            return data.map(d => ({
              time: Math.floor(Number(d[0]) / 1000),
              open: Number(d[1]),
              high: Number(d[2]),
              low: Number(d[3]),
              close: Number(d[4]),
              volume: Number(d[5])
            })).filter(c => Number.isFinite(c.close));
          } catch (e) {}
        }
        return [];
      }
    };

    function Gauge({ value, label, color = "#0ea5e9" }) {
      const v = clamp(value, 0, 100);
      const angle = -90 + v * 1.8;
      return (
        <div className="gauge">
          <div className="gauge-arc">
            <div className="gauge-needle" style={{ transform: `rotate(${angle}deg)`, background: color }} />
          </div>
          <div className="gauge-val" style={{ color }}>{Math.round(v)}</div>
          <div className="gauge-label">{label}</div>
        </div>
      );
    }

    function LiveClock() {
      const [now, setNow] = useState(new Date());
      useEffect(() => {
        const id = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(id);
      }, []);
      return <span className="mono font-bold text-slate-800">{now.toLocaleTimeString("ru-RU")}</span>;
    }

    function MiniScanner({ candles, phase }) {
      const data = Array.isArray(candles) ? candles.slice(-50) : [];
      const min = data.length ? Math.min(...data.map(c => c.low)) : 0;
      const max = data.length ? Math.max(...data.map(c => c.high)) : 1;
      const range = Math.max(max - min, 1);

      return (
        <div className="scanner glass-soft">
          <div className="scanner-title">
            <span>{phase}</span>
            <span>{data.length} BARS</span>
          </div>
          <div className="mini-chart">
            <div className="mini-grid" />
            <svg width="100%" height="100%" viewBox="0 0 260 84" preserveAspectRatio="none" style={{ position: "absolute", inset: 0, zIndex: 2 }}>
              {data.map((c, i) => {
                const x = i * (260 / Math.max(data.length, 1));
                const w = Math.max(2, 260 / Math.max(data.length, 1) * .62);
                const oY = 84 - ((c.open - min) / range) * 74 - 5;
                const clY = 84 - ((c.close - min) / range) * 74 - 5;
                const hY = 84 - ((c.high - min) / range) * 74 - 5;
                const lY = 84 - ((c.low - min) / range) * 74 - 5;
                const up = c.close >= c.open;
                return (
                  <g key={i}>
                    <line x1={x + w/2} y1={hY} x2={x + w/2} y2={lY} stroke={up ? "#38bdf8" : "#94a3b8"} strokeWidth="1" />
                    <rect x={x} y={Math.min(oY, clY)} width={w} height={Math.max(Math.abs(oY - clY), 1.5)} rx=".6" fill={up ? "#38bdf8" : "transparent"} stroke={up ? "#38bdf8" : "#94a3b8"} strokeWidth="1" />
                  </g>
                );
              })}
            </svg>
            <div className="scan-beam" />
          </div>
        </div>
      );
    }

      function speak(text) {
        return new Promise(resolve => {
          try {
            if (!window.speechSynthesis) return resolve();
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "ru-RU";
            u.rate = .96;
            u.pitch = .95;
            u.onend = resolve;
            u.onerror = resolve;
            window.speechSynthesis.speak(u);
            setTimeout(resolve, Math.max(1800, text.length * 75));
          } catch (e) {
            resolve();
          }
        });
      }

      function initChart() {

          },

      function drawPools(data) {
        if (!chartRef.current || !seriesRef.current) return;

        poolSeriesRef.current.forEach(s => {
          try { chartRef.current.removeSeries(s); } catch(e) {}
        });
        poolSeriesRef.current = [];

        const upper = [];
        const lower = [];

        for (let i = CFG.lookback; i < data.length; i++) {
          let up = -Infinity;
          let dn = Infinity;
          for (let k = 1; k <= CFG.lookback; k++) {
            up = Math.max(up, safeNumber(data[i-k].high));
            dn = Math.min(dn, safeNumber(data[i-k].low));
          }
          upper.push({ time: data[i].time, value: up });
          lower.push({ time: data[i].time, value: dn });
        }

        try {
          const upS = chartRef.current.addLineSeries({
            color: "rgba(244,63,94,.62)",
            lineWidth: 1,
            lineStyle: 2,
            title: "UPPER POOL",
            lastValueVisible: true,

          });
          upS.setData(upper);

          const dnS = chartRef.current.addLineSeries({
            color: "rgba(16,185,129,.62)",
            lineWidth: 1,
            lineStyle: 2,
            title: "LOWER POOL",
            lastValueVisible: true,
            priceLineVisible: false
          });
          dnS.setData(lower);

          poolSeriesRef.current = [upS, dnS];
        } catch(e) {}
      }

      function tooltipHtml(t) {

        const result = t.result || "В процессе";
        const color = pnl >= 0 ? "#059669" : "#e11d48";

        return `
          <div class="tooltip-title">${direction}</div>
          <div class="tooltip-row"><span>Причина:</span><b>${t.reason || "Сигнал"}</b></div>
          <div class="tooltip-row"><span>Сумма:</span><b>${formatRub(t.stake || CFG.baseStake)}</b></div>
          <div class="tooltip-row"><span>Мартингейл:</span><b>${t.martingaleStep || 1} колено</b></div>
          <div class="tooltip-row"><span>Сигнал:</span><b>${formatDateTime(t.signalTime)}</b></div>
          <div class="tooltip-row"><span>Вход:</span><b>${formatDateTime(t.entryTime)}</b></div>
          <div class="tooltip-row"><span>Выход:</span><b>${formatDateTime(t.exitTime)}</b></div>
          <div class="tooltip-row"><span>Цена входа:</span><b>${formatPrice(t.entryPrice)}</b></div>
          <div class="tooltip-row"><span>Цена выхода:</span><b>${t.exitPrice ? formatPrice(t.exitPrice) : "—"}</b></div>
          <div class="tooltip-row"><span>Результат:</span><b>${result}</b></div>
          <div class="tooltip-row"><span>PNL:</span><b style="color:${color}">${pnl > 0 ? "+" : ""}${formatRub(pnl)}</b></div>
        `;
      }

      function renderTradeOverlay() {
        if (!overlayRef.current || !chartRef.current || !seriesRef.current) return;

        const overlay = overlayRef.current;
        overlay.innerHTML = "";

        const chart = chartRef.current;
        const series = seriesRef.current;
        const allTrades = tradesRef.current || [];
        const currentLivePrice = livePriceRef.current;

        allTrades.forEach(t => {
          const resultClass =
            t.state !== "TRADE_CLOSED" ? "active" :
            t.result === "WIN" ? "win" :
            t.result === "LOSS" ? "loss" : "active";

          const isBuy = t.direction === "BUY";

          const signalX = chart.timeScale().timeToCoordinate((normalizeCandleTimeMs(t.signalTime) || 0) / 1000);
          const signalY = series.priceToCoordinate(
            isBuy
              ? safeNumber(t.signalLow, t.signalPrice) - safeNumber(t.atr, 0) * .35
              : safeNumber(t.signalHigh, t.signalPrice) + safeNumber(t.atr, 0) * .35
          );

          const entryTime = normalizeCandleTimeMs(t.entryChartTime || t.entryTime);
          const entryX = entryTime ? chart.timeScale().timeToCoordinate(entryTime / 1000) : null;
          const entryY = t.entryPrice ? series.priceToCoordinate(t.entryPrice) : null;

          const exitTime = t.exitTime ? normalizeCandleTimeMs(t.exitTime) : Date.now();
          const exitX = entryTime ? chart.timeScale().timeToCoordinate(exitTime / 1000) : null;
          const liveExitPrice = t.exitPrice || currentLivePrice || t.entryPrice || t.signalPrice;
          const exitY = liveExitPrice ? series.priceToCoordinate(liveExitPrice) : null;

          const showTip = (event) => {
            setTooltip({
              x: Math.min(window.innerWidth - 170, Math.max(150, event.clientX)),
              y: Math.min(window.innerHeight - 150, Math.max(140, event.clientY)),
              html: tooltipHtml(t)
            });
          };

          const hideTip = () => setTooltip(null);

          if (signalX != null && signalY != null) {
            const arrow = document.createElement("div");
            arrow.className = `signal-arrow ${isBuy ? "buy" : "sell"}`;
            arrow.style.left = `${signalX}px`;
            arrow.style.top = `${signalY}px`;
            arrow.innerHTML = isBuy
              ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>`
              : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12l7 7 7-7"/></svg>`;
            arrow.onmouseenter = showTip;
            arrow.onmouseleave = hideTip;
            overlay.appendChild(arrow);

            const label = document.createElement("div");
            label.className = `marker-label ${isBuy ? "buy" : "sell"}`;
            label.style.left = `${signalX}px`;
            label.style.top = `${signalY + (isBuy ? 24 : -24)}px`;
            label.innerHTML = isBuy ? "BUY SIGNAL" : "SELL SIGNAL";
            label.onmouseenter = showTip;
            label.onmouseleave = hideTip;
            overlay.appendChild(label);
          }

          if (entryX != null && entryY != null) {
            const ent = document.createElement("div");
            ent.className = "pt entry";
            ent.style.left = `${entryX}px`;
            ent.style.top = `${entryY}px`;
            ent.onmouseenter = showTip;
            ent.onmouseleave = hideTip;
            overlay.appendChild(ent);

            const entryLabel = document.createElement("div");
            entryLabel.className = "marker-label entry";
            entryLabel.style.left = `${entryX}px`;
            entryLabel.style.top = `${entryY - 22}px`;
            entryLabel.innerHTML = "ENTRY +6S";
            entryLabel.onmouseenter = showTip;
            entryLabel.onmouseleave = hideTip;
            overlay.appendChild(entryLabel);
          }

          if (entryX != null && entryY != null && exitX != null && exitY != null) {
            const left = Math.min(entryX, exitX);
            const width = Math.max(8, Math.abs(exitX - entryX));
            const top = Math.min(entryY, exitY) - 18;
            const height = Math.max(28, Math.abs(exitY - entryY) + 36);

            const box = document.createElement("div");
            box.className = `trade-box ${resultClass}`;
            box.style.left = `${left}px`;
            box.style.top = `${top}px`;
            box.style.width = `${width}px`;
            box.style.height = `${height}px`;
            box.onmouseenter = showTip;
            box.onmouseleave = hideTip;
            overlay.appendChild(box);

            if (t.state === "TRADE_CLOSED") {
              const exit = document.createElement("div");
              exit.className = "pt exit";
              exit.style.left = `${exitX}px`;
              exit.style.top = `${exitY}px`;
              exit.onmouseenter = showTip;
              exit.onmouseleave = hideTip;
              overlay.appendChild(exit);

              const exitLabel = document.createElement("div");
              exitLabel.className = "marker-label exit";
              exitLabel.style.left = `${exitX}px`;
              exitLabel.style.top = `${exitY + 22}px`;
              exitLabel.innerHTML = "EXIT";
              exitLabel.onmouseenter = showTip;
              exitLabel.onmouseleave = hideTip;
              overlay.appendChild(exitLabel);
            }

            const badge = document.createElement("div");
            badge.className = `badge ${resultClass}`;
            badge.style.left = `${exitX}px`;
            badge.style.top = `${exitY}px`;
            const pnl = safeNumber(t.pnl, 0);
            badge.innerHTML =
              t.state === "TRADE_CLOSED"
                ? `${t.result} ${pnl > 0 ? "+" : ""}${formatRub(pnl)}`
                : `В СДЕЛКЕ`;
            badge.onmouseenter = showTip;
            badge.onmouseleave = hideTip;
            overlay.appendChild(badge);
          }
        });
      }

      function updateLiveCandle(candle) {
        if (!candle || !Number.isFinite(candle.close)) return;

        livePriceRef.current = candle.close;
        setLivePrice(candle.close);

        if (seriesRef.current) {
          try {
            seriesRef.current.update(candle);
            lastChartTimeRef.current = Math.max(lastChartTimeRef.current, candle.time || 0);
          } catch(e) {}
        }

        const old = candlesRef.current || [];
        const last = old[old.length - 1];
        let next;
        if (last && last.time === candle.time) {
          next = [...old.slice(0, -1), candle];
        } else {
          next = [...old, candle].slice(-950);
        }

        candlesRef.current = next;
        setCandles(next);
        renderTradeOverlay();
      }

      async function checkLiveSignal() {
        if (!activeRef.current) return;
        if (tradesRef.current.some(t => t.state !== "TRADE_CLOSED")) return;

        const data = candlesRef.current;
        const closed = getClosedCandles(data);
        const recent = closed.slice(-16);

        const scanState = {
          lastSignalIndex: lastLiveSignalRef.current?.lastIndex ?? null,
          lastBuyPool: lastLiveSignalRef.current?.lastBuyPool ?? null,
          lastSellPool: lastLiveSignalRef.current?.lastSellPool ?? null
        };

        for (const c of recent) {
          const candleTime = normalizeCandleTimeMs(c.time);
          const candleCloseTime = candleTime + CFG.timeframeMs;

          if (candleCloseTime < Date.now() - CFG.timeframeMs * 4) continue;

          const index = data.findIndex(x => normalizeCandleTimeMs(x.time) === candleTime);
          if (index < 0) continue;

          const res = evaluateSignal(data, index, scanState);
          setScores(res.scores || basicScores());

          const direction = res.isBuy ? "BUY" : res.isSell ? "SELL" : null;
          if (!direction) continue;

          const signalId = `${CFG.symbol}_${CFG.timeframe}_${candleTime}_${direction}`;
          if (lastLiveSignalRef.current?.signalId === signalId) continue;

          lastLiveSignalRef.current = {
            signalId,
            lastIndex: index,
            lastBuyPool: direction === "BUY" ? res.lowerPool : scanState.lastBuyPool,
            lastSellPool: direction === "SELL" ? res.upperPool : scanState.lastSellPool
          };

          await startLiveTrade({
            signalId,
            direction,
            candle: c,
            result: res
          });

          break;
        }
      }

      async function startLiveTrade({ signalId, direction, candle, result }) {
        window.speechSynthesis?.cancel();

        const currentStats = buildStats(tradesRef.current);
        const last = tradesRef.current[tradesRef.current.length - 1];
        const lastStage = last && last.result === "LOSS" ? Math.min((last.martingaleStep || 1), CFG.martingaleLadder.length - 1) : 0;
        const stake = CFG.martingaleLadder[lastStage] || CFG.baseStake;

        const signalTime = normalizeCandleTimeMs(candle.time);
        const signalPrice = safeNumber(candle.close);

        const trade = {
          tradeId: signalId,
          mode: "live",
          direction,
          signalTime,
          signalPrice,
          signalHigh: safeNumber(candle.high),
          signalLow: safeNumber(candle.low),
          atr: result.atr,
          reason: buildSignalReason(direction),
          state: "SIGNAL_DETECTED",
          entryTime: null,
          entryChartTime: null,
          entryPrice: null,
          exitTime: null,
          exitPrice: null,
          result: null,
          stake,
          martingaleStep: lastStage + 1,
          pnl: 0,
          balanceBefore: currentStats.finalBalance,
          balanceAfter: currentStats.finalBalance,
          entryDelaySeconds: 6
        };

        tradesRef.current = [...tradesRef.current, trade];
        setTrades([...tradesRef.current]);
        setActiveSignal({ direction, stake });
        setPhase("СИГНАЛ АКТИВЕН");
        addLog(`СИГНАЛ ${direction}. Подготовка входа.`);

        await speak(buildSignalReason(direction));
        await new Promise(r => setTimeout(r, 3000));
        await speak("Подготовьтесь. До входа три секунды.");
        await new Promise(r => setTimeout(r, 3000));

        trade.state = "TRADE_ACTIVE";
        trade.entryTime = Date.now();
        trade.entryChartTime = Date.now();
        trade.entryPrice = livePriceRef.current || signalPrice;
        trade.balanceBefore = buildStats(tradesRef.current.filter(t => t.tradeId !== trade.tradeId)).finalBalance;

        tradesRef.current = tradesRef.current.map(t => t.tradeId === trade.tradeId ? trade : t);
        setTrades([...tradesRef.current]);
        addLog(`ВХОД ${direction}. Ставка ${formatRub(stake)}. Экспирация 25 минут.`);
        renderTradeOverlay();

        let seconds = CFG.expiryMinutes * 60;
        setCountdown(seconds);

        const timer = setInterval(() => {
          seconds--;
          setCountdown(seconds);
          renderTradeOverlay();

          if (seconds <= 0) {
            clearInterval(timer);
            closeLiveTrade(trade.tradeId);
          }
        }, 1000);
      }

      async function closeLiveTrade(tradeId) {
        const trade = tradesRef.current.find(t => t.tradeId === tradeId);
        if (!trade) return;

        const exitPrice = livePriceRef.current || trade.entryPrice;
        const res = resultOfTrade(trade.direction, trade.entryPrice, exitPrice);
        const pnl = res === "WIN" ? Math.round(trade.stake * CFG.payout) : -trade.stake;

        trade.state = "TRADE_CLOSED";
        trade.exitTime = Date.now();
        trade.exitPrice = exitPrice;
        trade.result = res;
        trade.pnl = pnl;
        trade.balanceAfter = safeNumber(trade.balanceBefore) + pnl;

        tradesRef.current = tradesRef.current.map(t => t.tradeId === tradeId ? trade : t);
        setTrades([...tradesRef.current]);

        const newStats = buildStats(tradesRef.current);
        setStats(newStats);
        setCountdown(null);
        setActiveSignal(null);
        setPhase("СКАНИРОВАНИЕ ЛИКВИДНОСТИ (1M)");
        renderTradeOverlay();

        if (res === "WIN") {
          addLog(`WIN: ${formatRub(pnl)}. Выход ${formatPrice(exitPrice)}.`);
          await speak(`Сделка закрыта в плюс. Прибыль ${Math.abs(pnl)} рублей.`);
        } else {
          addLog(`LOSS: ${formatRub(pnl)}. Следующий шаг мартингейла.`);
          await speak(`Сделка закрыта в минус. Следующий сигнал будет рассчитан с учётом мартингейла.`);
        }
      }

      function startWebSocket() {
        try {
          if (wsRef.current) wsRef.current.close();
        } catch(e) {}

        const wsUrl = `wss://stream.binance.com:9443/ws/${CFG.symbol.toLowerCase()}@kline_${CFG.timeframe}`;
        const ws = new WebSocket(wsUrl);
        wsRef.current = ws;

        ws.onopen = () => addLog(`LIVE STREAM ${CFG.timeframeLabel}: подключён`);
        ws.onmessage = async (event) => {
          try {
            const msg = JSON.parse(event.data);
            const k = msg.k;
            if (!k) return;

            const candle = {
              time: Math.floor(Number(k.t) / 1000),
              open: Number(k.o),
              high: Number(k.h),
              low: Number(k.l),
              close: Number(k.c),
              volume: Number(k.v)
            };

            updateLiveCandle(candle);

            if (k.x === true) {
              await checkLiveSignal();
            }
          } catch(e) {}
        };

        ws.onerror = () => {
          addLog("WebSocket недоступен, включаю REST polling");
          startPolling();
        };

        ws.onclose = () => {
          if (activeRef.current) {
            setTimeout(() => {
              if (activeRef.current) startWebSocket();
            }, 4000);
          }
        };
      }

      function startPolling() {
        if (pollRef.current) clearInterval(pollRef.current);

        pollRef.current = setInterval(async () => {
          if (!activeRef.current) return;
          const data = await API.getCandles(CFG.symbol, 5, CFG.timeframe);
          if (data.length) updateLiveCandle(data[data.length - 1]);
          await checkLiveSignal();
        }, 2500);
      }

      async function startTerminal() {
        setStarted(true);
        activeRef.current = true;
        liveStartMsRef.current = Date.now();

        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          osc.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + .01);
        } catch(e) {}

        setPhase("ЗАГРУЗКА ДАННЫХ");
        addLog("Запуск терминала...");

        setTimeout(() => initChart(), 0);
        await new Promise(r => setTimeout(r, 250));

        const data = await API.getCandles(CFG.symbol, 900, CFG.timeframe);
        if (!data.length) {
          setPhase("ОШИБКА API");
          addLog("Нет связи с биржей.");
          await speak("Ошибка связи с биржей.");
          return;
        }

        candlesRef.current = data;
        setCandles(data);
        livePriceRef.current = data[data.length - 1].close;
        setLivePrice(data[data.length - 1].close);

        if (seriesRef.current) {
          seriesRef.current.setData(data);
          lastChartTimeRef.current = data[data.length - 1].time;
          drawPools(data);
          setTimeout(() => {
            try { chartRef.current.timeScale().fitContent(); } catch(e) {}
            renderTradeOverlay();
          }, 100);
        }

        const bt = buildHistoricalBacktest(data);
        tradesRef.current = bt.trades;
        setTrades(bt.trades);
        setDebugStats(bt.stats);
        setScores(bt.lastScores || basicScores());

        const s = buildStats(bt.trades);
        setStats(s);

        setTimeout(renderTradeOverlay, 350);

        const pnlText = s.pnl >= 0 ? `заработали ${Math.abs(Math.round(s.pnl))} рублей` : `получили минус ${Math.abs(Math.round(s.pnl))} рублей`;

        await speak(`Терминал Про Макс запущен. За последние 12 часов было ${s.confirmedTrades} сделок. Плюсовых ${s.wins}, минусовых ${s.losses}. Если бы вход был по 500 рублей с учетом мартингейла до четвертого колена, вы бы ${pnlText}. Перехожу к сканированию рынка.`);

        setPhase("СКАНИРОВАНИЕ ЛИКВИДНОСТИ (1M)");
        startWebSocket();
        startPolling();
      }

      useEffect(() => {
        return () => {
          activeRef.current = false;
          try { wsRef.current?.close(); } catch(e) {}
          if (pollRef.current) clearInterval(pollRef.current);
        };
      }, []);

                      <div key={i} className="truncate">SMC: {l}</div>
                    )) : <div>SMC: ожидание событий...</div>}
                  </div>
                </div>
              </div>
            </aside>
          </main>

          <footer className="footer">
            <span>256-BIT ШИФРОВАНИЕ СИСТЕМЫ • СОЕДИНЕНИЕ БЕЗОПАСНО</span>
            <span className="bg-slate-800 text-white px-3 py-1 rounded-lg">КРИПТО ИНВЕСТ PRO MAX</span>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
