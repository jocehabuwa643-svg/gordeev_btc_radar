<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Крипто Терминал Гордеева - PRO MAX (SMC)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Oswald:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
        
        *, *::before, *::after { box-sizing: border-box; }

        html, body { 
            margin: 0; padding: 0; 
            background: #f8fafc;
            color: #0f172a; 
            max-width: 100%;
            overflow-x: hidden; 
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
            font-family: 'Montserrat', sans-serif;
        }

        .app-shell {
            width: 100%; max-width: 1600px; margin: 0 auto;
            padding: clamp(6px, 1.5vw, 16px);
            display: flex; flex-direction: column; height: 100dvh;
        }

        .main-layout {
            display: grid;
            grid-template-columns: minmax(0, 1.8fr) minmax(320px, 0.9fr);
            gap: clamp(12px, 1.5vw, 20px);
            flex: 1; min-height: 0; margin-top: 10px; margin-bottom: 10px;
        }

        @media (max-width: 1024px) {
            .main-layout { display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
            .chart-card { min-height: 55vh; flex-shrink: 0; }
        }
        
        .oswald-font { font-family: 'Oswald', sans-serif; letter-spacing: 0.05em; text-transform: uppercase; }
        .mono-font { font-family: 'JetBrains Mono', monospace; }

        .cinematic-author {
            font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 0.35em;
            background: linear-gradient(90deg, #94a3b8 0%, #f1f5f9 25%, #475569 50%, #f1f5f9 75%, #94a3b8 100%);
            background-size: 200% auto; color: transparent; -webkit-background-clip: text;
            animation: cinematicShimmer 7s linear infinite; text-transform: uppercase;
        }
        @keyframes cinematicShimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

        .bg-grid-pattern {
            background-image: linear-gradient(to right, rgba(14, 165, 233, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(14, 165, 233, 0.03) 1px, transparent 1px);
            background-size: 30px 30px; mask-image: radial-gradient(circle at center, black 50%, transparent 100%); -webkit-mask-image: radial-gradient(circle at center, black 50%, transparent 100%);
        }

        .bg-orb-1 {
            position: absolute; top: -10%; left: -5%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(226, 232, 240, 0.05) 50%, transparent 70%);
            border-radius: 50%; filter: blur(60px); animation: float 12s ease-in-out infinite alternate;
        }
        .bg-orb-2 {
            position: absolute; bottom: -15%; right: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.1) 0%, rgba(241, 245, 249, 0.05) 50%, transparent 70%);
            border-radius: 50%; filter: blur(80px); animation: float 15s ease-in-out infinite alternate-reverse;
        }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(2%, 4%) scale(1.02); } 100% { transform: translate(-2%, -3%) scale(0.98); } }

        .card-3d-wrapper { perspective: 2000px; width: 100%; }
        .card-3d {
            transform-style: preserve-3d; animation: float-3d 14s ease-in-out infinite;
            box-shadow: 0 30px 60px -15px rgba(15, 23, 42, 0.08), 0 15px 30px -10px rgba(14, 165, 233, 0.1), inset 0 1px 3px rgba(255, 255, 255, 1);
            border: 1px solid rgba(255, 255, 255, 0.9);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(241, 245, 249, 0.8) 100%);
            backdrop-filter: blur(25px); position: relative;
        }
        .card-3d::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.7) 25%, transparent 30%);
            border-radius: inherit; pointer-events: none; z-index: 50; animation: glare 8s infinite linear;
        }

        @keyframes glare { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes float-3d { 0% { transform: translateY(0px) rotateX(1deg) rotateY(-1deg); } 50% { transform: translateY(-8px) rotateX(-0.5deg) rotateY(1.5deg); } 100% { transform: translateY(0px) rotateX(1deg) rotateY(-1deg); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-wrapper { display: flex; width: max-content; animation: ticker 40s linear infinite; }
        
        /* PREMIUM SCANNER CSS */
        .scanner-premium-beam {
            position: absolute; top: 0; bottom: 0; left: 0; width: 25%;
            background: linear-gradient(to right, transparent, rgba(6, 182, 212, 0.05) 40%, rgba(34, 211, 238, 0.3) 100%);
            border-right: 2px solid rgba(34, 211, 238, 0.8);
            box-shadow: 2px 0 15px rgba(34, 211, 238, 0.4);
            animation: scannerBeamSweep 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            pointer-events: none; z-index: 20;
        }
        @keyframes scannerBeamSweep { 0% { transform: translateX(-100%); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(400%); opacity: 0; } }
        @keyframes candleReact {
            0%, 85%, 100% { opacity: 0.65; filter: brightness(0.9); transform: translateY(0) scaleY(1); }
            90% { opacity: 1; filter: brightness(1.6) drop-shadow(0 0 4px rgba(34,211,238,0.7)); transform: translateY(-1px) scaleY(1.05); }
            95% { opacity: 0.9; filter: brightness(1.2); transform: translateY(0) scaleY(1); }
        }
        
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255, 255, 255, 1); box-shadow: 0 4px 20px rgba(15, 23, 42, 0.03); z-index: 40; }
        .glass-panel-heavy { background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 250, 252, 0.7) 100%); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 1); box-shadow: 0 15px 40px -10px rgba(15, 23, 42, 0.08), inset 0 2px 10px rgba(255, 255, 255, 1); }
        .glass-card { background: linear-gradient(145deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 250, 252, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 1); box-shadow: 0 4px 20px -5px rgba(15, 23, 42, 0.04), inset 0 1px 4px rgba(255, 255, 255, 1); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { border-color: rgba(226, 232, 240, 1); background: linear-gradient(145deg, rgba(255, 255, 255, 1) 0%, rgba(248, 250, 252, 0.85) 100%); box-shadow: 0 10px 30px -5px rgba(14, 165, 233, 0.1), inset 0 1px 6px rgba(255, 255, 255, 1); transform: translateY(-1px); }
        .text-gradient { background: linear-gradient(135deg, #1d4ed8, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        @keyframes slideUpFade { 0% { transform: translateY(10px); opacity: 0; } 20% { transform: translateY(0); opacity: 1; } 80% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-10px); opacity: 0; } }
        .hft-tick { animation: slideUpFade 1.5s ease-out forwards; }

        /* Premium Startup Splash Screen */
        .author-splash {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(248, 250, 252, 0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            animation: splashFadeOut 0.6s ease-in-out 2.2s forwards; pointer-events: auto;
        }
        @keyframes splashFadeOut { 0% { opacity: 1; pointer-events: auto; } 100% { opacity: 0; pointer-events: none; } }
        @keyframes loadingBar { 0% { width: 0%; } 40% { width: 60%; } 100% { width: 100%; } }

        /* BROKER REFERRAL BUTTON & CURSOR */
        .broker-button-wrap { position: relative; overflow: hidden; border-radius: 22px; width: 100%; }
        .broker-ref-button {
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
            width: 100%; min-height: 78px; padding: 14px 18px; text-decoration: none; color: #ffffff;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.96), rgba(6, 182, 212, 0.92));
            border: 1px solid rgba(255,255,255,0.42); box-shadow: 0 14px 34px rgba(14,165,233,0.28), inset 0 1px 0 rgba(255,255,255,0.35);
            backdrop-filter: blur(18px); transition: transform 0.2s ease, box-shadow 0.2s ease;
            animation: brokerBtnDesktopPress 4s infinite; /* Syncs with cursor click */
        }
        .broker-ref-button:hover {
            animation: none; transform: translateY(-1px) scale(1.01);
            box-shadow: 0 18px 42px rgba(14,165,233,0.38), inset 0 1px 0 rgba(255,255,255,0.42);
        }
        .broker-ref-button__small { position: relative; z-index: 2; font-size: 10px; letter-spacing: .22em; text-transform: uppercase; font-weight: 800; opacity: .88; }
        .broker-ref-button__main { position: relative; z-index: 2; font-size: clamp(17px, 2vw, 24px); line-height: 1; letter-spacing: .04em; text-transform: uppercase; font-weight: 900; }
        .broker-ref-button__sub { position: relative; z-index: 2; font-size: 13px; font-weight: 700; opacity: .95; }
        
        .broker-demo-cursor {
            position: absolute; right: 15px; bottom: 5px; font-size: 32px; line-height: 1;
            pointer-events: none; opacity: 0; z-index: 10; filter: drop-shadow(0 4px 8px rgba(0,0,0,.4));
            animation: brokerCursorMove 4s infinite; transform-origin: top left; color: #fff;
        }

        @keyframes brokerBtnDesktopPress {
            0%, 23%, 30%, 100% { transform: scale(1); box-shadow: 0 14px 34px rgba(14,165,233,0.28), inset 0 1px 0 rgba(255,255,255,0.35); }
            26% { transform: scale(0.96); box-shadow: 0 5px 15px rgba(14,165,233,0.4), inset 0 1px 0 rgba(255,255,255,0.2); }
        }
        @keyframes brokerCursorMove {
            0% { transform: translate(50px, 40px) scale(1); opacity: 0; }
            15% { transform: translate(0px, 0px) scale(1); opacity: 1; }
            23% { transform: translate(0px, 0px) scale(1); opacity: 1; }
            26% { transform: translate(0px, 0px) scale(0.85); opacity: 1; } /* click down */
            29% { transform: translate(0px, 0px) scale(1); opacity: 1; } /* click release */
            45% { transform: translate(20px, 20px) scale(1); opacity: 0; }
            100% { transform: translate(50px, 40px) scale(1); opacity: 0; }
        }
        
        @media (hover: none), (pointer: coarse) { 
            .broker-demo-cursor { display: none !important; } 
            .broker-ref-button { animation: brokerBtnMobilePulse 3s ease-in-out infinite !important; }
        }
        @keyframes brokerBtnMobilePulse {
            0%, 100% { box-shadow: 0 10px 25px rgba(14, 165, 233, 0.25), inset 0 1px 0 rgba(255,255,255,0.3); transform: scale(1); }
            50% { box-shadow: 0 10px 40px rgba(14, 165, 233, 0.6), inset 0 1px 0 rgba(255,255,255,0.6); transform: scale(1.02); }
        }

        /* TRADE OVERLAY MARKERS, BOXES & RESULT BADGES */
        .trade-overlay { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 30; }
        
        .trade-box {
            position: absolute; border-radius: 4px; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 4px 15px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.4);
            pointer-events: auto; transition: filter 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .trade-box:hover, .chart-pt-entry:hover, .chart-pt-exit:hover, .chart-pt-signal:hover, .chart-result-badge:hover, .chart-arrow-signal:hover { z-index: 50; filter: brightness(1.15); }
        
        .trade-box.win.call { background: linear-gradient(180deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.05)); border-color: rgba(16, 185, 129, 0.4); }
        .trade-box.loss.call { background: linear-gradient(180deg, rgba(244, 63, 94, 0.15), rgba(244, 63, 94, 0.05)); border-color: rgba(244, 63, 94, 0.4); }
        .trade-box.win.put { background: linear-gradient(180deg, rgba(14, 165, 233, 0.2), rgba(14, 165, 233, 0.05)); border-color: rgba(14, 165, 233, 0.5); }
        .trade-box.loss.put { background: linear-gradient(180deg, rgba(244, 63, 94, 0.15), rgba(244, 63, 94, 0.05)); border-color: rgba(244, 63, 94, 0.4); }
        .trade-box.cancelled { background: linear-gradient(180deg, rgba(148, 163, 184, 0.2), rgba(148, 163, 184, 0.05)); border-color: rgba(148, 163, 184, 0.4); }
        
        /* Points */
        .chart-pt-signal, .chart-pt-entry, .chart-pt-exit {
            position: absolute; border-radius: 50%; pointer-events: auto; cursor: pointer; transform: translate(-50%, -50%);
        }
        .chart-pt-signal { width: 6px; height: 6px; background: #0ea5e9; box-shadow: 0 0 10px #0ea5e9; z-index: 35; }
        .chart-pt-signal.put { background: #f43f5e; box-shadow: 0 0 10px #f43f5e; }
        
        .chart-pt-entry { width: 8px; height: 8px; background: #f8fafc; border: 2px solid #3b82f6; box-shadow: 0 0 10px rgba(59,130,246,0.6); z-index: 36; }
        .chart-pt-exit { width: 8px; height: 8px; background: #f8fafc; border: 2px solid #8b5cf6; box-shadow: 0 0 10px rgba(139,92,246,0.6); z-index: 37; }
        
        /* Arrows */
        .chart-arrow-signal {
            position: absolute; pointer-events: auto; cursor: pointer; z-index: 34; display: flex; align-items: center; justify-content: center;
            width: 26px; height: 26px; border-radius: 50%; background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); transition: transform 0.2s;
        }
        .chart-arrow-signal:hover { transform: translate(-50%, -50%) scale(1.15) !important; z-index: 100; }
        .chart-arrow-signal.call { box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4); border: 1px solid rgba(16, 185, 129, 0.6); }
        .chart-arrow-signal.put { box-shadow: 0 4px 12px rgba(244, 63, 94, 0.4); border: 1px solid rgba(244, 63, 94, 0.6); }

        .chart-pt-label {
            position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
            font-size: 9px; font-weight: 800; color: #0f172a; background: rgba(255,255,255,0.95);
            padding: 2px 6px; border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); border: 1px solid rgba(226,232,240,1); white-space: nowrap;
        }
        .chart-pt-signal:hover .chart-pt-label, .chart-pt-entry:hover .chart-pt-label, .chart-pt-exit:hover .chart-pt-label { opacity: 1; z-index: 100; }

        /* Outcome Badge */
        .chart-result-badge {
            position: absolute; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 800;
            padding: 3px 6px; border-radius: 6px; color: white; pointer-events: auto; cursor: pointer;
            white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.25); z-index: 38; opacity: 0.95;
            transition: transform 0.2s, filter 0.2s;
        }
        .chart-result-badge.call { transform: translate(-50%, 15px); }
        .chart-result-badge.put { transform: translate(-50%, calc(-100% - 15px)); }
        .chart-result-badge:hover { filter: brightness(1.1); z-index: 100; }
        .chart-result-badge.win { background: rgba(16, 185, 129, 0.95); border: 1px solid #34d399; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .chart-result-badge.loss { background: rgba(244, 63, 94, 0.95); border: 1px solid #fb7185; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .chart-result-badge.cancelled { background: rgba(100, 116, 139, 0.95); border: 1px solid #cbd5e1; }

        /* DETAILED HOVER TOOLTIP */
        .trade-tooltip {
            position: absolute; z-index: 9999; pointer-events: none;
            min-width: 240px; padding: 14px 16px; border-radius: 16px; color: #0f172a;
            background: rgba(255, 255, 255, 0.92); border: 1px solid rgba(226, 232, 240, 1);
            box-shadow: 0 18px 38px rgba(15, 23, 42, 0.16), inset 0 1px 0 rgba(255,255,255,1);
            backdrop-filter: blur(18px); font-size: 12px; font-family: 'Montserrat', sans-serif;
            transform: translate(-50%, -110%); transition: opacity 0.15s, transform 0.1s;
        }
        .trade-tooltip__title { margin-bottom: 8px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 6px; font-family: 'Oswald', sans-serif;}
        .trade-tooltip__row { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; }
        .trade-tooltip__row span { color: rgba(51, 65, 85, .78); font-weight: 500; }
        .trade-tooltip__row b { color: #0f172a; text-align: right; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
        .trade-tooltip .positive { color: #059669; }
        .trade-tooltip .negative { color: #e11d48; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- UTILS (Globally Available) ---
        function safeNumber(value, fallback = 0) {
            const n = Number(value);
            return Number.isFinite(n) ? n : fallback;
        }
        function formatRub(value) {
            const n = safeNumber(value, 0);
            return `${Math.round(n).toLocaleString("ru-RU")} ₽`;
        }
        function formatPrice(p) {
            const num = safeNumber(p, 0);
            if (num === 0) return '0.00';
            if (num >= 1000) return num.toFixed(2);
            if (num >= 10) return num.toFixed(3);
            if (num >= 1) return num.toFixed(4);
            return num.toFixed(5);
        }
        function formatDateTimeFull(value) {
            if (!value) return "нет данных";
            const date = new Date(safeNumber(value, 0) * 1000); 
            if (Number.isNaN(date.getTime())) return "нет данных";
            return date.toLocaleString("ru-RU", {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'});
        }

        const { useState, useEffect, useRef, useCallback } = React;

        // --- APP & PINE SCRIPT EXACT CONFIGURATION (5M/25M) ---
        const STRATEGY_5M_25M_CONFIG = {
            mode: "TV_EXACT_5M_25M",
            signalTimeframe: "5m",
            chartTimeframe: "5m",
            expiryMinutes: 25,
            expiryCandles: 5,
            preparationDelaySeconds: 3,
            historicalLookbackHours: 12,

            lookback: 20,
            atrLen: 14,
            useChoch: false,
            chochLookback: 3,
            chochMode: "Close",
            confirmOnClose: true,

            minSweepATR: 0.03,
            minReclaimATR: 0.03,
            minBodyRatio: 0.10,
            maxRangeATR: 3.50,
            requireBodyDir: false,
            blockDoubleSweep: false,
            cooldownBars: 1,

            demoBalance: 50000,
            baseStake: 500,
            payout: 0.70,
            martingaleLadder: [500, 1215, 2950, 7165],
            maxMartingaleSteps: 4,
            
            referralUrl: "https://intrade31.bar/311164",
            authorName: "SLAVA GORDEEV"
        };

        // Strict State Machine
        const APP_STAGE = { 
            IDLE: "IDLE", 
            SPLASH: "SPLASH", 
            INIT: "INIT", 
            HISTORICAL_ANALYSIS_RENDER: "HISTORICAL_ANALYSIS_RENDER",
            HISTORICAL_ANALYSIS_VOICE: "HISTORICAL_ANALYSIS_VOICE",
            TRANSITION_TO_SCANNER: "TRANSITION_TO_SCANNER",
            LIVE_SCAN: "LIVE_SCAN" 
        };

        function clamp(val, min, max) {
            return Math.max(min, Math.min(max, safeNumber(val, 0)));
        }

        function calculateTradePnl(result, stake, payout = STRATEGY_5M_25M_CONFIG.payout) {
            const safeStake = safeNumber(stake, STRATEGY_5M_25M_CONFIG.baseStake);
            if (result === "WIN") return Math.round(safeStake * payout);
            if (result === "LOSS") return -safeStake;
            return 0; 
        }

        function getStakeByMartingaleIndex(index) {
            const safeIndex = Math.max(0, Math.min(STRATEGY_5M_25M_CONFIG.martingaleLadder.length - 1, safeNumber(index, 0)));
            return STRATEGY_5M_25M_CONFIG.martingaleLadder[safeIndex];
        }

        function getNextMartingaleIndex(result, currentIndex) {
            const safeIndex = safeNumber(currentIndex, 0);
            if (result === "WIN") return 0;
            if (result === "LOSS") {
                if (safeIndex < STRATEGY_5M_25M_CONFIG.martingaleLadder.length - 1) return safeIndex + 1;
                return 0; 
            }
            if (result === "CANCELLED") return 0; 
            return 0;
        }

        function evaluateTradeResult(direction, entryPrice, exitPrice) {
            const entry = Number(entryPrice);
            const exit = Number(exitPrice);
            if (!Number.isFinite(entry) || !Number.isFinite(exit)) return "CANCELLED";
            if (direction === "BUY" || direction === "CALL") return exit > entry ? "WIN" : "LOSS";
            if (direction === "SELL" || direction === "PUT") return exit < entry ? "WIN" : "LOSS";
            return "CANCELLED";
        }

        function createTradeObject({ signalId, direction, signalTime, signalPrice, entryTime, entryPrice, exitTime, exitPrice, result, martingaleStep, stake, cancelReason = "", balanceBefore = 0, entrySource = "live_tick" }) {
            const pnl = calculateTradePnl(result, stake);
            const safeBalBefore = safeNumber(balanceBefore, 0);
            
            return {
                tradeId: signalId, 
                timeframe: STRATEGY_5M_25M_CONFIG.signalTimeframe,
                expiryMinutes: STRATEGY_5M_25M_CONFIG.expiryMinutes,
                direction, signalTime, signalPrice, entryTime, entryPrice, entrySource, exitTime, exitPrice, result,
                martingaleStep: safeNumber(martingaleStep, 0) + 1, 
                stake: safeNumber(stake, STRATEGY_5M_25M_CONFIG.baseStake), 
                cancelReason,
                pnl,
                balanceBefore: safeBalBefore,
                balanceAfter: safeBalBefore + pnl
            };
        }

        function calculateSessionStats(trades) {
            const confirmedTrades = trades.filter(t => t.result !== "CANCELLED");

            if (idx < period) return 0;
            let sumTR = 0;
            for (let j = 0; j < period; j++) {
                const c = data[idx - j];
                const prevC = data[idx - j - 1];
                if (!prevC) continue;
                const tr = Math.max(c.high - c.low, Math.abs(c.high - prevC.close), Math.abs(c.low - prevC.close));
                sumTR += tr;
            }
            return sumTR / period;
        }

        // Pine Script Translation: EXACT Logic Wrapper & Realistic Gauge Scores
        function evaluateTVExactSignal(data, idx, cfg, lastSignalIdx = null) {
            if (idx < cfg.lookback + cfg.atrLen + 2) {
                return { isBuy: false, isSell: false, reason: "NOT_ENOUGH_DATA", scores: { structure: 50, liquidity: 50, atr: 50, confidence: 50 } };
            }

            const candle = data[idx];
            const prevBars = data.slice(idx - cfg.lookback, idx); 

            const upperPool = Math.max(...prevBars.map(c => c.high));
            const lowerPool = Math.min(...prevBars.map(c => c.low));

            const atr = calcAtrAtIndex(data, idx, cfg.atrLen);
            const safeRange = Math.max(candle.high - candle.low, 0.0000001);
            const bodySize = Math.abs(candle.close - candle.open);
            const bodyRatio = bodySize / safeRange;

            const rawSell = candle.high > upperPool && candle.close < upperPool;
            const rawBuy = candle.low < lowerPool && candle.close > lowerPool;

            const sweepUpDepth = candle.high - upperPool;
            const reclaimDown = upperPool - candle.close;
            const sweepDownDepth = lowerPool - candle.low;
            const reclaimUp = candle.close - lowerPool;

            const rangeOk = safeRange <= atr * cfg.maxRangeATR;
            const sellBodyOk = !cfg.requireBodyDir || candle.close < candle.open;
            const buyBodyOk = !cfg.requireBodyDir || candle.close > candle.open;
            const doubleSweep = rawSell && rawBuy;
            const sideOk = !(cfg.blockDoubleSweep && doubleSweep);
            const cooldownOk = lastSignalIdx === null || (idx - lastSignalIdx) >= cfg.cooldownBars;

            const sellFilters = sweepUpDepth >= atr * cfg.minSweepATR && reclaimDown >= atr * cfg.minReclaimATR && bodyRatio >= cfg.minBodyRatio && rangeOk && sellBodyOk && sideOk && cooldownOk;
            const buyFilters = sweepDownDepth >= atr * cfg.minSweepATR && reclaimUp >= atr * cfg.minReclaimATR && bodyRatio >= cfg.minBodyRatio && rangeOk && buyBodyOk && sideOk && cooldownOk;

            let sellChoch = true; let buyChoch = true;

            if (cfg.useChoch) {
                const chochBars = data.slice(idx - cfg.chochLookback, idx);
                const prevLowestLow = Math.min(...chochBars.map(c => c.low));
                const prevHighestHigh = Math.max(...chochBars.map(c => c.high));
                if (cfg.chochMode === "Close") { sellChoch = candle.close < prevLowestLow; buyChoch = candle.close > prevHighestHigh; } 
                else { sellChoch = candle.low < prevLowestLow; buyChoch = candle.high > prevHighestHigh; }
            }

            // Real-time Gauge Scores Computation (Clamped)
            let strScore = 50, liqScore = 50, atrSc = 50, confScore = 50;
            const sweepD = Math.max(0, rawSell ? sweepUpDepth : rawBuy ? sweepDownDepth : 0);
            const reclaimD = Math.max(0, rawSell ? reclaimDown : rawBuy ? reclaimUp : 0);
            
            strScore = Math.floor(clamp((bodyRatio / cfg.minBodyRatio) * 50, 20, 100));
            if (atr > 0) {
                liqScore = Math.floor(clamp(((sweepD / (atr * cfg.minSweepATR)) + (reclaimD / (atr * cfg.minReclaimATR))) * 25, 10, 100));
                atrSc = Math.floor(clamp(100 - (safeRange / (atr * cfg.maxRangeATR)) * 100, 10, 100));
            }
            if (!rawSell && !rawBuy) {
                liqScore = Math.floor(clamp(liqScore * 0.5, 0, 50)); 
                strScore = Math.floor(clamp(strScore * 0.8, 0, 80));
            }
            confScore = Math.floor(clamp((strScore * 0.3 + liqScore * 0.4 + atrSc * 0.3), 0, 100));

            return {
                isSell: rawSell && sellFilters && sellChoch,
                isBuy: rawBuy && buyFilters && buyChoch,
                rawSell, rawBuy, upperPool, lowerPool, atr, bodyRatio,
                scores: { structure: strScore, liquidity: liqScore, atr: atrSc, confidence: confScore },

                  splashDoneRef.current = true;

                  const timer = setTimeout(() => {
                      setAppStage(APP_STAGE.INIT);

          useEffect(() => {

          // Redraw trade boxes & custom markers overlay
          const redrawOverlay = useCallback(() => {
              if (!chartInstance.current || !candleSeries.current || !overlayRef.current) return;
              const chart = chartInstance.current;
              const series = candleSeries.current;
              overlayRef.current.innerHTML = '';

              tradesHistoryRef.current.forEach(t => {
                  if (!t.entryTime || !t.exitTime || !t.signalTime) return;
                  
                  const xSig = chart.timeScale().timeToCoordinate(t.signalTime);
                  const xEnt = chart.timeScale().timeToCoordinate(t.entryTime);
                  const xEx = chart.timeScale().timeToCoordinate(t.exitTime);

                  const ySig = series.priceToCoordinate(t.signalPrice);
                  const yEnt = series.priceToCoordinate(t.entryPrice);
                  const yEx = series.priceToCoordinate(t.exitPrice);

                  if (xEnt === null || xEx === null || yEnt === null || yEx === null) return;

                  // 1. Transparent Box
                  const yTop = Math.min(yEnt, yEx) - 15; 
                  const yBot = Math.max(yEnt, yEx) + 15;
                  const boxWidth = Math.max(8, Math.abs(xEx - xEnt));
                  
                  const box = document.createElement("div");
                  const isCall = t.direction === "CALL" || t.direction === "BUY";
                  const isWin = t.result === 'WIN';
                  const isCancelled = t.result === 'CANCELLED';
                  const resClass = isCancelled ? 'cancelled' : (isWin ? 'win' : 'loss');
                  const dirClass = isCall ? 'call' : 'put';
                  
                  box.className = `trade-box ${resClass} ${dirClass}`;
                  box.style.left = `${Math.min(xEnt, xEx)}px`; 
                  box.style.top = `${yTop}px`;
                  box.style.width = `${boxWidth}px`; 
                  box.style.height = `${Math.max(16, yBot - yTop)}px`;
                  
                  // 2. Entry Point
                  const entryPt = document.createElement("div");
                  entryPt.className = `chart-pt-entry`;
                  entryPt.style.left = `${xEnt}px`; 
                  entryPt.style.top = `${yEnt}px`;
                  entryPt.innerHTML = `<span class="chart-pt-label">ВХОД</span>`;

                  // 3. Exit Point
                  const exitPt = document.createElement("div");
                  exitPt.className = `chart-pt-exit`;
                  exitPt.style.left = `${xEx}px`; 
                  exitPt.style.top = `${yEx}px`;
                  exitPt.innerHTML = `<span class="chart-pt-label">ВЫХОД</span>`;

                  // 4. Result Badge (Outcome)
                  const pnlValue = safeNumber(t.pnl, 0);
                  const pnlText = isCancelled ? '' : (pnlValue > 0 ? `+${formatRub(pnlValue)}` : `${formatRub(pnlValue)}`);
                  const dirText = isCall ? "BUY" : "SELL";
                  const resText = isCancelled ? 'ОТМЕНА' : `${isWin ? 'WIN' : 'LOSS'} | ${dirText} ${pnlText}`;
                  
                  const resBadge = document.createElement("div");
                  resBadge.className = `chart-result-badge ${isCancelled ? 'cancelled' : (isWin ? 'win' : 'loss')} ${dirClass}`;
                  resBadge.style.left = `${xEx}px`;
                  resBadge.style.top = `${yEx}px`; 
                  resBadge.innerHTML = resText;

                  // Tooltip bindings
                  const tooltipContent = buildTradeTooltipHtml(t);
                  const showTooltip = () => {
                      setHtmlTooltipHtml(tooltipContent);
                      setHoveredTooltip({ x: xEnt + boxWidth / 2, y: yTop - 10 });
                  };
                  const hideTooltip = () => setHoveredTooltip(null);
                  
                  const elements = [box, entryPt, exitPt, resBadge];
                  
                  // 5. Arrow Signal Element
                  if (xSig !== null && ySig !== null) {
                      const arrowEl = document.createElement("div");
                      arrowEl.className = `chart-arrow-signal ${isCall ? 'call' : 'put'}`;
                      arrowEl.style.left = `${xSig}px`; 
                      // Place arrow slightly away from the candle close price to not overlap it heavily
                      const yOffset = isCall ? 20 : -20;
                      arrowEl.style.top = `calc(${ySig}px + ${yOffset}px)`;
                      arrowEl.innerHTML = isCall 
                        ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`
                        : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f43f5e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>`;
                      
                      const sigPt = document.createElement("div");
                      sigPt.className = `chart-pt-signal ${!isCall ? 'put' : ''}`;
                      sigPt.style.left = `${xSig}px`; 
                      sigPt.style.top = `${ySig}px`;
                      
                      elements.push(arrowEl);
                      elements.push(sigPt);
                      
                      overlayRef.current.appendChild(arrowEl);
                      overlayRef.current.appendChild(sigPt);
                  }

                  elements.forEach(el => {
                      el.onmouseenter = showTooltip;
                      el.onmouseleave = hideTooltip;
                      el.onclick = () => { showTooltip(); setTimeout(hideTooltip, 5000); };
                  });
                  
                  overlayRef.current.appendChild(box);
                  overlayRef.current.appendChild(entryPt);
                  overlayRef.current.appendChild(exitPt);
                  overlayRef.current.appendChild(resBadge);
              });
          }, []);

          useEffect(() => {
              if (chartInstance.current) {
                  chartInstance.current.timeScale().subscribeVisibleLogicalRangeChange(redrawOverlay);
                  chartInstance.current.timeScale().subscribeSizeChange(redrawOverlay);
                  chartInstance.current.timeScale().subscribeVisibleLogicalRangeChange(() => setHoveredTooltip(null));
              }
              return () => {
                  if (chartInstance.current) {
                      chartInstance.current.timeScale().unsubscribeVisibleLogicalRangeChange(redrawOverlay);
                      chartInstance.current.timeScale().unsubscribeSizeChange(redrawOverlay);
                  }
              };
          }, [redrawOverlay]);

          const fetchNews = async () => {
              try {
                  const urls = ['https://api.rss2json.com/v1/api.json?rss_url=https://forklog.com/feed/'];
                  let btcItems = [];
                  for(let u of urls) {
                      let res = await fetch(u).catch(()=>null);
                      if(res && res.ok) {
                          let data = await res.json();
                          if (data && data.items) btcItems = [...btcItems, ...data.items.filter(item => /биткоин|btc|bitcoin/i.test(item.title)).map(item => item.title.replace(/<\/?[^>]+(>|$)/g, "").trim())];
                      }
                  }
                  if (btcItems.length > 0) {
                      btcItems = [...new Set(btcItems)]; fullNewsPool.current = btcItems; setNewsHeadlines(btcItems);
                  } else { fullNewsPool.current = [...FALLBACK_BTC_NEWS]; setNewsHeadlines(FALLBACK_BTC_NEWS); }
              } catch (error) { fullNewsPool.current = [...FALLBACK_BTC_NEWS]; setNewsHeadlines(FALLBACK_BTC_NEWS); }
          };

          useEffect(() => {
            if(appStage !== APP_STAGE.IDLE && appStage !== APP_STAGE.SPLASH) return; // ONLY run randomizer in IDLE
            const interval = setInterval(() => {
                setMetrics(prev => ({
                    ...prev,
                    structure: prev.structure > 0 ? Math.max(0, Math.min(100, prev.structure + (Math.random() * 4 - 2))) : 50,
                    liquidity: Math.max(0, Math.min(100, prev.liquidity + (Math.random() - 0.5) * 4)),
                    filterLevel: Math.max(20, Math.min(80, prev.filterLevel + (Math.random() - 0.5) * 6)),
                    smartMoney: 50
                }));
            }, 1000);
            return () => clearInterval(interval);
          }, [appStage]);

          useEffect(() => {
              const loadSparklines = async () => {
                  const data = await ScannerAPI.getCandles('BTCUSDT', 50, '5m'); 
                  if (data && data.length > 0) { setSparklines({'BTCUSDT': data}); currentPrice.current = data[data.length - 1].close; }
              };
              loadSparklines();
          }, []);

          useEffect(() => { fetchNews(); const newsInterval = setInterval(fetchNews, 20 * 60 * 1000); return () => clearInterval(newsInterval); }, []);

          const addLog = (msg, isAi = false) => {
            const prefix = isAi ? 'SMC PINE:' : 'СИСТЕМА:';
            setLogs(p => [`${prefix} ${msg}`, ...p].slice(0, 5)); 
          };

          const playSound = (type) => {
            if (!audioCtx.current) return; const ctx = audioCtx.current;
            if (ctx.state === 'suspended') ctx.resume();
            const playTone = (freq, oscType, dur, vol, delay = 0) => {
                try {
                    const o = ctx.createOscillator(); const g = ctx.createGain(); o.type = oscType;
                    o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
                    g.gain.setValueAtTime(0, ctx.currentTime + delay);
                    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(ctx.currentTime + delay); o.stop(ctx.currentTime + delay + dur);
                } catch (e) {}
            };
            if (type === 'scan') playTone(1200 + Math.random()*300, 'sine', 0.03, 0.005);
            if (type === 'found') { playTone(600, 'triangle', 0.1, 0.03); playTone(800, 'triangle', 0.1, 0.03, 0.1); }
            if (type === 'start') { playTone(523.25, 'sine', 0.4, 0.03); playTone(659.25, 'sine', 0.5, 0.03, 0.1); playTone(783.99, 'sine', 0.6, 0.04, 0.2); }
            if (type === 'win') { playTone(523.25, 'triangle', 0.4, 0.04); playTone(659.25, 'triangle', 0.5, 0.04, 0.1); playTone(783.99, 'triangle', 0.8, 0.05, 0.2); }
            if (type === 'loss') { playTone(300, 'sawtooth', 0.4, 0.03); playTone(250, 'sawtooth', 0.6, 0.04, 0.2); }
            if (type === 'cancel') { playTone(400, 'square', 0.1, 0.04); playTone(300, 'square', 0.2, 0.04, 0.15); }
          };

          const initChart = async () => {
            if (!chartContainerRef.current) return;
            if (!window.LightweightCharts) {
              await new Promise(resolve => {
                const script = document.createElement('script'); script.src = 'https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js'; script.onload = resolve; document.head.appendChild(script);
              });
            }
            if (chartInstance.current) return;
            try {
                const mainChart = window.LightweightCharts.createChart(chartContainerRef.current, {
                  autoSize: true, layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#475569', fontFamily: 'JetBrains Mono' },
                  grid: { vertLines: { color: 'rgba(148, 163, 184, 0.1)' }, horzLines: { color: 'rgba(148, 163, 184, 0.1)' } },
                  timeScale: { borderVisible: false, timeVisible: true, secondsVisible: false }, rightPriceScale: { borderVisible: false }
                });
                candleSeries.current = mainChart.addCandlestickSeries({ upColor: '#38bdf8', downColor: '#fb7185', borderVisible: true, borderUpColor: '#38bdf8', borderDownColor: '#fb7185', wickUpColor: '#38bdf8', wickDownColor: '#fb7185' });
                chartInstance.current = mainChart;
                
                chartInstance.current.timeScale().subscribeVisibleLogicalRangeChange(redrawOverlay);
                chartInstance.current.timeScale().subscribeSizeChange(redrawOverlay);
            } catch(e) {}
          };

          const clearChartExtras = () => {
              if (!chartInstance.current || !candleSeries.current) return;
              extraSeriesRef.current.forEach(s => { try { chartInstance.current.removeSeries(s); } catch(e){} }); extraSeriesRef.current = [];
          };

          const drawIndicators = (data) => {
              clearChartExtras();
              let upperSeries, lowerSeries;
              
              const upperData = []; const lowerData = [];
              for(let i=STRATEGY_5M_25M_CONFIG.lookback; i<data.length; i++) {
                  let up = -Infinity; let dn = Infinity;
                  for(let k=1; k<=STRATEGY_5M_25M_CONFIG.lookback; k++) {
                      if(data[i-k].high > up) up = data[i-k].high;
                      if(data[i-k].low < dn) dn = data[i-k].low;
                  }
                  upperData.push({time: data[i].time, value: up});
                  lowerData.push({time: data[i].time, value: dn});
              }

              try {
                  upperSeries = chartInstance.current.addLineSeries({ color: 'rgba(244, 63, 94, 0.5)', lineWidth: 1, lineStyle: 2, title: 'UPPER POOL', lastValueVisible: false, priceLineVisible: false });
                  upperSeries.setData(upperData); extraSeriesRef.current.push(upperSeries);
                  lowerSeries = chartInstance.current.addLineSeries({ color: 'rgba(16, 185, 129, 0.5)', lineWidth: 1, lineStyle: 2, title: 'LOWER POOL', lastValueVisible: false, priceLineVisible: false });
                  lowerSeries.setData(lowerData); extraSeriesRef.current.push(lowerSeries);
              } catch(e) {}
          };

          const performHistoricalBacktest = (data) => {
              let currentBalance = STRATEGY_5M_25M_CONFIG.demoBalance;
              let currentMgStep = 0;
              let lastSignalIdx = null;
              
              const lookbackCandles = Math.round(STRATEGY_5M_25M_CONFIG.historicalLookbackHours * 60 / 5);
              const startIdx = data.length - lookbackCandles;
              const endIdx = data.length - 1 - STRATEGY_5M_25M_CONFIG.expiryCandles; 
              
              const simulatedTrades = [];

              // Prime metrics with real first values
              let lastScores = { structure: 50, liquidity: 50, atr: 50, confidence: 50 };

              for (let idx = Math.max(STRATEGY_5M_25M_CONFIG.lookback + STRATEGY_5M_25M_CONFIG.atrLen, startIdx); idx <= endIdx; idx++) {
                  const signalInfo = evaluateTVExactSignal(data, idx, STRATEGY_5M_25M_CONFIG, lastSignalIdx);
                  
                  if (signalInfo.scores) {
                      lastScores = signalInfo.scores;
                  }

                  if (signalInfo.isSell || signalInfo.isBuy) {
                      const isCall = signalInfo.isBuy;
                      const currCandle = data[idx];
                      const currTime = currCandle.time;

                      // Entry is next candle open (simulating +3 sec delay after signal candle close)
                      const entryCandle = data[idx + 1];
                      const exitCandle = data[idx + 1 + STRATEGY_5M_25M_CONFIG.expiryCandles];

                      if (entryCandle && exitCandle) {
                          lastSignalIdx = idx;
                          const signalPrice = currCandle.close;
                          const entryPrice = entryCandle.open; 
                          const exitPrice = exitCandle.close;
                          
                          const stake = getStakeByMartingaleIndex(currentMgStep);
                          const result = evaluateTradeResult(isCall ? "CALL" : "PUT", entryPrice, exitPrice);
                          
                          const trade = createTradeObject({
                              signalId: currTime, direction: isCall ? 'CALL' : 'PUT',
                              signalTime: currTime, signalPrice: signalPrice,
                              entryTime: entryCandle.time, entryPrice,
                              exitTime: exitCandle.time, exitPrice, 
                              result, martingaleStep: currentMgStep, stake,
                              balanceBefore: currentBalance, entrySource: "approx_next_5m_open"
                          });
                          
                          simulatedTrades.push(trade);
                          currentBalance = trade.balanceAfter;

                          currentMgStep = getNextMartingaleIndex(result, currentMgStep);
                          idx += STRATEGY_5M_25M_CONFIG.expiryCandles; 
                      }
                  }
              }
              
              return { simulatedTrades, currentMgStep, lastScores };
          };

          const runTerminalEngine = async () => {
            if (engineActive.current) return;
            engineActive.current = true;

            if (audioCtx.current && audioCtx.current.state === 'suspended') await audioCtx.current.resume();

            // PHASE: HISTORICAL ANALYSIS FETCH & RENDER
            setAppStage(APP_STAGE.HISTORICAL_ANALYSIS_RENDER);
            setAppPhase('АНАЛИЗ 12 ЧАСОВ (5M PINE)...');
            addLog(`ЗАПУСК: TV EXACT MODE (5M PINE SCRIPT)...`, true);
            setViewMode('DETAIL');

            const curAsset = ASSETS[0];
            const initialData = await ScannerAPI.getCandles(curAsset.symbol, 400, '5m');
            
            let currentMgStepLive = 0;

            if (initialData && initialData.length > 200) {
                setSparklines(prev => ({...prev, [curAsset.symbol]: initialData}));
                currentPrice.current = initialData[initialData.length - 1].close;

                const { simulatedTrades, currentMgStep, lastScores } = performHistoricalBacktest(initialData);
                
                tradesHistoryRef.current = simulatedTrades;
                currentMgStepLive = currentMgStep;
                
                setMetrics({ 
                    structure: lastScores.structure, 
                    liquidity: lastScores.liquidity, 
                    filterLevel: lastScores.atr, 
                    smartMoney: lastScores.confidence 
                });
                
                const stats = calculateSessionStats(simulatedTrades);
                setSessionStats(stats);
                
                addLog(`БЭКТЕСТ 12 ЧАСОВ: СИГНАЛОВ ${safeNumber(stats.totalSignals)}, PNL: ${safeNumber(stats.pnl)} RUB`, true);

                setAsset(curAsset);
                await initChart();
                
                if (candleSeries.current) {
                    candleSeries.current.setData(initialData);
                    lastChartTimeRef.current = initialData[initialData.length - 1].time;
                    drawIndicators(initialData);
                    redrawOverlay();
                    try { chartInstance.current.timeScale().fitContent(); } catch(e) {}
                }

                await new Promise(r => setTimeout(r, 500));

                // PHASE: HISTORICAL ANALYSIS VOICE (Strict Sync)
                setAppStage(APP_STAGE.HISTORICAL_ANALYSIS_VOICE);
                setAppPhase('ОТЧЁТ АНАЛИТИКИ...');
                await announceStatsAsync(stats, () => engineActive.current);

                // PHASE: TRANSITION
                if (!engineActive.current) return;
                setAppStage(APP_STAGE.TRANSITION_TO_SCANNER);
                setAppPhase('ПОДГОТОВКА СКАНЕРА...');
                await new Promise(r => setTimeout(r, 800)); 

                // PHASE: LIVE SCAN
                if (!engineActive.current) return;
                setAppStage(APP_STAGE.LIVE_SCAN);
                setViewMode('SCREENER');

            } else {
                addLog("ОШИБКА: НЕТ СВЯЗИ С БИРЖЕЙ", true);
                setAppPhase('ОШИБКА API');
                await speakTextAsync('Ошибка связи с биржей. Проверьте соединение.', () => engineActive.current);
                return; 
            }
            
            let lastSignalIdxLive = null;

            while (engineActive.current) {
              try {
                  setAppPhase('СКАНИРОВАНИЕ ЛИКВИДНОСТИ (5M)...');
                  setViewMode('SCREENER');
                  setSignal(null);

                  let signalFound = false;

                  for(let cur of ASSETS) {
                    if (!engineActive.current) break;
                    playSound('scan');
                    
                    const data = await ScannerAPI.getCandles(cur.symbol, 400, '5m'); 
                    
                    if (data && data.length > 50) {
                      setSparklines(prev => ({...prev, [cur.symbol]: data}));

                      const lastIdx = data.length - 1;
                      currentPrice.current = data[lastIdx].close; 

                      let triggerCandleIdx = lastIdx - 1; 

                      // Get real-time metric scores for the gauges based on current data
                      const signalInfo = evaluateTVExactSignal(data, triggerCandleIdx, STRATEGY_5M_25M_CONFIG, lastSignalIdxLive);
                      
                      setMetrics({ 
                          structure: signalInfo.scores.structure, 
                          liquidity: signalInfo.scores.liquidity, 
                          filterLevel: signalInfo.scores.atr, 
                          smartMoney: signalInfo.scores.confidence 
                      });

                      if (signalInfo && (signalInfo.isSell || signalInfo.isBuy)) {
                          
                          signalFound = true;
                          lastSignalIdxLive = triggerCandleIdx;
                          const isCall = signalInfo.isBuy;
                          
                          setAsset(cur); setViewMode('DETAIL');

                          await initChart(); playSound('found');
                          
                          if(candleSeries.current) {
                              try { 
                                  data.forEach(d => {
                                      if (d.time >= lastChartTimeRef.current) {
                                          candleSeries.current.update(d);
                                          lastChartTimeRef.current = Math.max(lastChartTimeRef.current, d.time);
                                      }
                                  });
                              } catch (e) {}
                          }

                          drawIndicators(data); redrawOverlay(); // ensure pools update
                          
                          const signalTime = data[triggerCandleIdx].time;
                          const signalPrice = data[triggerCandleIdx].close;
                          const directionText = isCall ? "повышение" : "понижение";
                          
                          setAppPhase(`ГОТОВЬТЕ: BTC (5 МИН)`);
                          addLog(`ЗАФИКСИРОВАН СИГНАЛ: PINE EXACT`, true);
                          await speakTextAsync(`Качественный сигнал подтвержден. Направление на ${directionText}. Подготовка 3 секунды.`, () => engineActive.current);

                          setAppPhase('СНАЙПЕР: ЗАДЕРЖКА 3 СЕК');
                          
                          await new Promise(r => setTimeout(r, STRATEGY_5M_25M_CONFIG.preparationDelaySeconds * 1000));

                          playSound('start'); setAppPhase('СИГНАЛ АКТИВЕН');
                          
                          const entryTime = Math.floor(Date.now() / 1000); 
                          const entryPrice = currentPrice.current; 
                          
                          setSignal({ type: isCall ? 'CALL' : 'PUT', exp: STRATEGY_5M_25M_CONFIG.expiryMinutes, entryPrice });

                          const liveStake = getStakeByMartingaleIndex(currentMgStepLive);
                          addLog(`ВХОД ${isCall ? 'ВВЕРХ' : 'ВНИЗ'} НА 25 МИН. СТАВКА: ${liveStake}₽`, true);
                          speakTextAsync(`Открываю сделку. Экспирация 25 минут.`, () => engineActive.current);

                          let expirySeconds = STRATEGY_5M_25M_CONFIG.expiryMinutes * 60;
                          let isLive = true;
                          
                          const liveChartTask = (async () => {
                            let localLastTime = lastChartTimeRef.current; 
                            while (isLive && engineActive.current) {
                              await new Promise(r => setTimeout(r, 2000));
                              if (!isLive) break;
                              try {
                                const liveTickArray = await ScannerAPI.getCandles(cur.symbol, 2, '5m');
                                if (liveTickArray && liveTickArray.length > 0 && candleSeries.current) {
                                  liveTickArray.forEach(tick => {
                                    if (tick.time >= localLastTime && !isNaN(tick.close)) {
                                      try {
                                          candleSeries.current.update(tick); currentPrice.current = tick.close;
                                          localLastTime = Math.max(localLastTime, tick.time); lastChartTimeRef.current = localLastTime;
                                      } catch (err) {}
                                    }
                                  });
                                }
                              } catch (e) {}
                            }
                          })();

                          while(expirySeconds > 0 && engineActive.current) {
                            setCountdown(expirySeconds);
                            await new Promise(r => setTimeout(r, 1000));
                            expirySeconds--;
                          }
                          
                          isLive = false; setCountdown(null); setAppPhase('АНАЛИЗ РЕЗУЛЬТАТА');

                          const resultData = await ScannerAPI.getCandles(cur.symbol, 1, '5m');
                          let finalPrice = entryPrice;
                          if (resultData && resultData.length > 0) finalPrice = resultData[resultData.length - 1].close;
                          
                          const result = evaluateTradeResult(isCall ? "CALL" : "PUT", entryPrice, finalPrice);
                          let isWin = result === 'WIN';

                          if (isWin) {
                            playSound('win');
                          } else {
                            playSound('loss');
                          }

                          const exitTime = Math.floor(Date.now() / 1000);
                          
                          const liveStatsBefore = calculateSessionStats(tradesHistoryRef.current);
                          const liveBalanceBefore = liveStatsBefore.finalBalance;

                          const liveTradeResult = createTradeObject({
                              signalId: signalTime, direction: isCall ? 'CALL' : 'PUT',
                              signalTime, signalPrice, entryTime, entryPrice, exitTime: exitTime, exitPrice: finalPrice,
                              result: result, martingaleStep: currentMgStepLive, stake: liveStake,
                              balanceBefore: liveBalanceBefore, entrySource: "live_tick"
                          });
                          
                          tradesHistoryRef.current.push(liveTradeResult);
                          const newStats = calculateSessionStats(tradesHistoryRef.current);
                          setSessionStats(newStats);
                          redrawOverlay();

                          if (isWin) {
                            addLog(`ПЛЮС (+). ВЫХОД: ${formatPrice(finalPrice)}. PNL: +${liveTradeResult.pnl}₽`);
                            await speakTextAsync(`Плюс. Прибыль ${liveTradeResult.pnl} рублей.`, () => engineActive.current);

                            addLog(`МИНУС (-). УБЫТОК: ${liveTradeResult.pnl}₽`);
                            await speakTextAsync(`Минус. Увеличиваю шаг мартингейла.`, () => engineActive.current);
                          }

                          currentMgStepLive = getNextMartingaleIndex(result, currentMgStepLive);

                          setSignal(null); setMetrics(prev => ({ ...prev, smartMoney: 0 }));
                          await new Promise(r => setTimeout(r, 2000));
                          break; 
                      }
                    }
                  }
                  
                  if (!signalFound && engineActive.current) await new Promise(r => setTimeout(r, 1500)); 
              } catch (e) {

              }
