<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Крипто Терминал Гордеева - PRO MAX (SMC)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Oswald:wght@300;400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
        
        body { 
            margin: 0; padding: 0; 
            background: #0f172a;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 70%);
            color: #f8fafc; 
            overflow: hidden; 
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
            font-family: 'Montserrat', sans-serif;
        }
        
        .oswald-font { font-family: 'Oswald', sans-serif; letter-spacing: 0.05em; text-transform: uppercase; }
        .mono-font { font-family: 'JetBrains Mono', monospace; }

        /* Серебряный переливающийся текст для Разработчика */
        .silver-text {
            background: linear-gradient(110deg, #94a3b8 0%, #ffffff 25%, #cbd5e1 50%, #ffffff 75%, #94a3b8 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: silverShine 3.5s linear infinite;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            display: inline-block;
            font-weight: 900;
        }
        @keyframes silverShine {
            to { background-position: -200% center; }
        }

        .bg-grid-pattern {
            background-image: 
                linear-gradient(to right, rgba(14, 165, 233, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(14, 165, 233, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        .bg-orb-1 {
            position: absolute; top: -15%; left: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, rgba(37, 99, 235, 0.05) 50%, transparent 70%);
            border-radius: 50%; filter: blur(80px); animation: float 15s ease-in-out infinite alternate;
        }
        .bg-orb-2 {
            position: absolute; bottom: -20%; right: -15%; width: 70vw; height: 70vw;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, rgba(14, 165, 233, 0.05) 50%, transparent 70%);
            border-radius: 50%; filter: blur(100px); animation: float 18s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(3%, 5%) scale(1.05); }
            100% { transform: translate(-3%, -4%) scale(0.95); }
        }

        .card-3d-wrapper { perspective: 2000px; }
        .card-3d {
            transform-style: preserve-3d;
            animation: float-3d 12s ease-in-out infinite;
            box-shadow: 
                0 40px 80px -20px rgba(0, 0, 0, 0.5), 
                0 20px 40px -15px rgba(14, 165, 233, 0.3),
                inset 0 1px 2px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.95) 100%);
            backdrop-filter: blur(25px);
            position: relative;
        }

        @keyframes float-3d {
            0% { transform: translateY(0px) rotateX(2deg) rotateY(-2deg); }
            50% { transform: translateY(-12px) rotateX(-1deg) rotateY(3deg); }
            100% { transform: translateY(0px) rotateX(2deg) rotateY(-2deg); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-wrapper { display: flex; width: max-content; animation: ticker 40s linear infinite; }
        
        @keyframes scanline { 
            0% { transform: translateY(-100%); opacity: 0; } 
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(500%); opacity: 0; } 
        }
        .scanline-anim { 
            animation: scanline 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
            background: linear-gradient(to bottom, transparent, rgba(14, 165, 233, 0.3), rgba(59, 130, 246, 0.5), transparent); 
        }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            z-index: 40;
        }
        
        .glass-panel-heavy {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.85) 0%, rgba(15, 23, 42, 0.9) 100%);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 15px -5px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(56, 189, 248, 0.4);
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 1) 100%);
            box-shadow: 0 8px 25px -5px rgba(14, 165, 233, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .text-gradient {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes slideUpFade {
            0% { transform: translateY(10px); opacity: 0; }
            20% { transform: translateY(0); opacity: 1; }
            80% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-10px); opacity: 0; }
        }
        .hft-tick { animation: slideUpFade 1.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Shield = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 4.81 17 6 19 6a1 1 0 0 1 1 1z"/></svg>;
        const Cpu = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>;
        const Globe = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
        const Clock = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const TrendingUp = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const Radar = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/><path d="M4 5.49A10 10 0 0 0 5.3 19.38"/><path d="M20 8.74A10 10 0 0 1 17.38 20"/><path d="M16 8a6 6 0 0 0-8.5-1.5"/><path d="M7.5 16.5a6 6 0 0 0 9.2-.5"/><path d="M12 12v.01"/></svg>;
        const Zap = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;

        const ASSETS = [
          { pair: 'BTC/USDT', symbol: 'BTCUSDT', name: 'Bitcoin', voiceName: 'биткоин' }
        ];

        const FALLBACK_BTC_NEWS = [
          "АЛГОРИТМ 15M ОПТИМИЗИРОВАН. СТРОГИЙ ФИЛЬТР ТРЕНДА ОТКЛЮЧЕН.",
          "Паттерн Пинбар подтверждает смену структуры рынка с экспирацией 45 минут.",
          "Система ловит глубокие пулы ликвидности для точных разворотов.",
          "Внедрен кулдаун (45 минут) для защиты от спам-сигналов во флэте."
        ];

        const ScannerAPI = {
          // Выгружаем 400 свечей для 15m (это почти 4 суток плотного графика)
          async getCandles(symbol, count = 400, interval = '15m') { 
            const urls = [
                `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api1.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api2.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`
            ];
            
            for (let url of urls) {
                try {
                    let response = await fetch(url);
                    if (response.ok) {
                        const data = await response.json();
                        return data.map(d => ({
                            time: d[0] / 1000,
                            open: parseFloat(d[1]),
                            high: parseFloat(d[2]),
                            low: parseFloat(d[3]),
                            close: parseFloat(d[4]),
                            volume: parseFloat(d[5])
                        }));
                    }
                } catch(e) { continue; }
            }
            console.error("Нет связи с Binance API");
            return [];
          }
        };

        const formatPrice = (p) => {
            if (!p && p !== 0) return '0.00';
            if (p >= 1000) return p.toFixed(2);
            if (p >= 10) return p.toFixed(3);
            if (p >= 1) return p.toFixed(4);
            return p.toFixed(5);
        };

        function calcLiquidityZones(data, period = 15) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) {
                    res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low });
                    continue;
                }
                let high = -Infinity;
                let low = Infinity;
                for (let j = 1; j <= period; j++) {
                    high = Math.max(high, data[i - j].high);
                    low = Math.min(low, data[i - j].low);
                }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;
        }

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { 
                    res.push({time: data[i].time, value: data[i].high - data[i].low}); 
                    continue; 
                }
                let sumTR = 0;
                let count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j];
                    const prevC = data[i - j - 1];
                    let tr = Math.max(
                        c.high - c.low,
                        Math.abs(c.high - prevC.close),
                        Math.abs(c.low - prevC.close)
                    );
                    sumTR += tr;
                    count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;
        }

        function calcSMA(data, period = 50) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) { 
                    res.push({time: data[i].time, value: data[i].close}); 
                    continue; 
                }
                let sum = 0;
                for (let j = 0; j < period; j++) { sum += data[i-j].close; }
                res.push({time: data[i].time, value: sum / period});
            }
            return res;
        }

        // --- ОПТИМИЗИРОВАННАЯ ЛОГИКА ДЕТЕКТА СИГНАЛА SMC (ДЛЯ 15M) ---
        const checkSignal = (idx, data, liqMap, atrMap, smaMap) => {
            const currCandle = data[idx];
            const prevCandle = data[idx - 1];
            if(!prevCandle) return { isCall: false, isPut: false, cAtr: 0 };
            
            const currTime = currCandle.time;
            const prevTime = prevCandle.time;

            const zones = liqMap.get(currTime);
            const prevZones = liqMap.get(prevTime);
            const cAtr = atrMap.get(currTime);
            const cSma = smaMap.get(currTime);

            if (!zones || !prevZones || cAtr === undefined || cSma === undefined) return { isCall: false, isPut: false, cAtr: 0 };

            const cUpper = zones.upper;
            const cLower = zones.lower;
            
            // 1. Адаптивный фильтр флэта (смягчен для 15М: 0.5 ATR вместо 0.8)
            const rangeWidth = cUpper - cLower;
            if (rangeWidth < cAtr * 0.5) return { isCall: false, isPut: false, cAtr };

            // 2. Размер свечи (смягчен: 0.25 ATR вместо 0.4, чтобы не пропускать аккуратные развороты)
            const candleSize = currCandle.high - currCandle.low;
            if (candleSize < cAtr * 0.25) return { isCall: false, isPut: false, cAtr };

            const upperWick = currCandle.high - Math.max(currCandle.open, currCandle.close);
            const lowerWick = Math.min(currCandle.open, currCandle.close) - currCandle.low;
            const isBearish = currCandle.close <= currCandle.open;
            const isBullish = currCandle.close >= currCandle.open;

            // Сверяем пробой с границей пула той минуты, когда пробой случился
            const sweptTopCurr = currCandle.high >= cUpper;
            const sweptTopPrev = prevCandle.high >= prevZones.upper; 
            const sweptTop = sweptTopCurr || sweptTopPrev;

            const returnedInsideTop = currCandle.close < cUpper;
            
            // 3. Пинбар (смягчен: хвост > 30% свечи И заметен визуально > 0.15 ATR)
            const prevUpperWick = prevCandle.high - Math.max(prevCandle.open, prevCandle.close);
            const prevCandleSize = prevCandle.high - prevCandle.low;
            const strongRejectionTop = (upperWick > candleSize * 0.30 && upperWick > cAtr * 0.15) || (sweptTopPrev && prevUpperWick > prevCandleSize * 0.30);

            // СИГНАЛ ВНИЗ (Убрана жесткая привязка к тренду SMA50, так как на 15М отскоки от пула работают как mean reversion)
            const isPut = sweptTop && returnedInsideTop && isBearish && strongRejectionTop;

            const sweptBottomCurr = currCandle.low <= cLower;
            const sweptBottomPrev = prevCandle.low <= prevZones.lower;
            const sweptBottom = sweptBottomCurr || sweptBottomPrev;

            const returnedInsideBottom = currCandle.close > cLower; 
            
            const prevLowerWick = Math.min(prevCandle.open, prevCandle.close) - prevCandle.low;
            const strongRejectionBottom = (lowerWick > candleSize * 0.30 && lowerWick > cAtr * 0.15) || (sweptBottomPrev && prevLowerWick > prevCandleSize * 0.30);

            // СИГНАЛ ВВЕРХ
            const isCall = sweptBottom && returnedInsideBottom && isBullish && strongRejectionBottom;

            return { isCall, isPut, cAtr };
        };
        // -------------------------------------------------------

        const LiveClock = () => {
          const [t, setT] = useState(new Date());
          useEffect(() => { const i = setInterval(() => setT(new Date()), 1000); return () => clearInterval(i); }, []);
          return <span className="text-slate-300 text-sm md:text-base mono-font font-bold">{t.toLocaleTimeString('ru-RU')}</span>;
        };

        const Speedometer = ({ value, label, colorHex = "#0ea5e9", glow = false }) => {
          const safeValue = isNaN(value) ? 50 : Math.max(0, Math.min(100, value));
          const angle = -90 + (safeValue / 100) * 180;
          const radius = 40;
          const circumference = Math.PI * radius;
          const strokeDashoffset = circumference - (safeValue / 100) * circumference;

          return (
            <div className="flex flex-col items-center flex-1 relative px-0.5 group pt-1">
              <svg viewBox="0 0 100 55" className="w-10 h-6 md:w-12 md:h-7 overflow-visible mt-1">
                <defs>
                    <filter id={`glow-${label.replace(/\s+/g, '')}`}>
                        <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
                        <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                {[0, 25, 50, 75, 100].map(tick => {
                   const a = -Math.PI + (tick/100)*Math.PI;
                   return <line key={tick} x1={50 + 36 * Math.cos(a)} y1={50 + 44 * Math.sin(a)} x2={50 + 44 * Math.cos(a)} y2={50 + 44 * Math.sin(a)} stroke="rgba(148, 163, 184, 0.3)" strokeWidth="2" strokeLinecap="round" />
                })}
                <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="rgba(51, 65, 85, 0.8)" strokeWidth="5" strokeLinecap="round" />
                <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke={colorHex} strokeWidth="5" strokeLinecap="round"
                      strokeDasharray={circumference} strokeDashoffset={strokeDashoffset}
                      style={{ transition: 'stroke-dashoffset 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)' }} filter={glow ? `url(#glow-${label.replace(/\s+/g, '')})` : "none"} />
                <g style={{ transform: `rotate(${angle}deg)`, transformOrigin: '50px 50px', transition: 'transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)' }}>
                  <polygon points="48,50 52,50 50,12" fill={colorHex} />
                  <circle cx="50" cy="50" r="6" fill={colorHex} />
                  <circle cx="50" cy="50" r="2.5" fill="#1e293b" />
                </g>
              </svg>
              <div className={`text-base md:text-lg mt-1.5 font-black leading-none oswald-font ${glow ? 'drop-shadow-[0_0_8px_currentColor]' : ''}`} style={{color: colorHex}}>{Math.round(safeValue)}</div>
              <div className="text-[7px] md:text-[8px] text-slate-400 tracking-widest leading-none text-center font-bold mt-1 uppercase whitespace-nowrap">{label}</div>
            </div>
          );
        };
        
        const VolumetricArrow = ({ type }) => {
          const isUp = type === 'CALL';
          return (
            <div className="relative w-16 h-16 md:w-20 md:h-20 flex items-center justify-center animate-arrow-premium">
               <svg viewBox="0 0 24 24" className={`w-full h-full fill-current ${isUp ? 'text-[#38bdf8]' : 'text-[#fb7185]'}`}>
                  <path d={isUp ? "M12 2l-10 11h7v9h6v-9h7z" : "M12 22l10-11h-7v-9h-6v9h-7z"} />
               </svg>
            </div>
          );
        };

        const OrderBookDepth = ({ price }) => {
          const p = price || 0;
          
          if (!p) {
              return (
                  <div className="flex flex-col mono-font text-slate-300 border-l border-slate-700/50 px-3 justify-center h-full w-full relative">
                      <div className="flex justify-between text-slate-500 mb-1 border-b border-slate-700/80 pb-1 text-[10px] md:text-xs tracking-widest font-bold oswald-font">
                          <span>ЦЕНА</span><span>ОБЪЕМ</span>
                      </div>
                      <div className="flex items-center justify-center h-full text-[10px] md:text-xs text-slate-500 font-bold animate-pulse oswald-font tracking-widest">
                          СИНХРОНИЗАЦИЯ...
                      </div>
                  </div>
              );
          }

          const formattedP = formatPrice(p);
          const step = p > 1000 ? 0.5 : p > 1 ? 0.005 : 0.00005;

          return (
            <div className="flex flex-col mono-font text-slate-200 border-l border-slate-700/50 px-3 justify-center h-full w-full relative">
              <div className="flex justify-between text-slate-400 mb-1 border-b border-slate-700/80 pb-1 text-[10px] md:text-xs tracking-widest font-bold oswald-font">
                <span>ЦЕНА</span><span>ОБЪЕМ</span>
              </div>
              <div className="space-y-0.5 mt-1 relative z-10">
                {[...Array(3)].map((_, i) => {
                  const vol = Math.floor(Math.random() * 80 + 20);
                  const width = `${Math.min(100, (vol / 100) * 100)}%`;
                  return (
                  <div key={`ask-${i}`} className="flex justify-between text-[10px] md:text-xs text-rose-400/90 font-bold tracking-wider relative group">
                    <div className="absolute right-0 top-0 bottom-0 bg-rose-900/30 rounded-sm transition-all" style={{width}}></div>
                    <span className="relative z-10 drop-shadow-sm">{formatPrice(p + (4 - i) * step)}</span>
                    <span className="relative z-10 opacity-80">{vol}</span>
                  </div>
                )})}
                <div className="flex justify-between text-sky-100 bg-sky-900/40 border border-sky-500/50 my-1.5 px-2 py-0.5 text-xs md:text-sm font-black shadow-[0_0_15px_rgba(14,165,233,0.2)] rounded-md relative overflow-hidden">
                  <div className="absolute left-0 top-0 bottom-0 bg-sky-500/20" style={{width: `${Math.random()*60 + 20}%`}}></div>
                  <span className="relative z-10 drop-shadow-sm">{formattedP}</span>
                  <span className="relative z-10 text-sky-300">{Math.floor(Math.random() * 200 + 50)}</span>
                </div>
                {[...Array(3)].map((_, i) => {
                  const vol = Math.floor(Math.random() * 80 + 20);
                  const width = `${Math.min(100, (vol / 100) * 100)}%`;
                  return (
                  <div key={`bid-${i}`} className="flex justify-between text-[10px] md:text-xs text-emerald-400/90 font-bold tracking-wider relative">
                    <div className="absolute right-0 top-0 bottom-0 bg-emerald-900/30 rounded-sm transition-all" style={{width}}></div>
                    <span className="relative z-10 drop-shadow-sm">{formatPrice(p - (i + 1) * step)}</span>
                    <span className="relative z-10 opacity-80">{vol}</span>
                  </div>
                )})}
              </div>
            </div>
          );
        };

        const HftTape = ({ price }) => {
          const [ticks, setTicks] = useState([]);
          useEffect(() => {
            if (!price) return;
            const int = setInterval(() => {
                const isBuy = Math.random() > 0.5;
                const amt = (Math.random() * 2 + 0.1).toFixed(2);
                const offset = (Math.random() * 2 - 1);
                const tickPrice = formatPrice(price + offset);
                setTicks(p => [{id: Date.now(), buy: isBuy, amt, price: tickPrice}, ...p].slice(0, 4));
            }, 600);
            return () => clearInterval(int);
          }, [price]);
          
          return (
             <div className="flex flex-col gap-1 w-[85px] md:w-[95px] pl-2 border-l border-slate-700/50 overflow-hidden justify-end pb-1 h-full shrink-0">
                {ticks.map(t => (
                    <div key={t.id} className={`hft-tick text-[9px] md:text-[10px] font-bold mono-font flex justify-between w-full ${t.buy ? 'text-emerald-400' : 'text-rose-400'}`}>
                        <span className="opacity-80">{t.price.slice(-2)}</span>
                        <span>{t.buy ? '▲' : '▼'}{t.amt}</span>
                    </div>
                ))}
             </div>
          )
        };

        // --- УМНАЯ ОЧЕРЕДЬ ДЛЯ ГОЛОСА (ЧТОБЫ НЕ ПЕРЕБИВАЛА СЕБЯ) ---
        const speechQueue = [];
        let isSpeakingNow = false;

        const processSpeechQueue = () => {
            if (isSpeakingNow || speechQueue.length === 0) return;
            isSpeakingNow = true;
            
            const { text, resolve } = speechQueue.shift();
            
            if (!window.speechSynthesis) {
                isSpeakingNow = false;
                resolve();
                processSpeechQueue();
                return;
            }

            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ru-RU'; 
            u.rate = 1.1; 
            u.pitch = 0.95;
            
            u.onend = () => { isSpeakingNow = false; resolve(); processSpeechQueue(); };
            u.onerror = () => { isSpeakingNow = false; resolve(); processSpeechQueue(); };
            
            try { window.speechSynthesis.speak(u); } 
            catch(e) { isSpeakingNow = false; resolve(); processSpeechQueue(); }
        };

        const speak = (text) => new Promise(res => {
            speechQueue.push({ text, resolve: res });
            processSpeechQueue();
        });
        // -----------------------------------------------------------

        const App = () => {
          const [isStarted, setIsStarted] = useState(false);
          const [appPhase, setAppPhase] = useState('СИНХРОНИЗАЦИЯ...');
          const [viewMode, setViewMode] = useState('SCREENER'); 
          const [asset, setAsset] = useState(ASSETS[0]);
          const [signal, setSignal] = useState(null);
          const [countdown, setCountdown] = useState(null);
          const [logs, setLogs] = useState([]);
          const [currentTF, setCurrentTF] = useState('15M'); 
          
          const [metrics, setMetrics] = useState({ structure: 50, liquidity: 50, filterLevel: 1.0, smartMoney: 0, volume: 30, buyPressure: 50 });
          const [newsHeadlines, setNewsHeadlines] = useState(["ОБНОВЛЕНИЕ ДАННЫХ BTC..."]);
          const [tradeStats, setTradeStats] = useState({ wins: 0, losses: 0, winRate: 0, total: 0 });
          
          const [statusColorClass, setStatusColorClass] = useState('text-slate-200');
          
          const chartContainerRef = useRef(null);
          const chartInstance = useRef(null);
          const candleSeries = useRef(null);
          const extraSeriesRef = useRef([]); 
          const priceLinesRef = useRef([]);  
          
          const audioCtx = useRef(null);
          const engineActive = useRef(false);
          const currentPrice = useRef(null);
          const statsRef = useRef({ wins: 0, losses: 0 });
          const markersRef = useRef([]); 
          const lastTradeTimeRef = useRef(0); // РЕФ ДЛЯ КУЛДАУНА СДЕЛОК

          const logsContainerRef = useRef(null); 
          const fullNewsPool = useRef([...FALLBACK_BTC_NEWS]);

          const fetchNews = async () => {
              try {
                  const urls = [
                      'https://api.rss2json.com/v1/api.json?rss_url=https://forklog.com/feed/',
                      'https://api.rss2json.com/v1/api.json?rss_url=https://bits.media/rss2/'
                  ];
                  
                  let btcItems = [];
                  for(let u of urls) {
                      let res = await fetch(u).catch(()=>null);
                      if(res && res.ok) {
                          let data = await res.json();
                          if (data && data.items) {
                              let filtered = data.items
                                  .filter(item => /биткоин|btc|bitcoin/i.test(item.title))
                                  .map(item => item.title.replace(/<\/?[^>]+(>|$)/g, "").trim());
                              btcItems = [...btcItems, ...filtered];
                          }
                      }
                  }
                  
                  if (btcItems.length > 0) {
                      btcItems = [...new Set(btcItems)];
                      fullNewsPool.current = btcItems;
                      setNewsHeadlines(btcItems);
                  } else {
                      fullNewsPool.current = [...FALLBACK_BTC_NEWS];
                      setNewsHeadlines(FALLBACK_BTC_NEWS);
                  }
              } catch (error) { 
                  fullNewsPool.current = [...FALLBACK_BTC_NEWS];
                  setNewsHeadlines(FALLBACK_BTC_NEWS); 
              }
          };

          useEffect(() => {
            if(!isStarted) return;
            const interval = setInterval(() => {
                setMetrics(prev => {
                    const liqWobble = (Math.random() - 0.5) * 4;
                    const pressureWobble = (Math.random() - 0.5) * 6;
                    const volWobble = (Math.random() - 0.5) * 8;
                    return {
                        ...prev,
                        smartMoney: prev.smartMoney > 0 ? Math.max(0, Math.min(100, prev.smartMoney + (Math.random() * 2 - 1))) : 0,
                        liquidity: Math.max(0, Math.min(100, prev.liquidity + liqWobble)),
                        volume: Math.max(10, Math.min(90, prev.volume + volWobble)),
                        buyPressure: Math.max(20, Math.min(80, prev.buyPressure + pressureWobble))
                    }
                });
            }, 1000);
            return () => clearInterval(interval);
          }, [isStarted]);

          useEffect(() => {
            fetchNews();
            const newsInterval = setInterval(fetchNews, 20 * 60 * 1000); 
            return () => clearInterval(newsInterval);
          }, []);

          const addLog = (msg, isAi = false) => {
            const prefix = isAi ? 'SMC АНАЛИЗ:' : 'СИСТЕМА:';
            setLogs(p => [`${prefix} ${msg}`, ...p].slice(0, 6)); 
          };

          const playSound = (type) => {
            if (!audioCtx.current) return;
            const ctx = audioCtx.current;
            if (ctx.state === 'suspended') ctx.resume();
            
            const playTone = (freq, oscType, dur, vol, delay = 0) => {
                try {
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = oscType;
                    o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
                    g.gain.setValueAtTime(0, ctx.currentTime + delay);
                    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(ctx.currentTime + delay);
                    o.stop(ctx.currentTime + delay + dur);
                } catch (e) {}
            };

            if (type === 'scan') playTone(1200 + Math.random()*300, 'sine', 0.03, 0.005);
            if (type === 'found') { playTone(600, 'triangle', 0.1, 0.03); playTone(800, 'triangle', 0.1, 0.03, 0.1); }
            if (type === 'tf_change') playTone(800, 'sine', 0.1, 0.02);
            if (type === 'start') { 
                playTone(523.25, 'sine', 0.4, 0.03); 
                playTone(659.25, 'sine', 0.5, 0.03, 0.1); 
                playTone(783.99, 'sine', 0.6, 0.04, 0.2); 
            }
            if (type === 'win') { 
                playTone(523.25, 'triangle', 0.4, 0.04); 
                playTone(659.25, 'triangle', 0.5, 0.04, 0.1); 
                playTone(783.99, 'triangle', 0.8, 0.05, 0.2); 
            }
            if (type === 'loss') { 
                playTone(300, 'sawtooth', 0.4, 0.03); 
                playTone(250, 'sawtooth', 0.6, 0.04, 0.2); 
            }
            if (type === 'cancel') {
                playTone(400, 'square', 0.1, 0.04); 
                playTone(300, 'square', 0.2, 0.04, 0.15); 
            }
          };

          const initChart = async () => {
            if (!chartContainerRef.current) return;
            if (!window.LightweightCharts) {
              await new Promise(resolve => {
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js';
                script.onload = resolve; document.head.appendChild(script);
              });
            }

            if (chartInstance.current) return;

            try {
                const mainChart = window.LightweightCharts.createChart(chartContainerRef.current, {
                  autoSize: true,
                  layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#94a3b8', fontFamily: 'JetBrains Mono' },
                  grid: { vertLines: { color: 'rgba(51, 65, 85, 0.3)' }, horzLines: { color: 'rgba(51, 65, 85, 0.3)' } },
                  timeScale: { borderVisible: false, timeVisible: true, secondsVisible: false },
                  rightPriceScale: { borderVisible: false }
                });

                candleSeries.current = mainChart.addCandlestickSeries({ 
                  upColor: '#38bdf8', 
                  downColor: '#fb7185', 
                  borderVisible: true, 
                  borderUpColor: '#38bdf8', 
                  borderDownColor: '#fb7185', 
                  wickUpColor: '#38bdf8', 
                  wickDownColor: '#fb7185'
                });

                chartInstance.current = mainChart;
            } catch(e) {
                console.error("Ошибка инициализации графика", e);
            }
          };

          const clearChartExtras = () => {
              if (!chartInstance.current || !candleSeries.current) return;
              
              priceLinesRef.current.forEach(l => {
                  try { candleSeries.current.removePriceLine(l); } catch(e){}
              });
              priceLinesRef.current = [];
              
              extraSeriesRef.current.forEach(s => {
                  try { chartInstance.current.removeSeries(s); } catch(e){}
              });
              extraSeriesRef.current = [];
          };

          const drawIndicators = (upperData, lowerData, smaData) => {
              clearChartExtras();
              
              try {
                  const upperSeries = chartInstance.current.addLineSeries({ 
                      color: 'rgba(251, 113, 133, 0.6)', lineWidth: 2, lineStyle: 2, title: 'BUY LIQUIDITY' 
                  });
                  upperSeries.setData(upperData);
                  extraSeriesRef.current.push(upperSeries);

                  const lowerSeries = chartInstance.current.addLineSeries({ 
                      color: 'rgba(52, 211, 153, 0.6)', lineWidth: 2, lineStyle: 2, title: 'SELL LIQUIDITY' 
                  });
                  lowerSeries.setData(lowerData);
                  extraSeriesRef.current.push(lowerSeries);

                  const smaSeriesLine = chartInstance.current.addLineSeries({ 
                      color: 'rgba(234, 179, 8, 0.8)', lineWidth: 2, title: 'SMA 50' 
                  });
                  smaSeriesLine.setData(smaData);
                  extraSeriesRef.current.push(smaSeriesLine);
              } catch(e) {}
          };

          const drawEntryLine = (price) => {
            if (!candleSeries.current) return;
            try {
                const line = candleSeries.current.createPriceLine({
                    price: price, color: '#60a5fa', lineWidth: 2, lineStyle: 3, axisLabelVisible: true, title: `ВХОД (45М)`
                });
                priceLinesRef.current.push(line);
            } catch(e) {}
          };

          const updateStatus = (phase, colorClass) => {
              setAppPhase(phase);
              setStatusColorClass(colorClass);
          };

          const runTerminalEngine = async () => {
            if (engineActive.current) return;
            engineActive.current = true;

            if (audioCtx.current && audioCtx.current.state === 'suspended') {
                await audioCtx.current.resume();
            }

            let lastCancelledTime = 0;

            await speak('Адаптивный алгоритм активирован. Ограничения тренда сняты для максимального захвата разворотов. Выгружаю широкий 15-минутный график. Запускаю поиск институциональных следов за последние 24 часа.');
            
            // Инициализация широкого графика сразу
            await initChart();

            // БЭКТЕСТ (Статистика за 24 часа, 15M таймфрейм = 96 свечей. Берем 400 свечей для длинного графика)
            if (markersRef.current.length === 0) {
                updateStatus('СИНХРОНИЗАЦИЯ ЧЕСТНОЙ ИСТОРИИ...', 'text-sky-400');
                addLog(`ВЫГРУЗКА ШИРОКОГО ГРАФИКА (ТАЙМФРЕЙМ 15M)...`, true);

                const curAsset = ASSETS[0];
                const initialData = await ScannerAPI.getCandles(curAsset.symbol, 400, '15m'); 
                
                if (initialData && initialData.length > 300) {
                    currentPrice.current = initialData[initialData.length - 1].close;

                    const liqZones = calcLiquidityZones(initialData, 15); 
                    const atrSeries = calcATRSeries(initialData, 14); 
                    const smaSeries = calcSMA(initialData, 50);

                    const liqMap = new Map(liqZones.map(i => [i.time, {upper: i.upper, lower: i.lower}]));
                    const atrMap = new Map(atrSeries.map(i => [i.time, i.value]));
                    const smaMap = new Map(smaSeries.map(i => [i.time, i.value]));

                    const upperData = liqZones.map(i => ({time: i.time, value: i.upper}));
                    const lowerData = liqZones.map(i => ({time: i.time, value: i.lower}));
                    const smaFilteredData = smaSeries.filter(i => i.value !== null);

                    const totalHistoryCandlesToAnalyze = 96; // 24 часа для таймфрейма 15 минут (4 свечи в час)
                    const startIdx = initialData.length - totalHistoryCandlesToAnalyze; 
                    const endIdx = initialData.length - 4; 

                    let historicalWins = 0;
                    let historicalLosses = 0;
                    let lastTradeIdx = -999; // Отслеживаем индекс для кулдауна

                    // ЧЕСТНЫЙ СНАЙПЕРСКИЙ АНАЛИЗ (Тренд + Пинбар + Кулдаун 3 свечи)
                    for (let idx = startIdx; idx <= endIdx; idx++) {
                        const sig = checkSignal(idx, initialData, liqMap, atrMap, smaMap);

                        // КУЛДАУН: Пропускаем минимум 3 свечи (45 минут) между входами
                        if ((sig.isCall || sig.isPut) && (idx - lastTradeIdx > 3)) {
                            const entryIdx = idx + 1; 
                            const exitIdx = entryIdx + 3; // 45 мин экспирация (3 свечи)
                            if(exitIdx >= initialData.length) continue;
                            
                            const entryPrice = initialData[entryIdx].open;
                            const exitPrice = initialData[exitIdx].close;
                            
                            let isWin = false;
                            if ((sig.isCall && exitPrice > entryPrice) || (sig.isPut && exitPrice < entryPrice)) {
                                isWin = true;
                            }

                            // Маркеры рисуются на графике
                            markersRef.current.push({
                                time: initialData[entryIdx].time,
                                position: sig.isCall ? 'belowBar' : 'aboveBar',
                                color: sig.isCall ? '#38bdf8' : '#fb7185',
                                shape: sig.isCall ? 'arrowUp' : 'arrowDown',
                                text: 'ВХОД 45М',
                                size: 1
                            });
                            
                            markersRef.current.push({
                                time: initialData[exitIdx].time,
                                position: isWin ? 'aboveBar' : 'belowBar',
                                color: isWin ? '#10b981' : '#f43f5e',
                                shape: 'circle',
                                text: isWin ? 'ВИН (+)' : 'ЛОСС (-)',
                                size: 1
                            });

                            if(isWin) historicalWins++; else historicalLosses++;
                            
                            lastTradeIdx = exitIdx; // Обновляем индекс кулдауна
                            lastTradeTimeRef.current = initialData[entryIdx].time; // Синхронизируем
                            idx += 3; // Пропускаем свечи экспирации
                        }
                    }

                    const total = historicalWins + historicalLosses;
                    const wr = total > 0 ? Math.round((historicalWins / total) * 100) : 0;
                    
                    statsRef.current.wins = historicalWins;
                    statsRef.current.losses = historicalLosses;
                    setTradeStats({ wins: historicalWins, losses: historicalLosses, winRate: wr, total });

                    if (total > 0) {
                        addLog(`ЗА 24 ЧАСА НАЙДЕНО СИГНАЛОВ: ${total}, ВИНРЕЙТ ${wr}%`, true);
                    } else {
                        addLog(`ЗА 24 ЧАСА ИДЕАЛЬНЫХ СИГНАЛОВ НЕ БЫЛО. ЖДЕМ...`, true);
                    }

                    setAsset(curAsset);
                    
                    if (candleSeries.current) {
                        candleSeries.current.setData(initialData);
                        const sortedMarkers = [...markersRef.current].sort((a, b) => a.time - b.time);
                        candleSeries.current.setMarkers(sortedMarkers);
                        drawIndicators(upperData, lowerData, smaFilteredData);
                        
                        try { chartInstance.current.timeScale().fitContent(); } catch(e) {}
                    }

                    if (total > 0) {
                        playSound('win');
                        await speak(`Честный анализ истории завершен. График расширен. За 24 часа зафиксировано ${total} снайперских входов по тренду. Винрейт ${wr} процентов. Перехожу к сканированию рынка в реальном времени.`);
                    } else {
                        await speak(`Честный анализ завершен. За 24 часа идеальных сигналов по нашей логике не было. Перехожу к сканированию рынка в реальном времени.`);
                    }

                    updateStatus('ПРИМЕНЕНИЕ ИСТОРИИ НА ГРАФИК...', 'text-slate-400');
                    await new Promise(r => setTimeout(r, 4000));

                    setViewMode('SCREENER');
                    await new Promise(r => setTimeout(r, 1000));
                } else {
                    addLog("ОШИБКА: НЕТ СВЯЗИ С БИРЖЕЙ", true);
                    updateStatus('ОШИБКА API BINANCE', 'text-rose-500');
                    await speak('Ошибка связи. Попробуйте позже.');
                }
            }
            
            // ЛАЙВ-СКАНЕР
            while (engineActive.current) {
              try {
                  updateStatus('СКАНИРОВАНИЕ ЛИКВИДНОСТИ (15M)...', 'text-slate-400');
                  setViewMode('SCREENER');
                  setSignal(null);
                  setCurrentTF('15M');
                  
                  setMetrics(prev => ({ ...prev, filterLevel: 10, smartMoney: 15 }));

                  let signalFound = false;

                  for(let cur of ASSETS) {
                    if (!engineActive.current) break;
                    playSound('scan');
                    
                    // Скачиваем 400 свечей (15m)
                    const data = await ScannerAPI.getCandles(cur.symbol, 400, '15m'); 
                    
                    if (data && data.length > 300) {
                      const lastIdx = data.length - 1;
                      currentPrice.current = data[lastIdx].close; 

                      const liqZones = calcLiquidityZones(data, 15); 
                      const atrSeries = calcATRSeries(data, 14);    
                      const smaSeries = calcSMA(data, 50);

                      const liqMap = new Map(liqZones.map(i => [i.time, {upper: i.upper, lower: i.lower}]));
                      const atrMap = new Map(atrSeries.map(i => [i.time, i.value]));
                      const smaMap = new Map(smaSeries.map(i => [i.time, i.value]));

                      const upperData = liqZones.map(i => ({time: i.time, value: i.upper}));
                      const lowerData = liqZones.map(i => ({time: i.time, value: i.lower}));
                      const smaFilteredData = smaSeries.filter(i => i.value !== null);

                      let isCall = false;
                      let isPut = false;
                      let triggerCandleIdx = lastIdx;
                      let currentAtr = 1;

                      // Проверяем последние 2 свечи на сигнал (строгая функция checkSignal)
                      for (let j = 0; j < 2; j++) {
                          const idx = lastIdx - j;
                          const sig = checkSignal(idx, data, liqMap, atrMap, smaMap);
                          const currTime = data[idx].time;

                          // ЖИВОЙ КУЛДАУН: 45 минут (2700 секунд) с прошлой сделки
                          const isCooldown = (currTime - lastTradeTimeRef.current) < 2700;

                          if (sig.isPut && currTime !== lastCancelledTime && !isCooldown) {
                              isPut = true; triggerCandleIdx = idx; currentAtr = sig.cAtr; break;
                          }
                          if (sig.isCall && currTime !== lastCancelledTime && !isCooldown) {
                              isCall = true; triggerCandleIdx = idx; currentAtr = sig.cAtr; break;
                          }
                      }

                      // Обновляем ЖИВОЙ ШИРОКИЙ график
                      if(candleSeries.current) {
                          try { 
                              candleSeries.current.setData(data);
                              const sortedMarkers = [...markersRef.current].sort((a, b) => a.time - b.time);
                              candleSeries.current.setMarkers(sortedMarkers);
                          } catch (e) {}
                      }
                      drawIndicators(upperData, lowerData, smaFilteredData);

                      if (isCall || isPut) {
                          signalFound = true;
                          
                          setAsset(cur);
                          setViewMode('DETAIL');
                          
                          const structureValue = isCall ? 100 : 0;
                          setMetrics(prev => ({ ...prev, structure: structureValue, liquidity: 90, smartMoney: 85, volume: 80, buyPressure: isCall ? 85 : 15 }));

                          playSound('found');
                          currentPrice.current = data[lastIdx].close;
                          
                          const directionText = isCall ? "повышение" : "понижение";
                          
                          updateStatus(`ВНИМАНИЕ: СЛОМ СТРУКТУРЫ`, 'text-sky-400 font-bold animate-pulse');
                          addLog(`ЗАФИКСИРОВАНО СНЯТИЕ ЛИКВИДНОСТИ`, true);

                          await speak(`Внимание. Зафиксировано мощное снятие ликвидности по тренду на пятнадцатиминутном графике. Подготовьте Биткоин. Время сделки 45 минут. Направление на ${directionText}.`);

                          // ДАЕМ ТРЕЙДЕРУ 3 СЕКУНДЫ НА ПОДГОТОВКУ С КОНТРОЛЕМ ЦЕНЫ
                          updateStatus('СНАЙПЕР: КОНТРОЛЬ ЦЕНЫ ПЕРЕД ВХОДОМ', 'text-slate-200 font-bold animate-pulse');
                          addLog(`ЖДЕМ ПОДТВЕРЖДЕНИЯ (3 СЕК)...`, true);

                          for(let w=3; w>0; w--) {
                              updateStatus(`ПРОВЕРКА ИМПУЛЬСА... ${w}С`, 'text-sky-400 font-bold');
                              playSound('scan');
                              await new Promise(r => setTimeout(r, 1000));
                          }

                          // Контрольная проверка цены перед входом (защита от импульса против нас)
                          let tradeCancelled = false;
                          try {
                              const liveDataCheck = await ScannerAPI.getCandles(cur.symbol, 2, '1m'); 
                              const liveTick = liveDataCheck[liveDataCheck.length - 1];
                              
                              if (liveTick) {
                                  currentPrice.current = liveTick.close;
                                  if (candleSeries.current) { try { candleSeries.current.update(liveTick); } catch(e){} }
                                  
                                  // Если за 3 секунды цена улетела сильно против нас (на половину среднего ATR) - ОТМЕНА
                                  if (isCall && liveTick.close < (data[triggerCandleIdx].close - (currentAtr * 0.5))) tradeCancelled = true;
                                  if (isPut && liveTick.close > (data[triggerCandleIdx].close + (currentAtr * 0.5))) tradeCancelled = true;
                              }
                          } catch(e) {}

                          if (tradeCancelled) {
                              lastCancelledTime = data[triggerCandleIdx].time; 
                              playSound('cancel');
                              updateStatus('ОТМЕНА: РЕЗКИЙ ИМПУЛЬС ПРОТИВ НАС', 'text-rose-500 font-bold');
                              addLog(`СИГНАЛ ОТМЕНЕН: РЫНОК ПОШЕЛ ПРОТИВ НАС`, true);
                              await speak("Внимание. Отмена. Рынок резко пошел против нас во время подготовки. Возвращаюсь к радару.");
                              
                              await new Promise(r => setTimeout(r, 3500));
                              setViewMode('SCREENER');
                              break; 
                          }

                          playSound('start');
                          updateStatus('СИГНАЛ АКТИВЕН', 'text-sky-400 font-bold');
                          
                          // ФИКСИРУЕМ РЕАЛЬНЫЙ ВХОД СИНХРОННО ДЛЯ UI И ГРАФИКА
                          const entryPrice = currentPrice.current;
                          const entryTimeForMarker = Math.floor(Date.now() / 1000); 
                          const expMins = 45; // ЭКСПИРАЦИЯ 45 МИНУТ
                          
                          lastTradeTimeRef.current = entryTimeForMarker; // ЗАПУСКАЕМ КУЛДАУН СЕЙЧАС

                          // Появление стрелки в UI терминала
                          setSignal({ type: isCall ? 'CALL' : 'PUT', exp: expMins, entryPrice });
                          drawEntryLine(entryPrice);

                          // Появление маркера на графике СИНХРОННО
                          markersRef.current.push({
                              time: entryTimeForMarker,
                              position: isCall ? 'belowBar' : 'aboveBar',
                              color: isCall ? '#38bdf8' : '#fb7185',
                              shape: isCall ? 'arrowUp' : 'arrowDown',
                              text: 'ВХОД 45М',
                              size: 2
                          });
                          if(candleSeries.current) {
                              const sortedMarkers = [...markersRef.current].sort((a, b) => a.time - b.time);
                              candleSeries.current.setMarkers(sortedMarkers);
                          }

                          addLog(`СИГНАЛ ВЫПОЛНЕН: ВХОД ${isCall ? 'ВВЕРХ' : 'ВНИЗ'} НА 45 МИН.`, true);
                          speak(`Вход подтвержден. Жмите на ${directionText} на 45 минут!`);

                          let newsReadInThisTrade = false;
                          const readOneRealBtcNews = () => {
                             if(fullNewsPool.current.length === 0) { fetchNews(); return; }
                             const idx = Math.floor(Math.random() * fullNewsPool.current.length);
                             const textToRead = fullNewsPool.current.splice(idx, 1)[0].toLowerCase(); 
                             speak("Сводка: " + textToRead);
                          };

                          let expirySeconds = expMins * 60;
                          let isLive = true;
                          
                          const liveChartTask = (async () => {
                            let localLastTime = 0;
                            while (isLive && engineActive.current) {
                              await new Promise(r => setTimeout(r, 2000));
                              if (!isLive) break;
                              try {
                                const liveTickArray = await ScannerAPI.getCandles(cur.symbol, 2, '15m');
                                if (liveTickArray && liveTickArray.length > 0 && candleSeries.current) {
                                  liveTickArray.forEach(tick => {
                                    if (tick.time >= localLastTime && !isNaN(tick.close)) {
                                      try {
                                          candleSeries.current.update(tick);
                                          currentPrice.current = tick.close;
                                          localLastTime = Math.max(localLastTime, tick.time);
                                      } catch (err) {}
                                    }
                                  });
                                }
                              } catch (e) {}
                            }
                          })();

                          while(expirySeconds > 0) {
                            setCountdown(expirySeconds);
                            
                            if (expirySeconds === Math.floor((expMins * 60) / 2) && !newsReadInThisTrade) {
                                 readOneRealBtcNews();
                                 newsReadInThisTrade = true;
                            }

                            await new Promise(r => setTimeout(r, 1000));
                            expirySeconds--;
                          }
                          
                          isLive = false;
                          setCountdown(null);
                          updateStatus('АНАЛИЗ РЕЗУЛЬТАТА', 'text-slate-400');

                          const resultData = await ScannerAPI.getCandles(cur.symbol, 1, '1m');
                          let finalPrice = entryPrice;
                          if (resultData && resultData.length > 0) {
                              finalPrice = resultData[resultData.length - 1].close;
                          }
                          let isWin = false;

                          if ((isCall && finalPrice > entryPrice) || (isPut && finalPrice < entryPrice)) isWin = true;

                          // Записываем маркер ВЫХОДА
                          const exitTimeForMarker = Math.floor(Date.now() / 1000);
                          markersRef.current.push({
                              time: exitTimeForMarker,
                              position: isWin ? 'aboveBar' : 'belowBar',
                              color: isWin ? '#10b981' : '#f43f5e',
                              shape: 'circle',
                              text: isWin ? 'ВИН (+)' : 'ЛОСС (-)',
                              size: 2
                          });
                          if(candleSeries.current) {
                              const sortedMarkers = [...markersRef.current].sort((a, b) => a.time - b.time);
                              candleSeries.current.setMarkers(sortedMarkers);
                          }

                          if (isWin) {
                            playSound('win');
                            statsRef.current.wins++;
                          } else {
                            playSound('loss');
                            statsRef.current.losses++;
                          }

                          const newTotal = statsRef.current.wins + statsRef.current.losses;
                          const newWinRate = Math.round((statsRef.current.wins / newTotal) * 100);
                          setTradeStats({ wins: statsRef.current.wins, losses: statsRef.current.losses, winRate: newWinRate, total: newTotal });

                          if (isWin) {
                            addLog(`РЕЗУЛЬТАТ: ПЛЮС (+). ВЫХОД: ${formatPrice(finalPrice)}`);
                            await speak(`Плюс. Сделка на 45 минут успешно завершена. Обновляю статистику.`);
                          } else {
                            addLog(`РЕЗУЛЬТАТ: МИНУС (-).`);
                            await speak(`Минус. Ничего страшного, ждем следующий сигнал по тренду.`);
                          }

                          setSignal(null);
                          setMetrics(prev => ({ ...prev, smartMoney: 0 }));
                          await new Promise(r => setTimeout(r, 2000));
                          break; 
                      }
                    }
                  }
                  
                  if (!signalFound) {
                      await new Promise(r => setTimeout(r, 1500)); 
                  }
              } catch (e) {
                  addLog("ПЕРЕЗАПУСК РАДАРА...", true);
                  await new Promise(r => setTimeout(r, 3000));
              }
            }
          };

          const startTerminal = () => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx.current = new AudioContext();
            const osc = audioCtx.current.createOscillator();
            osc.connect(audioCtx.current.destination);

                       <div className="w-full h-4 bg-slate-700 rounded-full flex overflow-hidden relative shadow-[inset_0_2px_5px_rgba(0,0,0,0.3)] mt-2 border border-slate-600">
                           <div 
                             className="h-full bg-gradient-to-r from-indigo-500 to-sky-400 transition-all duration-1000 ease-out relative"
                             style={{ 
                                 width: `${tradeStats.total > 0 ? (tradeStats.wins / tradeStats.total) * 100 : 50}%`,

                           </div>
                           <div 
                             className="h-full bg-gradient-to-r from-rose-600 to-rose-400 transition-all duration-1000 ease-out relative"
                             style={{ 
                                 width: `${tradeStats.total > 0 ? (tradeStats.losses / tradeStats.total) * 100 : 50}%`,
                                 boxShadow: tradeStats.winRate < 50 && tradeStats.total > 0 ? '0 0 15px rgba(244,63,94,0.4)' : 'none'
                             }}
                           >
                              {tradeStats.winRate < 50 && tradeStats.total > 0 && <div className="absolute inset-0 bg-white/20 w-full animate-pulse"></div>}
                           </div>
                       </div>

                       <div className="flex justify-between items-center z-10 relative mt-2 oswald-font">
                           <div className="flex flex-col bg-slate-900/80 px-3 py-1.5 rounded-lg border border-slate-700">
                               <span className="text-[9px] md:text-[10px] text-slate-400 tracking-widest font-bold uppercase">ПРОФИТ</span>
                               <span className="text-xl md:text-2xl text-sky-400 font-black ios-text leading-none mt-0.5">{tradeStats.wins}</span>
                           </div>
                           <div className="text-[10px] text-slate-500 font-bold tracking-widest">ВСЕГО: {tradeStats.total}</div>
                           <div className="flex flex-col items-end bg-slate-900/80 px-3 py-1.5 rounded-lg border border-slate-700">
                               <span className="text-[9px] md:text-[10px] text-slate-400 tracking-widest font-bold uppercase">УБЫТОК</span>
                               <span className="text-xl md:text-2xl text-rose-500 font-black ios-text leading-none mt-0.5">{tradeStats.losses}</span>
                           </div>
                       </div>
                    </div>

                    <div className="glass-card rounded-2xl p-4 flex justify-between items-center shrink-0 relative overflow-hidden shadow-md border-slate-700 bg-gradient-to-r from-slate-800 to-slate-800/80">
                       <div className="absolute right-0 top-0 bottom-0 w-2/3 bg-[radial-gradient(ellipse_at_right,_rgba(56,189,248,0.1),_transparent)] pointer-events-none"></div>
                       <div className="flex flex-col relative z-10">
                          <span className="text-[9px] md:text-[10px] text-slate-400 tracking-widest font-bold leading-none uppercase">ЦЕНА ВХОДА</span>
                          <span className="text-xl md:text-2xl text-white mt-2 font-black mono-font leading-none drop-shadow-sm">
                            {signal && signal.entryPrice ? formatPrice(signal.entryPrice) : '---.-----'}
                          </span>
                       </div>
                       <div className="flex flex-col items-end relative z-10">
                          <span className="text-[9px] md:text-[10px] text-slate-400 tracking-widest flex items-center gap-1.5 font-bold leading-none uppercase">
                            <Clock size={12} className="text-sky-400"/> ЭКСПИРАЦИЯ
                          </span>
                          <span className="text-3xl md:text-4xl text-sky-400 mt-1 font-black mono-font tracking-wider leading-none drop-shadow-sm">
                            {countdown !== null ? `${Math.floor(countdown/60)}:${(countdown%60).toString().padStart(2,'0')}` : (signal && signal.exp ? `0${signal.exp}:00` : '--:--')}
                          </span>
                       </div>
                    </div>

                    <div ref={logsContainerRef} className="flex-1 glass-card rounded-2xl p-4 overflow-hidden flex flex-col justify-start gap-2 border-slate-700 bg-slate-900 shadow-[inset_0_2px_15px_rgba(0,0,0,0.3)]">
                      {logs.map((l, i) => (
                        <div key={i} className={`text-[10px] md:text-xs leading-snug tracking-widest font-semibold mono-font ${i === 0 ? 'text-white font-bold border-l-4 border-sky-400 pl-2 bg-sky-900/30 py-1 rounded-r shadow-sm' : 'text-slate-500 pl-2'}`}>
                          {l}
                        </div>
                      ))}
                    </div>
                    
                  </div>
                </div>
              </main>

              <footer className="h-auto md:h-12 py-2 md:py-0 border-t border-slate-700/50 flex flex-row items-center justify-between px-4 md:px-6 shrink-0 glass-panel z-40 bg-slate-900/90">
                <div className="flex items-center gap-2 text-slate-400 text-[10px] md:text-xs tracking-widest font-bold uppercase oswald-font">
                  <Shield size={14} className="text-sky-400 hidden sm:block" /> 
                  <span className="hidden sm:inline">256-BIT ШИФРОВАНИЕ СИСТЕМЫ • СОЕДИНЕНИЕ БЕЗОПАСНО</span>
                  <span className="inline sm:hidden">ЗАЩИТА АКТИВНА</span>
                </div>
                
                <div className="flex items-center gap-3 oswald-font">
                  <span className="text-slate-500 text-[10px] md:text-xs tracking-widest font-bold hidden sm:block uppercase">ЛИЦЕНЗИЯ:</span>
                  <span className="text-sky-100 text-[10px] md:text-xs px-3 py-1.5 rounded-lg bg-slate-800 tracking-widest font-bold text-center shadow-[0_4px_10px_rgba(0,0,0,0.3)] border border-slate-600">
                    КРИПТО ИНВЕСТ PRO MAX
                  </span>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
