        /* ================= BROKER BUTTON ================= */

                <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-[150%] group-hover:translate-x-[150%] transition-transform duration-700 ease-in-out skew-x-12"></div>

        /* ================= FINANCIAL UNIFICATION ================= */
        const TRADE_MONEY_CONFIG = { startBalance: 100000, stake: 1000, payout: 0.70 };

        function calculateTradingStats(trades, moneyConfig) {
            const closedTrades = trades.filter(t => t.status === "CLOSED" && (t.result === "WIN" || t.result === "LOSS") && Number.isFinite(t.entryTime) && Number.isFinite(t.exitTime));
            const wins = closedTrades.filter(t => t.result === "WIN").length;
            const losses = closedTrades.filter(t => t.result === "LOSS").length;
            const total = wins + losses;
            const winPnl = moneyConfig.stake * moneyConfig.payout;
            const lossPnl = -moneyConfig.stake;
            const pnl = (wins * winPnl) + (losses * lossPnl);
            const balance = moneyConfig.startBalance + pnl;
            const winrate = total > 0 ? Math.round((wins / total) * 100) : 0;
            return { trades: total, wins, losses, winrate, pnl, balance, stake: moneyConfig.stake, payout: moneyConfig.payout, winPnl, lossPnl };
        }

        /* ================= SCAN LEDGER MANAGER (PERSISTENT PARITY) ================= */
        const _inMemoryLedger = {};
        const ScanLedger = {
            get: (time) => {
                try {
                    const stored = localStorage.getItem('crypto_pro_max_scan_ledger');
                    if (stored) {
                        const parsed = JSON.parse(stored);
                        if (parsed[time]) return parsed[time];
                    }
                } catch(e) {}
                return _inMemoryLedger[time] || null;
            },
            set: (time, status) => {
                _inMemoryLedger[time] = status;
                try {
                    const stored = localStorage.getItem('crypto_pro_max_scan_ledger');
                    const parsed = stored ? JSON.parse(stored) : {};
                    parsed[time] = status;
                    const keys = Object.keys(parsed).sort((a,b) => b - a);
                    if(keys.length > 200) {
                        const newData = {};
                        keys.slice(0, 200).forEach(k => newData[k] = parsed[k]);
                        localStorage.setItem('crypto_pro_max_scan_ledger', JSON.stringify(newData));
                    } else {
                        localStorage.setItem('crypto_pro_max_scan_ledger', JSON.stringify(parsed));
                    }
                } catch(e) {
                    const keys = Object.keys(_inMemoryLedger).sort((a,b) => b - a);
                    if(keys.length > 200) {
                        const keysToRemove = keys.slice(0, keys.length - 200);
                        keysToRemove.forEach(k => delete _inMemoryLedger[k]);
                    }
                }
            }
        };

        const ASSETS = [{ pair: 'BTC/USDT', symbol: 'BTCUSDT', name: 'Bitcoin' }];

        const TOP_CRYPTO_MAP = {
            'BTCUSDT': 'Bitcoin', 'ETHUSDT': 'Ethereum', 'DOGEUSDT': 'Dogecoin', 'SOLUSDT': 'Solana',

        const plural = (number, titles) => {
            const cases = [2, 0, 1, 1, 1, 2];
            return titles[ (number%100>4 && number%100<20)? 2 : cases[(number%10<5)?number%10:5] ];

        const fetchWithTimeout = async (url, options = {}) => {
            const { timeout = 4000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch(e) { clearTimeout(id); throw e; }
        };

        const ScannerAPI = {
          async getCandles(symbol, count = 250, interval = '5m') { 
            const urls = [
                `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api1.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api2.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://data-api.binance.vision/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`
            ];
            for (let url of urls) {
                try {
                    let response = await fetchWithTimeout(url, { timeout: 3500 });
                    if (response.ok) {
                        const data = await response.json();
                        return data.map(d => ({
                            time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]),
                            low: parseFloat(d[3]), close: parseFloat(d[4]), volume: parseFloat(d[5])
                        }));
                    }
                } catch(e) { continue; }
            }
            return [];
          }
        };

        const formatPrice = (p) => {
            if (!p && p !== 0) return '0.00';
            if (p >= 1000) return p.toFixed(2);
            if (p >= 10) return p.toFixed(3);
            if (p >= 1) return p.toFixed(4);
            return p.toFixed(5);
        };

        function calcLiquidityZones(data, period = 30) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) { res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low }); continue; }
                let high = -Infinity; let low = Infinity;
                for (let j = 1; j <= period; j++) {
                    high = Math.max(high, data[i - j].high); low = Math.min(low, data[i - j].low);
                }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;
        }

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { res.push({time: data[i].time, value: data[i].high - data[i].low}); continue; }
                let sumTR = 0; let count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j]; const prevC = data[i - j - 1];
                    let tr = Math.max( c.high - c.low, Math.abs(c.high - prevC.close), Math.abs(c.low - prevC.close) );
                    sumTR += tr; count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;
        }

            if (!data || data.length < 30) return 'NEUTRAL';
            const zones = calcLiquidityZones(data, 20);
            const atrSeries = calcATRSeries(data, 14);
            const lastZone = zones[zones.length - 1];
            const cAtr = atrSeries[atrSeries.length - 1]?.value;
            
            if (!lastZone || !cAtr) return 'NEUTRAL';
            const distTop = lastZone.upper - currentPrice;
            const distBot = currentPrice - lastZone.lower;
            
            if (distTop < cAtr * 1.5) return 'BEARISH';

        /* ================= OPTIMIZED DETERMINISTIC SIGNAL ENGINE ================= */
        function evaluateSignalEngine(data, evalIdx, liqMap, atrMap, mtfContext, engineState) {
            if (evalIdx < 100) return { valid: false, reason: 'Not enough data' };

            const currCandle = data[evalIdx];
            const prevCandle = data[evalIdx - 1];
            const currTime = currCandle.time;
            
            const zones = liqMap.get(currTime);

            if (!zones || !cAtr) return { valid: false, reason: 'Missing indicators' };

            const cUpper = zones.upper;
            const cLower = zones.lower;
            const rangeWidth = cUpper - cLower;
            const isRangeValid = rangeWidth > (cAtr * 1.0); 

            if (!isRangeValid) return { valid: false, reason: 'Range too tight' };

            const body = Math.abs(currCandle.open - currCandle.close);
            const upperWick = currCandle.high - Math.max(currCandle.open, currCandle.close);
            const lowerWick = Math.min(currCandle.open, currCandle.close) - currCandle.low;

            const isRedCandle = currCandle.close < currCandle.open;
            const isGreenCandle = currCandle.close > currCandle.open;

            const sweptTop = currCandle.high >= cUpper;
            const returnedInsideTop = currCandle.close < cUpper;
            const structureBreakTop = currCandle.close < prevCandle.low && isRedCandle;

            const sweptBot = currCandle.low <= cLower;
            const returnedInsideBot = currCandle.close > cLower;
            const structureBreakBot = currCandle.close > prevCandle.high && isGreenCandle;

            const isNearTop = (cUpper - currCandle.high) < cAtr * 1.1;
            const isNearBot = (currCandle.low - cLower) < cAtr * 1.1;

            let isCall = false; let isPut = false; let signalType = ''; let baseScore = 0; let rawSignal = false;

            if (sweptTop && returnedInsideTop && structureBreakTop) { isPut = true; signalType = 'Primary Sweep'; baseScore = 45; rawSignal = true; }

            else if (currCandle.high >= cUpper && currCandle.close < cUpper && upperWick > cAtr * 0.2) { isPut = true; signalType = 'Edge Reaction'; baseScore = 35; rawSignal = true; } 
            else if (isNearTop && prevCandle.high > cUpper && isRedCandle && currCandle.close < prevCandle.close) { isPut = true; signalType = 'Liquidity Return'; baseScore = 40; rawSignal = true; }

            if (sweptBot && returnedInsideBot && structureBreakBot) { isCall = true; signalType = 'Primary Sweep'; baseScore = 45; rawSignal = true; } 
            else if (isNearBot && lowerWick > body * 1.1 && isGreenCandle) { isCall = true; signalType = 'Wick Rejection'; baseScore = 38; rawSignal = true; } 
            else if (currCandle.low <= cLower && currCandle.close > cLower && lowerWick > cAtr * 0.2) { isCall = true; signalType = 'Edge Reaction'; baseScore = 35; rawSignal = true; } 
            else if (isNearBot && prevCandle.low < cLower && isGreenCandle && currCandle.close > prevCandle.close) { isCall = true; signalType = 'Liquidity Return'; baseScore = 40; rawSignal = true; }

            if (!rawSignal) return { valid: false, reason: 'No raw signal pattern' };

            let qScore = baseScore; let mtfConfStr = 'WAIT'; let rejectReason = '';

            if (isCall) {
                if (mtfContext.h4 === 'BULLISH') qScore += 15;
                if (mtfContext.h1 === 'BULLISH') qScore += 15;
                if (mtfContext.m15 === 'BULLISH') { qScore += 15; mtfConfStr = 'CONFIRM'; }
                if (mtfContext.h4 === 'BEARISH' || mtfContext.h1 === 'BEARISH') { qScore -= 20; mtfConfStr = 'CONFLICT'; }
            } else {
                if (mtfContext.h4 === 'BEARISH') qScore += 15;
                if (mtfContext.h1 === 'BEARISH') qScore += 15;

                if (mtfContext.h4 === 'BULLISH' || mtfContext.h1 === 'BULLISH') { qScore -= 20; mtfConfStr = 'CONFLICT'; }
            }

            if (mtfConfStr === 'WAIT' || mtfContext.h4 === 'LOCAL' || mtfContext.status === 'LOCAL 5M MODE') {
                mtfConfStr = 'LOCAL 5M'; qScore += 20;

            let threshold = (signalType === 'Primary Sweep') ? 48 : 51;
            if (engineState.consecutiveLosses >= 2) threshold += 8;

            const midPoint = cLower + rangeWidth / 2;
            const distToMid = Math.abs(currCandle.close - midPoint);

            else { qScore -= 10; rejectReason = 'middle range'; }

            const distTopLate = cUpper - currCandle.close;
            const distBotLate = currCandle.close - cLower;
            if (isCall && distBotLate > cAtr * 0.45) { qScore -= 15; rejectReason = 'late entry'; }
            else if (isPut && distTopLate > cAtr * 0.45) { qScore -= 15; rejectReason = 'late entry'; }

            if (isPut && prevCandle.close > prevCandle.open && (prevCandle.close - prevCandle.open) > cAtr * 1.5) { qScore -= 15; rejectReason = 'impulse risk'; }

                                        profitZone.style.background = 'linear-gradient(to top, rgba(16,185,129,0.05), rgba(16,185,129,0.25))';

                                        profitZone.style.background = 'linear-gradient(to bottom, rgba(244,63,94,0.05), rgba(244,63,94,0.25))';
                                        profitLabel.innerHTML = '▼ ПРОФИТ';
                                        profitLabel.className = 'profit-label absolute bottom-1 left-1/2 -translate-x-1/2 text-[9px] font-black tracking-widest px-1 py-0.5 rounded text-rose-700 bg-rose-100/80 opacity-100';
                                    }
                                }
                            } else {
                                if (expiryLine) expiryLine.style.display = 'none';
                                if (profitZone) profitZone.style.display = 'none';
                            }

                        } else {
                            box.style.display = 'none';
                        }
                    });
                };

                const scheduleOverlaySync = () => {
                    if (overlaySyncRaf) return;
                    overlaySyncRaf = requestAnimationFrame(() => {
                        overlaySyncRaf = null;
                        syncPositions();
                    });
                };

                scheduleOverlaySync();

                chart.timeScale().subscribeVisibleLogicalRangeChange(scheduleOverlaySync);
                try { chart.timeScale().subscribeVisibleTimeRangeChange(scheduleOverlaySync); } catch(e){}
                chart.subscribeCrosshairMove(scheduleOverlaySync);

                let ro;
                if (window.ResizeObserver && overlayRef.current) {
                    ro = new ResizeObserver(scheduleOverlaySync); ro.observe(overlayRef.current);
                }

                return () => {
                    if (overlaySyncRaf) cancelAnimationFrame(overlaySyncRaf);
                    chart.timeScale().unsubscribeVisibleLogicalRangeChange(scheduleOverlaySync);
                    try { chart.timeScale().unsubscribeVisibleTimeRangeChange(scheduleOverlaySync); } catch(e){}
                    chart.unsubscribeCrosshairMove(scheduleOverlaySync);
                    if (ro) ro.disconnect();
                };
            }, [chart, series, trades, zoneInfo]);

            return (
                <div className="absolute inset-0 pointer-events-none z-40 overflow-hidden" ref={overlayRef}>
                    <div className="zone-pulse-indicator absolute pointer-events-none z-0" style={{ display: 'none' }}>
                        <div className="absolute inset-0 animate-pulse rounded-full opacity-50" />
                    </div>

                    {trades.map(trade => {
                        const isWinningLive = trade.isLive ? (trade.type === 'CALL' ? trade.exitPrice > trade.entryPrice : trade.exitPrice < trade.entryPrice) : false;
                        
                        return (
                        <div 
                            key={trade.id}
                            data-id={trade.id}
                            className={`trade-glass-box glass-box-trade absolute pointer-events-auto cursor-help group rounded-xl z-10 transition-colors duration-300 ${
                                trade.isLive 
                                    ? (isWinningLive ? 'border-emerald-500/60 shadow-[0_0_25px_rgba(16,185,129,0.25)]' : 'border-rose-500/60 shadow-[0_0_25px_rgba(244,63,94,0.25)]')
                                    : (trade.result === "WIN" ? 'trade-win hover:bg-emerald-500/20' : 'trade-loss hover:bg-rose-500/20')
                            }`}
                            style={{ display: 'none' }}
                            onMouseEnter={(e) => {
                                const rect = e.currentTarget.getBoundingClientRect();
                                setHoveredTrade({ trade, x: rect.left + rect.width / 2, y: rect.top - 10 });
                            }}
                            onMouseLeave={() => setHoveredTrade(null)}
                        >
                            <div className="profit-zone absolute left-0 right-0 z-0 pointer-events-none transition-all duration-300 rounded-xl overflow-hidden">
                                 <span className="profit-label"></span>
                            </div>
                            <div className="expiry-line absolute top-0 bottom-0 border-l border-dashed border-slate-400/80 z-10 pointer-events-none">
                                 <span className="absolute -left-3 -top-4 text-[7px] font-black tracking-widest text-slate-500 uppercase bg-white/90 px-1 py-0.5 rounded shadow-sm border border-slate-200">EXPIRY</span>
                            </div>

                            <div className="entry-dot-wrapper absolute w-0 h-0 z-20 transition-transform duration-300 group-hover:scale-125 flex items-center justify-center">
                                <div className={`absolute w-3 h-3 -ml-[6px] -mt-[6px] rounded-full shadow-[0_0_15px_currentColor] border-[2px] border-white ${trade.type === 'CALL' ? 'bg-cyan-500 text-cyan-400' : 'bg-orange-500 text-orange-400'}`}></div>
                                <span className={`absolute -ml-4 -top-7 text-[8px] px-2 py-0.5 rounded-md shadow-lg font-bold uppercase tracking-wider bg-slate-900 border ${trade.type === 'CALL' ? 'text-cyan-400 border-cyan-500/50' : 'text-orange-400 border-orange-500/50'} opacity-0 group-hover:opacity-100 transition-opacity`}>ENTRY</span>
                            </div>

                            <div className="exit-dot-wrapper absolute w-0 h-0 z-20 transition-transform duration-300 group-hover:scale-125 flex items-center justify-center">
                                <div className={`absolute w-3 h-3 -ml-[6px] -mt-[6px] rounded-full shadow-[0_0_15px_currentColor] border-[2px] border-white ${
                                    trade.isLive ? 'bg-blue-500 text-blue-400' : (trade.result === "WIN" ? 'bg-emerald-500 text-emerald-400' : 'bg-rose-500 text-rose-400')
                                }`}></div>
                                {trade.isLive && <div className="absolute w-6 h-6 -ml-[12px] -mt-[12px] rounded-full bg-blue-400/40 animate-ping opacity-60"></div>}
                                <span className={`absolute -ml-4 -top-7 text-[8px] px-2 py-0.5 rounded-md shadow-lg font-bold uppercase tracking-wider bg-slate-900 border ${
                                    trade.isLive ? 'text-blue-400 border-blue-500/50' : (trade.result === "WIN" ? 'text-emerald-400 border-emerald-500/50' : 'text-rose-400 border-rose-500/50')
                                } opacity-0 group-hover:opacity-100 transition-opacity`}>
                                    {trade.isLive ? 'ACTIVE' : 'EXIT'}
                                </span>
                            </div>

                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[9px] font-bold tracking-widest uppercase oswald-font bg-white/95 px-2 py-1 rounded shadow-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap text-slate-800 border border-slate-200 pointer-events-none backdrop-blur-md">
                                {trade.isLive ? 'ACTIVE TRADE' : `25 MIN • ${trade.result === "WIN" ? 'WIN' : 'LOSS'}`}
                            </div>
                        </div>
                    )})}

                    {hoveredTrade && (
                        <div 
                            className="fixed z-50 premium-glass-card rounded-2xl p-4 pointer-events-none transform -translate-x-1/2 -translate-y-full min-w-[220px]"
                            style={{ left: hoveredTrade.x, top: hoveredTrade.y }}
                        >
                            <div className="flex justify-between items-center mb-3 border-b border-slate-200/60 pb-2">
                                <span className={`text-xs font-black tracking-widest oswald-font px-2.5 py-1 rounded-md ${hoveredTrade.trade.type === 'CALL' ? 'bg-cyan-100 text-cyan-700 shadow-[inset_0_1px_3px_rgba(255,255,255,0.8)]' : 'bg-orange-100 text-orange-700 shadow-[inset_0_1px_3px_rgba(255,255,255,0.8)]'}`}>
                                    {hoveredTrade.trade.type}
                                </span>
                                <span className={`text-xs font-black tracking-widest oswald-font px-2.5 py-1 rounded-md ${
                                    hoveredTrade.trade.isLive ? 'bg-blue-100 text-blue-700 shadow-[inset_0_1px_3px_rgba(255,255,255,0.8)]' : (hoveredTrade.trade.result === "WIN" ? 'bg-emerald-100 text-emerald-700 shadow-[inset_0_1px_3px_rgba(255,255,255,0.8)]' : 'bg-rose-100 text-rose-700 shadow-[inset_0_1px_3px_rgba(255,255,255,0.8)]')
                                }`}>
                                    {hoveredTrade.trade.isLive ? 'ACTIVE' : (hoveredTrade.trade.result === "WIN" ? 'WIN' : 'LOSS')}
                                </span>
                            </div>
                            <div className="grid grid-cols-2 gap-x-6 gap-y-1.5 text-[10px] md:text-xs mono-font font-semibold">
                                <span className="text-slate-500">Сигнал:</span><span className="text-right text-slate-800">{new Date(hoveredTrade.trade.signalTime * 1000).toLocaleTimeString('ru-RU')}</span>
                                <span className="text-slate-500">Вход:</span><span className="text-right text-slate-800">{new Date(hoveredTrade.trade.entryTime * 1000).toLocaleTimeString('ru-RU')}</span>
                                <span className="text-slate-500">Выход (25м):</span><span className="text-right text-slate-800">{new Date(hoveredTrade.trade.exitTime * 1000).toLocaleTimeString('ru-RU')}</span>
                                <span className="col-span-2 text-center text-slate-400 mt-1 mb-1 text-[9px] uppercase tracking-widest">ДАННЫЕ</span>
                                <span className="text-slate-500">Цена Входа:</span><span className="text-right text-slate-800">{hoveredTrade.trade.entryPrice.toFixed(2)}</span>
                                <span className="text-slate-500">Цена Выхода:</span><span className="text-right text-slate-800">{hoveredTrade.trade.exitPrice.toFixed(2)}</span>
                                <span className="text-slate-500 mt-1 pt-1 border-t border-slate-200">Ставка:</span><span className="text-right text-slate-800 mt-1 pt-1 border-t border-slate-200">{hoveredTrade.trade.betAmount || 1000} ₽</span>
                                <span className="text-slate-500 mt-1 uppercase font-bold">Итог:</span>
                                <span className={`text-right font-black mt-1 text-sm ${hoveredTrade.trade.isLive ? 'text-blue-600' : (hoveredTrade.trade.result === "WIN" ? 'text-emerald-600' : 'text-rose-600')}`}>
                                    {hoveredTrade.trade.isLive ? 'В ПРОЦЕССЕ' : ((hoveredTrade.trade.result === "WIN" ? '+' : '') + (hoveredTrade.trade.result === "WIN" ? Math.round((hoveredTrade.trade.betAmount || 1000)*0.7) : -(hoveredTrade.trade.betAmount || 1000)) + ' ₽')}
                                </span>
                            </div>
                            <div className="mt-3 pt-2 border-t border-slate-200/60 text-center text-[9px] text-slate-400 font-bold uppercase tracking-widest">
                                PURE 5M MODE • Q-SCORE: {hoveredTrade.trade.quality || 'N/A'}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
          const [isStarted, setIsStarted] = useState(false);
          const [isTransitioning, setIsTransitioning] = useState(false);
          
          const [appPhase, setAppPhase] = useState('СИНХРОНИЗАЦИЯ...');
          const [viewMode, setViewMode] = useState('SCREENER'); 
          const [asset, setAsset] = useState(ASSETS[0]);
          const [sparklines, setSparklines] = useState({});
          
          const [signalPhase, setSignalPhase] = useState('NONE'); 
          const [signal, setSignal] = useState(null);
          
          const [countdown, setCountdown] = useState(null); 
          const [logs, setLogs] = useState([]);
          const [currentTF, setCurrentTF] = useState('5M');
          const [zoneState, setZoneState] = useState('OUT');
          const [zoneInfo, setZoneInfo] = useState(null); 
          
          const [metrics, setMetrics] = useState({ structure: 50, liquidity: 50, filterLevel: 1.0, smartMoney: 0, buyPressure: 50 });
          const [mtfContext, setMtfContext] = useState({ h4: 'WAIT', h1: 'WAIT', m15: 'WAIT', score: '--', status: 'LOADING' });
          const [cryptoQuotes, setCryptoQuotes] = useState([]);
          
          const [tradesHistory, setTradesHistory] = useState([]);
          const [activeLiveTrade, setActiveLiveTrade] = useState(null);

          const [pureDiag, setPureDiag] = useState({
              candles: 0, sweepHigh: 0, sweepLow: 0, reclaimBuy: 0, reclaimSell: 0, candidates: 0, confirmed: 0, rejected: 0, rendered: 0, boxes: 0, lastReason: 'None'
          });
          
          const [statusColorClass, setStatusColorClass] = useState('text-slate-800');
          const [dataHealth, setDataHealth] = useState({ age: 0, status: 'LIVE' });
          const lastDataTimeRef = useRef(Date.now());
          
          const chartContainerRef = useRef(null);
          const chartInstance = useRef(null);
          const candleSeries = useRef(null);
          const extraSeriesRef = useRef([]); 
          const priceLinesRef = useRef([]);  
          
          const audioCtx = useRef(null);
          const engineActive = useRef(false);
          const currentPrice = useRef(null);
          
          const historicalMarkersRef = useRef([]); 
          const liveMarkersRef = useRef([]);
          
          const zoneStateRef = useRef('OUT'); 
          const zoneCooldownUntilRef = useRef(0);
          
          const signalPhaseRef = useRef('NONE');
          const logsContainerRef = useRef(null); 
          const cryptoQuotesRef = useRef([]);

          const consecutiveLossesRef = useRef(0);
          const lastSignalTimeRef = useRef(0);
          const lastSignalPriceRef = useRef(0);

          const lastEvaluatedCandleTimeRef = useRef(0);
          const lastClosedCandleTimeUiRef = useRef(0);

          let cachedMtfRef = useRef({ h4: 'NEUTRAL', h1: 'NEUTRAL', m15: 'NEUTRAL', score: '--', status: 'LOADING' });
          let lastMtfFetchRef = useRef(0);

          const speechQueueRef = useRef([]);
          const isSpeakingRef = useRef(false);
          const lastSpokenKeysRef = useRef({});

          const enqueueSpeech = (text, key = null, priority = 1, onDone = null) => {
              if (key) {
                  if (speechQueueRef.current.some(item => item.key === key)) { if (onDone) onDone(); return; }
                  const now = Date.now();
                  if (lastSpokenKeysRef.current[key] && (now - lastSpokenKeysRef.current[key]) < 30000) { if (onDone) onDone(); return; }
              }
              speechQueueRef.current.push({ text, key, priority, onDone });
              speechQueueRef.current.sort((a, b) => a.priority - b.priority); 
              processSpeechQueue();
          };

          const speakAsync = (text, key = null, priority = 1) => new Promise(resolve => enqueueSpeech(text, key, priority, resolve));

          const processSpeechQueue = () => {
              if (isSpeakingRef.current || speechQueueRef.current.length === 0) return;
              isSpeakingRef.current = true;
              const item = speechQueueRef.current.shift();
              if (item.key) lastSpokenKeysRef.current[item.key] = Date.now();

              const utterance = new SpeechSynthesisUtterance(item.text);
              utterance.lang = 'ru-RU'; utterance.rate = 1.05; utterance.pitch = 0.95;

              let isFinished = false; let fallbackTimeout;
              const completeSpeech = () => {
                  if (isFinished) return;
                  isFinished = true; clearTimeout(fallbackTimeout); isSpeakingRef.current = false;
                  if (item.onDone) item.onDone(); setTimeout(processSpeechQueue, 300); 
              };

              utterance.onend = completeSpeech; utterance.onerror = completeSpeech;

              try {
                  window.speechSynthesis.cancel(); 
                  setTimeout(() => {
                      window.speechSynthesis.speak(utterance);
                      fallbackTimeout = setTimeout(() => {
                          if (!isFinished) { window.speechSynthesis.cancel(); completeSpeech(); }
                      }, Math.max(5000, item.text.length * 150));
                  }, 50);
              } catch (e) { completeSpeech(); }
          };

          const awaitSpeechCompletion = () => new Promise(resolve => {
              const check = setInterval(() => {
                  if (!isSpeakingRef.current && speechQueueRef.current.length === 0) { clearInterval(check); resolve(); }
              }, 400);
          });

          const fetchCryptoQuotes = async () => {
              try {
                  const res = await fetchWithTimeout('https://api.binance.com/api/v3/ticker/24hr', {timeout: 4000});
                  if (res.ok) {
                      const data = await res.json();
                      const filtered = data.filter(item => TOP_CRYPTO_MAP[item.symbol]);
                      const formatted = filtered.map(item => ({
                          symbol: item.symbol.replace('USDT', ''), name: TOP_CRYPTO_MAP[item.symbol],
                          price: parseFloat(item.lastPrice), change: parseFloat(item.priceChangePercent)
                      })).sort((a, b) => b.price - a.price);
                      if (formatted.length > 0) { cryptoQuotesRef.current = formatted; setCryptoQuotes(formatted); }
                  } else { if (cryptoQuotesRef.current.length === 0) setCryptoQuotes([]); }
              } catch (e) { if (cryptoQuotesRef.current.length === 0) setCryptoQuotes([]); }
          };

          useEffect(() => {
              if (!isStarted) return;
              const voiceTimer = setInterval(() => {
                  if (cryptoQuotesRef.current && cryptoQuotesRef.current.length > 0 && signalPhaseRef.current === 'NONE') {
                      const idx = Math.floor(Math.random() * cryptoQuotesRef.current.length); const q = cryptoQuotesRef.current[idx];
                      if (q.price === 0) return;
                      const changeWord = q.change >= 0 ? 'выросла на' : 'снизилась на'; const changeVal = Math.abs(q.change).toFixed(1);
                      const intPrice = Math.floor(q.price); const pStr = plural(Math.round(Math.abs(q.change)), ['процент', 'процента', 'процентов']);
                      const text = `${q.name} сейчас торгуется около ${intPrice} долларов. За последние 24 часа цена ${changeWord} ${changeVal} ${pStr}.`;
                      enqueueSpeech(text, `quote-update-${q.symbol}`, 4);
                  }
              }, 10 * 60 * 1000); 
              return () => clearInterval(voiceTimer);
          }, [isStarted]);

          useEffect(() => {
            if(!isStarted) return;
            const healthTimer = setInterval(() => {
                const age = Math.floor((Date.now() - lastDataTimeRef.current) / 1000);
                setDataHealth({ age, status: age > 90 ? 'STALE' : 'LIVE' });
            }, 1000);

            const interval = setInterval(() => {
                setMetrics(prev => ({
                    ...prev,
                    smartMoney: prev.smartMoney > 0 ? Math.max(0, Math.min(100, prev.smartMoney + (Math.random() * 2 - 1))) : 0,
                    liquidity: Math.max(0, Math.min(100, prev.liquidity + (Math.random() - 0.5) * 4)),
                    buyPressure: Math.max(20, Math.min(80, prev.buyPressure + (Math.random() - 0.5) * 6))
                }));
            }, 1000);
            return () => { clearInterval(interval); clearInterval(healthTimer); };
          }, [isStarted]);

          useEffect(() => {
              const loadSparklines = async () => {
                  const data = await ScannerAPI.getCandles('BTCUSDT', 50, '5m'); 
                  if (data && data.length > 0) { setSparklines({'BTCUSDT': data}); currentPrice.current = data[data.length - 1].close; }
              };
              loadSparklines();
          }, []);

          useEffect(() => {
            fetchCryptoQuotes();
            const quotesInterval = setInterval(fetchCryptoQuotes, 60 * 1000); 
            return () => clearInterval(quotesInterval);
          }, []);

          const addLog = (msg, isAi = false) => {
            const prefix = isAi ? 'SMC АНАЛИЗ:' : 'СИСТЕМА:'; setLogs(p => [`${prefix} ${msg}`, ...p].slice(0, 5)); 
          };

          const playSound = (type) => {
            if (!audioCtx.current) return;
            const ctx = audioCtx.current; if (ctx.state === 'suspended') ctx.resume();
            
            const playTone = (freq, oscType, dur, vol, delay = 0) => {
                try {
                    const o = ctx.createOscillator(); const g = ctx.createGain(); o.type = oscType;
                    o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
                    g.gain.setValueAtTime(0, ctx.currentTime + delay);
                    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(ctx.currentTime + delay); o.stop(ctx.currentTime + delay + dur);
                } catch (e) {}
            };

            if (type === 'scan') playTone(1200 + Math.random()*300, 'sine', 0.03, 0.005);
            if (type === 'found') { playTone(600, 'triangle', 0.1, 0.03); playTone(800, 'triangle', 0.1, 0.03, 0.1); }
            if (type === 'start') { playTone(523.25, 'sine', 0.4, 0.03); playTone(659.25, 'sine', 0.5, 0.03, 0.1); playTone(783.99, 'sine', 0.6, 0.04, 0.2); }
            if (type === 'win') { playTone(523.25, 'triangle', 0.4, 0.04); playTone(659.25, 'triangle', 0.5, 0.04, 0.1); playTone(783.99, 'triangle', 0.8, 0.05, 0.2); }
            if (type === 'loss') { playTone(300, 'sawtooth', 0.4, 0.03); playTone(250, 'sawtooth', 0.6, 0.04, 0.2); }
            if (type === 'cancel') { playTone(400, 'square', 0.1, 0.04); playTone(300, 'square', 0.2, 0.04, 0.15); }
          };

          const initChart = async () => {
            if (!chartContainerRef.current) return;
            if (!window.LightweightCharts) {
              await new Promise(resolve => {
                const script = document.createElement('script'); script.src = 'https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js';
                script.onload = resolve; document.head.appendChild(script);
              });
            }
            if (chartInstance.current) return;

            try {
                const mainChart = window.LightweightCharts.createChart(chartContainerRef.current, {
                  autoSize: true,
                  layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#475569', fontFamily: 'JetBrains Mono' },
                  grid: { vertLines: { color: 'rgba(148, 163, 184, 0.2)' }, horzLines: { color: 'rgba(148, 163, 184, 0.2)' } },
                  timeScale: { borderVisible: false, timeVisible: true, secondsVisible: false }, rightPriceScale: { borderVisible: false }
                });
                candleSeries.current = mainChart.addCandlestickSeries({ upColor: '#0ea5e9', downColor: '#ef4444', borderVisible: true, borderUpColor: '#0ea5e9', borderDownColor: '#ef4444', wickUpColor: '#0ea5e9', wickDownColor: '#ef4444' });
                chartInstance.current = mainChart;
            } catch(e) {}
          };

          const clearChartExtras = () => {
              if (!chartInstance.current || !candleSeries.current) return;
              priceLinesRef.current.forEach(l => { try { candleSeries.current.removePriceLine(l); } catch(e){} }); priceLinesRef.current = [];
              extraSeriesRef.current.forEach(s => { try { chartInstance.current.removeSeries(s); } catch(e){} }); extraSeriesRef.current = [];
          };

          const drawIndicators = (upperData, lowerData) => {
              clearChartExtras();
              try {
                  const upperSeries = chartInstance.current.addLineSeries({ color: 'rgba(244, 63, 94, 0.5)', lineWidth: 2, lineStyle: 2, title: 'BUY LIQUIDITY' });
                  upperSeries.setData(upperData); extraSeriesRef.current.push(upperSeries);
                  const lowerSeries = chartInstance.current.addLineSeries({ color: 'rgba(16, 185, 129, 0.5)', lineWidth: 2, lineStyle: 2, title: 'SELL LIQUIDITY' });
                  lowerSeries.setData(lowerData); extraSeriesRef.current.push(lowerSeries);
              } catch(e) {}
          };

          const updateStatus = (phase, colorClass) => { setAppPhase(phase); setStatusColorClass(colorClass); };

          const syncModeView = () => {
              if (zoneStateRef.current === 'OUT' && signalPhaseRef.current === 'NONE') setViewMode('SCREENER');
              else setViewMode('DETAIL');
          };

          const fetchMtfContext = async (symbol, currentPriceVal) => {
              try {
                  const [data4h, data1h, data15m] = await Promise.all([ ScannerAPI.getCandles(symbol, 60, '4h'), ScannerAPI.getCandles(symbol, 60, '1h'), ScannerAPI.getCandles(symbol, 60, '15m') ]);
                  const h4 = data4h.length > 0 ? getHTFBias(data4h, currentPriceVal) : 'LOCAL';
                  const h1 = data1h.length > 0 ? getHTFBias(data1h, currentPriceVal) : 'LOCAL';
                  const m15 = data15m.length > 0 ? getHTFBias(data15m, currentPriceVal) : 'LOCAL';
                  cachedMtfRef.current = { h4, h1, m15, status: 'LOADED' }; setMtfContext(prev => ({ ...prev, h4, h1, m15, status: 'LOADED' }));
              } catch (e) {
                  cachedMtfRef.current = { h4: 'LOCAL', h1: 'LOCAL', m15: 'LOCAL', status: 'LOCAL 5M MODE' };
                  setMtfContext(prev => ({ ...prev, h4: 'LOCAL', h1: 'LOCAL', m15: 'LOCAL', status: 'LOCAL 5M MODE' }));
              }
          };

          const updateChartMarkers = () => {
              if (!candleSeries.current) return;
              try { const allMarkers = [...historicalMarkersRef.current, ...liveMarkersRef.current]; allMarkers.sort((a, b) => a.time - b.time); candleSeries.current.setMarkers(allMarkers); } catch (e) {}
          };

          const runTerminalEngine = async () => {
            if (engineActive.current) return; engineActive.current = true;

                          <span className="text-3xl md:text-4xl text-cyan-700 mt-1 font-black mono-font tracking-wider leading-none drop-shadow-sm">
                            {signalPhase === 'ACTIVE' && countdown !== null 
                                ? `${Math.floor(countdown/60).toString().padStart(2,'0')}:${(countdown%60).toString().padStart(2,'0')}` 
                                : (signalPhase === 'ACTIVE' && signal && signal.exp ? `${signal.exp}:00` : '--:--')}
                          </span>
                       </div>
                    </div>

                    <div className="flex-1 glass-card rounded-2xl overflow-hidden flex flex-col justify-start border-white bg-white shadow-[inset_0_2px_15px_rgba(0,0,0,0.02)]">
                      <div className="bg-slate-100/80 px-3 py-1.5 flex justify-between items-center border-b border-slate-200/60 mb-1 shrink-0">
                          <span className="text-[8px] md:text-[9px] font-bold text-slate-500 uppercase tracking-widest flex items-center gap-1"><BugIcon size={10}/> PURE 5M DEBUG</span>
                          <span className="text-[8px] font-bold text-emerald-600">PARITY: PROTECTED</span>
                      </div>
                      <div className="px-3 pb-1 shrink-0 grid grid-cols-2 gap-1 text-[8px] md:text-[9px] mono-font font-semibold text-slate-500 border-b border-slate-200/40 mb-1">
                          <span className="text-cyan-700">L.C: {new Date(lastClosedCandleTimeUiRef.current * 1000).toLocaleTimeString('ru-RU')}</span>
                          <span className="text-rose-600">REJECTS: {pureDiag.rejected}</span>
                      </div>
                      <div className="px-3 pb-2 pt-1 shrink-0 text-[8px] mono-font text-rose-500 font-bold border-b border-slate-200/40">
                          LAST REJECT: {pureDiag.lastReason}
                      </div>
                      <div ref={logsContainerRef} className="px-4 pb-4 flex flex-col gap-2 overflow-y-auto mt-2">
                          {logs.map((l, i) => (
                            <div key={i} className={`text-[9px] md:text-[11px] leading-tight tracking-widest font-semibold mono-font ${i === 0 ? 'text-slate-900 font-bold border-l-4 border-cyan-500 pl-2 bg-cyan-50/50 py-1 rounded-r shadow-sm' : 'text-slate-400 pl-2'}`}>
                              {l}
                            </div>
                          ))}
                      </div>
                    </div>
                    
                  </div>
                </div>
              </main>

              <footer className="h-auto md:h-12 py-2 md:py-0 border-t border-white/50 flex flex-row items-center justify-between px-4 md:px-6 shrink-0 glass-panel z-40 bg-white/90">
                <div className="flex items-center gap-2 text-slate-500 text-[10px] md:text-xs tracking-widest font-bold uppercase oswald-font">
                  <Shield size={14} className="text-cyan-600 hidden sm:block" /> 
                  <span className="hidden sm:inline">256-BIT ШИФРОВАНИЕ СИСТЕМЫ • СОЕДИНЕНИЕ БЕЗОПАСНО</span>
                  <span className="inline sm:hidden">ЗАЩИТА АКТИВНА</span>
                </div>
                
                <div className="flex items-center gap-3 md:gap-4 oswald-font">
                  <div className="silver-badge flex flex-col items-center justify-center px-2.5 py-1 rounded-lg">
                      <span className="text-[6px] md:text-[7px] text-slate-500 font-black tracking-[0.2em] uppercase leading-none mb-0.5">PRO MAX CREATOR</span>
                      <span className="text-[10px] md:text-[11px] font-black tracking-widest silver-text leading-none">SLAVA GORDEEV</span>
                  </div>
                  <span className="text-slate-300 text-[10px] hidden md:block">|</span>
                  <span className="text-slate-500 text-[10px] md:text-xs tracking-widest font-bold hidden sm:block uppercase">ЛИЦЕНЗИЯ:</span>
                  <span className="text-white text-[10px] md:text-xs px-3 py-1.5 rounded-lg bg-slate-900 tracking-widest font-bold text-center shadow-[0_4px_10px_rgba(15,23,42,0.2)] border border-slate-700">
                    КРИПТО ИНВЕСТ PRO MAX
                  </span>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
