        function calcLiquidityZones(data, period = 30) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) { res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low }); continue; }
                let high = -Infinity; let low = Infinity;
                for (let j = 1; j <= period; j++) {
                    high = Math.max(high, data[i - j].high); low = Math.min(low, data[i - j].low);
                }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { res.push({time: data[i].time, value: data[i].high - data[i].low}); continue; }
                let sumTR = 0; let count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j]; const prevC = data[i - j - 1];
                    let tr = Math.max( c.high - c.low, Math.abs(c.high - prevC.close), Math.abs(c.low - prevC.close) );
                    sumTR += tr; count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;

        // --- ENHANCED BALANCED SIGNAL ENGINE WITH STRICT SWITCH & RELAXED FILTERS ---
        function evaluateSignalEngine(data, evalIdx, liqMap, atrMap, mtfContext, engineState) {
            if (evalIdx < 100) return { valid: false, reason: 'Not enough data', score: 0 };

            const currCandle = data[evalIdx];

            const currTime = currCandle.time;

            const isRedCandle = currCandle.close < currCandle.open;
            const isGreenCandle = currCandle.close > currCandle.open;

            const candleRange = currCandle.high - currCandle.low;
            const upperWickRatio = candleRange > 0 ? upperWick / candleRange : 0;
            const lowerWickRatio = candleRange > 0 ? lowerWick / candleRange : 0;

            const returnedInsideBot = currCandle.close > cLower;

            const wickMult = isForcedPut || isForcedCall ? 0.25 : 0.40;

            const strictMsbPut = isRedCandle && (currCandle.close < prevCandle.low) && (body > cAtr * atrMult);
            const strictMsbCall = isGreenCandle && (currCandle.close > prevCandle.high) && (body > cAtr * atrMult);

            const massiveWickPut = upperWick > cAtr * wickMult && upperWickRatio > wickMult && returnedInsideTop;
            const massiveWickCall = lowerWick > cAtr * wickMult && lowerWickRatio > wickMult && returnedInsideBot;

            let strongBullImpulse = false;
            let strongBearImpulse = false;

            let isCall = false; let isPut = false; let signalType = ''; let baseScore = 0;

                if (strictMsbPut) { isPut = true; signalType = 'SMC Sweep & MSB'; baseScore = 65; }

            }

                if (strictMsbCall) { isCall = true; signalType = 'SMC Sweep & MSB'; baseScore = 65; }
                else if (massiveWickCall) { isCall = true; signalType = 'Rejection Wick'; baseScore = 60; }
            }

            // ЖЁСТКАЯ БЛОКИРОВКА НЕПРИОРИТЕТНЫХ СИГНАЛОВ
            let rejectReason = '';
            if (isForcedCall && isPut) {
                isPut = false;
                rejectReason = 'Direction Override (Strict CALL Priority)';
            }
            if (isForcedPut && isCall) {
                isCall = false;
                rejectReason = 'Direction Override (Strict PUT Priority)';
            }

            if (!isCall && !isPut) return { valid: false, reason: rejectReason || 'No strict SMC setup', score: 0 };
            if (isCall && isPut) return { valid: false, reason: 'Conflicting signals', score: 0 };

            let qScore = baseScore;

          // Voice engine
          const enqueueSpeech = useCallback((text, key = null, priority = 1, onDone = null) => {
              if (key) {
                  if (speechQueueRef.current.some(item => item.key === key)) { if (onDone) onDone(); return; }
                  const now = Date.now();
                  if (lastSpokenKeysRef.current[key] && (now - lastSpokenKeysRef.current[key]) < 30000) { if (onDone) onDone(); return; }
                  lastSpokenKeysRef.current[key] = now; 
              }
              speechQueueRef.current.push({ text, key, priority, onDone });
              speechQueueRef.current.sort((a, b) => a.priority - b.priority); 
              processSpeechQueue();
          }, []);

          const speakAsync = useCallback((text, key = null, priority = 1) => new Promise(resolve => enqueueSpeech(text, key, priority, resolve)), [enqueueSpeech]);

          const processSpeechQueue = () => {
              if (isSpeakingRef.current || speechQueueRef.current.length === 0) return;
              isSpeakingRef.current = true;
              const item = speechQueueRef.current.shift();
              if (item.key) lastSpokenKeysRef.current[item.key] = Date.now();

              const utterance = new SpeechSynthesisUtterance(item.text);
              utterance.lang = 'ru-RU'; utterance.rate = 1.05; utterance.pitch = 0.95;

              let isFinished = false; let fallbackTimeout;
              const completeSpeech = () => {
                  if (isFinished) return;
                  isFinished = true; clearTimeout(fallbackTimeout); isSpeakingRef.current = false;
                  if (item.onDone) item.onDone(); setTimeout(processSpeechQueue, 300); 
              };

              utterance.onend = completeSpeech; utterance.onerror = completeSpeech;

              try {
                  window.speechSynthesis.cancel(); 
                  setTimeout(() => {
                      window.speechSynthesis.speak(utterance);
                      fallbackTimeout = setTimeout(() => {
                          if (!isFinished) { window.speechSynthesis.cancel(); completeSpeech(); }
                      }, Math.max(5000, item.text.length * 150));
                  }, 50);
              } catch (e) { completeSpeech(); }
          };

          const awaitSpeechCompletion = () => new Promise(resolve => {
              const check = setInterval(() => {
                  if (!isSpeakingRef.current && speechQueueRef.current.length === 0) { clearInterval(check); resolve(); }
              }, 400);

          const fetchCryptoQuotes = async () => {

                          price: parseFloat(item.lastPrice), change: parseFloat(item.priceChangePercent)
                      })).sort((a, b) => b.price - a.price);
                      if (formatted.length > 0) { cryptoQuotesRef.current = formatted; setCryptoQuotes(formatted); }
                  } else { if (cryptoQuotesRef.current.length === 0) setCryptoQuotes([]); }
              } catch (e) { if (cryptoQuotesRef.current.length === 0) setCryptoQuotes([]); }
          };

          useEffect(() => {

                      const text = `${q.name} сейчас торгуется около ${intPrice} долларов. За последние 24 часа цена ${changeWord} ${changeVal} ${pStr}.`;
                      enqueueSpeech(text, `quote-update-${q.symbol}`, 4);

          const addLog = useCallback((msg, isAi = false) => {

          const playSound = useCallback((type) => {
            if (!audioCtx.current) return;
            const ctx = audioCtx.current; if (ctx.state === 'suspended') ctx.resume();
            
            const playTone = (freq, oscType, dur, vol, delay = 0) => {
                try {
                    const o = ctx.createOscillator(); const g = ctx.createGain(); o.type = oscType;
                    o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
                    g.gain.setValueAtTime(0, ctx.currentTime + delay);
                    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(ctx.currentTime + delay); o.stop(ctx.currentTime + delay + dur);
                } catch (e) {}
            };

            if (type === 'scan') playTone(1200 + Math.random()*300, 'sine', 0.03, 0.005);
            if (type === 'found') { playTone(600, 'triangle', 0.1, 0.03); playTone(800, 'triangle', 0.1, 0.03, 0.1); }
            if (type === 'start') { playTone(523.25, 'sine', 0.4, 0.03); playTone(659.25, 'sine', 0.5, 0.03, 0.1); playTone(783.99, 'sine', 0.6, 0.04, 0.2); }
            if (type === 'win') { playTone(523.25, 'triangle', 0.4, 0.04); playTone(659.25, 'triangle', 0.5, 0.04, 0.1); playTone(783.99, 'triangle', 0.8, 0.05, 0.2); }

            if (type === 'cancel') { playTone(400, 'square', 0.1, 0.04); playTone(300, 'square', 0.2, 0.04, 0.15); }
          }, []);

            if (initialData && initialData.length > 100) {
                lastDataTimeRef.current = Date.now(); setSparklines(prev => ({...prev, [curAsset.symbol]: initialData})); currentPrice.current = initialData[initialData.length - 1].close;
                const liqZones = calcLiquidityZones(initialData, 30); const atrSeries = calcATRSeries(initialData, 14); 

                const liqMap = new Map(liqZones.map(i => [i.time, {upper: i.upper, lower: i.lower}]));
                const atrMap = new Map(atrSeries.map(i => [i.time, i.value]));
