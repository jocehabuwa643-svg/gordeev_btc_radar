<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Icons
        const Shield = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 4.81 17 6 19 6a1 1 0 0 1 1 1z"/></svg>;
        const Cpu = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>;
        const Globe = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
        const Clock = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const TrendingUp = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const Radar = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/><path d="M4 5.49A10 10 0 0 0 5.3 19.38"/><path d="M20 8.74A10 10 0 0 1 17.38 20"/><path d="M16 8a6 6 0 0 0-8.5-1.5"/><path d="M7.5 16.5a6 6 0 0 0 9.2-.5"/><path d="M12 12v.01"/></svg>;
        const Zap = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const Activity = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;

        const ASSETS = [{ pair: 'BTC/USDT', symbol: 'BTCUSDT', name: 'Bitcoin' }];

        // --- ADAPTIVE STRATEGY CONFIGURATION (5 STEPS) ---
        const STRATEGY_1M_CONFIG = {
            NORMAL: { modeId: 'NORMAL', minScore: 60, minSweepAtrRatio: 0.10, minReclaimAtrRatio: 0.12, maxImpulseAtrRatio: 1.50, cooldownCandles: 4, minConfirmBodyRatio: 0.35, maxEntryDriftAtrRatio: 0.25 },
            REINFORCED_1: { modeId: 'REINFORCED_1', minScore: 65, minSweepAtrRatio: 0.11, minReclaimAtrRatio: 0.13, maxImpulseAtrRatio: 1.45, cooldownCandles: 4, minConfirmBodyRatio: 0.38, maxEntryDriftAtrRatio: 0.22 },
            REINFORCED_2: { modeId: 'REINFORCED_2', minScore: 70, minSweepAtrRatio: 0.12, minReclaimAtrRatio: 0.15, maxImpulseAtrRatio: 1.35, cooldownCandles: 5, minConfirmBodyRatio: 0.40, maxEntryDriftAtrRatio: 0.20 },
            REINFORCED_3: { modeId: 'REINFORCED_3', minScore: 75, minSweepAtrRatio: 0.14, minReclaimAtrRatio: 0.18, maxImpulseAtrRatio: 1.25, cooldownCandles: 6, minConfirmBodyRatio: 0.45, maxEntryDriftAtrRatio: 0.18 },
            EMERGENCY_4: { modeId: 'EMERGENCY_4', minScore: 80, minSweepAtrRatio: 0.15, minReclaimAtrRatio: 0.20, maxImpulseAtrRatio: 1.15, cooldownCandles: 8, minConfirmBodyRatio: 0.50, maxEntryDriftAtrRatio: 0.15 }
        };

        const getStrategyModeForStep = (step) => {
            if (step === 0) return 'NORMAL';
            if (step === 1) return 'REINFORCED_1';
            if (step === 2) return 'REINFORCED_2';
            if (step === 3) return 'REINFORCED_3';
            return 'EMERGENCY_4';
        };

        // --- UPDATED SESSION CONFIG (Base 100, 70% payout, 4 steps martingale = 5 levels) ---
        const SESSION_CONFIG = {
            startingBalance: 10000,
            baseStake: 100, 
            payoutPercent: 0.70,
            martingaleLadder: [100, 250, 625, 1560, 3900] // 0, 1, 2, 3, 4 (up to 4th knee)
        };

        // --- IN-MEMORY LEDGER ---
        let inMemoryTradeLedger = [];
        function loadTradeLedger() { return inMemoryTradeLedger; }
        function saveTradeLedger(trades) { inMemoryTradeLedger = trades; }
        function buildTradeId(trade) { return [trade.signalTime || 'na', trade.direction || 'na'].join('_'); }

        const ScannerAPI = {
          async getCandles(symbol, count = 1000, interval = '1m') { 
            const urls = [
                `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api1.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`
            ];
            for (let url of urls) {
                try {
                    let response = await fetch(url);
                    if (response.ok) {
                        const data = await response.json();
                        return data.map(d => ({
                            time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4]), volume: parseFloat(d[5])
                        }));
                    }
                } catch(e) { continue; }
            }
            throw new Error("API BINANCE НЕДОСТУПЕН");
          }
        };

        const formatPrice = (p) => p ? (p >= 1000 ? p.toFixed(2) : p.toFixed(5)) : '0.00';

        function calcLiquidityZones(data, period = 8) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) { res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low }); continue; }
                let high = -Infinity, low = Infinity;
                for (let j = 1; j <= period; j++) { high = Math.max(high, data[i - j].high); low = Math.min(low, data[i - j].low); }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;
        }

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { res.push({time: data[i].time, value: data[i].high - data[i].low}); continue; }
                let sumTR = 0, count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j], prevC = data[i - j - 1];
                    sumTR += Math.max(c.high - c.low, Math.abs(c.high - prevC.close), Math.abs(c.low - prevC.close));
                    count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;
        }

        function createMartingaleState(config = SESSION_CONFIG) {
            return { ladderIndex: 0, currentStake: config.martingaleLadder[0], blocked: false, reason: null };
        }

        function getTradePnL(result, stake, config = SESSION_CONFIG) {
            if (result === 'WIN') return Math.round(stake * config.payoutPercent);
            if (result === 'LOSS') return -stake;
            return 0;
        }

        function updateMartingaleAfterTrade(result, state, balance, config = SESSION_CONFIG) {
            if (result === 'WIN' || result === 'CANCELLED') return createMartingaleState(config);
            if (result === 'LOSS') {
                const nextIndex = state.ladderIndex + 1;
                if (nextIndex >= config.martingaleLadder.length) return createMartingaleState(config); // Reset after 4th knee loss
                const nextStake = config.martingaleLadder[nextIndex];
                if (nextStake > balance) return { ladderIndex: 0, currentStake: config.martingaleLadder[0], blocked: true, reason: 'Недостаточно баланса для шага мартингейла' };
                return { ladderIndex: nextIndex, currentStake: nextStake, blocked: false, reason: null };
            }
            return state;
        }

        // --- STRICT SMC LOGIC (Unchanged core) ---
        function detectLiquiditySweep1M(data, idx, zonesArr, atrArr, config) {
            if (idx < 2 || !data[idx] || !zonesArr[idx-1]) return { isCall: false, isPut: false, sweepLevel: null };
            const curr = data[idx], prev = data[idx - 1], zone = zonesArr[idx - 1], atr = atrArr[idx].value || 0.0001;

            const putSweep = (curr.high > zone.upper && curr.close < zone.upper) || (prev.high > zone.upper && prev.close >= zone.upper && curr.close < zone.upper);
            const callSweep = (curr.low < zone.lower && curr.close > zone.lower) || (prev.low < zone.lower && prev.close <= zone.lower && curr.close > zone.lower);

            let score = 0, isCall = false, isPut = false, sweepLevel = null;

            if (putSweep) {
                sweepLevel = zone.upper;
                const sweepCandle = (curr.high > zone.upper && curr.close < zone.upper) ? curr : prev;
                if ((sweepCandle.high - sweepLevel) >= atr * config.minSweepAtrRatio && (sweepLevel - curr.close) >= atr * config.minReclaimAtrRatio) {
                    if (Math.abs(curr.close - curr.open) / Math.max(curr.high - curr.low, 0.0001) >= config.minConfirmBodyRatio && curr.close < curr.open) isPut = true;
                }
            }
            if (callSweep && !isPut) {
                sweepLevel = zone.lower;
                const sweepCandle = (curr.low < zone.lower && curr.close > zone.lower) ? curr : prev;
                if ((sweepLevel - sweepCandle.low) >= atr * config.minSweepAtrRatio && (curr.close - sweepLevel) >= atr * config.minReclaimAtrRatio) {
                    if (Math.abs(curr.close - curr.open) / Math.max(curr.high - curr.low, 0.0001) >= config.minConfirmBodyRatio && curr.close > curr.open) isCall = true;
                }
            }
            return { isCall, isPut, sweepLevel };
        }

        // --- COMPONENTS ---
        const LiveClock = () => {
          const [t, setT] = useState(new Date());
          useEffect(() => { const i = setInterval(() => setT(new Date()), 1000); return () => clearInterval(i); }, []);
          return <span className="text-slate-300 mono-font">{t.toLocaleTimeString('ru-RU')}</span>;
        };

        const CinematicSplash = ({ onComplete }) => {
            const [active, setActive] = useState(false);
            useEffect(() => {
                const t1 = setTimeout(() => setActive(true), 100);
                const t2 = setTimeout(() => { setActive(false); setTimeout(onComplete, 1000); }, 3000);
                return () => { clearTimeout(t1); clearTimeout(t2); }
            }, [onComplete]);

            return (
                <div className={`cinematic-splash ${active ? 'splash-active opacity-100' : 'opacity-0 pointer-events-none'}`}>
                    <h1 className="cinematic-text text-center px-4">SLAVA GORDEEV</h1>
                </div>
            );
        };

        const EnhancedScanner = ({ data }) => {
          if (!data || data.length < 2) return <div className="w-full h-full flex items-center justify-center text-slate-500 font-bold animate-pulse">ОЖИДАНИЕ КЛАСТЕРОВ...</div>;
          
          const chartData = data.slice(-50); // Show more candles
          const min = Math.min(...chartData.map(d => d.low));
          const max = Math.max(...chartData.map(d => d.high));
          const range = (max - min) || 1;
          const width = 400, height = 100;
          const candleW = width / chartData.length;

          return (
            <div className="w-full h-full relative overflow-hidden bg-slate-900/40 rounded-xl border border-slate-700/50 shadow-inner">
                <svg className="w-full h-full relative z-10" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
                  {chartData.map((c, i) => {
                    const isUp = c.close >= c.open;
                    const x = i * candleW;
                    const w = candleW * 0.6;
                    const oY = height - ((c.open - min) / range) * height;
                    const cY = height - ((c.close - min) / range) * height;
                    const hY = height - ((c.high - min) / range) * height;
                    const lY = height - ((c.low - min) / range) * height;
                    
                    const color = isUp ? "#38bdf8" : "#f43f5e";
                    const isLast = i === chartData.length - 1;

                    return (
                      <g key={i} className={isLast ? "animate-pulse" : "opacity-70"}>
                        <line x1={x + w/2} y1={hY} x2={x + w/2} y2={lY} stroke={color} strokeWidth="1" opacity={isLast? 1 : 0.5} />
                        <rect x={x} y={Math.min(oY, cY)} width={w} height={Math.max(Math.abs(cY - oY), 1)} fill={isUp ? "transparent" : color} stroke={color} strokeWidth="1" rx="0.5" />
                        {isLast && <rect x={x-1} y={Math.min(oY, cY)-1} width={w+2} height={Math.max(Math.abs(cY - oY), 1)+2} fill="none" stroke="#fff" strokeWidth="0.5" className="animate-ping" opacity="0.5"/>}
                      </g>
                    );
                  })}
                </svg>
                <div className="scanner-beam-vertical"></div>
                <div className="absolute inset-0 bg-gradient-to-t from-sky-900/20 to-transparent pointer-events-none mix-blend-screen"></div>
            </div>
          );
        };

        const App = () => {
          const [appStage, setAppStage] = useState('splash'); // splash -> init -> backtest -> scan -> trade
          const [viewMode, setViewMode] = useState('SCREENER'); 
          const [asset, setAsset] = useState(ASSETS[0]);
          const [sparklines, setSparklines] = useState({});
          const [logs, setLogs] = useState([]);
          const [statusText, setStatusText] = useState('ИНИЦИАЛИЗАЦИЯ...');
          
          const [sessionData, setSessionData] = useState({
              balance: SESSION_CONFIG.startingBalance, stake: SESSION_CONFIG.baseStake, step: 0, pnl: 0, wins: 0, losses: 0, cancels: 0, totalSignals: 0
          });
          
          const chartContainerRef = useRef(null);
          const tradeBoxesContainerRef = useRef(null);
          const chartInstance = useRef(null);
          const candleSeries = useRef(null);
          const tradesRef = useRef([]); 
          
          const audioCtx = useRef(null);
          const engineActive = useRef(false);
          const currentPrice = useRef(null);
          
          // --- STRICT SPEECH QUEUE ---
          const speechQueueRef = useRef([]);
          const isSpeakingRef = useRef(false);

          const processSpeechQueue = useCallback(() => {
              if (!window.speechSynthesis || isSpeakingRef.current || speechQueueRef.current.length === 0) return;
              const nextItem = speechQueueRef.current.shift();
              
              isSpeakingRef.current = true;
              const utterance = new SpeechSynthesisUtterance(nextItem.text);
              utterance.lang = 'ru-RU'; utterance.rate = 0.95; utterance.pitch = 0.95;

              let resolved = false;
              const finish = () => {
                  if (resolved) return; resolved = true;
                  isSpeakingRef.current = false;
                  if (nextItem.resolve) nextItem.resolve();
                  setTimeout(processSpeechQueue, 300);
              };
              utterance.onend = finish; utterance.onerror = finish;
              try { window.speechSynthesis.speak(utterance); } catch (e) { finish(); }
              setTimeout(finish, Math.max(3000, nextItem.text.length * 70)); // fallback
          }, []);

          const enqueueSpeech = useCallback((text) => {
              return new Promise(resolve => {
                  if (!window.speechSynthesis) { resolve(); return; }
                  speechQueueRef.current.push({ text, resolve });
                  processSpeechQueue();
              });
          }, [processSpeechQueue]);

          const addLog = useCallback((msg) => setLogs(p => [msg, ...p].slice(0, 20)), []);

          // --- CHART OVERLAYS (Boxes & Lines & Tooltip) ---
          useEffect(() => {
            if (appStage === 'splash' || appStage === 'init') return;
            let animationFrameId;

            const syncOverlays = () => {
                if (chartInstance.current && candleSeries.current && tradeBoxesContainerRef.current) {
                    const timeScale = chartInstance.current.timeScale();
                    const series = candleSeries.current;
                    let html = '';

                    tradesRef.current.forEach(trade => {
                        let sigX = null, entX = null, extX = null;
                        try {
                            if (trade.signalTime) sigX = timeScale.timeToCoordinate(trade.signalTime);
                            if (trade.entryTime) entX = timeScale.timeToCoordinate(trade.entryTime);
                            if (trade.exitTime) extX = timeScale.timeToCoordinate(trade.exitTime);
                        } catch (e) {}

                        if (sigX === null) return;
                        
                        // Approximate missing coords for visual completeness
                        if (entX === null) entX = sigX + 15;
                        if (extX === null && trade.exitTime) extX = timeScale.timeToCoordinate(trade.exitTime);
                        if (extX === null) extX = entX + (trade.result === 'CANCELLED' ? 10 : 80);

                        const boxLeft = Math.min(sigX, entX);
                        const boxRight = extX;
                        const boxWidth = Math.max(boxRight - boxLeft, 2);

                        const pad = (trade.maxHigh - trade.minLow) * 0.1;
                        const topY = series.priceToCoordinate(trade.maxHigh + pad);
                        const bottomY = series.priceToCoordinate(trade.minLow - pad);
                        if (topY === null || bottomY === null) return;
                        const boxHeight = Math.max(bottomY - topY, 4);

                        const entY = trade.entryPrice ? series.priceToCoordinate(trade.entryPrice) : (topY + bottomY)/2;
                        const extY = trade.exitPrice ? series.priceToCoordinate(trade.exitPrice) : entY;

                        let color = '148, 163, 184'; // Gray (Cancel)
                        let bgAlpha = 0.1;
                        let borderAlpha = 0.4;
                        if (trade.result === 'WIN') { color = '16, 185, 129'; bgAlpha = 0.15; borderAlpha=0.6; } // Green
                        if (trade.result === 'LOSS') { color = '244, 63, 94'; bgAlpha = 0.15; borderAlpha=0.6; } // Red
                        if (trade.result === 'PENDING') { color = '245, 158, 11'; } // Yellow

                        trade.screenBox = { left: boxLeft, right: boxRight, top: topY, bottom: bottomY };

                        // 1. Box
                        html += `<div class="trade-box-glass absolute border rounded-sm pointer-events-auto" 
                                      style="left:${boxLeft}px; top:${topY}px; width:${boxWidth}px; height:${boxHeight}px; 
                                             background:rgba(${color},${bgAlpha}); border-color:rgba(${color},${borderAlpha}); 
                                             box-shadow: 0 0 15px rgba(${color}, 0.1);" data-idx="${trade.tradeId}">`;
                        
                        // 2. Signal Vertical Line
                        html += `<div class="absolute top-0 bottom-0 border-l border-dashed border-slate-400 opacity-50" style="left:${sigX - boxLeft}px"></div>`;
                        html += `<div class="absolute text-[8px] font-bold text-slate-300" style="left:${sigX - boxLeft - 10}px; bottom:-15px;">SIG</div>`;
                        
                        // 3. Entry Dot & Line
                        if (trade.entryPrice && entX !== null) {
                             html += `<div class="absolute w-2 h-2 rounded-full z-10" style="background:rgb(${color}); left:${entX - boxLeft - 4}px; top:${entY - topY - 4}px; box-shadow: 0 0 5px rgb(${color});"></div>`;
                             html += `<div class="absolute h-px border-b border-dotted" style="border-color:rgb(${color}); left:${entX - boxLeft}px; right:0; top:${entY - topY}px; opacity:0.5;"></div>`;
                        }

                        // 4. Exit Dot
                        if (trade.exitPrice && extX !== null && trade.result !== 'CANCELLED' && trade.result !== 'PENDING') {
                             html += `<div class="absolute w-2 h-2 rounded-full bg-white z-10 border border-slate-800" style="left:${extX - boxLeft - 4}px; top:${extY - topY - 4}px;"></div>`;
                        }

                        html += `</div>`;
                    });
                    tradeBoxesContainerRef.current.innerHTML = html;
                }
                animationFrameId = requestAnimationFrame(syncOverlays);
            };

            syncOverlays();
            return () => cancelAnimationFrame(animationFrameId);
          }, [appStage, viewMode]);

                          <div class="flex justify-between gap-4 text-[10px]"><span class="text-slate-400">Выход:</span> <span class="font-mono text-white">${hovered.exitPrice ? hovered.exitPrice.toFixed(2) : '-'}</span></div>

                      `;
