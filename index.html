<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Строгая стейт-машина (Startup Flow)
        const APP_STAGE = {
            SPLASH: "SPLASH",
            INIT_SCREEN: "INIT_SCREEN",
            BOOT: "BOOT",
            HISTORICAL_SUMMARY: "HISTORICAL_SUMMARY",
            READY: "READY",
            LIVE_SCAN: "LIVE_SCAN"
        };

        // Иконки
        const Zap = ({ size = 24, className = "" }) => <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const Activity = ({ size = 24, className = "" }) => <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
        const Radar = ({ size = 24, className = "" }) => <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/><path d="M4 5.49A10 10 0 0 0 5.3 19.38"/><path d="M20 8.74A10 10 0 0 1 17.38 20"/><path d="M16 8a6 6 0 0 0-8.5-1.5"/><path d="M7.5 16.5a6 6 0 0 0 9.2-.5"/><path d="M12 12v.01"/></svg>;

        const ASSETS = [{ pair: 'BTC/USDT', symbol: 'BTCUSDT', name: 'Bitcoin' }];

        // --- КОНФИГУРАЦИЯ СТРАТЕГИИ И МАРТИНГЕЙЛА ---
        const STRATEGY_1M_CONFIG = {
            NORMAL: { modeId: 'NORMAL', minScore: 60, minSweepAtrRatio: 0.10, minReclaimAtrRatio: 0.12, maxImpulseAtrRatio: 1.50, cooldownCandles: 4, minConfirmBodyRatio: 0.35, maxEntryDriftAtrRatio: 0.25 },
        };
        const SESSION_CONFIG = {
            startingBalance: 10000,
            baseStake: 100, 
            payoutPercent: 0.70,
            martingaleLadder: [100, 250, 625, 1560, 3900]
        };

        // --- УТИЛИТЫ ---
        const ScannerAPI = {
          async getCandles(symbol, count = 1000, interval = '1m') { 
            const urls = [
                `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api1.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`
            ];
            for (let url of urls) {
                try {
                    let response = await fetch(url);
                    if (response.ok) {
                        const data = await response.json();
                        return data.map(d => ({ time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4]), volume: parseFloat(d[5]) }));
                    }
                } catch(e) { console.warn("[API] Binance error:", e); continue; }
            }
            throw new Error("API BINANCE НЕДОСТУПЕН");
          }
        };

        function calcLiquidityZones(data, period = 8) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) { res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low }); continue; }
                let high = -Infinity, low = Infinity;
                for (let j = 1; j <= period; j++) { high = Math.max(high, data[i - j].high); low = Math.min(low, data[i - j].low); }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;
        }

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { res.push({time: data[i].time, value: data[i].high - data[i].low}); continue; }
                let sumTR = 0, count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j], prevC = data[i - j - 1];
                    sumTR += Math.max(c.high - c.low, Math.abs(c.high - prevC.close), Math.abs(c.low - prevC.close));
                    count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;
        }

        function createMartingaleState(config = SESSION_CONFIG) {
            return { ladderIndex: 0, currentStake: config.martingaleLadder[0], blocked: false, reason: null };
        }

        function getTradePnL(result, stake, config = SESSION_CONFIG) {
            if (result === 'WIN') return Math.round(stake * config.payoutPercent);
            if (result === 'LOSS') return -stake;
            return 0;
        }

        function updateMartingaleAfterTrade(result, state, balance, config = SESSION_CONFIG) {
            if (result === 'WIN' || result === 'CANCELLED') return createMartingaleState(config);
            if (result === 'LOSS') {
                const nextIndex = state.ladderIndex + 1;
                if (nextIndex >= config.martingaleLadder.length) return createMartingaleState(config);
                const nextStake = config.martingaleLadder[nextIndex];
                if (nextStake > balance) return { ladderIndex: 0, currentStake: config.martingaleLadder[0], blocked: true, reason: 'Недостаточно баланса для шага мартингейла' };
                return { ladderIndex: nextIndex, currentStake: nextStake, blocked: false, reason: null };
            }
            return state;
        }

        function detectLiquiditySweep1M(data, idx, zonesArr, atrArr, config) {
            if (idx < 2 || !data[idx] || !zonesArr[idx-1]) return { isCall: false, isPut: false, sweepLevel: null };
            const curr = data[idx], prev = data[idx - 1], zone = zonesArr[idx - 1], atr = atrArr[idx].value || 0.0001;

            const putSweep = (curr.high > zone.upper && curr.close < zone.upper) || (prev.high > zone.upper && prev.close >= zone.upper && curr.close < zone.upper);
            const callSweep = (curr.low < zone.lower && curr.close > zone.lower) || (prev.low < zone.lower && prev.close <= zone.lower && curr.close > zone.lower);

            let score = 0, isCall = false, isPut = false, sweepLevel = null;

            if (putSweep) {
                sweepLevel = zone.upper;
                const sweepCandle = (curr.high > zone.upper && curr.close < zone.upper) ? curr : prev;
                if ((sweepCandle.high - sweepLevel) >= atr * config.minSweepAtrRatio && (sweepLevel - curr.close) >= atr * config.minReclaimAtrRatio) {
                    if (Math.abs(curr.close - curr.open) / Math.max(curr.high - curr.low, 0.0001) >= config.minConfirmBodyRatio && curr.close < curr.open) isPut = true;
                }
            }
            if (callSweep && !isPut) {
                sweepLevel = zone.lower;
                const sweepCandle = (curr.low < zone.lower && curr.close > zone.lower) ? curr : prev;
                if ((sweepLevel - sweepCandle.low) >= atr * config.minSweepAtrRatio && (curr.close - sweepLevel) >= atr * config.minReclaimAtrRatio) {
                    if (Math.abs(curr.close - curr.open) / Math.max(curr.high - curr.low, 0.0001) >= config.minConfirmBodyRatio && curr.close > curr.open) isCall = true;
                }
            }
            return { isCall, isPut, sweepLevel };
        }

        // --- UI КОМПОНЕНТЫ ---
        const LiveClock = () => {
          const [t, setT] = useState(new Date());
          useEffect(() => { const i = setInterval(() => setT(new Date()), 1000); return () => clearInterval(i); }, []);
          return <span className="text-slate-300 mono-font text-[clamp(10px,1.5vw,14px)]">{t.toLocaleTimeString('ru-RU')}</span>;
        };

        const CinematicSplash = ({ onComplete }) => {
            const [active, setActive] = useState(false);
            
            useEffect(() => {
                const t1 = setTimeout(() => setActive(true), 100);
                const t2 = setTimeout(() => { setActive(false); onComplete(); }, 2500);
                return () => { clearTimeout(t1); clearTimeout(t2); }
            }, [onComplete]);

            return (
                <div className={`cinematic-splash ${active ? 'splash-active opacity-100' : 'opacity-0 pointer-events-none'}`}>
                    <h1 className="cinematic-text text-center px-4 w-full break-words">SLAVA GORDEEV</h1>
                </div>
            );
        };

        const ResponsiveScanner = ({ data }) => {
          if (!data || data.length < 2) return <div className="w-full h-full flex items-center justify-center text-slate-500 font-bold animate-pulse text-sm lg:text-base">ОЖИДАНИЕ КЛАСТЕРОВ...</div>;
          
          const chartData = data.slice(-40); 
          const min = Math.min(...chartData.map(d => d.low));
          const max = Math.max(...chartData.map(d => d.high));
          const range = (max - min) || 1;

          return (
            <div className="w-full h-full relative overflow-hidden bg-slate-900/50 rounded-xl border border-slate-700/50 shadow-inner flex">
                <svg className="w-full h-full relative z-10" viewBox={`0 0 400 100`} preserveAspectRatio="none">
                  {chartData.map((c, i) => {
                    const isUp = c.close >= c.open;
                    const candleW = 400 / chartData.length;
                    const x = i * candleW;
                    const w = candleW * 0.5;
                    const oY = 100 - ((c.open - min) / range) * 100;
                    const cY = 100 - ((c.close - min) / range) * 100;
                    const hY = 100 - ((c.high - min) / range) * 100;
                    const lY = 100 - ((c.low - min) / range) * 100;
                    
                    const color = isUp ? "#38bdf8" : "#f43f5e";
                    const isLast = i === chartData.length - 1;

                    return (
                      <g key={i} className={isLast ? "animate-pulse" : "opacity-80"}>
                        <line x1={x + w/2} y1={hY} x2={x + w/2} y2={lY} stroke={color} strokeWidth="0.5" opacity={isLast? 1 : 0.4} />
                        <rect x={x} y={Math.min(oY, cY)} width={w} height={Math.max(Math.abs(cY - oY), 0.5)} fill={isUp ? "transparent" : color} stroke={color} strokeWidth="0.5" rx="0.5" />
                      </g>
                    );
                  })}
                </svg>
                <div className="scanner-beam-vertical"></div>
                <div className="absolute inset-0 bg-gradient-to-t from-sky-900/10 to-transparent pointer-events-none mix-blend-screen"></div>
            </div>
          );
        };

        const App = () => {
          const [appStage, setAppStage] = useState(APP_STAGE.SPLASH); 
          const [viewMode, setViewMode] = useState('SCREENER'); 
          
          const [sparklines, setSparklines] = useState({});
          const [logs, setLogs] = useState([]);
          const [statusText, setStatusText] = useState('ОЖИДАНИЕ ЗАПУСКА');
          
          const [sessionData, setSessionData] = useState({
              balance: SESSION_CONFIG.startingBalance, stake: SESSION_CONFIG.baseStake, step: 0, pnl: 0, wins: 0, losses: 0, cancels: 0, totalSignals: 0
          });
          
          const chartContainerRef = useRef(null);
          const tradeBoxesContainerRef = useRef(null);
          const chartInstance = useRef(null);
          const candleSeries = useRef(null);
          const tradesRef = useRef([]); 
          
          const audioCtx = useRef(null);
          const engineActive = useRef(false);

          // Диагностика состояний
          useEffect(() => {
              console.log("[STATE MACHINE] Transitioned to:", appStage);
          }, [appStage]);

          // --- СИНХРОНИЗИРОВАННАЯ ОЗВУЧКА ---
          const speechQueueRef = useRef([]);
          const isSpeakingRef = useRef(false);

          const processSpeechQueue = useCallback(() => {
              if (!window.speechSynthesis || isSpeakingRef.current || speechQueueRef.current.length === 0) return;
              const nextItem = speechQueueRef.current.shift();
              
              isSpeakingRef.current = true;
              const utterance = new SpeechSynthesisUtterance(nextItem.text);
              utterance.lang = 'ru-RU'; utterance.rate = 0.95; utterance.pitch = 0.95;

              let resolved = false;
              const finish = () => {
                  if (resolved) return; 
                  resolved = true;
                  isSpeakingRef.current = false;
                  if (nextItem.resolve) nextItem.resolve();
                  setTimeout(processSpeechQueue, 200);
              };
              
              utterance.onend = finish; 
              utterance.onerror = finish;
              
              try { 
                  window.speechSynthesis.speak(utterance); 
              } catch (e) { 
                  console.error("[SPEECH] Speak error:", e);
                  finish(); 
              }
          }, []);

          const enqueueSpeech = useCallback((text) => {
              return new Promise(resolve => {
                  if (!window.speechSynthesis) { resolve(); return; }
                  
                  // Защитный таймер (Fallback timeout), чтобы приложение не зависло навсегда
                  const maxDuration = Math.max(3000, text.length * 100);
                  const safetyTimer = setTimeout(() => {
                      console.warn("[SPEECH] Fallback timer triggered for:", text);
                      resolve();
                  }, maxDuration);

                  speechQueueRef.current.push({ 
                      text, 
                      resolve: () => {
                          clearTimeout(safetyTimer);
                          resolve();
                      } 
                  });
                  processSpeechQueue();
              });
          }, [processSpeechQueue]);

          const addLog = useCallback((msg) => {
              const time = new Date().toLocaleTimeString('ru-RU', {hour12: false});
              setLogs(p => [`[${time}] ${msg}`, ...p].slice(0, 30));
          }, []);

          // --- CHART & OVERLAYS SYNC (RESPONSIVE) ---
          useEffect(() => {
            if (appStage === APP_STAGE.SPLASH || appStage === APP_STAGE.INIT_SCREEN) return;
            let animationFrameId;

            const syncOverlays = () => {
                if (chartInstance.current && candleSeries.current && tradeBoxesContainerRef.current) {
                    const timeScale = chartInstance.current.timeScale();
                    const series = candleSeries.current;
                    let html = '';

                    tradesRef.current.forEach(trade => {
                        let sigX = null, entX = null, extX = null;
                        try {
                            if (trade.signalTime) sigX = timeScale.timeToCoordinate(trade.signalTime);
                            if (trade.entryTime) entX = timeScale.timeToCoordinate(trade.entryTime);
                            if (trade.exitTime) extX = timeScale.timeToCoordinate(trade.exitTime);
                        } catch (e) {}

                        if (sigX === null) return;
                        if (entX === null) entX = sigX + 10;
                        if (extX === null && trade.exitTime) extX = timeScale.timeToCoordinate(trade.exitTime);
                        if (extX === null) extX = entX + (trade.result === 'CANCELLED' ? 10 : 50);

                        const boxLeft = Math.min(sigX, entX);
                        const boxRight = extX;
                        const boxWidth = Math.max(boxRight - boxLeft, 2);

                        const pad = (trade.maxHigh - trade.minLow) * 0.1;
                        const topY = series.priceToCoordinate(trade.maxHigh + pad);
                        const bottomY = series.priceToCoordinate(trade.minLow - pad);
                        if (topY === null || bottomY === null) return;
                        const boxHeight = Math.max(bottomY - topY, 4);

                        let color = '148, 163, 184'; // Gray
                        if (trade.result === 'WIN') color = '16, 185, 129'; 
                        if (trade.result === 'LOSS') color = '244, 63, 94'; 

                        trade.screenBox = { left: boxLeft, right: boxRight, top: topY, bottom: bottomY };

                        html += `<div class="trade-box-glass absolute border rounded-sm pointer-events-none" 
                                      style="left:${boxLeft}px; top:${topY}px; width:${boxWidth}px; height:${boxHeight}px; 
                                             background:rgba(${color},0.15); border-color:rgba(${color},0.6); 
                                             box-shadow: 0 0 10px rgba(${color}, 0.1);">`;
                        html += `<div class="absolute top-0 bottom-0 border-l border-dashed border-slate-400 opacity-50" style="left:${sigX - boxLeft}px"></div>`;
                        html += `</div>`;
                    });
                    tradeBoxesContainerRef.current.innerHTML = html;
                }
                animationFrameId = requestAnimationFrame(syncOverlays);
            };

            syncOverlays();
            return () => cancelAnimationFrame(animationFrameId);
          }, [appStage, viewMode]);

          // Hover Tooltip
          useEffect(() => {
              if (appStage === APP_STAGE.SPLASH || appStage === APP_STAGE.INIT_SCREEN || !chartInstance.current) return;
              
              const tooltip = document.getElementById('trade-tooltip');
              if (!tooltip) return;

              const handleCrosshairMove = (param) => {
                  if (!param.point || !param.time) { tooltip.style.opacity = '0'; return; }

                  const x = param.point.x;
                  const y = param.point.y;

                  const hovered = tradesRef.current.find(t => t.screenBox && x >= t.screenBox.left && x <= t.screenBox.right && y >= t.screenBox.top && y <= t.screenBox.bottom);

                  if (hovered) {
                      const isWin = hovered.result === 'WIN';
                      const isCanc = hovered.result === 'CANCELLED';
                      let headColor = 'text-slate-300';
                      if (isWin) headColor = 'text-emerald-400';
                      if (hovered.result === 'LOSS') headColor = 'text-rose-400';

                      tooltip.innerHTML = `

                          ${!isCanc ? `
                          <div class="flex justify-between gap-4 text-[9px] mt-1"><span class="text-slate-400">Вход:</span> <span class="font-mono text-white">${hovered.entryPrice ? hovered.entryPrice.toFixed(2) : '-'}</span></div>
                          <div class="flex justify-between gap-4 text-[9px] mt-1"><span class="text-slate-400">Выход:</span> <span class="font-mono text-white">${hovered.exitPrice ? hovered.exitPrice.toFixed(2) : '-'}</span></div>
                          <div class="flex justify-between gap-4 text-[9px] mt-2 pt-1 border-t border-slate-700"><span class="text-slate-400">Ставка (Шаг ${hovered.martingaleStep}):</span> <span class="font-mono text-white">${hovered.stake} ₽</span></div>
                          <div class="flex justify-between gap-4 text-[9px] mt-1"><span class="text-slate-400">PnL:</span> <span class="font-mono ${hovered.pnl > 0 ? 'text-emerald-400' : 'text-rose-400'} font-bold">${hovered.pnl > 0 ? '+' : ''}${hovered.pnl} ₽</span></div>
                          ` : `<div class="text-[9px] text-rose-300 mt-1">Отмена по фильтру 3 сек</div>`}
                      `;
                      const tooltipWidth = 150;
                      let leftPos = x + 15;
                      if (leftPos + tooltipWidth > window.innerWidth - 40) leftPos = x - tooltipWidth - 15;
                      
                      tooltip.style.left = `${leftPos}px`;
                      tooltip.style.top = `${Math.max(10, y - 10)}px`;
                      tooltip.style.opacity = '1';
                  } else {
                      tooltip.style.opacity = '0';
                  }
              };

              chartInstance.current.subscribeCrosshairMove(handleCrosshairMove);
              return () => { if(chartInstance.current) chartInstance.current.unsubscribeCrosshairMove(handleCrosshairMove); }
          }, [appStage, viewMode]);

                      const sigTime = data1m[i].time;

                      let isCanceled = false;

                      const trade = {

                          const exitCandle = data1m[i+6];
                          trade.exitTime = exitCandle.time;
                          trade.exitPrice = exitCandle.close;

                          const executionWindow = data1m.slice(i+1, i+7);
                          trade.maxHigh = Math.max(...executionWindow.map(c=>c.high));
                          trade.minLow = Math.min(...executionWindow.map(c=>c.low));

                          const win = (isCall && trade.exitPrice > trade.entryPrice) || (isPut && trade.exitPrice < trade.entryPrice) || (trade.exitPrice === trade.entryPrice);
                          trade.result = win ? 'WIN' : 'LOSS';
                          if (win) tWins++; else tLosses++;
                      }

                      const pnl = getTradePnL(trade.result, mState.currentStake);
                      trade.stake = mState.currentStake;
                      trade.pnl = pnl;
                      trade.martingaleStep = mState.ladderIndex;
                      
                      currentBal += pnl;
                      mState = updateMartingaleAfterTrade(trade.result, mState, currentBal);
                      
                      histTrades.push(trade);
                  }
