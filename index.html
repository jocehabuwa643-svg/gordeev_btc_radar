<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Radar PRO MAX | Slava Gordeev</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Oswald:wght@300;500;700&display=swap');
        
        body { 
            background: #0f172a; color: #f8fafc; 
            font-family: 'Montserrat', sans-serif; overflow: hidden; 
        }

        /* Серебристый стиль для имени разработчика */
        .dev-name {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            background: linear-gradient(to bottom, #cfd8dc 0%, #eceff1 50%, #90a4ae 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3);
        }

        .status-glow {
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(56, 189, 248, 0.5); }
            50% { box-shadow: 0 0 20px rgba(56, 189, 248, 0.8); }
            100% { box-shadow: 0 0 5px rgba(56, 189, 248, 0.5); }
        }

        .ticker-anim { animation: ticker 30s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isStarted, setIsStarted] = useState(false);
            const [status, setStatus] = useState("ИНИЦИАЛИЗАЦИЯ...");
            const [price, setPrice] = useState(0);
            const [winRate, setWinRate] = useState(0);
            
            const chartContainerRef = useRef(null);
            const chart = useRef(null);
            const candleSeries = useRef(null);
            const markers = useRef([]);
            const audioCtx = useRef(null);

            // Константы стратегии
            const EXP_TIME = 15; // Экспирация 15 минут
            const HISTORY_DEPTH = 600; // Глубина анализа истории в минутах

            const speak = (text) => {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'ru-RU'; u.rate = 1.0; u.pitch = 0.9;
                window.speechSynthesis.speak(u);
            };

            const playSound = (freq, type = 'sine', dur = 0.2) => {
                if (!audioCtx.current) return;
                const o = audioCtx.current.createOscillator();
                const g = audioCtx.current.createGain();
                o.type = type; o.frequency.value = freq;
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.current.currentTime + dur);
                o.connect(g); g.connect(audioCtx.current.destination);
                o.start(); o.stop(audioCtx.current.currentTime + dur);
            };

            const analyzeHistory = async () => {
                setStatus("СКАНИРОВАНИЕ ИСТОРИИ SMC...");
                const data = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=${HISTORY_DEPTH}`)
                    .then(res => res.json());
                
                const candles = data.map(d => ({
                    time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]),
                    low: parseFloat(d[3]), close: parseFloat(d[4])
                }));

                candleSeries.current.setData(candles);
                setPrice(candles[candles.length - 1].close);

                let wins = 0; let total = 0;
                const historyMarkers = [];

                // Реальная SMC логика (поиск BOS/CHoCH в истории)
                for (let i = 50; i < candles.length - EXP_TIME; i++) {
                    const prevHigh = Math.max(...candles.slice(i-20, i).map(c => c.high));
                    const prevLow = Math.min(...candles.slice(i-20, i).map(c => c.low));

                    let signalType = null;
                    if (candles[i].close > prevHigh) signalType = 'CALL';
                    if (candles[i].close < prevLow) signalType = 'PUT';

                    if (signalType) {
                        const entryPrice = candles[i].close;
                        const exitPrice = candles[i + EXP_TIME].close;
                        const isWin = signalType === 'CALL' ? exitPrice > entryPrice : exitPrice < entryPrice;
                        
                        historyMarkers.push({
                            time: candles[i].time,
                            position: signalType === 'CALL' ? 'belowBar' : 'aboveBar',
                            color: isWin ? '#10b981' : '#f43f5e',
                            shape: signalType === 'CALL' ? 'arrowUp' : 'arrowDown',
                            text: isWin ? `WIN (${EXP_TIME}m)` : `LOSS (${EXP_TIME}m)`
                        });
                        
                        if (isWin) wins++;
                        total++;
                        i += EXP_TIME; // Пропускаем время сделки
                    }
                }

                markers.current = historyMarkers;
                candleSeries.current.setMarkers(markers.current);
                setWinRate(total > 0 ? Math.round((wins / total) * 100) : 0);
                
                speak(`Анализ истории завершен. Найдено ${total} реальных ситуаций. Винрейт за час составил ${winRate} процентов.`);
                setStatus("LIVE SCANNING ACTIVE");
            };

            const startSystem = () => {
                audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                setIsStarted(true);
                speak("Алгоритм Слава Гордеев PRO MAX запущен. Начинаю поиск ликвидности.");
                
                setTimeout(() => {
                    initChart();
                    analyzeHistory();
                }, 500);
            };

            const initChart = () => {
                chart.current = LightweightCharts.createChart(chartContainerRef.current, {
                    layout: { background: { color: '#0f172a' }, textColor: '#94a3b8' },
                    grid: { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
                    timeScale: { timeVisible: true, secondsVisible: false }
                });
                candleSeries.current = chart.current.addCandlestickSeries({
                    upColor: '#38bdf8', downColor: '#f43f5e', borderVisible: false,
                    wickUpColor: '#38bdf8', wickDownColor: '#f43f5e'
                });
            };

            if (!isStarted) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-6 text-center">
                        <div className="w-24 h-24 mb-6 bg-sky-500 rounded-3xl flex items-center justify-center shadow-2xl shadow-sky-500/20">
                            <Zap size={48} className="text-white" />
                        </div>
                        <h1 className="text-4xl font-black mb-2 oswald-font tracking-tighter uppercase">
                            Crypto Core <span className="text-sky-400">PRO MAX</span>
                        </h1>
                        <p className="text-sky-200/50 text-sm tracking-widest uppercase mb-10">Smart Money Concepts V3</p>
                        <button onClick={startSystem} className="px-12 py-4 bg-sky-500 hover:bg-sky-400 text-white rounded-2xl font-bold text-xl transition-all active:scale-95 shadow-lg shadow-sky-500/40">
                            ЗАПУСТИТЬ ТЕРМИНАЛ
                        </button>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col">
                    {/* Header */}
                    <header className="h-16 glass-panel px-6 flex items-center justify-between z-50">
                        <div className="flex flex-col">
                            <div className="dev-name text-xl uppercase italic">Slava Gordeev</div>
                            <div className="text-[10px] tracking-[0.3em] text-sky-400 font-bold uppercase">Developer Edition</div>
                        </div>
                        <div className="flex gap-6 items-center">
                            <div className="text-right">
                                <div className="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Win Rate</div>
                                <div className="text-xl font-black text-emerald-400 oswald-font">{winRate}%</div>
                            </div>
                            <div className="h-8 w-[1px] bg-slate-700"></div>
                            <div className="px-4 py-1.5 rounded-lg border border-sky-500/30 text-sky-400 text-xs font-bold status-glow">
                                {status}
                            </div>
                        </div>
                    </header>

                    {/* Main Chart */}
                    <div className="flex-1 relative">
                        <div ref={chartContainerRef} className="absolute inset-0" />
                    </div>

                    {/* Footer Info */}
                    <footer className="h-12 glass-panel px-6 flex items-center justify-between text-[10px] font-bold tracking-widest text-slate-500 uppercase">
                        <div>BTC/USDT • REAL-TIME DATA • BINANCE API</div>
                        <div className="flex gap-4">
                            <span>EXP: 15 MIN</span>
                            <span className="text-sky-400">Security: ACTIVE</span>
                        </div>
                    </footer>
                </div>
            );
        };

        // Иконки
        const Zap = ({ size, className }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
            </svg>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
