<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Крипто Терминал Гордеева - PRO MAX (SMC)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Oswald:wght@300;400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
        
        body { 
            margin: 0; padding: 0; 
            background: #eef2f6;
            color: #0f172a; 
            overflow: hidden; 
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
            font-family: 'Montserrat', sans-serif;
        }
        
        .oswald-font { font-family: 'Oswald', sans-serif; letter-spacing: 0.05em; text-transform: uppercase; }
        .mono-font { font-family: 'JetBrains Mono', monospace; }

        .bg-grid-pattern {
            background-image: 
                linear-gradient(to right, rgba(14, 165, 233, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        .bg-orb-1 {
            position: absolute; top: -10%; left: -5%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.25) 0%, rgba(37, 99, 235, 0.05) 50%, transparent 70%);
            border-radius: 50%; filter: blur(60px); animation: float 12s ease-in-out infinite alternate;
        }
        .bg-orb-2 {
            position: absolute; bottom: -15%; right: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.2) 0%, rgba(14, 165, 233, 0.05) 50%, transparent 70%);
            border-radius: 50%; filter: blur(80px); animation: float 15s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(2%, 4%) scale(1.05); }
            100% { transform: translate(-2%, -3%) scale(0.95); }
        }

        .card-3d-wrapper { perspective: 2000px; }
        .card-3d {
            transform-style: preserve-3d;
            animation: float-3d 12s ease-in-out infinite;
            box-shadow: 
                0 30px 60px -15px rgba(15, 23, 42, 0.15), 
                0 15px 30px -10px rgba(14, 165, 233, 0.2),
                inset 0 1px 3px rgba(255, 255, 255, 1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 249, 255, 0.8) 100%);
            backdrop-filter: blur(20px);
            position: relative;
        }
        .card-3d::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.6) 25%, transparent 30%);
            border-radius: inherit; pointer-events: none; z-index: 50; animation: glare 6s infinite linear;
        }

        @keyframes glare {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes float-3d {
            0% { transform: translateY(0px) rotateX(2deg) rotateY(-2deg); }
            50% { transform: translateY(-10px) rotateX(-1deg) rotateY(3deg); }
            100% { transform: translateY(0px) rotateX(2deg) rotateY(-2deg); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-wrapper { display: flex; width: max-content; animation: ticker 40s linear infinite; }
        
        @keyframes scanline { 
            0% { transform: translateY(-100%); opacity: 0; } 
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(500%); opacity: 0; } 
        }
        .scanline-anim { 
            animation: scanline 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
            background: linear-gradient(to bottom, transparent, rgba(14, 165, 233, 0.4), rgba(59, 130, 246, 0.6), transparent); 
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            z-index: 40;
        }
        
        .glass-panel-heavy {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(241, 245, 249, 0.8) 100%);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 15px 35px -10px rgba(15, 23, 42, 0.08), inset 0 2px 10px rgba(255, 255, 255, 0.6);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 250, 252, 0.6) 100%);
            border: 1px solid rgba(226, 232, 240, 0.9);
            box-shadow: 0 4px 15px -5px rgba(15, 23, 42, 0.03), inset 0 1px 1px rgba(255, 255, 255, 1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(186, 230, 253, 0.8);
            background: linear-gradient(145deg, rgba(255, 255, 255, 1) 0%, rgba(248, 250, 252, 0.9) 100%);
            box-shadow: 0 8px 25px -5px rgba(14, 165, 233, 0.15), inset 0 1px 2px rgba(255, 255, 255, 1);
        }

        .text-gradient {
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes slideUpFade {
            0% { transform: translateY(10px); opacity: 0; }
            20% { transform: translateY(0); opacity: 1; }
            80% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-10px); opacity: 0; }
        }
        .hft-tick { animation: slideUpFade 1.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Shield = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 4.81 17 6 19 6a1 1 0 0 1 1 1z"/></svg>;
        const Cpu = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>;
        const Globe = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
        const Clock = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const TrendingUp = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const Radar = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/><path d="M4 5.49A10 10 0 0 0 5.3 19.38"/><path d="M20 8.74A10 10 0 0 1 17.38 20"/><path d="M16 8a6 6 0 0 0-8.5-1.5"/><path d="M7.5 16.5a6 6 0 0 0 9.2-.5"/><path d="M12 12v.01"/></svg>;
        const Zap = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;

        const ASSETS = [
          { pair: 'BTC/USDT', symbol: 'BTCUSDT', name: 'Bitcoin', voiceName: 'биткоин' }
        ];

        const FALLBACK_BTC_NEWS = [
          "Крупный капитал формирует пулы ликвидности за локальными экстремумами.",
          "Паттерн снятия ликвидности (SMC) подтверждает смену структуры рынка.",
          "Зафиксирован ложный пробой диапазона с последующим CHoCH.",
          "Маркетмейкер собирает стопы розничных трейдеров перед разворотом."
        ];

        const CHART_LIBRARY_URL = 'https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js';
        const SIGNAL_CACHE_KEY = 'btc-radar-history-cache-v1';
        const STRATEGY_CONFIG = {
            primaryInterval: '1m',
            confirmInterval: '1m',
            expiryMinutes: 5,
            prepDelaySeconds: 3,
            historyHours: 12,
            historyLimit: 720,
            liveLimit: 400,
            confirmLookback: 2,
            confirmFetchCount: 4,
            historyRangePeriod: 30,
            liveRangePeriod: 30,
            atrPeriod: 14,
            apiTimeoutMs: 9000,
            retryDelayMs: 3000,
            markerLimit: 200
        };
        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));
        const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
        const describeError = (error) => {
            if (!error) return 'Неизвестная ошибка';
            if (typeof error === 'string') return error;
            if (error.message) return error.message;
            return 'Непредвиденная ошибка';
        };
        const normalizeCandleResponse = (data) => {
            if (!Array.isArray(data)) return [];
            return data
                .filter(item => Array.isArray(item) && item.length >= 6)
                .map(item => ({
                    time: Number(item[0]) / 1000,
                    open: Number(item[1]),
                    high: Number(item[2]),
                    low: Number(item[3]),
                    close: Number(item[4]),
                    volume: Number(item[5])
                }))
                .filter(item => (
                    Number.isFinite(item.time) &&
                    Number.isFinite(item.open) &&
                    Number.isFinite(item.high) &&
                    Number.isFinite(item.low) &&
                    Number.isFinite(item.close) &&
                    Number.isFinite(item.volume)
                ))
                .sort((a, b) => a.time - b.time);
        };

        const ScannerAPI = {
          async getCandles(symbol, count = 250, interval = '1m') {
            const urls = [
                `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api1.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api2.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://data-api.binance.vision/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`
            ];

            let lastError = null;
            for (const url of urls) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), STRATEGY_CONFIG.apiTimeoutMs);
                try {
                    const response = await fetch(url, {
                        method: 'GET',
                        cache: 'no-store',
                        signal: controller.signal
                    });
                    if (!response.ok) {
                        lastError = new Error(`HTTP ${response.status}`);
                        continue;
                    }

                    const payload = await response.json();
                    const candles = normalizeCandleResponse(payload);
                    if (candles.length > 0) return candles;
                    lastError = new Error(`Пустой или невалидный ответ Binance (${interval})`);
                } catch (error) {
                    lastError = error;
                } finally {
                    clearTimeout(timeoutId);
                }
            }

            if (lastError) {
                throw new Error(`Binance ${symbol} ${interval}: ${describeError(lastError)}`);
            }
            throw new Error(`Binance ${symbol} ${interval}: ответ не получен`);
          }
        };

        const formatPrice = (p) => {
            if (!p && p !== 0) return '0.00';
            if (p >= 1000) return p.toFixed(2);
            if (p >= 10) return p.toFixed(3);
            if (p >= 1) return p.toFixed(4);
            return p.toFixed(5);
        };

        function calcLiquidityZones(data, period = 30) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) {
                    res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low });
                    continue;
                }
                let high = -Infinity;
                let low = Infinity;
                for (let j = 1; j <= period; j++) {
                    high = Math.max(high, data[i - j].high);
                    low = Math.min(low, data[i - j].low);
                }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;
        }

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { 
                    res.push({time: data[i].time, value: data[i].high - data[i].low}); 
                    continue; 
                }
                let sumTR = 0;
                let count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j];
                    const prevC = data[i - j - 1];
                    let tr = Math.max(
                        c.high - c.low,
                        Math.abs(c.high - prevC.close),
                        Math.abs(c.low - prevC.close)
                    );
                    sumTR += tr;
                    count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;
        }

        function buildStrategyContext(data, idx, zonesMap, atrMap, strictness = 1) {
            if (!Array.isArray(data) || idx < 2 || idx >= data.length) return null;
            const candle = data[idx];
            const prev = data[idx - 1];
            const zones = zonesMap.get(candle.time);
            const atr = atrMap.get(candle.time);
            if (!zones || !Number.isFinite(atr) || atr <= 0) return null;

            const rangeWidth = Math.max(zones.upper - zones.lower, 0);
            const body = Math.abs(candle.close - candle.open);
            const candleRange = Math.max(candle.high - candle.low, 0.0000001);
            const bodyRatio = body / candleRange;
            const wickTop = candle.high - Math.max(candle.close, candle.open);
            const wickBottom = Math.min(candle.close, candle.open) - candle.low;
            const momentum = candle.close - prev.close;
            const directionalBias = momentum / atr;
            const distanceFromMid = Math.abs(candle.close - ((zones.upper + zones.lower) / 2));
            const rangeCompression = rangeWidth / atr;
            const isSideways = rangeCompression < 2.6 && Math.abs(directionalBias) < 0.75;
            const isBullishTrend = !isSideways && directionalBias > 0.6;
            const isBearishTrend = !isSideways && directionalBias < -0.6;
            const regime = isSideways ? 'sideways' : (isBullishTrend ? 'bullish' : (isBearishTrend ? 'bearish' : 'transition'));

            const sweptTop = candle.high > zones.upper || prev.high > zones.upper;
            const sweptBottom = candle.low < zones.lower || prev.low < zones.lower;
            const returnedInsideTop = candle.close < zones.upper;
            const returnedInsideBottom = candle.close > zones.lower;
            const structureBreakTop = candle.close < prev.low;
            const structureBreakBottom = candle.close > prev.high;
            const strongRange = rangeWidth > (atr * (1.45 * strictness));
            const falseBreakoutFilter = sweptTop && returnedInsideTop && wickTop > body * 0.45;
            const falseDumpFilter = sweptBottom && returnedInsideBottom && wickBottom > body * 0.45;
            const weakEntry = bodyRatio < 0.22 || distanceFromMid < (atr * 0.15);

            const callScore = (
                (sweptBottom ? 30 : 0) +
                (returnedInsideBottom ? 20 : 0) +
                (structureBreakBottom ? 25 : 0) +
                (falseDumpFilter ? 15 : 0) +
                ((isBullishTrend || regime === 'transition') ? 10 : 0)
            );
            const putScore = (
                (sweptTop ? 30 : 0) +
                (returnedInsideTop ? 20 : 0) +
                (structureBreakTop ? 25 : 0) +
                (falseBreakoutFilter ? 15 : 0) +
                ((isBearishTrend || regime === 'transition') ? 10 : 0)
            );

            const canCall = strongRange && !weakEntry && callScore >= 80 && (!isBearishTrend || falseDumpFilter);
            const canPut = strongRange && !weakEntry && putScore >= 80 && (!isBullishTrend || falseBreakoutFilter);

            return {
                candle,
                prev,
                atr,
                zones,
                rangeWidth,
                regime,
                isSideways,
                isBullishTrend,
                isBearishTrend,
                weakEntry,
                falseBreakoutFilter,
                falseDumpFilter,
                callScore,
                putScore,
                canCall,
                canPut,
                confidence: clamp(Math.round(Math.max(callScore, putScore)), 0, 100)
            };
        }

        function evaluateLiquiditySignal(currCandle, prevCandle, zones, atr, strictness = 1) {
            if (!currCandle || !prevCandle || !zones || !Number.isFinite(atr)) return { isCall: false, isPut: false, strength: 0 };

            const rangeWidth = zones.upper - zones.lower;
            const isRangeValid = rangeWidth > (atr * (1.5 * strictness));

            const sweptTop = currCandle.high > zones.upper || prevCandle.high > zones.upper;
            const returnedInsideTop = currCandle.close < zones.upper;
            const structureBreakTop = currCandle.close < prevCandle.low;

            const sweptBottom = currCandle.low < zones.lower || prevCandle.low < zones.lower;
            const returnedInsideBottom = currCandle.close > zones.lower;
            const structureBreakBottom = currCandle.close > prevCandle.high;

            const isPut = sweptTop && returnedInsideTop && structureBreakTop && isRangeValid;
            const isCall = sweptBottom && returnedInsideBottom && structureBreakBottom && isRangeValid;
            const strength = clamp(Math.round((rangeWidth / Math.max(atr, 0.0000001)) * 18), 0, 100);

            return { isCall, isPut, strength, rangeWidth };
        }

        const LiveClock = () => {
          const [t, setT] = useState(new Date());
          useEffect(() => { const i = setInterval(() => setT(new Date()), 1000); return () => clearInterval(i); }, []);
          return <span className="text-slate-800 text-sm md:text-base mono-font font-bold">{t.toLocaleTimeString('ru-RU')}</span>;
        };

        const MiniChart = ({ data }) => {
          if (!data || !Array.isArray(data) || data.length < 2) {
            return <div className="w-full h-full flex items-center justify-center opacity-60 text-lg tracking-widest text-slate-500 font-bold animate-pulse oswald-font">ЗАГРУЗКА КЛАСТЕРОВ...</div>;
          }
          const chartData = data.slice(-40); 
          const min = Math.min(...chartData.map(d => d.low));
          const max = Math.max(...chartData.map(d => d.high));
          const maxVol = Math.max(...chartData.map(d => d.volume || 1));
          const range = (max - min) || 1;
          const width = 200, height = 80;
          const candleWidth = width / chartData.length;

          return (
            <svg className="w-full h-full opacity-90" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
              {chartData.map((c, i) => {
                const isUp = c.close >= c.open;
                const x = i * candleWidth;
                const w = candleWidth * 0.7;
                const oY = height - ((c.open - min) / range) * height;
                const cY = height - ((c.close - min) / range) * height;
                const hY = height - ((c.high - min) / range) * height;
                const lY = height - ((c.low - min) / range) * height;
                
                const volH = ((c.volume || 0) / maxVol) * 15;
                const volY = height - volH;

                return (
                  <g key={i}>
                    <line x1={x + w / 2} y1={hY} x2={x + w / 2} y2={lY} stroke={isUp ? "#0ea5e9" : "#94a3b8"} strokeWidth="1" />
                    <rect x={x} y={isUp ? cY : oY} width={w} height={Math.max(Math.abs(cY - oY), 1.2)} fill={isUp ? "#0ea5e9" : "transparent"} stroke={isUp ? "none" : "#94a3b8"} strokeWidth="1" rx="0.5" />
                    <rect x={x} y={volY} width={w} height={volH} fill={isUp ? "rgba(14, 165, 233, 0.2)" : "rgba(148, 163, 184, 0.2)"} />
                  </g>
                );
              })}
            </svg>
          );
        };

        const Speedometer = ({ value, label, colorHex = "#0284c7", glow = false }) => {
          const safeValue = isNaN(value) ? 50 : Math.max(0, Math.min(100, value));
          const angle = -90 + (safeValue / 100) * 180;
          const radius = 40;
          const circumference = Math.PI * radius;
          const strokeDashoffset = circumference - (safeValue / 100) * circumference;

          return (
            <div className="flex flex-col items-center flex-1 relative px-0.5 group pt-1">
              <svg viewBox="0 0 100 55" className="w-10 h-6 md:w-12 md:h-7 overflow-visible mt-1">
                <defs>
                    <filter id={`glow-${label.replace(/\s+/g, '')}`}>
                        <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
                        <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                {[0, 25, 50, 75, 100].map(tick => {
                   const a = -Math.PI + (tick/100)*Math.PI;
                   return <line key={tick} x1={50 + 36 * Math.cos(a)} y1={50 + 36 * Math.sin(a)} x2={50 + 44 * Math.cos(a)} y2={50 + 44 * Math.sin(a)} stroke="rgba(148, 163, 184, 0.5)" strokeWidth="2" strokeLinecap="round" />
                })}

                <g style={{ transform: `rotate(${angle}deg)`, transformOrigin: '50px 50px', transition: 'transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)' }}>

        const VolumetricArrow = ({ type }) => {

        const OrderBookDepth = ({ price }) => {

          if (!p) {

                  <div className="flex flex-col mono-font text-slate-800 border-l border-slate-300/50 px-3 justify-center h-full w-full relative">

                          <span>ЦЕНА</span><span>ОБЪЕМ</span>

                      <div className="flex items-center justify-center h-full text-[10px] md:text-xs text-slate-400 font-bold animate-pulse oswald-font tracking-widest">

                      </div>
                  </div>
              );

          const formattedP = formatPrice(p);

            <div className="flex flex-col mono-font text-slate-800 border-l border-slate-300/50 px-3 justify-center h-full w-full relative">

                <span>ЦЕНА</span><span>ОБЪЕМ</span>

              <div className="space-y-0.5 mt-1 relative z-10">
                {[...Array(3)].map((_, i) => {

                <div className="flex justify-between text-blue-900 bg-blue-100 border border-blue-400 my-1.5 px-2 py-0.5 text-xs md:text-sm font-black shadow-[0_0_15px_rgba(14,165,233,0.3)] rounded-md relative overflow-hidden">
                  <div className="absolute left-0 top-0 bottom-0 bg-blue-300/40" style={{width: `${Math.random()*60 + 20}%`}}></div>
                  <span className="relative z-10 drop-shadow-sm">{formattedP}</span>
                  <span className="relative z-10 text-blue-700">{Math.floor(Math.random() * 200 + 50)}</span>
                </div>
                {[...Array(3)].map((_, i) => {

                  return (
                  <div key={`bid-${i}`} className="flex justify-between text-[10px] md:text-xs text-emerald-600/90 font-bold tracking-wider relative">
                    <div className="absolute right-0 top-0 bottom-0 bg-emerald-100/50 rounded-sm transition-all" style={{width}}></div>

                    <span className="relative z-10 opacity-80">{vol}</span>

              </div>
            </div>

        };

        const HftTape = ({ price }) => {
          const [ticks, setTicks] = useState([]);
          useEffect(() => {
            if (!price) return;
            const int = setInterval(() => {
                const isBuy = Math.random() > 0.5;
                const amt = (Math.random() * 2 + 0.1).toFixed(2);
                const offset = (Math.random() * 2 - 1);
                const tickPrice = formatPrice(price + offset);
                setTicks(p => [{id: Date.now(), buy: isBuy, amt, price: tickPrice}, ...p].slice(0, 4));
            }, 600);
            return () => clearInterval(int);
          }, [price]);
          
          return (
             <div className="flex flex-col gap-1 w-[85px] md:w-[95px] pl-2 border-l border-slate-200/50 overflow-hidden justify-end pb-1 h-full shrink-0">
                {ticks.map(t => (
                    <div key={t.id} className={`hft-tick text-[9px] md:text-[10px] font-bold mono-font flex justify-between w-full ${t.buy ? 'text-emerald-600' : 'text-rose-600'}`}>
                        <span className="opacity-80">{t.price.slice(-2)}</span>
                        <span>{t.buy ? '▲' : '▼'}{t.amt}</span>
                    </div>
                ))}
             </div>
          )
        };

        const App = () => {
          const [isStarted, setIsStarted] = useState(false);
          const [appPhase, setAppPhase] = useState('СИНХРОНИЗАЦИЯ...');
          const [viewMode, setViewMode] = useState('SCREENER'); 
          const [scanIndex, setScanIndex] = useState(-1);
          const [asset, setAsset] = useState(ASSETS[0]);
          const [sparklines, setSparklines] = useState({});
          const [signal, setSignal] = useState(null);
          const [countdown, setCountdown] = useState(null);
          const [logs, setLogs] = useState([]);
          const [currentTF, setCurrentTF] = useState('1M');
          const [startupError, setStartupError] = useState('');
          
          const [metrics, setMetrics] = useState({ structure: 50, liquidity: 50, filterLevel: 1.0, smartMoney: 0, buyPressure: 50 });
          const [newsHeadlines, setNewsHeadlines] = useState(["ОБНОВЛЕНИЕ ДАННЫХ BTC..."]);
          const [tradeStats, setTradeStats] = useState({ wins: 0, losses: 0, cancels: 0, winRate: 0 });
          
          const [statusColorClass, setStatusColorClass] = useState('text-slate-800');
          
          const chartContainerRef = useRef(null);
          const chartInstance = useRef(null);
          const candleSeries = useRef(null);
          const extraSeriesRef = useRef([]); 
          const priceLinesRef = useRef([]);  
          
          const audioCtx = useRef(null);
          const engineActive = useRef(false);
          const currentPrice = useRef(null);
          const statsRef = useRef({ wins: 0, losses: 0, cancels: 0 });
          const filterStrictness = useRef(1.0); 
          const markersRef = useRef([]); 
          const cachedSnapshotRef = useRef(null);
          const resizeObserverRef = useRef(null);
          const resizeFallbackRef = useRef(null);
          const prepAbortRef = useRef(false);
          const countdownTimerRef = useRef(null);
          const liveLoopRef = useRef(null);
          const startInFlightRef = useRef(false);

          const logsContainerRef = useRef(null); 
          const fullNewsPool = useRef([...FALLBACK_BTC_NEWS]);

          const fetchNews = async () => {
              try {
                  const urls = [
                      'https://api.rss2json.com/v1/api.json?rss_url=https://forklog.com/feed/',
                      'https://api.rss2json.com/v1/api.json?rss_url=https://bits.media/rss2/'
                  ];
                  
                  let btcItems = [];
                  for(let u of urls) {
                      let res = await fetch(u).catch(()=>null);
                      if(res && res.ok) {
                          let data = await res.json();
                          if (data && data.items) {
                              let filtered = data.items
                                  .filter(item => /биткоин|btc|bitcoin/i.test(item.title))
                                  .map(item => item.title.replace(/<\/?[^>]+(>|$)/g, "").trim());
                              btcItems = [...btcItems, ...filtered];
                          }
                      }
                  }
                  
                  if (btcItems.length > 0) {
                      btcItems = [...new Set(btcItems)];
                      fullNewsPool.current = btcItems;
                      setNewsHeadlines(btcItems);
                  } else {
                      fullNewsPool.current = [...FALLBACK_BTC_NEWS];
                      setNewsHeadlines(FALLBACK_BTC_NEWS);
                  }
              } catch (error) { 
                  fullNewsPool.current = [...FALLBACK_BTC_NEWS];
                  setNewsHeadlines(FALLBACK_BTC_NEWS); 
              }
          };

          useEffect(() => {
            if(!isStarted) return;
            const interval = setInterval(() => {
                setMetrics(prev => {
                    const liqWobble = (Math.random() - 0.5) * 4;
                    const pressureWobble = (Math.random() - 0.5) * 6;
                    return {
                        ...prev,
                        smartMoney: prev.smartMoney > 0 ? Math.max(0, Math.min(100, prev.smartMoney + (Math.random() * 2 - 1))) : 0,
                        liquidity: Math.max(0, Math.min(100, prev.liquidity + liqWobble)),
                        buyPressure: Math.max(20, Math.min(80, prev.buyPressure + pressureWobble))
                    }
                });
            }, 1000);
            return () => clearInterval(interval);
          }, [isStarted]);

          useEffect(() => {
              const loadSparklines = async () => {
                  try {
                      const data = await ScannerAPI.getCandles('BTCUSDT', 60, STRATEGY_CONFIG.primaryInterval);
                      if (data && data.length > 0) {
                          setSparklines({'BTCUSDT': data});
                          currentPrice.current = data[data.length - 1].close;
                      }
                  } catch (error) {
                      reportError('Загрузка мини-графика', error);
                  }
              };
              loadSparklines();
          }, []);

          useEffect(() => {
            fetchNews();
            const newsInterval = setInterval(fetchNews, 20 * 60 * 1000); 
            return () => clearInterval(newsInterval);
          }, []);

          const addLog = (msg, isAi = false) => {
            const prefix = isAi ? 'SMC АНАЛИЗ:' : 'СИСТЕМА:';
            setLogs(p => [`${prefix} ${msg}`, ...p].slice(0, 5)); 
          };

          const reportError = (context, error) => {
            const message = describeError(error);
            console.error(`[${context}]`, error);
            addLog(`${context}: ${message}`, false);
          };

          const updateTradeStats = (nextStats) => {
            const wins = nextStats.wins || 0;
            const losses = nextStats.losses || 0;
            const cancels = nextStats.cancels || 0;
            const total = wins + losses;
            const winRate = total > 0 ? Math.round((wins / total) * 100) : 0;
            statsRef.current = { wins, losses, cancels };
            setTradeStats({ wins, losses, cancels, winRate });
          };

          const loadHistoryCache = () => {
            try {
                const raw = window.localStorage.getItem(SIGNAL_CACHE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                if (!parsed || !Array.isArray(parsed.candles) || !Array.isArray(parsed.markers)) return null;
                return parsed;
            } catch (error) {
                reportError('Чтение localStorage cache', error);
                return null;
            }
          };

          const persistHistoryCache = (candles, markers, stats) => {
            try {
                const payload = {
                    version: 1,
                    savedAt: Date.now(),
                    timeframe: STRATEGY_CONFIG.primaryInterval,
                    candles,
                    markers,
                    stats
                };
                window.localStorage.setItem(SIGNAL_CACHE_KEY, JSON.stringify(payload));
            } catch (error) {
                reportError('Сохранение localStorage cache', error);
            }
          };

          const applyCachedSnapshot = async (snapshot) => {
            if (!snapshot || !snapshot.candles || snapshot.candles.length === 0) return false;
            cachedSnapshotRef.current = snapshot;
            setAsset(ASSETS[0]);
            setViewMode('DETAIL');
            setCurrentTF('1M');
            await initChart();
            if (candleSeries.current) {
                candleSeries.current.setData(snapshot.candles);
                safeApplyMarkers(snapshot.markers || []);
                try { chartInstance.current.timeScale().fitContent(); } catch (error) {}
            }
            currentPrice.current = snapshot.candles[snapshot.candles.length - 1]?.close || null;
            updateTradeStats(snapshot.stats || { wins: 0, losses: 0, cancels: 0 });
            addLog('Загружен резервный кэш сигналов из localStorage.', true);
            return true;
          };

          const cleanupRuntime = () => {
            prepAbortRef.current = true;
            if (countdownTimerRef.current) {
                clearTimeout(countdownTimerRef.current);
                countdownTimerRef.current = null;
            }
            if (liveLoopRef.current) {
                clearTimeout(liveLoopRef.current);
                liveLoopRef.current = null;
            }
            setCountdown(null);
            setSignal(null);
          };

          const safeApplyMarkers = (markers) => {
            if (!candleSeries.current) return;
            const nextMarkers = Array.isArray(markers) ? markers.slice(-STRATEGY_CONFIG.markerLimit) : [];
            markersRef.current = nextMarkers;
            try {
                if (typeof candleSeries.current.setMarkers === 'function') {
                    candleSeries.current.setMarkers(nextMarkers);
                    return;
                }
                addLog('Маркеры временно недоступны в текущем API графика.', false);
            } catch (error) {
                reportError('Маркеры графика', error);
            }
          };

          useEffect(() => () => {
            engineActive.current = false;
            cleanupRuntime();
            if (resizeObserverRef.current) {
                try { resizeObserverRef.current.disconnect(); } catch (error) {}
            }
            if (resizeFallbackRef.current) {
                window.removeEventListener('resize', resizeFallbackRef.current);
            }
          }, []);

          const playSound = (type) => {
            if (!audioCtx.current) return;
            const ctx = audioCtx.current;
            if (ctx.state === 'suspended') ctx.resume();
            
            const playTone = (freq, oscType, dur, vol, delay = 0) => {
                try {
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = oscType;
                    o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
                    g.gain.setValueAtTime(0, ctx.currentTime + delay);
                    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(ctx.currentTime + delay);
                    o.stop(ctx.currentTime + delay + dur);
                } catch (e) {}
            };

            if (type === 'scan') playTone(1200 + Math.random()*300, 'sine', 0.03, 0.005);
            if (type === 'found') { playTone(600, 'triangle', 0.1, 0.03); playTone(800, 'triangle', 0.1, 0.03, 0.1); }
            if (type === 'tf_change') playTone(800, 'sine', 0.1, 0.02);
            if (type === 'start') { 
                playTone(523.25, 'sine', 0.4, 0.03); 
                playTone(659.25, 'sine', 0.5, 0.03, 0.1); 
                playTone(783.99, 'sine', 0.6, 0.04, 0.2); 
            }
            if (type === 'win') { 
                playTone(523.25, 'triangle', 0.4, 0.04); 
                playTone(659.25, 'triangle', 0.5, 0.04, 0.1); 
                playTone(783.99, 'triangle', 0.8, 0.05, 0.2); 
            }
            if (type === 'loss') { 
                playTone(300, 'sawtooth', 0.4, 0.03); 
                playTone(250, 'sawtooth', 0.6, 0.04, 0.2); 
            }
            if (type === 'cancel') {
                playTone(400, 'square', 0.1, 0.04); 
                playTone(300, 'square', 0.2, 0.04, 0.15); 
            }
          };

          const speak = (text) => new Promise(res => {
            if (!window.speechSynthesis) return res();
            window.speechSynthesis.cancel(); 
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ru-RU'; 
            u.rate = 1.05; 
            u.pitch = 0.95; 
            
            let resolved = false;
            let fallbackTimer;

            const resolveOnce = () => {
                if (!resolved) {
                    resolved = true;
                    clearTimeout(fallbackTimer);
                    setTimeout(res, 200); 
                }
            };

            u.onend = resolveOnce; 
            u.onerror = resolveOnce;
            
            try {
                window.speechSynthesis.speak(u);
            } catch(e) { resolveOnce(); }
            
            fallbackTimer = setTimeout(resolveOnce, Math.max(3000, text.length * 80)); 
          });

          const initChart = async () => {
            if (!chartContainerRef.current) throw new Error('Контейнер графика не найден');
            if (!window.LightweightCharts) {
              await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = CHART_LIBRARY_URL;
                script.onload = resolve;
                script.onerror = () => reject(new Error('Не удалось загрузить lightweight-charts'));
                document.head.appendChild(script);
              });
            }

            if (chartInstance.current) {
                const rect = chartContainerRef.current.getBoundingClientRect();
                if (rect.width > 0 && rect.height > 0) {
                    chartInstance.current.applyOptions({ width: rect.width, height: rect.height });
                }
                return;
            }

            try {
                let rect = chartContainerRef.current.getBoundingClientRect();
                let attempts = 0;
                while ((rect.width === 0 || rect.height === 0) && attempts < 12) {
                    await wait(120);
                    rect = chartContainerRef.current.getBoundingClientRect();
                    attempts++;
                }
                if (rect.width === 0 || rect.height === 0) {
                    throw new Error('Контейнер графика имеет нулевой размер');
                }

                const mainChart = window.LightweightCharts.createChart(chartContainerRef.current, {
                  width: rect.width,
                  height: rect.height,
                  layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#475569', fontFamily: 'JetBrains Mono' },
                  grid: { vertLines: { color: 'rgba(148, 163, 184, 0.2)' }, horzLines: { color: 'rgba(148, 163, 184, 0.2)' } },
                  timeScale: { borderVisible: false, timeVisible: true, secondsVisible: false },
                  rightPriceScale: { borderVisible: false }
                });

                candleSeries.current = mainChart.addCandlestickSeries({ 
                  upColor: '#0ea5e9', 
                  downColor: '#ef4444', 
                  borderVisible: true, 
                  borderUpColor: '#0ea5e9', 
                  borderDownColor: '#ef4444', 
                  wickUpColor: '#0ea5e9', 
                  wickDownColor: '#ef4444'
                });

                chartInstance.current = mainChart;
                const syncChartSize = () => {
                    if (!chartContainerRef.current || !chartInstance.current) return;
                    const bounds = chartContainerRef.current.getBoundingClientRect();
                    if (bounds.width > 0 && bounds.height > 0) {
                        chartInstance.current.applyOptions({ width: bounds.width, height: bounds.height });
                        try { chartInstance.current.timeScale().fitContent(); } catch (error) {}
                    }
                };

                if (resizeObserverRef.current) {
                    try { resizeObserverRef.current.disconnect(); } catch (error) {}
                }
                if (resizeFallbackRef.current) {
                    window.removeEventListener('resize', resizeFallbackRef.current);
                }

                if (typeof ResizeObserver === 'function') {
                    resizeObserverRef.current = new ResizeObserver(() => syncChartSize());
                    resizeObserverRef.current.observe(chartContainerRef.current);
                } else {
                    resizeFallbackRef.current = syncChartSize;
                    window.addEventListener('resize', resizeFallbackRef.current);
                }
            } catch(e) {
                reportError('Инициализация графика', e);
                throw e;
            }
          };

          const clearChartExtras = () => {
              if (!chartInstance.current || !candleSeries.current) return;
              
              priceLinesRef.current.forEach(l => {
                  try { candleSeries.current.removePriceLine(l); } catch(e){}
              });
              priceLinesRef.current = [];
              
              extraSeriesRef.current.forEach(s => {
                  try { chartInstance.current.removeSeries(s); } catch(e){}
              });
              extraSeriesRef.current = [];
          };

          const drawIndicators = (upperData, lowerData) => {
              clearChartExtras();
              let upperSeries, lowerSeries;
              
              try {
                  upperSeries = chartInstance.current.addLineSeries({ 
                      color: 'rgba(244, 63, 94, 0.5)', // Rose-500
                      lineWidth: 2, 
                      lineStyle: 2, // Dashed
                      title: 'BUY LIQUIDITY' 
                  });
                  upperSeries.setData(upperData);
                  extraSeriesRef.current.push(upperSeries);

                  lowerSeries = chartInstance.current.addLineSeries({ 
                      color: 'rgba(16, 185, 129, 0.5)', // Emerald-500
                      lineWidth: 2, 
                      lineStyle: 2, // Dashed
                      title: 'SELL LIQUIDITY' 
                  });
                  lowerSeries.setData(lowerData);
                  extraSeriesRef.current.push(lowerSeries);
              } catch(e) {}
              
              return { upperSeries, lowerSeries };
          };

          const drawEntryLine = (price) => {
            if (!candleSeries.current) return;
            try {
                const line = candleSeries.current.createPriceLine({
                    price: price,
                    color: '#1d4ed8',
                    lineWidth: 2,
                    lineStyle: 3,
                    axisLabelVisible: true,
                    title: `ВХОД (CHoCH)`
                });
                priceLinesRef.current.push(line);
            } catch(e) {}
          };

          const updateStatus = (phase, colorClass) => {
              setAppPhase(phase);
              setStatusColorClass(colorClass);
          };

          const syncMetricsFromContext = (context, direction) => {
              if (!context) return;
              const liquidity = clamp(Math.round((context.rangeWidth / Math.max(context.atr, 0.0000001)) * 22), 20, 100);
              const smartMoney = clamp(context.confidence, 10, 100);
              const buyPressure = direction === 'CALL'
                  ? clamp(55 + Math.round(context.callScore / 2), 50, 92)
                  : clamp(45 - Math.round(context.putScore / 2), 8, 50);

              setMetrics(prev => ({
                  ...prev,
                  structure: direction === 'CALL' ? 86 : 14,
                  liquidity,
                  filterLevel: Number((filterStrictness.current * 10).toFixed(1)),
                  smartMoney,
                  buyPressure
              }));
          };

          const runTerminalEngine = async () => {
            if (engineActive.current) return;
            engineActive.current = true;

            cleanupRuntime();
            if (audioCtx.current && audioCtx.current.state === 'suspended') {
                await audioCtx.current.resume();
            }

            let lastCancelledTime = 0;

            await speak('Институциональный алгоритм активирован. Идет анализ Smart Money за последние двенадцать часов. Использую исходную логику снятия ликвидности и слома структуры, а экспирация сделки остается пять минут.');
            await wait(500);

            markersRef.current = [];
            updateStatus('БЭКТЕСТ: АНАЛИЗ 12H ИСТОРИИ...', 'text-cyan-600');
            addLog(`ЗАПУСК НЕЙРОСЕТИ: BTC ${STRATEGY_CONFIG.historyHours}H • ИСХОДНАЯ ЛОГИКА SMC`, true);
            addLog(`СНАЧАЛА ПОКАЗЫВАЮ РЕЗЕРВНЫЙ КЭШ, ЗАТЕМ ПЕРЕСЧИТЫВАЮ ИСТОРИЮ ДЕТЕРМИНИРОВАННО`, true);

            const curAsset = ASSETS[0];
            const cachedSnapshot = loadHistoryCache();
            if (cachedSnapshot) {
                await applyCachedSnapshot(cachedSnapshot);
            }
            let initialData = [];
            try {
                initialData = await ScannerAPI.getCandles(curAsset.symbol, STRATEGY_CONFIG.historyLimit, STRATEGY_CONFIG.primaryInterval);
            } catch (error) {
                reportError('Загрузка истории Binance', error);
                if (cachedSnapshot && Array.isArray(cachedSnapshot.candles) && cachedSnapshot.candles.length > 0) {
                    initialData = cachedSnapshot.candles;
                    addLog('Binance недоступен. Использую резервный кэш сигналов и свечей.', true);
                } else {
                    throw error;
                }
            }
            
            if (initialData && initialData.length > 80) {
                setSparklines(prev => ({...prev, [curAsset.symbol]: initialData}));
                currentPrice.current = initialData[initialData.length - 1].close;

                const liqZones = calcLiquidityZones(initialData, STRATEGY_CONFIG.historyRangePeriod); 
                const atrSeries = calcATRSeries(initialData, STRATEGY_CONFIG.atrPeriod); 

                const liqMap = new Map(liqZones.map(i => [i.time, {upper: i.upper, lower: i.lower}]));
                const atrMap = new Map(atrSeries.map(i => [i.time, i.value]));

                const upperData = liqZones.map(i => ({time: i.time, value: i.upper}));
                const lowerData = liqZones.map(i => ({time: i.time, value: i.lower}));

                let historicalWins = 0;
                let historicalLosses = 0;
                let historicalCancels = 0;
                const historyStrictness = 0.8;
                const startIdx = Math.max(STRATEGY_CONFIG.historyRangePeriod + 2, 35);
                const endIdx = initialData.length - 6;

                for (let idx = startIdx; idx <= endIdx; idx++) {
                    const currCandle = initialData[idx];
                    const prevCandle = initialData[idx - 1];
                    const zones = liqMap.get(currCandle.time);
                    const cAtr = atrMap.get(currCandle.time);
                    const signalEval = evaluateLiquiditySignal(currCandle, prevCandle, zones, cAtr, historyStrictness);
                    const direction = signalEval.isCall ? 'CALL' : (signalEval.isPut ? 'PUT' : null);
                    if (!direction) continue;

                    const entryPrice = currCandle.close;
                    const expiryCandle = initialData[idx + 5];
                    if (!expiryCandle) continue;
                    const exitPrice = expiryCandle.close;
                    const isWin = direction === 'CALL' ? exitPrice >= entryPrice : exitPrice <= entryPrice;

                    markersRef.current.push({
                        time: currCandle.time,
                        position: direction === 'CALL' ? 'belowBar' : 'aboveBar',
                        color: direction === 'CALL' ? '#0ea5e9' : '#f43f5e',
                        shape: direction === 'CALL' ? 'arrowUp' : 'arrowDown',
                        text: isWin ? 'ВИН (+)' : 'ЛОСС (-)',
                        size: 1
                    });

                    if (isWin) historicalWins++;
                    else historicalLosses++;

                    idx += 5;
                }

                const total = historicalWins + historicalLosses;
                const wr = total > 0 ? Math.round((historicalWins / total) * 100) : 0;
                updateTradeStats({ wins: historicalWins, losses: historicalLosses, cancels: historicalCancels });

                if (total > 0) {
                    addLog(`БЭКТЕСТ 12H ЗАВЕРШЕН: СИГНАЛОВ ${total}, WINRATE ${wr}%`, true);
                    addLog(`ИСТОРИЯ СЧИТАЕТСЯ ПО ТОЙ ЖЕ БАЗОВОЙ LOGIC LIQUIDITY SWEEP + CHOCH`, true);
                    if (wr >= 60) filterStrictness.current = 1.0;
                    else filterStrictness.current = 1.25;
                } else {
                    addLog(`БЭКТЕСТ 12H: СИЛЬНЫХ ПАТТЕРНОВ ИСХОДНОЙ ЛОГИКИ НЕ ОБНАРУЖЕНО.`, true);
                }

                setAsset(curAsset);
                setViewMode('DETAIL');
                setCurrentTF('1M');
                await initChart();
                if (candleSeries.current) {
                    candleSeries.current.setData(initialData);
                    safeApplyMarkers(markersRef.current);
                    drawIndicators(upperData, lowerData);
                    try { chartInstance.current.timeScale().fitContent(); } catch(e) {}
                }
                setMetrics(prev => ({ ...prev, structure: 50, liquidity: 72, filterLevel: filterStrictness.current * 10, smartMoney: 40, buyPressure: 50 }));
                persistHistoryCache(initialData, markersRef.current, { wins: historicalWins, losses: historicalLosses, cancels: historicalCancels });

                if (total > 0) {
                    playSound('win');
                    await speak(`Бэктест завершен. История сигналов за последние двенадцать часов восстановлена по исходной логике снятия ликвидности. Перехожу к живому сканированию рынка.`);
                } else {
                    await speak(`Бэктест завершен. За последние двенадцать часов сильных паттернов исходной логики не обнаружено. Перехожу к живому сканированию рынка.`);
                }

                updateStatus('ИЗУЧЕНИЕ РЕАЛЬНОЙ ИСТОРИИ...', 'text-slate-500');
                await wait(3000);

                await speak('Запускаю радар поиска новой ликвидности.');
                setViewMode('SCREENER');
                await wait(1000);
                startInFlightRef.current = false;
            } else {
                addLog("ОШИБКА: BINANCE НЕ ВЕРНУЛ ДОСТАТОЧНО ДАННЫХ ДЛЯ СТАРТА", true);
                updateStatus('ОШИБКА API BINANCE', 'text-rose-600');
                await speak('Ошибка связи с криптобиржей Бинанс. Попробуйте перезапустить утилиту позже.');
                throw new Error('Недостаточно данных Binance для запуска');
            }
            
            // ОСНОВНОЙ ЛАЙВ-ЦИКЛ
            while (engineActive.current) {
              try {
                  updateStatus('СКАНИРОВАНИЕ ЛИКВИДНОСТИ...', 'text-slate-700');
                  setViewMode('SCREENER');
                  setSignal(null);
                  setCurrentTF('1M');
                  
                  setMetrics(prev => ({ ...prev, filterLevel: Number((filterStrictness.current * 10).toFixed(1)), smartMoney: 15 }));

                  let signalFound = false;

                  for(let cur of ASSETS) {
                    if (!engineActive.current) break;
                    setScanIndex(0); 
                    playSound('scan');
                    
                    const data = await ScannerAPI.getCandles(cur.symbol, STRATEGY_CONFIG.liveLimit, STRATEGY_CONFIG.primaryInterval); 
                    
                    if (data && data.length > 80) {
                      setSparklines(prev => ({...prev, [cur.symbol]: data}));

                      const lastIdx = data.length - 1;
                      currentPrice.current = data[lastIdx].close; 

                      const liqZones = calcLiquidityZones(data, STRATEGY_CONFIG.liveRangePeriod); 
                      const atrSeries = calcATRSeries(data, STRATEGY_CONFIG.atrPeriod);    

                      const liqMap = new Map(liqZones.map(i => [i.time, {upper: i.upper, lower: i.lower}]));
                      const atrMap = new Map(atrSeries.map(i => [i.time, i.value]));

                      const upperData = liqZones.map(i => ({time: i.time, value: i.upper}));
                      const lowerData = liqZones.map(i => ({time: i.time, value: i.lower}));

                      let isCall = false;
                      let isPut = false;
                      let triggerCandleIdx = lastIdx;
                      let activeSignalStrength = 50;
                      let activeZones = null;

                      for (let j = 0; j < 3; j++) {
                          const idx = lastIdx - j;
                          if (idx < STRATEGY_CONFIG.liveRangePeriod + 2) continue;
                          const currCandle = data[idx];
                          const prevCandle = data[idx - 1];
                          const zones = liqMap.get(currCandle.time);
                          const cAtr = atrMap.get(currCandle.time);
                          const signalEval = evaluateLiquiditySignal(currCandle, prevCandle, zones, cAtr, filterStrictness.current);
                          if (currCandle.time === lastCancelledTime) continue;

                          if (signalEval.isPut) {
                              isPut = true;
                              triggerCandleIdx = idx;
                              activeSignalStrength = signalEval.strength;
                              activeZones = zones;
                              break;
                          }

                          if (signalEval.isCall) {
                              isCall = true;
                              triggerCandleIdx = idx;
                              activeSignalStrength = signalEval.strength;
                              activeZones = zones;
                              break;
                          }
                      }

                      if (isCall || isPut) {
                          signalFound = true;
                          
                          setAsset(cur);
                          setViewMode('DETAIL');
                          setMetrics(prev => ({
                              ...prev,
                              structure: isCall ? 100 : 0,
                              liquidity: clamp(activeSignalStrength, 35, 95),
                              filterLevel: Number((filterStrictness.current * 10).toFixed(1)),
                              smartMoney: 85,
                              buyPressure: isCall ? 85 : 15
                          }));

                          await initChart();
                          playSound('found');
                          
                          if(candleSeries.current) {
                              try { 
                                  candleSeries.current.setData(data);
                                  
                                  markersRef.current.push({
                                      time: data[triggerCandleIdx].time,
                                      position: isCall ? 'belowBar' : 'aboveBar',
                                      color: isCall ? '#0ea5e9' : '#f43f5e',
                                      shape: isCall ? 'arrowUp' : 'arrowDown',
                                      text: 'ВХОД (CHoCH)',
                                      size: 2
                                  });
                                  safeApplyMarkers(markersRef.current);
                              } catch (e) {}
                          }

                          const liveMarkerIdx = markersRef.current.length - 1;
                          drawIndicators(upperData, lowerData);
                          currentPrice.current = data[lastIdx].close;
                          
                          const directionText = isCall ? "повышение" : "понижение";
                          
                          updateStatus(`ГОТОВЬТЕ: BTC`, 'text-cyan-600 font-bold animate-pulse');
                          addLog(`ЗАФИКСИРОВАНО СНЯТИЕ ЛИКВИДНОСТИ`, true);
                          addLog(`СЛОМ СТРУКТУРЫ (CHoCH) ПОДТВЕРЖДЕН`, true);
                          addLog(`ИСТОРИЧЕСКИЕ СИГНАЛЫ СОХРАНЯЮТСЯ В LOCALSTORAGE КАК РЕЗЕРВ`, true);

                          await speak(`Внимание. Зафиксировано снятие ликвидности маркетмейкером и возврат цены в диапазон. Слом структуры подтвержден. Подготовьте Биткоин. Время пять минут. Направление на ${directionText}.`);

                          for(let w=STRATEGY_CONFIG.prepDelaySeconds; w>0; w--) {
                              updateStatus(`ПОДГОТОВКА К ВХОДУ... ${w}С`, 'text-amber-600 font-bold animate-pulse');
                              playSound('scan');
                              await wait(1000);
                          }

                          let tradeCancelled = false;
                          updateStatus('СНАЙПЕР: ФИНАЛЬНЫЙ 1M CHECK', 'text-slate-800 font-bold animate-pulse');
                          addLog(`ЖДЕМ ТЕХНИЧЕСКОГО CONFIRM/CANCEL НА 1M...`, true);

                          for(let w=0; w<STRATEGY_CONFIG.confirmLookback; w++) {
                              await wait(1000);
                              try {
                                  const liveData = await ScannerAPI.getCandles(cur.symbol, STRATEGY_CONFIG.confirmFetchCount, STRATEGY_CONFIG.confirmInterval);
                                  const liveTick = liveData[liveData.length - 1];
                                  
                                  if (liveTick && liveTick.time >= data[data.length - 1].time) {
                                      currentPrice.current = liveTick.close;
                                      if (candleSeries.current) {
                                          try { candleSeries.current.update(liveTick); } catch(e){}
                                      }

                                      if (isPut && activeZones && liveTick.close > activeZones.upper) tradeCancelled = true;
                                      if (isCall && activeZones && liveTick.close < activeZones.lower) tradeCancelled = true;
                                  }
                              } catch(e) {
                                  reportError('1m confirm/cancel', e);
                              }
                              if (tradeCancelled) break;
                          }

                          if (tradeCancelled) {
                              lastCancelledTime = data[triggerCandleIdx].time; 
                              playSound('cancel');
                              updateStatus('ОТМЕНА: ЦЕНА ПОШЛА ПРОТИВ ВХОДА', 'text-rose-600 font-bold');
                              addLog(`СИГНАЛ ОТМЕНЕН: 1M-СЛОЙ ПОДТВЕРДИЛ ДВИЖЕНИЕ ПРОТИВ ВХОДА`, true);
                              updateTradeStats({ ...statsRef.current, cancels: (statsRef.current.cancels || 0) + 1 });
                              if (markersRef.current[liveMarkerIdx]) {
                                  markersRef.current[liveMarkerIdx].text = 'ОТМЕНА';
                                  markersRef.current[liveMarkerIdx].color = '#f59e0b';
                                  safeApplyMarkers(markersRef.current);
                              }
                              persistHistoryCache(data, markersRef.current, { ...statsRef.current, cancels: (statsRef.current.cancels || 0) });
                              await speak("Внимание. Отмена. Одноминутный технический слой показал движение цены против входа. Возвращаюсь к радару.");
                              
                              await wait(2500);
                              setViewMode('SCREENER');
                              updateStatus('ПЕРЕЗАПУСК СКАНИРОВАНИЯ...', 'text-slate-600');
                              await wait(1500);
                              break; 
                          }

                          playSound('start');
                          updateStatus('СИГНАЛ АКТИВЕН', 'text-blue-700 font-bold');
                          
                          const entryPrice = currentPrice.current;
                          const expMins = STRATEGY_CONFIG.expiryMinutes; 
                          
                          setSignal({ type: isCall ? 'CALL' : 'PUT', exp: expMins, entryPrice });
                          drawEntryLine(entryPrice);

                          addLog(`СИГНАЛ ВЫПОЛНЕН: ВХОД ${isCall ? 'ВВЕРХ' : 'ВНИЗ'} НА 5 МИН.`, true);

                          speak(`Слом структуры подтвержден. Вход на ${directionText}! Время пять минут. Жмите кнопку!`);

                          let newsReadInThisTrade = false;
                          const readOneRealBtcNews = () => {
                             if(fullNewsPool.current.length === 0) {
                                 fetchNews(); 
                                 return;
                             }
                             const idx = Math.floor(Math.random() * fullNewsPool.current.length);
                             const textToRead = fullNewsPool.current.splice(idx, 1)[0].toLowerCase(); 
                             
                             try {
                                 if(window.speechSynthesis && !window.speechSynthesis.speaking) {
                                     const u = new SpeechSynthesisUtterance("Сводка: " + textToRead);
                                     u.lang = 'ru-RU'; u.rate = 1.1; u.pitch = 0.95;
                                     window.speechSynthesis.speak(u);
                                 }
                             } catch(e){}
                          };

                          let expirySeconds = expMins * 60;
                          let isLive = true;
                          
                          const liveChartTask = (async () => {
                            let localLastTime = 0;
                            while (isLive && engineActive.current) {
                              await wait(2000);
                              if (!isLive) break;
                              try {
                                const liveTickArray = await ScannerAPI.getCandles(cur.symbol, 2, STRATEGY_CONFIG.confirmInterval);
                                if (liveTickArray && liveTickArray.length > 0 && candleSeries.current) {
                                  liveTickArray.forEach(tick => {
                                    if (tick.time >= localLastTime && !isNaN(tick.close)) {
                                      try {
                                          candleSeries.current.update(tick);
                                          currentPrice.current = tick.close;
                                          localLastTime = Math.max(localLastTime, tick.time);
                                      } catch (err) {}
                                    }
                                  });
                                }
                              } catch (e) {
                                reportError('Обновление лайв-графика', e);
                              }
                            }
                          })();

                          while(expirySeconds > 0) {
                            setCountdown(expirySeconds);
                            
                            if (expirySeconds === Math.floor((expMins * 60) / 2) && !newsReadInThisTrade) {
                                 readOneRealBtcNews();
                                 newsReadInThisTrade = true;
                            }

                            await wait(1000);
                            expirySeconds--;
                          }
                          
                          isLive = false;
                          setCountdown(null);
                          updateStatus('АНАЛИЗ РЕЗУЛЬТАТА', 'text-slate-500');

                          const resultData = await ScannerAPI.getCandles(cur.symbol, 1, STRATEGY_CONFIG.confirmInterval);
                          let finalPrice = entryPrice;
                          if (resultData && resultData.length > 0) {
                              finalPrice = resultData[resultData.length - 1].close;
                          }
                          let isWin = false;

                          if ((isCall && finalPrice > entryPrice) || (isPut && finalPrice < entryPrice)) isWin = true;
                          else if (finalPrice === entryPrice) isWin = true; 

                          if (markersRef.current[liveMarkerIdx]) {
                              markersRef.current[liveMarkerIdx].text = isWin ? 'ВИН (+)' : 'ЛОСС (-)';
                              safeApplyMarkers(markersRef.current);
                          }

                          if (isWin) {
                            playSound('win');
                            updateTradeStats({ ...statsRef.current, wins: statsRef.current.wins + 1 });
                            filterStrictness.current = Math.max(1.0, filterStrictness.current - 0.2);
                          } else {
                            playSound('loss');
                            updateTradeStats({ ...statsRef.current, losses: statsRef.current.losses + 1 });
                            filterStrictness.current = Math.min(2.2, filterStrictness.current + 0.15);
                            addLog(`ФИЛЬТРЫ ЛИКВИДНОСТИ УСИЛЕНЫ ДО ${filterStrictness.current.toFixed(1)}`, true);
                          }

                          const newTotal = statsRef.current.wins + statsRef.current.losses;
                          const newWinRate = newTotal > 0 ? Math.round((statsRef.current.wins / newTotal) * 100) : 0;

                          if (isWin) {
                            addLog(`РЕЗУЛЬТАТ: ПЛЮС (+). ВЫХОД: ${formatPrice(finalPrice)}`);
                            await speak(`Плюс. Сделка успешно завершена. Текущий винрейт: ${newWinRate} процентов.`);
                          } else {
                            addLog(`РЕЗУЛЬТАТ: МИНУС (-).`);
                            await speak(`Минус. Маркетмейкер пошел дальше. Усиливаю фильтры ликвидности.`);
                          }
                          persistHistoryCache(data, markersRef.current, { ...statsRef.current });

                          setSignal(null);
                          setMetrics(prev => ({ ...prev, smartMoney: 0 }));
                          await wait(2000);
                          break; 
                      }
                    }
                  }
                  
                  if (!signalFound) {
                      await wait(1500); 
                  }
              } catch (e) {
                  reportError('Live scan', e);
                  addLog("ПЕРЕЗАПУСК РАДАРА...", true);
                  await wait(STRATEGY_CONFIG.retryDelayMs);
              }
            }
          };

          const startTerminal = () => {
            if (engineActive.current || startInFlightRef.current) {
                addLog('ТЕРМИНАЛ УЖЕ ЗАПУЩЕН ИЛИ ЕЩЕ ИНИЦИАЛИЗИРУЕТСЯ.', false);
                return;
            }
            startInFlightRef.current = true;
            setStartupError('');
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx.current = new AudioContext();
            const osc = audioCtx.current.createOscillator();
            osc.connect(audioCtx.current.destination);
            osc.start(0); osc.stop(0.01);

            if (window.speechSynthesis) {
                const unlockUtterance = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(unlockUtterance);
            }

            setIsStarted(true);
            runTerminalEngine().catch(error => {
                cleanupRuntime();
                engineActive.current = false;
                startInFlightRef.current = false;
                reportError('Старт терминала', error);
                updateStatus('ОШИБКА ЗАПУСКА', 'text-rose-600');
                setStartupError(describeError(error));
                setIsStarted(false);
            });
          };

          if (!isStarted) {
            return (
              <div className="h-[100dvh] w-screen flex flex-col items-center justify-center relative overflow-hidden text-slate-900">
                <div className="bg-orb-1 pointer-events-none"></div>
                <div className="bg-orb-2 pointer-events-none"></div>
                <div className="absolute inset-0 bg-grid-pattern pointer-events-none opacity-40"></div>
                
                <div className="max-w-[90%] sm:max-w-md w-full p-8 md:p-12 text-center relative z-10 glass-panel-heavy rounded-[2.5rem] premium-glow flex flex-col items-center">
                  <div className="w-20 h-20 mb-6 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center shadow-[0_15px_30px_rgba(14,165,233,0.4)] border border-white/50 relative overflow-hidden">
                      <div className="absolute inset-0 bg-white/20 animate-pulse"></div>
                      <Zap size={44} className="text-white relative z-10" />
                  </div>
                  <h1 className="text-4xl md:text-5xl text-slate-800 leading-none mb-3 oswald-font font-bold tracking-wide drop-shadow-sm">
                    КРИПТО ЯДРО <br/><span className="text-gradient font-black drop-shadow-[0_0_15px_rgba(14,165,233,0.3)]">PRO MAX</span>
                  </h1>
                  <p className="text-sm md:text-base text-slate-500 tracking-[0.2em] mb-10 font-bold leading-tight uppercase">
                    Smart Money Concepts
                  </p>
                  {startupError ? (
                    <div className="w-full mb-6 px-4 py-3 rounded-2xl border border-rose-200 bg-rose-50/90 text-rose-700 text-xs md:text-sm font-bold tracking-wide">
                      ОШИБКА ЗАПУСКА: {startupError}
                    </div>
                  ) : null}
                  <button 
                    onClick={startTerminal} 
                    className="w-full py-4 bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 border border-white/50 shadow-[0_15px_35px_rgba(14,165,233,0.4)] text-white text-xl md:text-2xl transition-all duration-300 oswald-font font-bold active:scale-95 rounded-2xl cursor-pointer flex items-center justify-center gap-3 group relative overflow-hidden"
                  >
                    <div className="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out"></div>
                    <Cpu size={24} className="text-blue-50 group-hover:animate-spin relative z-10" /> 
                    <span className="relative z-10 tracking-widest">ЗАПУСК СИСТЕМЫ</span>
                  </button>
                </div>
              </div>
            );
          }

          return (
            <div className="h-[100dvh] w-screen flex flex-col text-slate-900 relative overflow-hidden selection:bg-cyan-500/20">
              <div className="bg-orb-1 pointer-events-none opacity-80"></div>
              <div className="bg-orb-2 pointer-events-none opacity-80"></div>
              <div className="absolute inset-0 bg-grid-pattern pointer-events-none z-0 opacity-60"></div>

              <div className="h-7 md:h-9 glass-panel z-50 overflow-hidden flex items-center shrink-0 w-full relative">
                <div className="absolute left-0 h-full bg-slate-900 text-white px-3 md:px-5 flex items-center gap-2 z-20 text-[10px] md:text-xs tracking-widest shadow-[5px_0_15px_rgba(0,0,0,0.1)] font-bold oswald-font rounded-r-xl border-r border-cyan-500/50">
                  <Globe size={14} className="text-cyan-400" /> РАДАР СЕТИ
                </div>
                <div className="flex-1 overflow-hidden relative h-full flex items-center ml-[120px] sm:ml-[160px]">
                  <div className="ticker-wrapper text-[10px] md:text-xs text-slate-700 tracking-widest pt-0.5 font-bold oswald-font">
                    {[...Array(2)].map((_, idx) => (
                      <div key={idx} className="flex gap-10 md:gap-16 whitespace-nowrap pr-10 md:pr-16">

                              {tradeStats.winRate >= 50 && <div className="absolute inset-0 bg-white/40 w-full animate-pulse"></div>}
                           </div>
                           <div 
                             className="h-full bg-gradient-to-r from-rose-600 to-rose-400 transition-all duration-1000 ease-out relative"
                             style={{ 
                                 width: `${(tradeStats.wins + tradeStats.losses) > 0 ? (tradeStats.losses / (tradeStats.wins + tradeStats.losses)) * 100 : 50}%`,

                               <span className="text-xl md:text-2xl text-rose-600 font-black ios-text leading-none mt-0.5">{tradeStats.losses}</span>

                            {countdown !== null ? `${Math.floor(countdown/60)}:${(countdown%60).toString().padStart(2,'0')}` : (signal && signal.exp ? `0${signal.exp}:00` : '--:--')}

                    </div>

                    <div ref={logsContainerRef} className="flex-1 glass-card rounded-2xl p-4 overflow-hidden flex flex-col justify-start gap-2 border-white bg-white shadow-[inset_0_2px_15px_rgba(0,0,0,0.02)]">

              <footer className="h-auto md:h-12 py-2 md:py-0 border-t border-white/50 flex flex-row items-center justify-between px-4 md:px-6 shrink-0 glass-panel z-40 bg-white/90">

                <div className="flex items-center gap-3 oswald-font">

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
