<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC PRO MAX | SLAVA GORDEEV</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&family=Oswald:wght@300;500;700&display=swap');
        
        body { 
            margin: 0; padding: 0; 
            background: #f0f2f5;
            color: #1e293b; 
            overflow: hidden; 
            font-family: 'Montserrat', sans-serif;
        }

        .oswald-font { font-family: 'Oswald', sans-serif; letter-spacing: 0.05em; text-transform: uppercase; }
        
        /* СЕРЕБРИСТОЕ ИМЯ РАЗРАБОТЧИКА */
        .silver-text {
            background: linear-gradient(180deg, #f8fafc 0%, #94a3b8 50%, #475569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1));
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,1);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,1);
        }

        .ticker-wrapper { display: flex; width: max-content; animation: ticker 40s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .premium-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-btn:active { transform: scale(0.95); opacity: 0.9; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Иконки
        const Zap = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const Globe = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;

        const ScannerAPI = {
          async getCandles(symbol, limit = 200) {
            try {
              const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=${limit}`);
              const data = await res.json();
              return data.map(d => ({
                time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]),
                low: parseFloat(d[3]), close: parseFloat(d[4]), volume: parseFloat(d[5])
              }));
            } catch(e) { return []; }
          }
        };

        const Speedometer = ({ value, label, color = "#3b82f6" }) => {
          const angle = -90 + (value / 100) * 180;
          return (
            <div className="flex flex-col items-center flex-1">
              <svg viewBox="0 0 100 60" className="w-12 h-8 overflow-visible">
                <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#e2e8f0" strokeWidth="6" strokeLinecap="round" />
                <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke={color} strokeWidth="6" strokeLinecap="round" strokeDasharray="125.6" strokeDashoffset={125.6 - (value/100)*125.6} style={{transition:'0.8s'}} />
                <circle cx="50" cy="50" r="4" fill={color} />
                <line x1="50" y1="50" x2={50 + 35 * Math.cos((angle * Math.PI)/180)} y2={50 + 35 * Math.sin((angle * Math.PI)/180)} stroke={color} strokeWidth="2" />
              </svg>
              <div className="text-lg font-black mt-1 text-slate-800">{Math.round(value)}</div>
              <div className="text-[8px] text-slate-400 font-bold uppercase tracking-widest">{label}</div>
            </div>
          );
        };

        const App = () => {
          const [isStarted, setIsStarted] = useState(false);
          const [phase, setPhase] = useState("ИНИЦИАЛИЗАЦИЯ...");
          const [view, setView] = useState("SCREENER"); // SCREENER или DETAIL
          const [news, setNews] = useState(["ОБНОВЛЕНИЕ ДАННЫХ BTC..."]);
          const [stats, setStats] = useState({ wins: 0, losses: 0, wr: 0 });
          const [signal, setSignal] = useState(null);
          const [timer, setTimer] = useState(null);
          const [price, setPrice] = useState(0);

          const chartContainer = useRef(null);
          const chart = useRef(null);
          const series = useRef(null);
          const allMarkers = useRef([]);
          const engineActive = useRef(false);

          const speak = (text) => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ru-RU'; u.rate = 1.0;
            window.speechSynthesis.speak(u);
          };

          const runEngine = async () => {
            if (engineActive.current) return;
            engineActive.current = true;

            await speak("Аналитическая система Слава Гордеев ПРО МАКС активирована. Выполняю бэктест рынка за последний час.");
            setPhase("БЭКТЕСТ ИСТОРИИ SMC...");

            const history = await ScannerAPI.getCandles('BTCUSDT', 150);
            if (history.length > 100) {
              setPrice(history[history.length - 1].close);
              
              // ЛОГИКА БЭКТЕСТА (за 60 минут)
              let wins = 0; let losses = 0;
              const startIdx = history.length - 75;
              const endIdx = history.length - 16;

              for (let i = startIdx; i <= endIdx; i++) {
                const candle = history[i];
                const prev = history.slice(i - 20, i);
                const high = Math.max(...prev.map(c => c.high));
                const low = Math.min(...prev.map(c => c.low));

                let type = null;
                if (candle.high > high && candle.close < high) type = 'PUT';
                if (candle.low < low && candle.close > low) type = 'CALL';

                if (type) {
                  const entry = candle.close;
                  const exit = history[i + 15].close;
                  const isWin = type === 'CALL' ? exit > entry : exit < entry;
                  
                  allMarkers.current.push({
                    time: candle.time, position: type === 'CALL' ? 'belowBar' : 'aboveBar',
                    color: type === 'CALL' ? '#3b82f6' : '#ef4444', shape: type === 'CALL' ? 'arrowUp' : 'arrowDown',
                    text: 'ВХОД'
                  });
                  allMarkers.current.push({
                    time: history[i + 15].time, position: isWin ? 'aboveBar' : 'belowBar',
                    color: isWin ? '#10b981' : '#94a3b8', shape: 'circle',
                    text: isWin ? 'ВИН (+)' : 'ЛОСС (-)'
                  });

                  if (isWin) wins++; else losses++;
                  i += 15; // Пропускаем время сделки
                }
              }

              const total = wins + losses;
              const calculatedWR = total > 0 ? Math.round((wins / total) * 100) : 0;
              setStats({ wins, losses, wr: calculatedWR });

              // Показываем график с историей
              setView("DETAIL");
              setTimeout(() => {
                if (!chart.current && chartContainer.current) {
                  chart.current = LightweightCharts.createChart(chartContainer.current, {
                    layout: { background: { color: 'white' }, textColor: '#64748b' },
                    grid: { vertLines: { visible: false }, horzLines: { color: '#f1f5f9' } },
                    timeScale: { borderVisible: false, timeVisible: true }
                  });
                  series.current = chart.current.addCandlestickSeries({ upColor: '#3b82f6', downColor: '#ef4444' });
                }
                series.current.setData(history);
                series.current.setMarkers(allMarkers.current);
              }, 100);

              if (total > 0) {
                await speak(`Бэктест завершен. За последний час алгоритм нашел ${total} сигналов. Винрейт составил ${calculatedWR} процентов.`);
              } else {
                await speak(`Бэктест завершен. За последний час идеальных точек входа не обнаружено.`);
              }

              await new Promise(r => setTimeout(r, 5000));
              await speak("Перехожу к сканированию рынка. Ищу новые манипуляции крупного капитала.");
              setView("SCREENER");

              // ЛАЙВ-ЦИКЛ
              while (engineActive.current) {
                setPhase("СКАНИРОВАНИЕ ЛИКВИДНОСТИ...");
                const live = await ScannerAPI.getCandles('BTCUSDT', 100);
                if (live.length > 0) {
                  const last = live[live.length - 1];
                  setPrice(last.close);
                  const prevHigh = Math.max(...live.slice(-30, -1).map(c => c.high));
                  const prevLow = Math.min(...live.slice(-30, -1).map(c => c.low));

                  let liveType = null;
                  if (last.high > prevHigh && last.close < prevHigh) liveType = 'PUT';
                  if (last.low < prevLow && last.close > prevLow) liveType = 'CALL';

                  if (liveType) {
                    setView("DETAIL");
                    allMarkers.current.push({
                      time: last.time, position: liveType === 'CALL' ? 'belowBar' : 'aboveBar',
                      color: liveType === 'CALL' ? '#3b82f6' : '#ef4444', shape: liveType === 'CALL' ? 'arrowUp' : 'arrowDown',
                      text: 'СИГНАЛ'
                    });
                    series.current.setMarkers(allMarkers.current);

                    setPhase(`ГОТОВЬТЕ: BTC (15 МИН)`);
                    await speak(`Внимание! Обнаружено снятие ликвидности. Подготовьте Биткоин. Время пятнадцать минут. Направление на ${liveType === 'CALL' ? 'повышение' : 'понижение'}.`);

                    // 5 сек на подтверждение
                    let cancelled = false;
                    for (let s = 5; s > 0; s--) {
                      setPhase(`СНАЙПЕР: ПРОВЕРКА... ${s}С`);
                      await new Promise(r => setTimeout(r, 1000));
                      const check = await ScannerAPI.getCandles('BTCUSDT', 1);
                      if (liveType === 'PUT' && check[0].close > prevHigh) cancelled = true;
                      if (liveType === 'CALL' && check[0].close < prevLow) cancelled = true;
                    }

                    if (cancelled) {
                      setPhase("ОТМЕНА: ПРОВЕРКА НЕ ПРОЙДЕНА");
                      await speak("Отмена. Паттерн сломан. Возвращаюсь к сканеру.");
                      await new Promise(r => setTimeout(r, 2000));
                    } else {
                      setPhase("СИГНАЛ АКТИВЕН");
                      setSignal({ type: liveType, entry: last.close });
                      await speak("Вход подтвержден! Экспирация пятнадцать минут. Жмите кнопку!");

                      let exp = 15 * 60;
                      while (exp > 0) {
                        setTimer(exp);
                        await new Promise(r => setTimeout(r, 1000));
                        exp--;
                      }
                      
                      setTimer(null);
                      setSignal(null);
                      const result = await ScannerAPI.getCandles('BTCUSDT', 1);
                      const isWin = liveType === 'CALL' ? result[0].close > last.close : result[0].close < last.close;
                      
                      allMarkers.current.push({
                        time: result[0].time, position: isWin ? 'aboveBar' : 'belowBar',
                        color: isWin ? '#10b981' : '#94a3b8', shape: 'circle', text: isWin ? 'ВИН (+)' : 'ЛОСС (-)'
                      });
                      series.current.setMarkers(allMarkers.current);
                      
                      if (isWin) {
                        setStats(p => ({ ...p, wins: p.wins + 1, wr: Math.round(((p.wins+1)/(p.wins+p.losses+1))*100) }));
                        await speak("Плюс! Сделка закрыта в профит.");
                      } else {
                        setStats(p => ({ ...p, losses: p.losses + 1, wr: Math.round((p.wins/(p.wins+p.losses+1))*100) }));
                        await speak("Сделка закрыта в минус.");
                      }
                    }
                  }
                }
                await new Promise(r => setTimeout(r, 3000));
              }
            }
          };

          const start = () => { setIsStarted(true); runEngine(); };

          if (!isStarted) {
            return (
              <div className="h-screen flex items-center justify-center p-6 bg-slate-50">
                <div className="w-full max-w-sm glass-card p-10 rounded-[2.5rem] text-center">
                  <div className="w-20 h-20 bg-blue-500 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-lg"><Zap size={40} className="text-white" /></div>
                  <h1 className="text-3xl font-black text-slate-800 oswald-font leading-none mb-2">КРИПТО ЯДРО<br/><span className="text-blue-600">PRO MAX</span></h1>
                  <p className="text-[10px] text-slate-400 font-bold tracking-[0.3em] uppercase mb-10">Smart Money Concepts</p>
                  <button onClick={start} className="w-full py-4 premium-btn text-white rounded-2xl font-bold text-lg oswald-font tracking-widest">ЗАПУСК СИСТЕМЫ</button>
                </div>
              </div>
            );
          }

          return (
            <div className="h-screen flex flex-col">
              {/* Новости */}
              <div className="h-8 bg-slate-900 flex items-center overflow-hidden border-b border-white/10 shrink-0">
                <div className="bg-blue-600 h-full px-4 text-[10px] font-black text-white flex items-center oswald-font tracking-widest z-10">РАДАР СЕТИ</div>
                <div className="ticker-wrapper text-[10px] text-slate-400 font-bold oswald-font">
                  {[...Array(2)].map((_, i) => <div key={i} className="flex gap-10 px-10"><span>• БИТКОИН ФОРМИРУЕТ ЗОНЫ ЛИКВИДНОСТИ...</span><span>• ПОИСК СЛОМА СТРУКТУРЫ В РЕАЛЬНОМ ВРЕМЕНИ...</span><span>• АЛГОРИТМ SLAVA GORDEEV АКТИВИРОВАН...</span></div>)}
                </div>
              </div>

              {/* Шапка */}
              <header className="px-6 py-4 flex justify-between items-center glass-card border-b border-slate-200">
                <div className="flex items-center gap-3">
                  <Zap size={28} className="text-blue-600" />
                  <div className="flex flex-col">
                    <h1 className="text-xl font-bold oswald-font leading-none">ТЕРМИНАЛ <span className="text-blue-600">PRO MAX</span></h1>
                    <span className="silver-text text-[11px] mt-1 tracking-widest uppercase">SLAVA GORDEEV</span>
                  </div>
                </div>
                <div className="px-4 py-2 bg-blue-50 text-blue-600 rounded-xl text-xs font-black oswald-font border border-blue-100">{phase}</div>
              </header>

              <main className="flex-1 flex flex-col md:flex-row p-3 gap-3 overflow-hidden">
                {/* График / Скринер */}
                <div className="flex-1 glass-card rounded-3xl relative overflow-hidden flex flex-col">
                  {view === "SCREENER" ? (
                    <div className="absolute inset-0 flex items-center justify-center">
                       <div className="w-full max-w-lg p-6">
                         <div className="flex items-center gap-6 mb-10">
                            <div className="w-20 h-20 bg-slate-100 text-slate-800 rounded-3xl flex items-center justify-center text-4xl font-black shadow-inner">₿</div>
                            <div><h2 className="text-5xl font-black text-slate-900 oswald-font">BITCOIN</h2><span className="text-xl font-bold text-blue-600 tracking-widest">BTC/USDT</span></div>
                         </div>
                         <div className="grid grid-cols-4 gap-4">
                           <Speedometer value={75} label="СТРУКТУРА" />
                           <Speedometer value={90} label="ЛИКВИДНОСТЬ" color="#06b6d4" />
                           <Speedometer value={40} label="АТР ФИЛЬТР" color="#6366f1" />
                           <Speedometer value={15} label="SMART MONEY" color="#8b5cf6" />
                         </div>
                       </div>
                    </div>
                  ) : (
                    <div className="flex-1 flex flex-col p-4">
                      <div className="flex justify-between items-center mb-4">
                        <div><div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Live Chart</div><div className="text-3xl font-black text-slate-800 oswald-font">BITCOIN PRO</div></div>
                        <div className="text-right text-xs font-bold text-slate-500">TF: <span className="text-blue-600">15M</span></div>
                      </div>
                      <div ref={chartContainer} className="flex-1 border rounded-2xl overflow-hidden shadow-inner"></div>
                    </div>
                  )}
                </div>

                {/* Статистика */}
                <div className="w-full md:w-[350px] flex flex-col gap-3">
                  <div className="glass-card p-6 rounded-3xl flex flex-col items-center">
                    <span className="text-xs font-black text-slate-400 tracking-widest uppercase mb-2">ВИНРЕЙТ СИСТЕМЫ</span>
                    <span className={`text-6xl font-black oswald-font ${stats.wr >= 50 ? 'text-emerald-500' : 'text-rose-500'}`}>{stats.wr}%</span>
                    <div className="flex gap-8 mt-6">
                      <div className="text-center"><div className="text-[10px] font-bold text-slate-400">ПРОФИТ</div><div className="text-2xl font-black text-emerald-500">{stats.wins}</div></div>
                      <div className="text-center"><div className="text-[10px] font-bold text-slate-400">УБЫТОК</div><div className="text-2xl font-black text-rose-500">{stats.losses}</div></div>
                    </div>
                  </div>

                  <div className="glass-card p-6 rounded-3xl flex justify-between items-center">
                     <div><div className="text-[10px] font-bold text-slate-400 uppercase mb-1">ЭКСПИРАЦИЯ</div><div className="text-3xl font-black text-blue-600 oswald-font">{timer ? `${Math.floor(timer/60)}:${(timer%60).toString().padStart(2,'0')}` : '--:--'}</div></div>
                     <div className="text-right">
                        <div className="text-[10px] font-bold text-slate-400 uppercase mb-1">ВХОД</div>
                        <div className="text-xl font-black text-slate-800">{signal ? signal.entry.toFixed(2) : '00000.00'}</div>
                     </div>
                  </div>

                  <div className="flex-1 glass-card p-4 rounded-3xl overflow-hidden flex flex-col gap-2">
                    <div className="text-[10px] font-black text-slate-300 uppercase mb-2">СИСТЕМНЫЙ ЛОГ</div>
                    <div className="text-xs font-bold text-slate-800 bg-blue-50 p-2 rounded-lg border border-blue-100">BTCUSDT: {price.toFixed(2)}</div>
                    <div className="text-[10px] font-bold text-blue-500">• СИСТЕМА: ПОИСК МАНИПУЛЯЦИЙ...</div>
                    <div className="text-[10px] font-bold text-slate-400">• АНАЛИЗ SMC ЗА 1 ЧАС ЗАВЕРШЕН</div>
                  </div>
                </div>
              </main>

              <footer className="h-10 bg-white border-t border-slate-200 px-6 flex items-center justify-between text-[10px] font-black text-slate-400 uppercase tracking-widest">
                <div>СОЕДИНЕНИЕ ЗАЩИЩЕНО • GORDEEV PRO MAX</div>
                <div className="text-blue-600">ЛИЦЕНЗИЯ АКТИВНА</div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
