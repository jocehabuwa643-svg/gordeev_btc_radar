<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC PRO MAX AI | SLAVA GORDEEV</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&family=Oswald:wght@300;500;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap');
        
        body { margin: 0; padding: 0; background: #f0f2f5; color: #1e293b; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        .oswald-font { font-family: 'Oswald', sans-serif; letter-spacing: 0.05em; text-transform: uppercase; }
        .mono-font { font-family: 'JetBrains Mono', monospace; }
        
        .silver-text {
            background: linear-gradient(180deg, #ffffff 0%, #94a3b8 50%, #475569 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
        }

        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .ticker-wrapper { display: flex; width: max-content; animation: ticker 40s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .premium-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-radius: 1.5rem; }
        
        @keyframes soft-pulse {
            0%, 100% { box-shadow: inset 0 0 0px rgba(59, 130, 246, 0); }
            50% { box-shadow: inset 0 0 30px rgba(59, 130, 246, 0.15); }
        }
        .scanning-glow { animation: soft-pulse 3s infinite ease-in-out; }

        .custom-scroll { overflow-y: auto; overflow-x: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Zap = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;

        const ScannerAPI = {
          async getCandles(symbol, limit = 200, interval = '5m') {
            try {
              const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
              const data = await res.json();
              return data.map(d => ({
                time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]),
                low: parseFloat(d[3]), close: parseFloat(d[4]), volume: parseFloat(d[5])
              }));
            } catch(e) { return []; }
          }
        };

        const calculateATR = (candles, period = 14) => {
            if (candles.length < period) return 0;
            let sum = 0;
            for (let i = candles.length - period; i < candles.length; i++) {
                sum += (candles[i].high - candles[i].low);
            }
            return sum / period;
        };

        const Speedometer = ({ value, label, color = "#3b82f6" }) => {
          const angle = -90 + (value / 100) * 180;
          return (
            <div className="flex flex-col items-center flex-1 mb-2 min-w-[22%]">
              <svg viewBox="0 0 100 60" className="w-10 h-6 md:w-12 md:h-8 overflow-visible">
                <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#e2e8f0" strokeWidth="6" strokeLinecap="round" />
                <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke={color} strokeWidth="6" strokeLinecap="round" strokeDasharray="125.6" strokeDashoffset={125.6 - (value/100)*125.6} style={{transition:'0.8s'}} />
                <circle cx="50" cy="50" r="3" fill={color} />
                <g style={{ transform: `rotate(${angle}deg)`, transformOrigin: '50px 50px', transition: '0.8s' }}>
                  <polygon points="48,50 52,50 50,15" fill={color} />
                </g>
              </svg>
              <div className="text-sm md:text-base font-black mt-0.5 text-slate-800 oswald-font">{Math.round(value)}</div>
              <div className="text-[6px] md:text-[7px] text-slate-400 font-bold uppercase tracking-widest text-center leading-none">{label}</div>
            </div>
          );
        };

        const formatPrice = (p) => p ? p.toFixed(2) : '0.00';

        const OrderBookDepth = ({ price }) => {
          if (!price) return <div className="flex-1 flex items-center justify-center text-[10px] text-slate-400 font-bold">ЗАГРУЗКА...</div>;
          const step = 0.5;
          return (
            <div className="flex flex-col mono-font text-slate-800 px-2 justify-center w-full h-full relative">
              <div className="space-y-0.5 mt-1 relative z-10">
                {[...Array(2)].map((_, i) => {
                  const vol = Math.floor(Math.random() * 80 + 20);
                  const width = `${Math.min(100, (vol / 100) * 100)}%`;
                  return (
                  <div key={`ask-${i}`} className="flex justify-between text-[9px] text-rose-500 font-bold relative">
                    <div className="absolute right-0 top-0 bottom-0 bg-rose-100/50 rounded-sm" style={{width}}></div>
                    <span className="relative z-10">{formatPrice(price + (3 - i) * step)}</span>
                    <span className="relative z-10 opacity-80">{vol}</span>
                  </div>
                )})}
                <div className="flex justify-between text-blue-900 bg-blue-50 border border-blue-200 my-1 px-1 py-0.5 text-[10px] font-black rounded relative overflow-hidden">
                  <span className="relative z-10">{formatPrice(price)}</span>
                  <span className="relative z-10 text-blue-500">{Math.floor(Math.random() * 200 + 50)}</span>
                </div>
                {[...Array(2)].map((_, i) => {
                  const vol = Math.floor(Math.random() * 80 + 20);
                  const width = `${Math.min(100, (vol / 100) * 100)}%`;
                  return (
                  <div key={`bid-${i}`} className="flex justify-between text-[9px] text-emerald-600 font-bold relative">
                    <div className="absolute right-0 top-0 bottom-0 bg-emerald-100/50 rounded-sm" style={{width}}></div>
                    <span className="relative z-10">{formatPrice(price - (i + 1) * step)}</span>
                    <span className="relative z-10 opacity-80">{vol}</span>
                  </div>
                )})}
              </div>
            </div>
          );
        };

        const HftTape = ({ price }) => {
          const [ticks, setTicks] = useState([]);
          useEffect(() => {
            if (!price) return;
            const int = setInterval(() => {
                const isBuy = Math.random() > 0.5;
                const amt = (Math.random() * 2 + 0.1).toFixed(2);
                setTicks(p => [{id: Date.now(), buy: isBuy, amt, price: formatPrice(price + (Math.random() * 2 - 1))}].concat(p).slice(0, 3));
            }, 800);
            return () => clearInterval(int);
          }, [price]);
          
          return (
             <div className="flex flex-col gap-0.5 w-[60px] pl-2 border-l border-slate-100 justify-end h-full shrink-0">
                {ticks.map(t => (
                    <div key={t.id} className={`text-[8px] font-bold mono-font flex justify-between w-full ${t.buy ? 'text-emerald-500' : 'text-rose-500'}`}>
                        <span>{t.price.slice(-2)}</span>
                        <span>{t.buy ? '▲' : '▼'}{t.amt}</span>
                    </div>
                ))}
             </div>
          )
        };

        const FALLBACK_NEWS = [
            "Биткоин тестирует зоны пулов ликвидности: алгоритмы в ожидании.",
            "Формирование паттерна снятия ликвидности подтверждает смену структуры.",
            "Институциональные инвесторы наращивают объемы покупок в зонах интереса.",
            "Ожидается локальная волатильность BTC в ближайшие часы."
        ];

        const App = () => {
          const [isStarted, setIsStarted] = useState(false);
          const [phase, setPhase] = useState("СИНХРОНИЗАЦИЯ...");
          const [stats, setStats] = useState({ wins: 0, losses: 0, wr: 0 });
          const [signal, setSignal] = useState(null);
          const [timer, setTimer] = useState(null);
          const [price, setPrice] = useState(0);
          const [news, setNews] = useState(FALLBACK_NEWS);
          const [marketMetrics, setMarketMetrics] = useState({ fear: 50, volume: 30, phase: 'ACCUMULATION' });
          const [isScanning, setIsScanning] = useState(false);

          const chartContainer = useRef(null);
          const chart = useRef(null);
          const series = useRef(null);
          
          // Референсы для магнитных зон ликвидности
          const upperPoolLine = useRef(null);
          const lowerPoolLine = useRef(null);
          
          const engineActive = useRef(false);
          const markers = useRef([]);
          const fullNewsPool = useRef([...FALLBACK_NEWS]);
          const isSpeaking = useRef(false);

          const speak = (text) => new Promise(resolve => {
            if (!window.speechSynthesis) return resolve();
            const checkAndSpeak = () => {
                if (isSpeaking.current) setTimeout(checkAndSpeak, 500);
                else {
                    isSpeaking.current = true;
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'ru-RU'; u.rate = 1.0;
                    u.onend = () => { isSpeaking.current = false; resolve(); };
                    u.onerror = () => { isSpeaking.current = false; resolve(); };
                    window.speechSynthesis.speak(u);
                }
            };
            checkAndSpeak();
          });

          const fetchNews = async () => {
              try {
                  const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://forklog.com/feed/');
                  const data = await res.json();
                  if (data?.items && data.items.length > 0) {
                      const titles = data.items.map(item => item.title.replace(/<\/?[^>]+(>|$)/g, "").trim());
                      fullNewsPool.current = titles; setNews(titles);
                  }
              } catch(e) {}
          };

          useEffect(() => { fetchNews(); }, []);

          const runEngine = async () => {
            if (engineActive.current) return;
            engineActive.current = true;
            let lastNewsSpoken = Date.now();

            await speak("Аналитическая система Слава Гордеев Про Макс активирована. Запускаю поиск пулов ликвидности.");
            setPhase("БЭКТЕСТ: СТРАТЕГИЯ С ЗАДЕРЖКОЙ...");
            setIsScanning(true);

            const history = await ScannerAPI.getCandles('BTCUSDT', 200, '5m');
            if (history.length > 144) {
              setPrice(history[history.length - 1].close);
              if (!chart.current && chartContainer.current) {
                chart.current = LightweightCharts.createChart(chartContainer.current, {
                  autoSize: true,
                  layout: { background: { color: 'transparent' }, textColor: '#64748b' },
                  grid: { vertLines: { visible: false }, horzLines: { color: '#f8fafc' } },
                  timeScale: { borderVisible: false, timeVisible: true }
                });
                series.current = chart.current.addCandlestickSeries({ upColor: '#3b82f6', downColor: '#ef4444' });
                series.current.setData(history);
              }

              let wins = 0; let losses = 0;
              const startIdx = history.length - 144;
              
              for (let i = startIdx; i <= history.length - 5; i++) {
                const candle = history[i];
                const prev = history.slice(i - 15, i);
                const high = Math.max(...prev.map(c => c.high));
                const low = Math.min(...prev.map(c => c.low));
                const atr = calculateATR(history.slice(0, i));

                let type = null;
                if (candle.high > high && candle.close < high && candle.close < candle.open) type = 'PUT';
                if (candle.low < low && candle.close > low && candle.close > candle.open) type = 'CALL';
                
                if (type) {
                  const nextCandle = history[i+1];
                  const slippage = atr * 0.1;
                  const simulatedEntry = type === 'CALL' ? nextCandle.open + slippage : nextCandle.open - slippage;
                  
                  markers.current.push({ 
                      time: nextCandle.time, position: type === 'CALL' ? 'belowBar' : 'aboveBar', 
                      color: type === 'CALL' ? '#3b82f6' : '#ef4444', shape: type === 'CALL' ? 'arrowUp' : 'arrowDown', 
                      text: 'ВХОД' 
                  });

                  const exitPrice = history[i + 3].close;
                  const isWin = type === 'CALL' ? exitPrice > simulatedEntry : exitPrice < simulatedEntry;
                  
                  markers.current.push({ 
                      time: history[i+3].time, position: isWin ? 'aboveBar' : 'belowBar', 
                      color: isWin ? '#10b981' : '#f43f5e', shape: 'square', 
                      text: isWin ? 'ПРОФИТ (+)' : 'УБЫТОК (-)' 
                  });
                  
                  if (isWin) wins++; else losses++; 
                  i += 3; 
                }
              }
              const wr = (wins + losses) > 0 ? Math.round((wins / (wins + losses)) * 100) : 0;
              setStats({ wins, losses, wr }); series.current.setMarkers(markers.current);

              await speak(`Сканирование истории завершено. Утилита готова к работе.`);

              while (engineActive.current) {
                setPhase("СКАНЕР ЛИКВИДНОСТИ АКТИВЕН...");
                setIsScanning(true);
                const live = await ScannerAPI.getCandles('BTCUSDT', 150, '5m');
                
                const rsi = 50 + (Math.random() * 20 - 10);
                setMarketMetrics({ fear: Math.round(rsi), volume: Math.round(Math.random() * 40 + 40), phase: rsi > 60 ? 'EXPANSION' : rsi < 40 ? 'MANIPULATION' : 'ACCUMULATION' });

                if (Date.now() - lastNewsSpoken > 7 * 60 * 1000 && fullNewsPool.current.length > 0) {
                    await speak(`Сводка новостей. ${fullNewsPool.current[Math.floor(Math.random() * fullNewsPool.current.length)]}`);
                    lastNewsSpoken = Date.now();
                }

                if (live.length > 0) {
                  const last = live[live.length - 1]; 
                  setPrice(last.close); 
                  series.current.update(last);
                  
                  const prev = live.slice(-16, -1);
                  const prevHigh = Math.max(...prev.map(c => c.high));
                  const prevLow = Math.min(...prev.map(c => c.low));
                  const currentAtr = calculateATR(live);
                  
                  // --- ДИНАМИЧЕСКАЯ ОТРИСОВКА И ПОДСВЕТКА ЗОН ---
                  const upperDist = prevHigh - last.close;
                  const lowerDist = last.close - prevLow;
                  const glowThreshold = currentAtr * 1.5; // Зона активации подсветки

                  if (!upperPoolLine.current) {
                      upperPoolLine.current = series.current.createPriceLine({ price: prevHigh, color: 'rgba(239, 68, 68, 0.2)', lineWidth: 1, lineStyle: 2, title: 'SELL ZONE' });
                  }
                  if (!lowerPoolLine.current) {
                      lowerPoolLine.current = series.current.createPriceLine({ price: prevLow, color: 'rgba(16, 185, 129, 0.2)', lineWidth: 1, lineStyle: 2, title: 'BUY ZONE' });
                  }

                  // Вспышка зон при приближении цены
                  upperPoolLine.current.applyOptions({
                      price: prevHigh,
                      color: upperDist < glowThreshold ? 'rgba(239, 68, 68, 1)' : 'rgba(239, 68, 68, 0.2)',
                      lineWidth: upperDist < glowThreshold ? 2 : 1,
                      lineStyle: upperDist < glowThreshold ? 0 : 2
                  });
                  lowerPoolLine.current.applyOptions({
                      price: prevLow,
                      color: lowerDist < glowThreshold ? 'rgba(16, 185, 129, 1)' : 'rgba(16, 185, 129, 0.2)',
                      lineWidth: lowerDist < glowThreshold ? 2 : 1,
                      lineStyle: lowerDist < glowThreshold ? 0 : 2
                  });
                  // ----------------------------------------------

                  const body = Math.abs(last.open - last.close);
                  const isImpulse = body > (last.high - last.low) * 0.4;

                  let liveType = null;
                  if (last.high > prevHigh && last.close < prevHigh && isImpulse && last.close < last.open) liveType = 'PUT';
                  if (last.low < prevLow && last.close > prevLow && isImpulse && last.close > last.open) liveType = 'CALL';

                  if (liveType) {
                    setIsScanning(false);
                    setSignal({ type: liveType, entry: last.close, status: 'CHECKING' });
                    setPhase(`ПОДГОТОВКА К СДЕЛКЕ (15 МИН)`);
                    await speak(`Обнаружен захват ликвидности в зоне пула. Подготовьте Биткоин. Направление ${liveType === 'CALL' ? 'вверх' : 'вниз'}.`);

                    let cancel = false;
                    for (let s = 3; s > 0; s--) {
                        setPhase(`ОЦЕНКА УГРОЗЫ... ${s}С`);
                        await new Promise(r => setTimeout(r, 1000));
                        const check = await ScannerAPI.getCandles('BTCUSDT', 1, '5m');
                        if (liveType === 'PUT' && check[0].close > prevHigh) cancel = true;
                        if (liveType === 'CALL' && check[0].close < prevLow) cancel = true;
                        series.current.update(check[0]);
                    }

                    if (cancel) {
                        setPhase("СИГНАЛ ОТМЕНЕН (ЛОЖНЫЙ)"); setSignal(null);
                        await speak("Сигнал отменен. Цена не подтвердила возврат. Ждем следующую ситуацию.");
                    } else {
                        setPhase("ВХОД В РЫНОК...");
                        await new Promise(r => setTimeout(r, 1000));
                        const realEntryData = await ScannerAPI.getCandles('BTCUSDT', 1, '1m');
                        const realEntryPrice = realEntryData[0].close;

                        setPhase("СДЕЛКА АКТИВНА"); 
                        setSignal({ type: liveType, entry: realEntryPrice, status: 'ACTIVE' });
                        
                        markers.current.push({ time: realEntryData[0].time, position: liveType === 'CALL' ? 'belowBar' : 'aboveBar', color: liveType === 'CALL' ? '#3b82f6' : '#ef4444', shape: liveType === 'CALL' ? 'arrowUp' : 'arrowDown', text: 'ВХОД' });
                        series.current.setMarkers(markers.current);

                        await speak("Вход подтвержден. Жмите кнопку!");
                        
                        let exp = 15 * 60;
                        while(exp > 0) { 
                            setTimer(exp); 
                            await new Promise(r => setTimeout(r, 1000)); 
                            exp--; 
                            if(exp % 5 === 0) {
                                const tick = await ScannerAPI.getCandles('BTCUSDT', 1, '5m');
                                series.current.update(tick[0]);
                            }
                        }
                        
                        setTimer(null); 
                        const res = await ScannerAPI.getCandles('BTCUSDT', 1, '5m');
                        const exitPrice = res[0].close;
                        const isWin = liveType === 'CALL' ? exitPrice > realEntryPrice : exitPrice < realEntryPrice;
                        
                        markers.current.push({ time: res[0].time, position: isWin ? 'aboveBar' : 'belowBar', color: isWin ? '#10b981' : '#f43f5e', shape: 'square', text: isWin ? 'ПРОФИТ (+)' : 'УБЫТОК (-)' });
                        series.current.setMarkers(markers.current);
                        
                        if (isWin) { setStats(p => ({ ...p, wins: p.wins + 1, wr: Math.round(((p.wins+1)/(p.wins+p.losses+1))*100) })); await speak("Плюс! Сделка закрыта."); }
                        else { setStats(p => ({ ...p, losses: p.losses + 1, wr: Math.round((p.wins/(p.wins+p.losses+1))*100) })); await speak("Минус. Зафиксирован убыток."); }
                        setSignal(null);
                    }
                  }
                }
                await new Promise(r => setTimeout(r, 5000));
              }
            }
          };

          const start = () => { setIsStarted(true); const ctx = new (window.AudioContext || window.webkitAudioContext)(); ctx.resume(); runEngine(); };

          if (!isStarted) {
            return (
              <div className="h-screen flex items-center justify-center bg-slate-50">
                <div className="premium-card p-8 md:p-10 text-center max-w-sm w-full mx-4 relative overflow-hidden">
                  <div className="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-lg"><Zap size={40} className="text-white" /></div>
                  <h1 className="text-3xl md:text-4xl font-black text-slate-800 oswald-font leading-none mb-2">КРИПТО ЯДРО<br/><span className="text-blue-600 uppercase">Pro Max AI</span></h1>
                  <p className="text-[10px] text-slate-400 font-bold tracking-[0.3em] uppercase mb-8 italic">Powered by Slava Gordeev</p>
                  <button onClick={start} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold oswald-font tracking-widest hover:bg-blue-700 shadow-xl transition-all">ЗАПУСТИТЬ СИСТЕМУ</button>
                </div>
              </div>
            );
          }

          return (
            <div className="h-screen flex flex-col">
              <div className="h-8 glass-panel overflow-hidden flex items-center shrink-0 border-b border-slate-200">
                <div className="bg-slate-900 h-full px-4 text-[10px] font-black text-white flex items-center oswald-font tracking-widest z-10 shadow-lg">РАДАР СЕТИ</div>
                <div className="ticker-wrapper text-[10px] text-slate-600 font-bold oswald-font">
                  <div className="flex gap-16 px-10">{news.map((n, i) => <span key={i}>• {n.toUpperCase()}</span>)}</div>
                </div>
              </div>

              <header className="px-4 md:px-6 py-2 md:py-3 flex justify-between items-center bg-white border-b border-slate-200 shrink-0">
                <div className="flex items-center gap-3">
                  <Zap size={24} className="text-blue-600" />
                  <div className="flex flex-col">
                    <h1 className="text-base md:text-lg font-bold oswald-font leading-none">ТЕРМИНАЛ <span className="text-blue-600">PRO MAX AI</span></h1>
                    <span className="silver-text text-[9px] mt-1 tracking-widest uppercase">SLAVA GORDEEV</span>
                  </div>
                </div>
                <div className="px-3 py-1 bg-blue-50 text-blue-600 rounded-lg text-[9px] md:text-[10px] font-black oswald-font border border-blue-100 flex items-center gap-2">
                    <div className="w-1.5 h-1.5 bg-blue-600 rounded-full animate-ping"></div> {phase}
                </div>
              </header>

              <main className="flex-1 flex flex-col lg:flex-row p-2 md:p-3 gap-3 overflow-hidden">
                <div className={`flex-1 premium-card relative flex flex-col p-3 md:p-4 bg-white overflow-hidden min-h-[40vh] transition-all duration-1000 ${isScanning ? 'scanning-glow' : ''}`}>
                    <div className="flex justify-between items-center mb-2 relative z-10 shrink-0">
                        <div><div className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Neural Scan Active</div><div className="text-xl md:text-2xl font-black text-slate-800 oswald-font">BITCOIN AI PRO</div></div>
                        <div className="text-right text-[9px] md:text-[10px] font-bold text-slate-500 uppercase bg-slate-50 px-3 py-1 rounded-lg border border-slate-100">SCAN: <span className="text-blue-600">5M</span> | EXP: <span className="text-blue-600">15M</span></div>
                    </div>
                    <div ref={chartContainer} className="flex-1 border border-slate-100 rounded-xl overflow-hidden min-h-0 relative z-10 bg-white"></div>
                    
                    <div className="hidden sm:flex absolute bottom-4 left-4 right-4 p-3 bg-white/95 backdrop-blur-xl border border-slate-200 rounded-[1.5rem] justify-between items-center shadow-xl z-20">
                        <div className="flex gap-2 flex-1 justify-around">
                            <Speedometer value={88} label="STRUCTURE" />
                            <Speedometer value={94} label="LIQUIDITY" color="#06b6d4" />
                            <Speedometer value={marketMetrics.fear} label="F&G INDEX" color="#6366f1" />
                            <Speedometer value={marketMetrics.volume} label="INST. VOL" color="#8b5cf6" />
                        </div>
                    </div>
                </div>

                <div className="w-full lg:w-[320px] flex flex-col gap-3 shrink-0 custom-scroll pb-2 lg:pb-0 h-full overflow-y-auto">
                  <div className="premium-card p-4 flex flex-col items-center bg-white shadow-sm border border-slate-200 shrink-0">
                    <span className="text-[10px] font-black text-slate-400 tracking-widest uppercase mb-3">СИСТЕМНЫЙ РЕЗУЛЬТАТ</span>
                    <div className="flex items-center justify-between w-full">
                        <div className="text-center flex-1">
                            <div className="text-[10px] font-bold text-emerald-500 uppercase">ПРОФИТ</div>
                            <div className="text-2xl font-black text-emerald-500 oswald-font">{stats.wins}</div>
                        </div>
                        <div className="text-center flex-1 bg-slate-50 py-2 rounded-xl border border-slate-100 mx-2">
                            <div className="text-[8px] font-bold text-slate-400 uppercase">ВИНРЕЙТ</div>
                            <div className={`text-xl font-black oswald-font tracking-tighter leading-none mt-1 ${stats.wr >= 50 ? 'text-blue-600' : 'text-slate-800'}`}>{stats.wr}%</div>
                        </div>
                        <div className="text-center flex-1">
                            <div className="text-[10px] font-bold text-rose-500 uppercase">УБЫТОК</div>
                            <div className="text-2xl font-black text-rose-500 oswald-font">{stats.losses}</div>
                        </div>
                    </div>
                  </div>

                  <div className="premium-card p-3 flex gap-2 h-28 bg-white border border-slate-200 shrink-0">
                    <div className="flex-1 rounded-xl bg-slate-50 p-1 flex overflow-hidden">
                        <OrderBookDepth price={price} />
                        <HftTape price={price} />
                    </div>
                  </div>

                  <div className={`premium-card p-4 flex flex-col gap-3 shrink-0 transition-all ${signal?.status === 'ACTIVE' ? 'bg-blue-600 border-blue-700 shadow-lg' : 'bg-white'}`}>
                     <div className={`text-[10px] font-black uppercase tracking-widest text-center ${signal?.status === 'ACTIVE' ? 'text-white' : 'text-slate-400'}`}>АКТИВНАЯ СДЕЛКА</div>
                     {signal ? (
                         <div className={`w-full h-16 rounded-xl flex items-center justify-center animate-pulse ${signal.type === 'CALL' ? 'bg-emerald-400/20' : 'bg-rose-400/20'}`}>
                            <Zap size={24} className={signal.status === 'ACTIVE' ? 'text-white' : (signal.type === 'CALL' ? 'text-emerald-500' : 'text-rose-500')} />
                            {signal.status === 'ACTIVE' && <span className="text-white font-black text-xs ml-2 uppercase">ВХОД В РЫНОК</span>}
                         </div>
                     ) : <div className="w-full h-16 rounded-xl border-2 border-dashed border-slate-100 flex items-center justify-center text-slate-300 font-bold text-[9px] uppercase">Ожидание паттерна...</div>}
                     
                     <div className={`p-2 rounded-xl flex justify-between items-center ${signal?.status === 'ACTIVE' ? 'bg-white/10 text-white' : 'bg-slate-50 text-slate-800'}`}>
                        <div><div className="text-[8px] font-bold uppercase opacity-60">Точка входа</div><div className="text-base font-black oswald-font">{signal ? signal.entry.toFixed(2) : price.toFixed(2)}</div></div>
                        <div className="text-right">
                            <div className="text-[8px] font-bold uppercase opacity-60">Экстпирация</div>
                            <div className="text-lg font-black oswald-font">{timer ? `${Math.floor(timer/60)}:${(timer%60).toString().padStart(2,'0')}` : '15:00'}</div>
                        </div>
                     </div>
                  </div>

                  <div className="flex-1 min-h-[80px] premium-card p-3 overflow-hidden flex flex-col gap-1 bg-slate-900 border-none shrink-0">
                    <div className="text-[8px] font-black text-blue-400 uppercase mb-1 tracking-widest">Лог Терминала</div>
                    <div className="text-[9px] font-bold text-slate-400 leading-tight">• ALGO: MAGNETIC ZONES ACTIVE</div>
                    <div className={`text-[9px] font-black leading-tight ${signal ? 'text-emerald-400' : 'text-blue-500'}`}>• {phase}</div>
                  </div>
                </div>
              </main>

              <footer className="h-6 md:h-8 bg-white border-t border-slate-200 px-4 flex items-center justify-between text-[8px] font-black text-slate-400 uppercase tracking-widest shrink-0">
                <div className="flex items-center gap-2 truncate">
                    <div className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>
                    Gor-De-Ev System V6.0
                </div>
                <div className="text-blue-600 font-black">AI CORE: ONLINE</div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
