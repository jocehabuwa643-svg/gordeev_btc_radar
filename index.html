<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Крипто Терминал Гордеева - PRO MAX (SMC)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Oswald:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
        
        *, *::before, *::after { box-sizing: border-box; }

        html, body { 
            margin: 0; padding: 0; 
            background: #f8fafc;
            color: #0f172a; 
            max-width: 100%;
            overflow-x: hidden; 
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
            font-family: 'Montserrat', sans-serif;
        }

        .app-shell {
            width: 100%; max-width: 1600px; margin: 0 auto;
            padding: clamp(6px, 1.5vw, 16px);
            display: flex; flex-direction: column; height: 100dvh;
        }

        .main-layout {
            display: grid;
            grid-template-columns: minmax(0, 1.8fr) minmax(320px, 0.9fr);
            gap: clamp(12px, 1.5vw, 20px);
            flex: 1; min-height: 0; margin-top: 10px; margin-bottom: 10px;
        }

        @media (max-width: 1024px) {
            .main-layout { display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
            .chart-card { min-height: 55vh; flex-shrink: 0; }
        }
        
        .oswald-font { font-family: 'Oswald', sans-serif; letter-spacing: 0.05em; text-transform: uppercase; }
        .mono-font { font-family: 'JetBrains Mono', monospace; }

        .cinematic-author {
            font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 0.35em;
            background: linear-gradient(90deg, #94a3b8 0%, #f1f5f9 25%, #475569 50%, #f1f5f9 75%, #94a3b8 100%);
            background-size: 200% auto; color: transparent; -webkit-background-clip: text;
            animation: cinematicShimmer 7s linear infinite; text-transform: uppercase;
        }
        @keyframes cinematicShimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

        .bg-grid-pattern {
            background-image: linear-gradient(to right, rgba(14, 165, 233, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(14, 165, 233, 0.03) 1px, transparent 1px);
            background-size: 30px 30px; mask-image: radial-gradient(circle at center, black 50%, transparent 100%); -webkit-mask-image: radial-gradient(circle at center, black 50%, transparent 100%);
        }

        .bg-orb-1 {
            position: absolute; top: -10%; left: -5%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(226, 232, 240, 0.05) 50%, transparent 70%);
            border-radius: 50%; filter: blur(60px); animation: float 12s ease-in-out infinite alternate;
        }
        .bg-orb-2 {
            position: absolute; bottom: -15%; right: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.1) 0%, rgba(241, 245, 249, 0.05) 50%, transparent 70%);
            border-radius: 50%; filter: blur(80px); animation: float 15s ease-in-out infinite alternate-reverse;
        }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(2%, 4%) scale(1.02); } 100% { transform: translate(-2%, -3%) scale(0.98); } }

        .card-3d-wrapper { perspective: 2000px; width: 100%; }
        .card-3d {
            transform-style: preserve-3d; animation: float-3d 14s ease-in-out infinite;
            box-shadow: 0 30px 60px -15px rgba(15, 23, 42, 0.08), 0 15px 30px -10px rgba(14, 165, 233, 0.1), inset 0 1px 3px rgba(255, 255, 255, 1);
            border: 1px solid rgba(255, 255, 255, 0.9);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(241, 245, 249, 0.8) 100%);
            backdrop-filter: blur(25px); position: relative;
        }
        .card-3d::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.7) 25%, transparent 30%);
            border-radius: inherit; pointer-events: none; z-index: 50; animation: glare 8s infinite linear;
        }

        @keyframes glare { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes float-3d { 0% { transform: translateY(0px) rotateX(1deg) rotateY(-1deg); } 50% { transform: translateY(-8px) rotateX(-0.5deg) rotateY(1.5deg); } 100% { transform: translateY(0px) rotateX(1deg) rotateY(-1deg); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-wrapper { display: flex; width: max-content; animation: ticker 40s linear infinite; }
        
        .scanner-premium-beam {
            position: absolute; top: 0; bottom: 0; left: 0; width: 25%;
            background: linear-gradient(to right, transparent, rgba(6, 182, 212, 0.05) 40%, rgba(34, 211, 238, 0.3) 100%);

            box-shadow: 2px 0 15px rgba(34, 211, 238, 0.4);
            animation: scannerBeamSweep 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;

        }
        @keyframes scannerBeamSweep { 0% { transform: translateX(-100%); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(400%); opacity: 0; } }
        @keyframes candleReact {
            0%, 85%, 100% { opacity: 0.65; filter: brightness(0.9); transform: translateY(0) scaleY(1); }
            90% { opacity: 1; filter: brightness(1.6) drop-shadow(0 0 4px rgba(34,211,238,0.7)); transform: translateY(-1px) scaleY(1.05); }

        }
        
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255, 255, 255, 1); box-shadow: 0 4px 20px rgba(15, 23, 42, 0.03); z-index: 40; }
        .glass-panel-heavy { background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 250, 252, 0.7) 100%); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 1); box-shadow: 0 15px 40px -10px rgba(15, 23, 42, 0.08), inset 0 2px 10px rgba(255, 255, 255, 1); }
        .glass-card { background: linear-gradient(145deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 250, 252, 0.6) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 1); box-shadow: 0 4px 20px -5px rgba(15, 23, 42, 0.04), inset 0 1px 4px rgba(255, 255, 255, 1); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes slideUpFade { 0% { transform: translateY(10px); opacity: 0; } 20% { transform: translateY(0); opacity: 1; } 80% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-10px); opacity: 0; } }

        /* Premium Startup Splash Screen */

            position: fixed; inset: 0; z-index: 9999;

        @keyframes loadingBar { 0% { width: 0%; } 40% { width: 60%; } 100% { width: 100%; } }

        /* BROKER REFERRAL BUTTON & CURSOR */
        .broker-button-wrap { position: relative; overflow: hidden; border-radius: 22px; width: 100%; }
        .broker-ref-button {
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
            width: 100%; min-height: 78px; padding: 14px 18px; text-decoration: none; color: #ffffff;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.96), rgba(6, 182, 212, 0.92));

            backdrop-filter: blur(18px); transition: transform 0.2s ease, box-shadow 0.2s ease;
            animation: brokerBtnDesktopPress 3.8s infinite;
        }
        .broker-ref-button:hover {
            animation: none; transform: translateY(-1px) scale(1.01);
            box-shadow: 0 18px 42px rgba(14,165,233,0.38), inset 0 1px 0 rgba(255,255,255,0.42);
        }
        .broker-ref-button__small { position: relative; z-index: 2; font-size: 10px; letter-spacing: .22em; text-transform: uppercase; font-weight: 800; opacity: .88; }
        .broker-ref-button__main { position: relative; z-index: 2; font-size: clamp(17px, 2vw, 24px); line-height: 1; letter-spacing: .04em; text-transform: uppercase; font-weight: 900; }
        .broker-ref-button__sub { position: relative; z-index: 2; font-size: 13px; font-weight: 700; opacity: .95; }
        
        .broker-demo-cursor {
            position: absolute; right: 14px; bottom: 10px; font-size: 24px; line-height: 1;
            pointer-events: none; opacity: 0; z-index: 10; filter: drop-shadow(0 4px 8px rgba(0,0,0,.4));
            animation: brokerCursorMove 3.8s ease-in-out infinite; transform-origin: top left; color: #fff;
        }

        @keyframes brokerBtnDesktopPress {
            0%, 40%, 48%, 100% { transform: scale(1); box-shadow: 0 14px 34px rgba(14,165,233,0.28), inset 0 1px 0 rgba(255,255,255,0.35); }
            44% { transform: scale(0.98); box-shadow: 0 5px 15px rgba(14,165,233,0.4), inset 0 1px 0 rgba(255,255,255,0.2); }
        }
        @keyframes brokerCursorMove {
            0% { transform: translate(30px, 20px) scale(0.96); opacity: 0; }
            12% { opacity: 1; }
            35% { transform: translate(6px, 4px) scale(1); opacity: 1; }
            44% { transform: translate(0px, 0px) scale(0.85); opacity: 1; } 
            50% { transform: translate(1px, 1px) scale(1.04); opacity: 1; } 
            62% { transform: translate(4px, 3px) scale(1); opacity: 0.95; }
            100% { transform: translate(30px, 20px) scale(0.96); opacity: 0; }
        }
        
        @media (hover: none), (pointer: coarse) { 
            .broker-demo-cursor { display: none !important; } 
            .broker-ref-button { animation: brokerBtnMobilePulse 3s ease-in-out infinite !important; }
        }
        @keyframes brokerBtnMobilePulse {
            0%, 100% { box-shadow: 0 10px 25px rgba(14, 165, 233, 0.25), inset 0 1px 0 rgba(255,255,255,0.3); transform: scale(1); }
            50% { box-shadow: 0 10px 40px rgba(14, 165, 233, 0.6), inset 0 1px 0 rgba(255,255,255,0.6); transform: scale(1.02); }
        }

        /* TRADE OVERLAY MARKERS, BOXES & RESULT BADGES */
        .trade-overlay { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 30; }
        
        .trade-box {
            position: absolute; border-radius: 4px; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 4px 15px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.4);
            pointer-events: auto; transition: filter 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .trade-box:hover, .chart-pt-entry:hover, .chart-pt-exit:hover, .chart-pt-signal:hover, .chart-result-badge:hover, .chart-arrow-signal:hover { z-index: 50; filter: brightness(1.15); }
        
        .trade-box.win.call { background: linear-gradient(180deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.05)); border-color: rgba(16, 185, 129, 0.5); }
        .trade-box.loss.call { background: linear-gradient(180deg, rgba(244, 63, 94, 0.15), rgba(244, 63, 94, 0.05)); border-color: rgba(244, 63, 94, 0.4); }
        .trade-box.win.put { background: linear-gradient(180deg, rgba(14, 165, 233, 0.2), rgba(14, 165, 233, 0.05)); border-color: rgba(14, 165, 233, 0.5); }
        .trade-box.loss.put { background: linear-gradient(180deg, rgba(244, 63, 94, 0.15), rgba(244, 63, 94, 0.05)); border-color: rgba(244, 63, 94, 0.4); }
        .trade-box.cancelled { background: linear-gradient(180deg, rgba(148, 163, 184, 0.2), rgba(148, 163, 184, 0.05)); border-color: rgba(148, 163, 184, 0.5); }
        
        /* Points */
        .chart-pt-signal, .chart-pt-entry, .chart-pt-exit {
            position: absolute; border-radius: 50%; pointer-events: auto; cursor: pointer; transform: translate(-50%, -50%);
        }
        .chart-pt-signal { width: 6px; height: 6px; background: #0ea5e9; box-shadow: 0 0 10px #0ea5e9; z-index: 35; }
        .chart-pt-signal.put { background: #f43f5e; box-shadow: 0 0 10px #f43f5e; }
        
        .chart-pt-entry { width: 8px; height: 8px; background: #ffffff; border: 2px solid #3b82f6; box-shadow: 0 0 10px rgba(59,130,246,0.6); z-index: 36; }
        .chart-pt-exit { width: 8px; height: 8px; background: #ffffff; border: 2px solid #8b5cf6; box-shadow: 0 0 10px rgba(139,92,246,0.6); z-index: 37; }
        
        /* Arrows */
        .chart-arrow-signal {
            position: absolute; pointer-events: auto; cursor: pointer; z-index: 34; display: flex; align-items: center; justify-content: center;
            width: 26px; height: 26px; border-radius: 50%; background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); transition: transform 0.2s;
            transform: translate(-50%, -50%);
        }
        .chart-arrow-signal:hover { transform: translate(-50%, -50%) scale(1.15) !important; z-index: 100; }
        .chart-arrow-signal.call { box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4); border: 1px solid rgba(16, 185, 129, 0.6); }
        .chart-arrow-signal.put { box-shadow: 0 4px 12px rgba(244, 63, 94, 0.4); border: 1px solid rgba(244, 63, 94, 0.6); }

        .chart-pt-label {
            position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
            font-size: 9px; font-weight: 800; color: #0f172a; background: rgba(255,255,255,0.95);
            padding: 2px 6px; border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); border: 1px solid rgba(226,232,240,1); white-space: nowrap;
        }
        .chart-pt-signal:hover .chart-pt-label, .chart-pt-entry:hover .chart-pt-label, .chart-pt-exit:hover .chart-pt-label { opacity: 1; z-index: 100; }

        /* Outcome Badge */
        .chart-result-badge {
            position: absolute; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 800;
            padding: 3px 6px; border-radius: 6px; color: white; pointer-events: auto; cursor: pointer;
            white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.25); z-index: 38; opacity: 0.95;
            transition: transform 0.2s, filter 0.2s;
        }
        .chart-result-badge.call { transform: translate(-50%, 15px); }
        .chart-result-badge.put { transform: translate(-50%, calc(-100% - 15px)); }
        .chart-result-badge:hover { filter: brightness(1.1); z-index: 100; }
        .chart-result-badge.win { background: rgba(16, 185, 129, 0.95); border: 1px solid #34d399; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .chart-result-badge.loss { background: rgba(244, 63, 94, 0.95); border: 1px solid #fb7185; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .chart-result-badge.cancelled { background: rgba(100, 116, 139, 0.95); border: 1px solid #cbd5e1; }

        /* DETAILED HOVER TOOLTIP */
        .trade-tooltip {
            position: absolute; z-index: 9999; pointer-events: none;
            min-width: 240px; padding: 14px 16px; border-radius: 16px; color: #0f172a;
            background: rgba(255, 255, 255, 0.92); border: 1px solid rgba(226, 232, 240, 1);
            box-shadow: 0 18px 38px rgba(15, 23, 42, 0.16), inset 0 1px 0 rgba(255,255,255,1);
            backdrop-filter: blur(18px); font-size: 12px; font-family: 'Montserrat', sans-serif;
            transform: translate(-50%, -110%); transition: opacity 0.15s, transform 0.1s;
        }
        .trade-tooltip__title { margin-bottom: 8px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 6px; font-family: 'Oswald', sans-serif;}
        .trade-tooltip__row { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; }
        .trade-tooltip__row span { color: rgba(51, 65, 85, .78); font-weight: 500; }
        .trade-tooltip__row b { color: #0f172a; text-align: right; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
        .trade-tooltip .positive { color: #059669; }
        .trade-tooltip .negative { color: #e11d48; }

<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- UTILS (Globally Available) ---
        function safeNumber(value, fallback = 0) {
            const n = Number(value);
            return Number.isFinite(n) ? n : fallback;
        }
        function formatRub(value) {
            const n = safeNumber(value, 0);
            return `${Math.round(n).toLocaleString("ru-RU")} ₽`;
        }
        function formatPrice(p) {
            const num = safeNumber(p, 0);
            if (num === 0) return '0.00';
            if (num >= 1000) return num.toFixed(2);
            if (num >= 10) return num.toFixed(3);
            if (num >= 1) return num.toFixed(4);
            return num.toFixed(5);
        }
        function normalizeCandleTimeMs(time) {
            const n = Number(time);
            if (!Number.isFinite(n)) return null;
            return n < 1e12 ? n * 1000 : n;
        }
        function formatDateTimeFull(valueMs) {
            if (!valueMs) return "нет данных";
            const date = new Date(safeNumber(valueMs, 0)); 
            if (Number.isNaN(date.getTime())) return "нет данных";
            return date.toLocaleString("ru-RU", {hour: '2-digit', minute: '2-digit', second: '2-digit'});
        }

        const { useState, useEffect, useRef, useCallback } = React;

        // --- APP & PINE SCRIPT EXACT CONFIGURATION (5M/25M) ---
        const STRATEGY_RUNTIME_CONFIG = {
            mode: "PINE_EQUIVALENT_5M",
            symbol: "BTCUSDT",
            timeframe: "5m",
            timeframeMs: 5 * 60 * 1000,
            expiryMinutes: 25,
            expiryCandles: 5,
            
            lookback: 20,
            atrLen: 14,
            useChoch: false,
            chochLookback: 3,
            chochMode: "Close",
            confirmOnClose: true,

            minSweepATR: 0.03,
            minReclaimATR: 0.03,
            minBodyRatio: 0.10,
            maxRangeATR: 3.50,
            requireBodyDir: false,
            blockDoubleSweep: false,
            cooldownBars: 1,

            explanationDelaySeconds: 3,
            traderPrepSeconds: 3,
            totalEntryDelaySeconds: 6,
            catchUpClosedCandles: 3,
            signalDebug: true,

            demoBalance: 50000,
            baseStake: 500,
            payout: 0.70,
            martingaleLadder: [500, 1215, 2950, 7165],
            maxMartingaleSteps: 4,
            
            referralUrl: "https://intrade31.bar/311164",
            authorName: "SLAVA GORDEEV"
        };

        // Strict State Machine
        const APP_STAGE = { 
            IDLE: "IDLE", 
            SPLASH: "SPLASH", 
            INIT: "INIT", 
            HISTORICAL_ANALYSIS_RENDER: "HISTORICAL_ANALYSIS_RENDER",
            HISTORICAL_ANALYSIS_VOICE: "HISTORICAL_ANALYSIS_VOICE",
            TRANSITION_TO_SCANNER: "TRANSITION_TO_SCANNER",
            LIVE_SCAN: "LIVE_SCAN" 
        };

        const announcedSignalIds = new Set(); 

        function buildSignalId({ symbol, timeframe, candleTimeMs, direction }) {
            return `${symbol}_${timeframe}_${Number(candleTimeMs)}_${direction}`;
        }

        function clamp(val, min, max) {
            return Math.max(min, Math.min(max, safeNumber(val, 0)));
        }

        function calculateTradePnl(result, stake, payout = STRATEGY_RUNTIME_CONFIG.payout) {
            const safeStake = safeNumber(stake, STRATEGY_RUNTIME_CONFIG.baseStake);
            if (result === "WIN") return Math.round(safeStake * payout);
            if (result === "LOSS") return -safeStake;
            return 0; 
        }

        function getStakeByMartingaleIndex(index) {
            const safeIndex = Math.max(0, Math.min(STRATEGY_RUNTIME_CONFIG.martingaleLadder.length - 1, safeNumber(index, 0)));
            return STRATEGY_RUNTIME_CONFIG.martingaleLadder[safeIndex];
        }

        function getNextMartingaleIndex(result, currentIndex) {
            const safeIndex = safeNumber(currentIndex, 0);
            if (result === "WIN") return 0;
            if (result === "LOSS") {
                if (safeIndex < STRATEGY_RUNTIME_CONFIG.martingaleLadder.length - 1) return safeIndex + 1;
                return 0; 
            }
            if (result === "CANCELLED") return 0; 
            return 0;
        }

        function evaluateTradeResult(direction, entryPrice, exitPrice) {
            const entry = Number(entryPrice);
            const exit = Number(exitPrice);
            if (!Number.isFinite(entry) || !Number.isFinite(exit)) return "CANCELLED";
            if (direction === "BUY" || direction === "CALL") return exit > entry ? "WIN" : "LOSS";
            if (direction === "SELL" || direction === "PUT") return exit < entry ? "WIN" : "LOSS";
            return "CANCELLED";
        }

        function buildSignalReason({direction}) {
            if (direction === "BUY" || direction === "CALL") return "Цена сняла нижнюю ликвидность, вернулась выше границы пула, возврат подтверждён.";
            if (direction === "SELL" || direction === "PUT") return "Цена сняла верхнюю ликвидность, закрылась обратно ниже границы пула, возврат подтверждён.";
            return "Сигнал по стратегии снятия ликвидности.";
        }

        function buildHistoricalTradeFromSignal({ candles, signalIndex, signalResult, direction, cfg }) {
            const signalCandle = candles[signalIndex];
            if (!signalCandle) return null;

            const entryIndex = signalIndex + 1;
            const exitIndex = entryIndex + cfg.expiryCandles; 

            const entryCandle = candles[entryIndex];
            const exitCandle = candles[exitIndex];

            const signalTime = normalizeCandleTimeMs(signalCandle.time);

            const baseTrade = {
                tradeId: `${cfg.symbol}_${cfg.timeframe}_${signalTime}_${direction}`,
                mode: "historical",
                direction, timeframe: cfg.timeframe, expiryMinutes: cfg.expiryMinutes,
                signalTime, signalPrice: Number(signalCandle.close), signalHigh: Number(signalCandle.high), signalLow: Number(signalCandle.low),
                atr: signalResult.atr, reason: buildSignalReason({ direction }), debug: signalResult
            };

            if (!entryCandle || !exitCandle) {
                return {
                    ...baseTrade, result: "CANCELLED", cancelReason: "NOT_ENOUGH_FUTURE_CANDLES",
                    entryTime: entryCandle ? normalizeCandleTimeMs(entryCandle.time) : null, entryPrice: entryCandle ? Number(entryCandle.open) : null,
                    exitTime: null, exitPrice: null, pnl: 0, stake: 0, balanceBefore: 0, balanceAfter: 0, state: "TRADE_CLOSED", martingaleStep: 0
                };
            }

            const entryTime = normalizeCandleTimeMs(entryCandle.time);
            const exitTime = normalizeCandleTimeMs(exitCandle.time);
            const entryPrice = Number(entryCandle.open);
            const exitPrice = Number(exitCandle.close);
            const isWin = direction === "BUY" ? exitPrice > entryPrice : exitPrice < entryPrice;

            return {
                ...baseTrade, entryTime, entryPrice, entrySource: "historical_next_5m_open", exitTime, exitPrice, entryDelaySeconds: cfg.totalEntryDelaySeconds,
                result: isWin ? "WIN" : "LOSS", state: "TRADE_CLOSED" 
            };
        }

        function applyMoneyManagementToTrades(rawTrades, moneyConfig) {
            let balance = moneyConfig.demoBalance;
            let mgIndex = 0;

            return rawTrades.map((trade, index) => {
                const currentMgStage = mgIndex + 1; 

                if (trade.result === "CANCELLED") {
                    return { ...trade, stake: 0, martingaleStep: currentMgStage, pnl: 0, balanceBefore: balance, balanceAfter: balance };
                }

                const stake = moneyConfig.martingaleLadder[mgIndex] ?? moneyConfig.baseStake;
                const balanceBefore = balance;
                let pnl = 0;

                if (trade.result === "WIN") {
                    pnl = Math.round(stake * moneyConfig.payout);
                    mgIndex = 0;
                } else if (trade.result === "LOSS") {
                    pnl = -stake;
                    mgIndex = mgIndex < moneyConfig.martingaleLadder.length - 1 ? mgIndex + 1 : 0;
                }

                const balanceAfter = balanceBefore + pnl;
                balance = balanceAfter;

                return {
                    ...trade, tradeId: trade.tradeId || `trade-${index + 1}`,
                    stake, martingaleStep: currentMgStage,
                    pnl, balanceBefore, balanceAfter
                };
            });
        }


        function buildHistoricalBacktest12h(candles, cfg) {
            const now = Date.now();
            const windowStart = now - cfg.historicalLookbackHours * 60 * 60 * 1000;
            const closed = getClosedCandles(candles, now, cfg.timeframeMs);
            
            const rawTrades = [];
            let lastSignalIndex = null;

            const stats = {
                candlesLoaded: candles.length, closedCandles: closed.length, candlesInWindow: 0,
                rawBuy: 0, rawSell: 0, reclaimBuy: 0, reclaimSell: 0, finalBuy: 0, finalSell: 0,
                rejected: 0, rejectReasons: {}
            };

            let lastScores = { structure: 50, liquidity: 50, atr: 50, confidence: 50 };

            for (let i = 0; i < closed.length; i++) {
                const candle = closed[i];
                const candleTimeMs = normalizeCandleTimeMs(candle.time);
                if (!candleTimeMs || candleTimeMs < windowStart) continue;
                
                stats.candlesInWindow++;
                const originalIndex = candles.findIndex(c => normalizeCandleTimeMs(c.time) === candleTimeMs);
                if (originalIndex < 0) continue;

                const result = evaluateStrategySignal(candles, originalIndex, cfg, lastSignalIndex);
                if (result.scores) lastScores = result.scores;
                
                if (result.rawBuy) stats.rawBuy++;
                if (result.rawSell) stats.rawSell++;
                if (result.reclaimBuy) stats.reclaimBuy++;
                if (result.reclaimSell) stats.reclaimSell++;

                const direction = result.isBuy ? "BUY" : result.isSell ? "SELL" : null;

                if (!direction) {
                    if (result.rawBuy || result.rawSell || result.reclaimBuy || result.reclaimSell) {
                        stats.rejected++;
                        const reason = result.reason || "NO_SIGNAL";
                        stats.rejectReasons[reason] = (stats.rejectReasons[reason] || 0) + 1;
                    }
                    continue;
                }

                if (direction === "BUY") stats.finalBuy++;
                if (direction === "SELL") stats.finalSell++;

                lastSignalIndex = originalIndex;

                const trade = buildHistoricalTradeFromSignal({ candles, signalIndex: originalIndex, signalResult: result, direction, cfg });
                if (trade) {
                    rawTrades.push(trade);
                    announcedSignalIds.add(trade.tradeId);
                    
                    if (trade.result !== "CANCELLED") {
                        const exitTimeMs = trade.exitTime;
                        const exitIdxInClosed = closed.findIndex(c => normalizeCandleTimeMs(c.time) >= exitTimeMs);
                        if (exitIdxInClosed > i) {
                            i = exitIdxInClosed - 1; 
                        }
                    }
                }
            }

            const financialTrades = applyMoneyManagementToTrades(rawTrades, cfg);
            const currentMgStep = financialTrades.length > 0 && financialTrades[financialTrades.length - 1].result === 'LOSS' ? 
                                    getNextMartingaleIndex('LOSS', financialTrades[financialTrades.length - 1].martingaleStep - 1) : 0;
            
            stats.builtTrades = rawTrades.length;
            stats.ledgerTrades = financialTrades.length;

            console.log("Historical scan result", {
                rawSweepCount: stats.rawBuy + stats.rawSell,
                reclaimCount: stats.reclaimBuy + stats.reclaimSell,
                finalSignalCount: stats.finalBuy + stats.finalSell,
                builtTrades: rawTrades.length,
                ledgerTrades: financialTrades.length,
                wins: financialTrades.filter(t=>t.result==='WIN').length,
                losses: financialTrades.filter(t=>t.result==='LOSS').length,
                pnl: financialTrades.reduce((s,t)=>s+safeNumber(t.pnl), 0),
                balance: financialTrades.length > 0 ? financialTrades[financialTrades.length-1].balanceAfter : cfg.demoBalance
            });

            return { simulatedTrades: financialTrades, currentMgStep, lastScores, stats };
        }

        function calculateSessionStats(trades) {
            const confirmedTrades = trades.filter(t => t.result !== "CANCELLED" && t.state === "TRADE_CLOSED");
            const totalPnL = confirmedTrades.reduce((sum, t) => sum + safeNumber(t.pnl, 0), 0);
            
            const stats = {
                totalSignals: trades.length, 
                confirmedTrades: confirmedTrades.length,
                cancelled: trades.filter(t => t.result === "CANCELLED").length, 
                wins: confirmedTrades.filter(t => t.result === "WIN").length,
                losses: confirmedTrades.filter(t => t.result === "LOSS").length, 
                pnl: totalPnL,
                finalBalance: safeNumber(STRATEGY_RUNTIME_CONFIG.demoBalance + totalPnL, STRATEGY_RUNTIME_CONFIG.demoBalance)
            };
            return stats;
        }

        function calcAtrAtIndex(candles, index, period) {
            if (index < period) return 0;
            let sumTR = 0;
            for (let j = 0; j < period; j++) {
                const c = candles[index - j];
                const prevC = candles[index - j - 1];
                if (!prevC) continue;
                const tr = Math.max(c.high - c.low, Math.abs(c.high - prevC.close), Math.abs(c.low - prevC.close));
                sumTR += tr;
            }
            return sumTR / period;
        }

        function getClosedCandles(candles, now = Date.now(), timeframeMs = STRATEGY_RUNTIME_CONFIG.timeframeMs) {
            return candles.filter(c => {
                const openTime = normalizeCandleTimeMs(c.time);
                if (!openTime) return false;
                const closeTime = openTime + timeframeMs;
                return closeTime <= now;
            });
        }

        function evaluateStrategySignal(candles, index, cfg = STRATEGY_RUNTIME_CONFIG, lastSignalIndex = null) {
            if (!Array.isArray(candles) || index < cfg.lookback + cfg.atrLen + 2) {
                return { isBuy: false, isSell: false, rawBuy: false, rawSell: false, reclaimBuy: false, reclaimSell: false, reason: "NOT_ENOUGH_DATA", scores: { structure: 50, liquidity: 50, atr: 50, confidence: 50 } };
            }

            const candle = candles[index];
            const prevBars = candles.slice(index - cfg.lookback, index);

            const high = Number(candle.high);
            const low = Number(candle.low);
            const open = Number(candle.open);
            const close = Number(candle.close);

            const upperPool = Math.max(...prevBars.map(c => Number(c.high)));
            const lowerPool = Math.min(...prevBars.map(c => Number(c.low)));
            const atr = calcAtrAtIndex(candles, index, cfg.atrLen);

            if (![high, low, open, close, upperPool, lowerPool, atr].every(Number.isFinite)) {
                return { isBuy: false, isSell: false, rawBuy: false, rawSell: false, reclaimBuy: false, reclaimSell: false, reason: "BAD_NUMERIC_DATA", scores: { structure: 50, liquidity: 50, atr: 50, confidence: 50 } };
            }

            const safeRange = Math.max(high - low, 0.00000001);
            const bodySize = Math.abs(close - open);
            const bodyRatio = bodySize / safeRange;

            const rawSell = high > upperPool;
            const rawBuy = low < lowerPool;

            const reclaimSell = rawSell && close < upperPool;
            const reclaimBuy = rawBuy && close > lowerPool;

            const sweepUpDepth = high - upperPool;
            const reclaimDown = upperPool - close;
            const sweepDownDepth = lowerPool - low;
            const reclaimUp = close - lowerPool;

            const rangeOk = safeRange <= atr * cfg.maxRangeATR;
            const sellBodyOk = !cfg.requireBodyDir || close < open;
            const buyBodyOk = !cfg.requireBodyDir || close > open;
            const doubleSweep = reclaimSell && reclaimBuy;
            const sideOk = !(cfg.blockDoubleSweep && doubleSweep);
            const cooldownOk = lastSignalIndex === null || index - lastSignalIndex > cfg.cooldownBars;

            const sellFilters = reclaimSell && sweepUpDepth >= atr * cfg.minSweepATR && reclaimDown >= atr * cfg.minReclaimATR && bodyRatio >= cfg.minBodyRatio && rangeOk && sellBodyOk && sideOk && cooldownOk;
            const buyFilters = reclaimBuy && sweepDownDepth >= atr * cfg.minSweepATR && reclaimUp >= atr * cfg.minReclaimATR && bodyRatio >= cfg.minBodyRatio && rangeOk && buyBodyOk && sideOk && cooldownOk;

            let sellChoch = true; let buyChoch = true;

            if (cfg.useChoch) {
                const chochBars = candles.slice(index - cfg.chochLookback, index);
                const prevLowestLow = Math.min(...chochBars.map(c => Number(c.low)));
                const prevHighestHigh = Math.max(...chochBars.map(c => Number(c.high)));
                if (cfg.chochMode === "Close") { sellChoch = close < prevLowestLow; buyChoch = close > prevHighestHigh; } 
                else { sellChoch = low < prevLowestLow; buyChoch = high > prevHighestHigh; }
            }

            const isSell = sellFilters && sellChoch;
            const isBuy = buyFilters && buyChoch;

            let reason = "NO_SIGNAL";
            if (!rawBuy && !rawSell) reason = "NO_RAW_SWEEP";
            else if (rawBuy && !reclaimBuy) reason = "BUY_NO_RECLAIM";
            else if (rawSell && !reclaimSell) reason = "SELL_NO_RECLAIM";
            else if (reclaimBuy && !buyFilters) reason = "BUY_FILTERED";
            else if (reclaimSell && !sellFilters) reason = "SELL_FILTERED";
            else if (isBuy) reason = "FINAL_BUY";
            else if (isSell) reason = "FINAL_SELL";

            let strScore = 50, liqScore = 50, atrSc = 50, confScore = 50;
            const sweepD = Math.max(0, rawSell ? sweepUpDepth : rawBuy ? sweepDownDepth : 0);
            const reclaimD = Math.max(0, rawSell ? reclaimDown : rawBuy ? reclaimUp : 0);
            
            strScore = Math.floor(clamp((bodyRatio / cfg.minBodyRatio) * 50, 20, 100));
            if (atr > 0) {
                liqScore = Math.floor(clamp(((sweepD / (atr * cfg.minSweepATR)) + (reclaimD / (atr * cfg.minReclaimATR))) * 25, 10, 100));
                atrSc = Math.floor(clamp(100 - (safeRange / (atr * cfg.maxRangeATR)) * 100, 10, 100));
            }
            if (!rawSell && !rawBuy) {
                liqScore = Math.floor(clamp(liqScore * 0.5, 0, 50)); 
                strScore = Math.floor(clamp(strScore * 0.8, 0, 80));
            }
            confScore = Math.floor(clamp((strScore * 0.3 + liqScore * 0.4 + atrSc * 0.3), 0, 100));

            return {
                isBuy, isSell, rawBuy, rawSell, reclaimBuy, reclaimSell, upperPool, lowerPool, atr, bodyRatio, sweepUpDepth, sweepDownDepth, reclaimUp, reclaimDown, rangeOk, buyFilters, sellFilters, cooldownOk, reason,
                scores: { structure: strScore, liquidity: liqScore, atr: atrSc, confidence: confScore }
            };
        }

        function checkRecentClosedSignals({ candles, symbol = "BTCUSDT", cfg = STRATEGY_RUNTIME_CONFIG, setDebugInfo }) {
            const now = Date.now();
            const closed = getClosedCandles(candles, now, cfg.timeframeMs);
            const lookbackCount = cfg.catchUpClosedCandles || 3;
            
            const start = Math.max(0, closed.length - lookbackCount);
            const recent = closed.slice(start);

            for (let i = 0; i < recent.length; i++) {
                const candle = recent[i];
                const candleTimeMs = normalizeCandleTimeMs(candle.time);

                        finalBuy: result.isBuy, finalSell: result.isSell, reason: result.reason

                    const signalId = buildSignalId({ symbol, timeframe: cfg.timeframe, candleTimeMs, direction });

                    if (announcedSignalIds.has(signalId)) continue;

                        signalHigh: Number(candle.high), signalLow: Number(candle.low),

                    };
                }
            }
            if (latestDebug && cfg.signalDebug && setDebugInfo) setDebugInfo(latestDebug);
            return null;
        }

        const speakTextAsync = (text, isEngineActive) => new Promise(resolve => {
            if (!window.speechSynthesis || !isEngineActive()) {
                return resolve();
            }
            
            const processNext = () => {
                if (speakQueue.length === 0) return resolve();
                isSpeakingVoice = true;
                const nextText = speakQueue.shift();
                
                const utterance = new SpeechSynthesisUtterance(nextText);
                utterance.lang = "ru-RU";
                utterance.rate = 0.95;
                utterance.pitch = 0.95;
                
                const fallbackTimer = setTimeout(() => { 
                    isSpeakingVoice = false; 
                    if (speakQueue.length > 0) processNext(); else resolve();
                }, nextText.length * 120 + 2000); 

                utterance.onend = () => { 
                    clearTimeout(fallbackTimer); 
                    isSpeakingVoice = false; 
                    setTimeout(() => {
                        if (speakQueue.length > 0) processNext(); else resolve();
                    }, 300); 
                };
                utterance.onerror = () => { 
                    clearTimeout(fallbackTimer); 
                    isSpeakingVoice = false; 
                    setTimeout(() => {
                        if (speakQueue.length > 0) processNext(); else resolve();
                    }, 300); 
                };

                try { window.speechSynthesis.speak(utterance); } 
                catch(e) { clearTimeout(fallbackTimer); isSpeakingVoice = false; resolve(); }
            };

            speakQueue.push(text);
            if (!isSpeakingVoice) processNext();
        });

        const ScannerAPI = {
          async getCandles(symbol, count = 300, interval = '5m') { 
            const urls = [
                `https://api.mexc.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`
            ];
            for (let url of urls) {
                try {
                    let response = await fetch(url);
                    if (response.ok) {
                        const data = await response.json();
                        return data.map(d => ({ time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4]), volume: parseFloat(d[5]) }));
                    }
                } catch(e) { continue; }
            }
            return [];
          }
        };

        const LiveClock = () => {

        // Premium Cinematic Scanner

          const chartData = data.slice(-40); 
          const min = Math.min(...chartData.map(d => d.low)); const max = Math.max(...chartData.map(d => d.high));
          const maxVol = Math.max(...chartData.map(d => d.volume || 1)); const range = (max - min) || 1;
          const width = 200, height = 80; const candleWidth = width / chartData.length;

          return (
            <div className="relative w-full h-full bg-slate-800/5 rounded-[1.25rem] overflow-hidden border border-slate-200/50 shadow-[inset_0_0_20px_rgba(0,0,0,0.02)]">
                <div className="absolute inset-0 bg-[linear-gradient(rgba(14,165,233,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(14,165,233,0.05)_1px,transparent_1px)] bg-[size:10px_10px] pointer-events-none" />
                
                <svg className="relative w-full h-full opacity-90 z-10 overflow-visible" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
                  {chartData.map((c, i) => {
                    const isUp = c.close >= c.open; const x = i * candleWidth; const w = candleWidth * 0.7;
                    const oY = height - ((c.open - min) / range) * height; const cY = height - ((c.close - min) / range) * height;

                      <g key={i} style={candleStyle}>

                        <rect x={x} y={isUp ? cY : oY} width={w} height={Math.max(Math.abs(cY - oY), 1.2)} fill={isUp ? "#38bdf8" : "transparent"} stroke={isUp ? "none" : "#94a3b8"} strokeWidth="1" rx="0.5" />
                        <rect x={x} y={volY} width={w} height={volH} fill={isUp ? "rgba(14, 165, 233, 0.15)" : "rgba(148, 163, 184, 0.15)"} />
                      </g>

        const Speedometer = ({ value, label, colorHex = "#0284c7", glow = false }) => {

        const App = () => {
          // --- REFS DECLARATION ---

          const candleSeries = useRef(null);

          // --- STATE DECLARATION ---
          const [appStage, setAppStage] = useState(APP_STAGE.IDLE);
          const [appPhase, setAppPhase] = useState('ОЖИДАНИЕ ЗАПУСКА...');
          const [viewMode, setViewMode] = useState('SCREENER');

          const [statusColorClass, setStatusColorClass] = useState('text-slate-800');
          const [hoveredTooltip, setHoveredTooltip] = useState(null);

          const [debugInfo, setDebugInfo] = useState(null);
          const [backtestStats, setBacktestStats] = useState(null);

          const appStageRef = useRef(appStage);
          const splashDoneRef = useRef(false);

          useEffect(() => {
              appStageRef.current = appStage;
          }, [appStage]);

          // --- SPLASH SCREEN TIMERS ---
          useEffect(() => {
              if (appStage === APP_STAGE.SPLASH) {

          // --- ROBUST REDRAW OVERLAY (Single Source of Truth: tradesHistoryRef) ---
          const redrawOverlay = useCallback(() => {
              if (!chartInstance.current || !candleSeries.current || !overlayRef.current) return;
              const chart = chartInstance.current;
              const series = candleSeries.current;
              
              overlayRef.current.innerHTML = '';
              let renderedMarkersCount = 0;

              tradesHistoryRef.current.forEach(t => {
                  if (!t.signalTime) return;
                  
                  const isCall = t.direction === "CALL" || t.direction === "BUY";
                  const isCancelled = t.result === 'CANCELLED';
                  const isWin = t.result === 'WIN';
                  const isClosed = t.state === 'TRADE_CLOSED';
                  const isActive = t.state === 'TRADE_ACTIVE' || t.state === 'ENTRY_CONFIRMED' || t.state === 'TRADE_EXIT';
                  
                  const resClass = isCancelled ? 'cancelled' : (isActive ? 'active' : (isWin ? 'win' : 'loss'));
                  const dirClass = isCall ? 'call' : 'put';

                  const xSig = chart.timeScale().timeToCoordinate(t.signalTime / 1000);
                  const ySigPrice = getSignalArrowPrice(t);
                  const ySig = ySigPrice ? series.priceToCoordinate(ySigPrice) : null;

                  let xEnt = null, yEnt = null;
                  if (t.entryTime) {
                      xEnt = chart.timeScale().timeToCoordinate(t.entryTime / 1000);
                      yEnt = series.priceToCoordinate(t.entryPrice);
                  }
                  
                  let xEx = null, yEx = null;
                  if (t.entryTime) {
                      const currentUnix = Math.floor(Date.now() / 1000);
                      const renderExitTime = t.exitTime ? (t.exitTime / 1000) : (isActive ? currentUnix : null);
                      xEx = renderExitTime ? chart.timeScale().timeToCoordinate(renderExitTime) : null;
                      
                      const renderExitPrice = t.exitPrice || (isActive ? currentPrice.current : null);
                      yEx = renderExitPrice ? series.priceToCoordinate(renderExitPrice) : null;
                  }

                  const elements = [];

                  // 1. SIGNAL ARROW
                  if (xSig !== null && ySig !== null) {

                      arrowEl.className = `chart-arrow-signal ${dirClass}`;

                      arrowEl.style.top = `${ySig}px`;
                      arrowEl.innerHTML = isCall 
                        ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`
                        : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f43f5e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>`;
                      elements.push({ el: arrowEl, isBox: false, xCenter: xSig, yTop: ySig });

                  // 2. ENTRY POINT

                  if (xEnt !== null && xEx !== null && yEnt !== null && yEx !== null) {

                      const yTop = Math.min(yEnt, yEx) - 15; 
                      const yBot = Math.max(yEnt, yEx) + 15;
                      const boxWidth = Math.max(8, Math.abs(xEx - xEnt));
                      
                      const box = document.createElement("div");
                      box.className = `trade-box ${resClass} ${dirClass}`;
                      box.style.left = `${Math.min(xEnt, xEx)}px`; 
                      box.style.top = `${yTop}px`;
                      box.style.width = `${boxWidth}px`; 
                      box.style.height = `${Math.max(16, yBot - yTop)}px`;

                          exitPt.style.left = `${xEx}px`;

                          elements.push({ el: resBadge, isBox: false, xCenter: xEx, yTop: yEx });

                  }

          useEffect(() => {

                  if (appStageRef.current !== APP_STAGE.LIVE_SCAN || !engineActive.current) return;
                  if (window.speechSynthesis && window.speechSynthesis.speaking) return;

                  const now = Date.now();

                  let shouldReadNews = false;
                  
                  if (timeSinceLastSignal > 10 * 60 * 1000) {

            return () => clearInterval(interval);
          }, [appStage]);

          const addLog = (msg, isAi = false) => {
            const prefix = isAi ? 'SMC PINE:' : 'СИСТЕМА:';
            setLogs(p => [`${prefix} ${msg}`, ...p].slice(0, 5)); 
          };

          const playSound = (type) => {
            if (!audioCtx.current) return; const ctx = audioCtx.current;
            if (ctx.state === 'suspended') ctx.resume();
            const playTone = (freq, oscType, dur, vol, delay = 0) => {
                try {
                    const o = ctx.createOscillator(); const g = ctx.createGain(); o.type = oscType;
                    o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
                    g.gain.setValueAtTime(0, ctx.currentTime + delay);
                    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(ctx.currentTime + delay); o.stop(ctx.currentTime + delay + dur);
                } catch (e) {}
            };
            if (type === 'scan') playTone(1200 + Math.random()*300, 'sine', 0.03, 0.005);
            if (type === 'found') { playTone(600, 'triangle', 0.1, 0.03); playTone(800, 'triangle', 0.1, 0.03, 0.1); }
            if (type === 'start') { playTone(523.25, 'sine', 0.4, 0.03); playTone(659.25, 'sine', 0.5, 0.03, 0.1); playTone(783.99, 'sine', 0.6, 0.04, 0.2); }

                  timeScale: { borderVisible: false, timeVisible: true, secondsVisible: false }, rightPriceScale: { borderVisible: false }
                });
                candleSeries.current = mainChart.addCandlestickSeries({ upColor: '#38bdf8', downColor: '#fb7185', borderVisible: true, borderUpColor: '#38bdf8', borderDownColor: '#fb7185', wickUpColor: '#38bdf8', wickDownColor: '#fb7185' });

          const clearChartExtras = () => {
              if (!chartInstance.current || !candleSeries.current) return;

          };

          const drawIndicators = (data) => {
              clearChartExtras();
              let upperSeries, lowerSeries;
              
              const upperData = []; const lowerData = [];
              for(let i=STRATEGY_RUNTIME_CONFIG.lookback; i<data.length; i++) {
                  let up = -Infinity; let dn = Infinity;
                  for(let k=1; k<=STRATEGY_RUNTIME_CONFIG.lookback; k++) {
                      if(data[i-k].high > up) up = data[i-k].high;
                      if(data[i-k].low < dn) dn = data[i-k].low;
                  }
                  upperData.push({time: data[i].time, value: up});
                  lowerData.push({time: data[i].time, value: dn});
              }

              try {
                  upperSeries = chartInstance.current.addLineSeries({ color: 'rgba(244, 63, 94, 0.5)', lineWidth: 1, lineStyle: 2, title: 'UPPER POOL', lastValueVisible: false, priceLineVisible: false });

                  <div className="border-b border-white/80 p-3 bg-gradient-to-r from-blue-50/50 to-transparent flex justify-center items-center shrink-0 shadow-sm relative z-10">
                    <div className={`text-sm md:text-base oswald-font tracking-widest flex items-center gap-2 text-center leading-none transition-all duration-300 w-full justify-center font-bold ${statusColorClass}`}>
                      {appPhase.includes('ПОДГОТОВКА') || appPhase.includes('ОЖИДАНИЕ') || appPhase.includes('ПЕРЕХОД') ? (
                        <span className="text-amber-500 drop-shadow-[0_0_10px_rgba(245,158,11,0.3)] animate-pulse">{appPhase}</span>
                      ) : appPhase.includes('СНАЙПЕР:') || appPhase.includes('ОТЧЁТ') ? (
                        <span className="text-blue-600 drop-shadow-[0_0_10px_rgba(37,99,235,0.3)] animate-pulse">{appPhase}</span>
                      ) : appPhase}
                    </div>
                  </div>

                  <div className="flex-1 flex flex-col p-2 md:p-3 gap-3 overflow-y-auto no-scrollbar relative z-10 pb-6">
                    
                    <div className="broker-button-wrap shrink-0">
                        <a className="broker-ref-button" href={STRATEGY_RUNTIME_CONFIG.referralUrl} target="_blank" rel="noopener noreferrer">
                            <span className="broker-ref-button__small">Брокер для входа</span>
                            <span className="broker-ref-button__main">Торговать здесь</span>
                            <span className="broker-ref-button__sub">через брокера</span>
                            <span className="broker-demo-cursor" aria-hidden="true">
                              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-45)"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                            </span>
                        </a>
                    </div>

                    {/* NEW DEBUG PANEL */}
                    {STRATEGY_RUNTIME_CONFIG.signalDebug && backtestStats && (
                        <div className="glass-card rounded-2xl p-3 flex flex-col gap-1 text-[9px] md:text-[10px] mono-font shrink-0">
                           <div className="text-cyan-600 font-bold border-b border-slate-200 pb-1 mb-1 oswald-font tracking-widest">ДИАГНОСТИКА СТРАТЕГИИ 12H</div>
                           <div className="flex justify-between"><span>Свечей в 12H:</span><b>{backtestStats.candlesInWindow}</b></div>
                           <div className="flex justify-between"><span>RAW Sweep:</span><b className="text-cyan-600">{backtestStats.rawBuy + backtestStats.rawSell}</b></div>
                           <div className="flex justify-between"><span>RECLAIM:</span><b className="text-blue-600">{backtestStats.reclaimBuy + backtestStats.reclaimSell}</b></div>
                           <div className="flex justify-between"><span>FINAL Signals:</span><b className="text-emerald-500">{backtestStats.finalBuy + backtestStats.finalSell}</b></div>
                           
                           <div className="flex justify-between border-t border-slate-100 pt-1 mt-1"><span>Built trades:</span><b className={backtestStats.finalBuy + backtestStats.finalSell > 0 && backtestStats.builtTrades === 0 ? 'text-rose-500' : 'text-slate-700'}>{backtestStats.builtTrades}</b></div>
                           <div className="flex justify-between"><span>Ledger trades:</span><b>{backtestStats.ledgerTrades}</b></div>
                           <div className="flex justify-between"><span>Rendered markers:</span><b id="rendered-markers-count">-</b></div>

                           {(backtestStats.finalBuy + backtestStats.finalSell > 0 && backtestStats.builtTrades === 0) && (
                               <div className="text-rose-500 font-bold mt-1">Ошибка: сигналы найдены, сделки не построены.</div>
                           )}

                           {Object.keys(backtestStats.rejectReasons).length > 0 && (
                               <div className="mt-1 pt-1 border-t border-slate-100 flex flex-col">
                                   <span className="text-slate-400 mb-0.5">Частые причины отклонения:</span>
                                   {Object.entries(backtestStats.rejectReasons).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([reason, count]) => (
                                       <b key={reason} className="text-amber-600 truncate">{reason}: {count}</b>
                                   ))}
                               </div>
                           )}
                           {debugInfo && (
                               <div className="flex justify-between text-slate-500 border-t border-slate-100 pt-1 mt-1"><span>Live Reason:</span><b className="text-amber-600">{debugInfo.reason}</b></div>
                           )}
                        </div>
                    )}

                    <div className="grid grid-cols-4 gap-2 glass-card rounded-2xl p-2 shrink-0">
                       <Speedometer value={metrics.structure} label="СТРУКТУРА" colorHex="#eab308" />
                       <Speedometer value={metrics.liquidity} label="ЛИКВИДНОСТЬ" colorHex="#0ea5e9" glow={true} />
                       <Speedometer value={metrics.filterLevel} label="АТР ФИЛЬТР" colorHex="#8b5cf6" />
                       <Speedometer value={metrics.smartMoney} label="SMART MONEY" colorHex="#06b6d4" />
                    </div>

                    <div className="flex gap-2 h-24 shrink-0">
                      <div className={`w-[35%] rounded-2xl flex flex-col items-center justify-center relative transition-all duration-500 glass-card ${appPhase === 'СИГНАЛ АКТИВЕН' ? 'border-cyan-300 shadow-[0_0_20px_rgba(34,211,238,0.2)]' : ''}`}>
                        {signal ? <VolumetricArrow type={signal.type} /> : (
                          <div className="flex flex-col items-center opacity-30">
                              <Radar size={24} className="text-slate-500 mb-1" /><span className="text-[8px] md:text-[9px] tracking-widest font-bold text-slate-500 oswald-font">СТАТУС</span>
                          </div>
                        )}
                      </div>
                      <div className="w-[65%] rounded-2xl overflow-hidden glass-card p-2 flex justify-between items-end pb-2 pl-3">
                        <div className="flex flex-col items-start w-full pr-1">
                           <span className="text-[8px] text-slate-400 font-bold uppercase tracking-widest leading-none mb-1">БАЛАНС 12H</span>
                           <span className="text-lg md:text-xl text-slate-700 font-black oswald-font drop-shadow-sm leading-none">{formatRub(sessionStats.finalBalance)}</span>
                           <span className={`text-[10px] mt-1 font-bold ${sessionStats.pnl >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                             {sessionStats.pnl > 0 ? '+' : ''}{formatRub(sessionStats.pnl)} PNL
                           </span>
                        </div>
                        <HftTape price={currentPrice.current} />
                      </div>
                    </div>

                    <div className={`glass-card border rounded-2xl p-3 flex flex-col gap-2 shrink-0 relative overflow-hidden transition-all duration-700 ${
                        sessionStats.totalSignals > 0 ? (sessionStats.pnl >= 0 ? 'border-emerald-300/50 shadow-[0_10px_30px_rgba(16,185,129,0.05)]' : 'border-rose-300/50 shadow-[0_10px_30px_rgba(225,29,72,0.05)]') : ''
                    }`}>
                       <div className="flex justify-between items-center z-10 relative">
                           <span className="text-[9px] md:text-[10px] text-slate-500 tracking-widest font-bold flex items-center gap-1.5 leading-none oswald-font">
                              <TrendingUp size={14} className={sessionStats.pnl >= 0 ? "text-emerald-500" : "text-rose-500"} /> СТАТИСТИКА
                           </span>
                           <span className="text-[9px] font-black tracking-widest text-slate-600 oswald-font bg-white/60 px-1.5 py-0.5 rounded border border-white">12 ЧАСОВ</span>
                       </div>
                       
                       <div className="flex justify-between items-center z-10 relative mt-1 oswald-font gap-2">
                           <div className="flex flex-col flex-1 bg-white/60 px-2 py-1.5 rounded-xl border border-white shadow-[0_2px_5px_rgba(0,0,0,0.02)]">
                               <span className="text-[7px] md:text-[8px] text-slate-400 tracking-widest font-bold uppercase">ПРОФИТ</span>
                               <span className="text-base md:text-lg text-emerald-500 font-black leading-none mt-0.5">{sessionStats.wins}</span>
                           </div>
                           <div className="flex flex-col flex-1 items-end bg-white/60 px-2 py-1.5 rounded-xl border border-white shadow-[0_2px_5px_rgba(0,0,0,0.02)]">
                               <span className="text-[7px] md:text-[8px] text-slate-400 tracking-widest font-bold uppercase">УБЫТОК</span>
                               <span className="text-base md:text-lg text-rose-500 font-black leading-none mt-0.5">{sessionStats.losses}</span>
                           </div>
                       </div>
                    </div>

                    <div className="glass-card rounded-2xl p-3 flex justify-between items-center shrink-0 relative overflow-hidden shadow-sm">
                       <div className="flex flex-col relative z-10">
                          <span className="text-[8px] text-slate-400 tracking-widest font-bold leading-none uppercase">ЦЕНА ВХОДА</span>
                          <span className="text-base text-slate-700 mt-1 font-black mono-font leading-none drop-shadow-sm">{signal && signal.entryPrice ? formatPrice(signal.entryPrice) : '---.-----'}</span>
                       </div>
                       <div className="flex flex-col items-end relative z-10">
                          <span className="text-[8px] text-slate-400 tracking-widest flex items-center gap-1 font-bold leading-none uppercase"><Clock size={10} className="text-cyan-500"/> ЭКСПИРАЦИЯ</span>
                          <span className="text-xl text-cyan-600 mt-1 font-black mono-font tracking-wider leading-none drop-shadow-sm">{countdown !== null ? `${Math.floor(countdown/60)}:${(countdown%60).toString().padStart(2,'0')}` : (signal && signal.exp ? `0${signal.exp}:00` : '--:--')}</span>
                       </div>
                    </div>

                  </div>
                </div>
              </main>

              <footer className="h-auto py-2 border-t border-slate-200/50 flex flex-row items-center justify-between px-4 shrink-0 z-40 bg-transparent mb-1">
                <div className="flex items-center gap-2 text-slate-400 text-[9px] md:text-[10px] tracking-widest font-bold uppercase oswald-font">
                  <Shield size={12} className="text-cyan-500 hidden sm:block" /> 
                  <span className="hidden sm:inline">256-BIT ШИФРОВАНИЕ СИСТЕМЫ • СОЕДИНЕНИЕ БЕЗОПАСНО</span>
                  <span className="inline sm:hidden">ЗАЩИТА АКТИВНА</span>
                </div>
                
                <div className="flex items-center gap-2 oswald-font">
                  <span className="text-white text-[8px] md:text-[9px] px-2 py-1 rounded bg-slate-800 tracking-widest font-bold text-center shadow-sm border border-slate-600">
                    КРИПТО ИНВЕСТ PRO MAX
                  </span>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
