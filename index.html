<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Крипто Терминал Гордеева - PRO MAX (SMC)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Oswald:wght@300;400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
        
        body { 
            margin: 0; padding: 0; 
            background: #eef2f6;
            color: #0f172a; 
            overflow: hidden; 
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
            font-family: 'Montserrat', sans-serif;
        }
        
        .oswald-font { font-family: 'Oswald', sans-serif; letter-spacing: 0.05em; text-transform: uppercase; }
        .mono-font { font-family: 'JetBrains Mono', monospace; }

        .bg-grid-pattern {
            background-image: 
                linear-gradient(to right, rgba(14, 165, 233, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        .bg-orb-1 {
            position: absolute; top: -10%; left: -5%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.25) 0%, rgba(37, 99, 235, 0.05) 50%, transparent 70%);
            border-radius: 50%; filter: blur(60px); animation: float 12s ease-in-out infinite alternate;
        }
        .bg-orb-2 {
            position: absolute; bottom: -15%; right: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.2) 0%, rgba(14, 165, 233, 0.05) 50%, transparent 70%);
            border-radius: 50%; filter: blur(80px); animation: float 15s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(2%, 4%) scale(1.05); }
            100% { transform: translate(-2%, -3%) scale(0.95); }
        }

        @keyframes gradient-x {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient-x {
            background-size: 200% 200%;
            animation: gradient-x 6s ease infinite;
        }

        .card-3d-wrapper { perspective: 2000px; }
        .card-3d {
            transform-style: preserve-3d;
            animation: float-3d 12s ease-in-out infinite;
            box-shadow: 
                0 30px 60px -15px rgba(15, 23, 42, 0.15), 
                0 15px 30px -10px rgba(14, 165, 233, 0.2),
                inset 0 1px 3px rgba(255, 255, 255, 1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 249, 255, 0.8) 100%);
            backdrop-filter: blur(20px);
            position: relative;
        }
        .card-3d::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.6) 25%, transparent 30%);
            border-radius: inherit; pointer-events: none; z-index: 50; animation: glare 6s infinite linear;
        }

        @keyframes glare {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes float-3d {
            0% { transform: translateY(0px) rotateX(1deg) rotateY(-1deg); }
            50% { transform: translateY(-8px) rotateX(-1deg) rotateY(2deg); }
            100% { transform: translateY(0px) rotateX(1deg) rotateY(-1deg); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-wrapper { display: flex; width: max-content; animation: ticker 40s linear infinite; }
        
        .scanline-anim { 
            background: linear-gradient(to bottom, transparent, rgba(14, 165, 233, 0.2), rgba(59, 130, 246, 0.3), transparent); 
            animation: scanline 3s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
        }
        @keyframes scanline { 
            0% { transform: translateY(-100%); opacity: 0; } 
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(500%); opacity: 0; } 
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            z-index: 40;
        }
        
        .glass-panel-heavy {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(241, 245, 249, 0.8) 100%);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 15px 35px -10px rgba(15, 23, 42, 0.08), inset 0 2px 10px rgba(255, 255, 255, 0.6);
        }

        .glass-panel-splash {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.85) 0%, rgba(2, 6, 23, 0.95) 100%);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 250, 252, 0.6) 100%);
            border: 1px solid rgba(226, 232, 240, 0.9);
            box-shadow: 0 4px 15px -5px rgba(15, 23, 42, 0.03), inset 0 1px 1px rgba(255, 255, 255, 1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(186, 230, 253, 0.8);
            background: linear-gradient(145deg, rgba(255, 255, 255, 1) 0%, rgba(248, 250, 252, 0.9) 100%);
            box-shadow: 0 8px 25px -5px rgba(14, 165, 233, 0.15), inset 0 1px 2px rgba(255, 255, 255, 1);
        }

        .text-gradient {
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes slideUpFade {
            0% { transform: translateY(10px); opacity: 0; }
            20% { transform: translateY(0); opacity: 1; }
            80% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-10px); opacity: 0; }
        }
        .hft-tick { animation: slideUpFade 1.5s ease-out forwards; }

        /* ================= PREMIUM UI ADDITIONS ================= */
        
        .silver-badge {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #cbd5e1 100%);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 
                0 4px 10px -2px rgba(15, 23, 42, 0.1),
                inset 0 2px 4px rgba(255, 255, 255, 1),
                inset 0 -1px 2px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }
        .silver-badge::after {
            content: '';
            position: absolute;
            top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-20deg);
            animation: silver-shine 5s infinite;
        }
        @keyframes silver-shine {
            0% { left: -150%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }
        .silver-text {
            background: linear-gradient(to right, #475569, #94a3b8, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 1px 1px rgba(255,255,255,0.6);
        }

        .broker-btn {
            background: linear-gradient(135deg, #0ea5e9 0%, #1d4ed8 100%);
            box-shadow: 
                0 8px 20px -5px rgba(14, 165, 233, 0.5),
                inset 0 1px 2px rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(186, 230, 253, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .broker-btn:hover {
            box-shadow: 
                0 12px 25px -5px rgba(14, 165, 233, 0.7),
                inset 0 1px 2px rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }
        .broker-btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 4px 10px -5px rgba(14, 165, 233, 0.5);
        }

        .animated-cursor {
            animation: cursor-click 4s infinite;
        }
        @keyframes cursor-click {
            0% { transform: translate(20px, 20px) scale(1); opacity: 0; }
            15% { transform: translate(0px, 0px) scale(1); opacity: 1; }
            25% { transform: translate(0px, 0px) scale(0.9); opacity: 1; } 
            35% { transform: translate(0px, 0px) scale(1); opacity: 1; }
            50% { transform: translate(20px, 20px) scale(1); opacity: 0; }
            100% { transform: translate(20px, 20px) scale(1); opacity: 0; }
        }

        .click-ripple {
            position: absolute;
            top: 2px; left: 2px;
            width: 15px; height: 15px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            transform: scale(0);
            opacity: 0;
            animation: ripple-effect 4s infinite;
            pointer-events: none;
        }
        @keyframes ripple-effect {
            0%, 20% { transform: scale(0); opacity: 0; }
            25% { transform: scale(1); opacity: 0.8; }
            40% { transform: scale(3.5); opacity: 0; }
            100% { transform: scale(3.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Shield = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 4.81 17 6 19 6a1 1 0 0 1 1 1z"/></svg>;
        const Cpu = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>;
        const Globe = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
        const Clock = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const TrendingUp = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const Radar = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/><path d="M4 5.49A10 10 0 0 0 5.3 19.38"/><path d="M20 8.74A10 10 0 0 1 17.38 20"/><path d="M16 8a6 6 0 0 0-8.5-1.5"/><path d="M7.5 16.5a6 6 0 0 0 9.2-.5"/><path d="M12 12v.01"/></svg>;
        const Zap = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const Activity = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
        
        const MousePointer = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)" stroke="#0f172a" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
                <path d="M13 13l6 6"/>
            </svg>
        );

        const ASSETS = [
          { pair: 'BTC/USDT', symbol: 'BTCUSDT', name: 'Bitcoin' }
        ];

        const TOP_CRYPTO_MAP = {
            'BTCUSDT': 'Bitcoin', 'ETHUSDT': 'Ethereum', 'DOGEUSDT': 'Dogecoin', 'SOLUSDT': 'Solana',
            'BNBUSDT': 'BNB', 'XRPUSDT': 'XRP', 'ADAUSDT': 'Cardano', 'TONUSDT': 'Toncoin',
            'SHIBUSDT': 'Shiba Inu', 'AVAXUSDT': 'Avalanche', 'DOTUSDT': 'Polkadot', 'TRXUSDT': 'TRON',
            'LINKUSDT': 'Chainlink', 'MATICUSDT': 'Polygon', 'POLUSDT': 'Polygon', 'LTCUSDT': 'Litecoin',
            'BCHUSDT': 'Bitcoin Cash', 'UNIUSDT': 'Uniswap', 'APTUSDT': 'Aptos', 'ARBUSDT': 'Arbitrum',
            'OPUSDT': 'Optimism'
        };

        const plural = (number, titles) => {
            const cases = [2, 0, 1, 1, 1, 2];
            return titles[ (number%100>4 && number%100<20)? 2 : cases[(number%10<5)?number%10:5] ];
        }

        const ScannerAPI = {
          async getCandles(symbol, count = 250, interval = '5m') { 
            const urls = [
                `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api1.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://api2.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                `https://data-api.binance.vision/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`
            ];
            
            for (let url of urls) {
                try {
                    let response = await fetch(url);
                    if (response.ok) {
                        const data = await response.json();
                        return data.map(d => ({
                            time: d[0] / 1000,
                            open: parseFloat(d[1]),
                            high: parseFloat(d[2]),
                            low: parseFloat(d[3]),
                            close: parseFloat(d[4]),
                            volume: parseFloat(d[5])
                        }));
                    }
                } catch(e) { continue; }
            }
            return [];
          }
        };

        const formatPrice = (p) => {
            if (!p && p !== 0) return '0.00';
            if (p >= 1000) return p.toFixed(2);
            if (p >= 10) return p.toFixed(3);
            if (p >= 1) return p.toFixed(4);
            return p.toFixed(5);
        };

        function calcLiquidityZones(data, period = 30) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) {
                    res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low });
                    continue;
                }
                let high = -Infinity;
                let low = Infinity;
                for (let j = 1; j <= period; j++) {
                    high = Math.max(high, data[i - j].high);
                    low = Math.min(low, data[i - j].low);
                }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;
        }

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { 
                    res.push({time: data[i].time, value: data[i].high - data[i].low}); 
                    continue; 
                }
                let sumTR = 0;
                let count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j];
                    const prevC = data[i - j - 1];
                    let tr = Math.max(
                        c.high - c.low,
                        Math.abs(c.high - prevC.close),
                        Math.abs(c.low - prevC.close)
                    );
                    sumTR += tr;
                    count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;
        }

        const LiveClock = () => {
          const [t, setT] = useState(new Date());
          useEffect(() => { const i = setInterval(() => setT(new Date()), 1000); return () => clearInterval(i); }, []);
          return <span className="text-slate-800 text-sm md:text-base mono-font font-bold">{t.toLocaleTimeString('ru-RU')}</span>;
        };

        const MiniChart = ({ data }) => {
          const [scanIndex, setScanIndex] = useState(0);
          const [isDeepScan, setIsDeepScan] = useState(false);

          useEffect(() => {
              if (!data || !Array.isArray(data) || data.length < 2) return;
              let isActive = true;
              let timeoutId;
              
              const maxIdx = Math.min(150, data.length) - 1; 

              const scanCycle = () => {
                  if (!isActive) return;
                  setScanIndex(prev => {
                      if (prev >= maxIdx) return 0;
                      return prev + 1;
                  });
                  
                  const deep = Math.random() > 0.8;
                  setIsDeepScan(deep);
                  
                  const delay = deep ? (Math.random() * 350 + 150) : (Math.random() * 40 + 20);
                  timeoutId = setTimeout(scanCycle, delay);
              };

              timeoutId = setTimeout(scanCycle, 500);
              return () => {
                  isActive = false;
                  clearTimeout(timeoutId);
              };
          }, [data]);

          if (!data || !Array.isArray(data) || data.length < 2) {
            return <div className="w-full h-full flex items-center justify-center opacity-60 text-lg tracking-widest text-slate-500 font-bold animate-pulse oswald-font">ЗАГРУЗКА КЛАСТЕРОВ...</div>;
          }
          
          const chartData = data.slice(-150); 
          const min = Math.min(...chartData.map(d => d.low));
          const max = Math.max(...chartData.map(d => d.high));
          const maxVol = Math.max(...chartData.map(d => d.volume || 1));
          const range = (max - min) || 1;
          const width = 800, height = 120; 
          const candleWidth = width / chartData.length;

          return (
            <div className="relative w-full h-full bg-[#f8fafc]">
                <svg className="w-full h-full opacity-90" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
                  <defs>
                      <linearGradient id="scanGlow" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%" stopColor="rgba(34, 211, 238, 0)" />
                          <stop offset="50%" stopColor="rgba(34, 211, 238, 0.4)" />
                          <stop offset="100%" stopColor="rgba(34, 211, 238, 0)" />
                      </linearGradient>
                  </defs>
                  
                  {chartData.map((c, i) => {
                    const isUp = c.close >= c.open;
                    const x = i * candleWidth;
                    const w = candleWidth * 0.6;
                    const oY = height - ((c.open - min) / range) * height;
                    const cY = height - ((c.close - min) / range) * height;
                    const hY = height - ((c.high - min) / range) * height;
                    const lY = height - ((c.low - min) / range) * height;
                    
                    const volH = ((c.volume || 0) / maxVol) * 20;
                    const volY = height - volH;
                    
                    const isTarget = i === scanIndex;

                    return (
                      <g key={i}>
                        {isTarget && (
                            <rect x={x - candleWidth*0.5} y={0} width={candleWidth * 2} height={height} fill="url(#scanGlow)" />
                        )}
                        
                        <line x1={x + w / 2} y1={hY} x2={x + w / 2} y2={lY} stroke={isUp ? (isTarget ? "#06b6d4" : "#0ea5e9") : (isTarget ? "#e11d48" : "#94a3b8")} strokeWidth={isTarget ? "2" : "1"} className="transition-colors duration-150" />
                        <rect x={x} y={isUp ? cY : oY} width={w} height={Math.max(Math.abs(cY - oY), 1.2)} fill={isUp ? (isTarget ? "#06b6d4" : "#0ea5e9") : "transparent"} stroke={isUp ? "none" : (isTarget ? "#e11d48" : "#94a3b8")} strokeWidth={isTarget ? "1.5" : "1"} rx="0.5" className="transition-colors duration-150" />
                        <rect x={x} y={volY} width={w} height={volH} fill={isUp ? "rgba(14, 165, 233, 0.2)" : "rgba(148, 163, 184, 0.2)"} />
                      </g>
                    );
                  })}
                </svg>
                
                {chartData.length > 0 && scanIndex >= 0 && scanIndex < chartData.length && (
                    <div 
                        className="absolute top-0 bottom-0 pointer-events-none transition-all duration-75 flex flex-col justify-center items-center mix-blend-multiply"
                        style={{ left: `${(scanIndex / chartData.length) * 100}%`, width: `${(1 / chartData.length) * 100}%` }}
                    >
                        <div className={`w-[1px] h-full bg-cyan-400 ${isDeepScan ? 'opacity-100 shadow-[0_0_15px_rgba(34,211,238,1)]' : 'opacity-60 shadow-[0_0_8px_rgba(34,211,238,0.5)]'} transition-all duration-100`}></div>
                        {isDeepScan && (
                            <div className="absolute top-1/2 -translate-y-1/2 w-8 h-8 border border-cyan-400/60 rounded-full animate-ping shadow-[0_0_10px_rgba(34,211,238,0.3)]"></div>
                        )}
                        {isDeepScan && (

          const cryptoQuotesRef = useRef([]);

          const consecutiveLossesRef = useRef(0);
          const lastSignalTimeRef = useRef(0);
          const lastSignalPriceRef = useRef(0);

          const speechQueueRef = useRef([]);
          const isSpeakingRef = useRef(false);
          const lastSpokenKeysRef = useRef({});

          const enqueueSpeech = (text, key = null, priority = 1, onDone = null) => {
              if (key) {
                  if (speechQueueRef.current.some(item => item.key === key)) {
                      if (onDone) onDone(); 
                      return;
                  }
                  const now = Date.now();
                  if (lastSpokenKeysRef.current[key] && (now - lastSpokenKeysRef.current[key]) < 30000) {
                      if (onDone) onDone(); 
                      return;
                  }
              }
              
              speechQueueRef.current.push({ text, key, priority, onDone });
              speechQueueRef.current.sort((a, b) => a.priority - b.priority); 
              processSpeechQueue();
          };

          const speakAsync = (text, key = null, priority = 1) => {
              return new Promise(resolve => {
                  enqueueSpeech(text, key, priority, resolve);
              });
          };

          const processSpeechQueue = () => {
              if (isSpeakingRef.current || speechQueueRef.current.length === 0) return;
              isSpeakingRef.current = true;
              
              const item = speechQueueRef.current.shift();
              
              if (item.key) {
                  lastSpokenKeysRef.current[item.key] = Date.now();
              }

              const utterance = new SpeechSynthesisUtterance(item.text);
              utterance.lang = 'ru-RU';
              utterance.rate = 1.05;
              utterance.pitch = 0.95;

              let isFinished = false;
              let fallbackTimeout;

              const completeSpeech = () => {
                  if (isFinished) return;
                  isFinished = true;
                  clearTimeout(fallbackTimeout);
                  isSpeakingRef.current = false;
                  if (item.onDone) item.onDone();
                  setTimeout(processSpeechQueue, 300); 
              };

              utterance.onend = completeSpeech;
              utterance.onerror = completeSpeech;

              try {
                  window.speechSynthesis.cancel(); 
                  setTimeout(() => {
                      window.speechSynthesis.speak(utterance);
                      fallbackTimeout = setTimeout(() => {
                          if (!isFinished) {
                              window.speechSynthesis.cancel();
                              completeSpeech();
                          }
                      }, Math.max(5000, item.text.length * 150));
                  }, 50);
              } catch (e) {
                  completeSpeech();
              }
          };

          const awaitSpeechCompletion = () => new Promise(resolve => {
              const check = setInterval(() => {
                  if (!isSpeakingRef.current && speechQueueRef.current.length === 0) {
                      clearInterval(check);
                      resolve();
                  }
              }, 400);
          });

          const fetchCryptoQuotes = async () => {

                  const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                  if (res.ok) {
                      const data = await res.json();
                      const filtered = data.filter(item => TOP_CRYPTO_MAP[item.symbol]);
                      const formatted = filtered.map(item => ({
                          symbol: item.symbol.replace('USDT', ''),
                          name: TOP_CRYPTO_MAP[item.symbol],
                          price: parseFloat(item.lastPrice),
                          change: parseFloat(item.priceChangePercent)
                      })).sort((a, b) => b.price - a.price);
                      
                      if (formatted.length > 0) {
                          cryptoQuotesRef.current = formatted;
                          setCryptoQuotes(formatted);
                      }
                  }
              } catch (e) {}
          };

          useEffect(() => {
              if (!isStarted) return;
              const voiceTimer = setInterval(() => {
                  if (cryptoQuotesRef.current && cryptoQuotesRef.current.length > 0 && signalPhaseRef.current === 'NONE') {
                      const idx = Math.floor(Math.random() * cryptoQuotesRef.current.length);
                      const q = cryptoQuotesRef.current[idx];
                      const changeWord = q.change >= 0 ? 'выросла на' : 'снизилась на';

                    const g = ctx.createGain();
                    o.type = oscType;
                    o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
                    g.gain.setValueAtTime(0, ctx.currentTime + delay);
                    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(ctx.currentTime + delay);
                    o.stop(ctx.currentTime + delay + dur);
                } catch (e) {}
            };

                                      isPut = true; signalType = 'Wick Rejection'; baseScore = 78; rawSignal = true;
                                  } else if (currCandle.high >= cUpper && currCandle.close < cUpper && upperWick > cAtr * 0.2) {
                                      isPut = true; signalType = 'Edge Reaction'; baseScore = 75; rawSignal = true;
                                  } else if (isNearTop && prevCandle.high > cUpper && isRedCandle && currCandle.close < prevCandle.close) {
                                      isPut = true; signalType = 'Liquidity Return'; baseScore = 75; rawSignal = true;
                                  }

                                  if (sweptBot && returnedInsideBot && structureBreakBot) {
                                      isCall = true; signalType = 'Primary Sweep'; baseScore = 85; rawSignal = true;
                                  } else if (isNearBot && lowerWick > body * 1.2 && isGreenCandle) {
                                      isCall = true; signalType = 'Wick Rejection'; baseScore = 78; rawSignal = true;
                                  } else if (currCandle.low <= cLower && currCandle.close > cLower && lowerWick > cAtr * 0.2) {
                                      isCall = true; signalType = 'Edge Reaction'; baseScore = 75; rawSignal = true;
                                  } else if (isNearBot && prevCandle.low < cLower && isGreenCandle && currCandle.close > prevCandle.close) {
                                      isCall = true; signalType = 'Liquidity Return'; baseScore = 75; rawSignal = true;
                                  }
                              }

                              if (rawSignal) {
                                  let qScore = baseScore;
                                  let rejectReason = '';

                                  let threshold = (signalType === 'Primary Sweep') ? 58 : 66;

                                  if (consecutiveLossesRef.current >= 2) threshold += 8;

                                  const midPoint = cLower + rangeWidth / 2;
                                  const distToMid = Math.abs(currCandle.close - midPoint);
                                  if (distToMid < rangeWidth * 0.15) { 
                                      qScore -= 30; rejectReason = 'middle range';
                                  }

                                  const distTopLate = cUpper - currCandle.close;
                                  const distBotLate = currCandle.close - cLower;
                                  if (isCall && distBotLate > cAtr * 0.45) { qScore -= 40; rejectReason = 'late entry'; }
                                  if (isPut && distTopLate > cAtr * 0.45) { qScore -= 40; rejectReason = 'late entry'; }

                                  const candlesSinceLast = (currTime - lastSignalTimeRef.current) / (5 * 60); 
                                  if (candlesSinceLast < 4) {
                                      qScore -= 50; rejectReason = 'cooldown';
                                  } else if (candlesSinceLast < 8) {
                                      if (Math.abs(currCandle.close - lastSignalPriceRef.current) < cAtr * 0.38) {
                                          qScore -= 20; rejectReason = 'same zone cooldown';
                                      }
                                  }

                                  if (isCall && prevCandle.close < prevCandle.open && (prevCandle.open - prevCandle.close) > cAtr * 1.5) {
                                      qScore -= 15; rejectReason = 'impulse risk';
                                  }
                                  if (isPut && prevCandle.close > prevCandle.open && (prevCandle.close - prevCandle.open) > cAtr * 1.5) {
                                      qScore -= 15; rejectReason = 'impulse risk';
                                  }

                                  if (qScore < threshold) {
                                      if (!rejectReason) rejectReason = 'low quality score';
                                      addLog(`Rejected: ${rejectReason}`, true);
                                      isCall = false; isPut = false;
                                      setFinances(prev => ({...prev, rejected: prev.rejected + 1}));
                                  } else {
                                      lastSignalTimeRef.current = currTime;
                                      lastSignalPriceRef.current = currCandle.close;
                                      triggerCandleIdx = evaluateIdx;
                                      currentQScore = qScore;
                                  }
                              }
                          }
                      }

                      if (isCall || isPut) {
                          setAsset(cur);
                          signalPhaseRef.current = 'EXPLAINING';
                          setSignalPhase('EXPLAINING');
                          syncModeView();
                          
                          const structureValue = isCall ? 100 : 0;

                          playSound('found');
                          
                          if(candleSeries.current) {
                              try { 
                                  markersRef.current.push({
                                      time: data[triggerCandleIdx].time,
                                      position: isCall ? 'belowBar' : 'aboveBar',
                                      color: isCall ? '#0ea5e9' : '#f43f5e',

                                  candleSeries.current.setMarkers(markersRef.current);

                          }

                          drawIndicators(upperData, lowerData);
                          currentPrice.current = data[lastIdx].close;
                          
                          updateStatus(`ОБЪЯСНЕНИЕ СИГНАЛА...`, 'text-cyan-600 font-bold animate-pulse');

                          await speakAsync(`Внимание. Появился сигнал ${directionText}. Причина: ${signalType === 'Primary Sweep' ? 'снятие ликвидности' : 'подтверждение уровня'}.`, `signal-detect-${triggerCandleIdx}`, 1);

                          signalPhaseRef.current = 'COUNTDOWN';
                          setSignalPhase('COUNTDOWN');
                          for(let w=3; w>0; w--) {

                          setCountdown(null);

                          let tradeCancelled = false;
                          
                          try {

                                  const liveUpper = currentZones[currentZones.length-1].upper;
                                  const liveLower = currentZones[currentZones.length-1].lower;

                                  if (isCall && liveTick.close < liveLower) tradeCancelled = true;

                          if (tradeCancelled) {

                              setZoneState('OUT');
                              signalPhaseRef.current = 'NONE';
                              setSignalPhase('NONE');
                              playSound('cancel');
                              updateStatus('ОТМЕНА: ИСТИННЫЙ ПРОБОЙ', 'text-rose-600 font-bold');
                              await speakAsync("Внимание. Отмена. Сигнал сломан. Возвращаюсь к радару.", `signal-cancel-${triggerCandleIdx}`, 1);
                              syncModeView();
                              break; 
                          }

                          playSound('start');
                          updateStatus('СДЕЛКА АКТИВНА', 'text-blue-700 font-bold');
                          signalPhaseRef.current = 'ACTIVE';
                          setSignalPhase('ACTIVE');
                          
                          const entryPrice = currentPrice.current;
                          const expMins = 25; 
                          
                          const actualEntryTime = Math.floor(Date.now() / 1000); 
                          
                          setSignal({ type: isCall ? 'CALL' : 'PUT', exp: expMins, entryPrice });
                          addLog(`ВХОД ${isCall ? 'ВВЕРХ' : 'ВНИЗ'} НА 25 МИНУТ.`, true);
                          enqueueSpeech(`Вход выполнен. Сделка активна.`, `trade-entry-${triggerCandleIdx}`, 1);

                          let expirySeconds = expMins * 60;
                          let isLive = true;
                          let finalExitTime = actualEntryTime + (expMins * 60);
                          
                          let currentBetStr = 0;
                          setFinances(prev => {
                              currentBetStr = getBetAmount(prev.currentStep);
                              return prev;
                          });
                          
                          setActiveLiveTrade({
                              id: `live_trade_${Date.now()}`,
                              type: isCall ? 'CALL' : 'PUT',

                              exitPrice: entryPrice,
                              isLive: true,

                              reason: signalType,
                              quality: currentQScore
                          });

                          let midTradeSpoken = false;

                          while(expirySeconds > 0 && engineActive.current) {
                            setCountdown(expirySeconds);
                            
                            if (expirySeconds === 750 && !midTradeSpoken) { 
                                midTradeSpoken = true;
                                const isWinningNow = (isCall && currentPrice.current > entryPrice) || (!isCall && currentPrice.current < entryPrice);
                                if (isWinningNow) {
                                    enqueueSpeech('Мы на середине сделки. Сейчас сигнал идёт в плюс. Продолжаем спокойно наблюдать.', `trade-mid-win-${actualEntryTime}`, 2);
                                } else if (currentPrice.current === entryPrice) {
                                    enqueueSpeech('Мы на середине сделки. Цена рядом с точкой входа. Ждём завершения экспирации.', `trade-mid-tie-${actualEntryTime}`, 2);
                                } else {
                                    enqueueSpeech('Мы на середине сделки. Сейчас сигнал временно идёт в минус. Работаем по системе.', `trade-mid-loss-${actualEntryTime}`, 2);
                                }
                            }

                            await new Promise(r => setTimeout(r, 1000));
                            expirySeconds--;
                            
                            if (expirySeconds % 2 === 0) {
                                try {
                                    const liveData = await ScannerAPI.getCandles(cur.symbol, 2, '5m');
                                    if (liveData && liveData.length > 0) {
                                        lastDataTimeRef.current = Date.now();
                                        const tick = liveData[liveData.length - 1];
                                        currentPrice.current = tick.close;
                                        if (candleSeries.current) { try { candleSeries.current.update(tick); } catch(e){} }
                                        setActiveLiveTrade(prev => prev ? { ...prev, exitPrice: tick.close } : null);
                                    }
                                } catch(e) {}
                            }
                          }
                          
                          if (!engineActive.current) break;

                          isLive = false;
                          setCountdown(null);
                          updateStatus('АНАЛИЗ РЕЗУЛЬТАТА', 'text-slate-500');

                              lastDataTimeRef.current = Date.now();
                              finalPrice = resultData[resultData.length - 1].close;
                              finalExitTime = resultData[resultData.length - 1].time;
                          }
                          let isWin = false;

                          if ((isCall && finalPrice > entryPrice) || (isPut && finalPrice < entryPrice)) isWin = true;
                          else if (finalPrice === entryPrice) isWin = true; 

                          setFinances(prev => {
                              const newPrev = { ...prev };
                              const stepObj = { ...newPrev.steps[prev.currentStep] };
                              
                              if (isWin) {
                                  newPrev.sessionPnl += (currentBetStr * 0.7) + prev.recoveryDrawdown;
                                  newPrev.recoveryDrawdown = 0;
                                  stepObj.w++;
                                  newPrev.currentStep = 1;
                                  consecutiveLossesRef.current = 0;
                              } else {
                                  newPrev.recoveryDrawdown -= currentBetStr;
                                  stepObj.l++;
                                  newPrev.currentStep = Math.min(7, prev.currentStep + 1);
                                  if (newPrev.currentStep > newPrev.maxStep) newPrev.maxStep = newPrev.currentStep;
                                  if (newPrev.currentStep > 7) {
                                      newPrev.sessionPnl += newPrev.recoveryDrawdown;
                                      newPrev.recoveryDrawdown = 0;
                                      newPrev.currentStep = 1; 
                                  }
                                  consecutiveLossesRef.current++;
                              }
                              newPrev.steps = { ...newPrev.steps, [prev.currentStep]: stepObj };
                              
                              setTradeStats(ts => ({
                                  count: ts.count + 1,
                                  wins: ts.wins + (isWin ? 1 : 0),
                                  losses: ts.losses + (!isWin ? 1 : 0),
                                  winRate: Math.round(((ts.wins + (isWin ? 1 : 0)) / (ts.count + 1)) * 100),
                                  pnl: newPrev.sessionPnl
                              }));
                              
                              return newPrev;
                          });

                          setActiveLiveTrade(null); 
                          setTradesHistory(prev => [...prev, { 
                              id: `live_trade_${Date.now()}`,
                              type: isCall ? 'CALL' : 'PUT',
                              signalTime: data[triggerCandleIdx].time,
                              entryTime: actualEntryTime, 
                              exitTime: finalExitTime,
                              entryPrice: entryPrice,
                              exitPrice: finalPrice,
                              isWin: isWin,
                              betAmount: currentBetStr,
                              reason: signalType,
                              quality: currentQScore
                          }]);

                          if (isWin) {
                            playSound('win');
                            addLog(`РЕЗУЛЬТАТ: ПЛЮС (+). ВЫХОД: ${formatPrice(finalPrice)}`);
                            await speakAsync(`Сделка закрылась в плюс. Отличный результат.`, `trade-result-win-${actualEntryTime}`, 1);
                          } else {
                            playSound('loss');
                            addLog(`РЕЗУЛЬТАТ: МИНУС (-).`);
                            await speakAsync(`Сделка закрылась в минус. Ничего страшного. Переходим к следующему колену по системе.`, `trade-result-loss-${actualEntryTime}`, 1);
                          }

                          setSignal(null);
                          signalPhaseRef.current = 'NONE';
                          setSignalPhase('NONE');
                          setMetrics(prev => ({ ...prev, smartMoney: 0 }));
                          zoneStateRef.current = 'OUT';
                          setZoneState('OUT');
                          zoneCooldownUntilRef.current = Date.now() + 60000;
                          
                          syncModeView();
                          await new Promise(r => setTimeout(r, 1500));
                          break; 
                      }
                    }
                  }
                  
                  await new Promise(r => setTimeout(r, 2000)); 
              } catch (e) {
                  addLog("ПЕРЕЗАПУСК РАДАРА...", true);
                  await new Promise(r => setTimeout(r, 3000));
              }
            }
          };

                              </div>
                              <div className="flex flex-col items-end">
                                  <div className="flex items-center gap-2 text-slate-900 bg-white/80 px-4 py-2 rounded-xl shadow-[0_10px_20px_rgba(15,23,42,0.05)] border border-slate-200">
                                      <span className="text-xs md:text-sm font-bold tracking-widest uppercase">Balanced 5M+ Mode</span>
                                      <Radar size={18} className="animate-spin text-cyan-500" />
                                  </div>
                              </div>
                          </div>

                          <div className="flex-1 overflow-hidden rounded-3xl bg-white/90 border-2 border-white relative shadow-[inset_0_4px_20px_rgba(0,0,0,0.05)] z-10">
                              <MiniChart data={sparklines['BTCUSDT']} />
                              <div className="absolute inset-0 scanline-anim pointer-events-none opacity-40 mix-blend-overlay" />
                          </div>

                          <div className="mt-6 flex justify-between items-center bg-white/80 p-4 rounded-2xl border border-white relative z-10 shadow-sm">
                              <span className="text-xs md:text-sm text-slate-700 font-bold tracking-widest uppercase">Анализ пулов ликвидности...</span>
                              <div className="flex gap-2">
                                  <div className="w-2.5 h-2.5 rounded-full bg-blue-500 animate-bounce shadow-[0_0_8px_rgba(59,130,246,0.6)]" style={{animationDelay: '0ms'}}></div>
                                  <div className="w-2.5 h-2.5 rounded-full bg-cyan-400 animate-bounce shadow-[0_0_8px_rgba(34,211,238,0.6)]" style={{animationDelay: '150ms'}}></div>
                                  <div className="w-2.5 h-2.5 rounded-full bg-blue-400 animate-bounce shadow-[0_0_8px_rgba(96,165,250,0.6)]" style={{animationDelay: '300ms'}}></div>
                              </div>
                          </div>
                          
                       </div>
                    </div>

                  </div>

                  {/* DETAILS VIEW (CHARTS) */}
                  <div className={`absolute inset-0 z-20 flex flex-col transition-all duration-700 bg-transparent ${viewMode === 'DETAIL' ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                    <div className="absolute top-5 left-5 z-40 flex flex-col gap-2">
                      <div className="glass-card p-4 md:p-5 rounded-3xl min-w-[160px] border-white shadow-[0_15px_40px_rgba(14,165,233,0.15)] relative overflow-hidden bg-white/80">
                        <div className="absolute -right-10 -top-10 w-24 h-24 bg-cyan-400/20 rounded-full blur-xl pointer-events-none"></div>
                        <div className="text-[10px] md:text-xs text-slate-500 tracking-widest mb-1.5 flex items-center gap-2 font-bold uppercase">
                          <div className="w-2 h-2 bg-cyan-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(6,182,212,0.8)]"/> РЕАЛЬНОЕ ВРЕМЯ
                        </div>
                        <div className="text-4xl md:text-5xl tracking-wider text-slate-900 leading-none pt-0.5 font-black oswald-font drop-shadow-sm">{asset.name}</div>
                        <div className="mt-3 text-xs md:text-sm text-slate-700 tracking-widest font-bold flex items-center gap-2">
                            ТАЙМФРЕЙМ: <span className="text-white bg-gradient-to-r from-blue-600 to-cyan-500 px-3 py-1 rounded-lg shadow-[0_4px_10px_rgba(14,165,233,0.4)] border border-white/50">{currentTF}</span>
                        </div>
                      </div>
                    </div>

                    {zoneState === 'IN' && signalPhase === 'NONE' && (
                        <div className="absolute top-8 right-8 z-50 bg-amber-500/10 text-amber-600 px-4 py-2 rounded-xl font-bold tracking-widest uppercase oswald-font shadow-[0_0_20px_rgba(245,158,11,0.2)] border border-amber-400/50 flex items-center gap-3 backdrop-blur-md">
                            <div className="w-2.5 h-2.5 bg-amber-500 rounded-full animate-ping"></div>
                            Зона интереса: возможен сигнал
                        </div>
                    )}
                    
                    <div className="flex-1 relative w-full mt-32 md:mt-36 flex flex-col gap-2 px-4 pb-4 md:px-5 md:pb-5">
                        <div className="flex-1 relative w-full rounded-3xl overflow-hidden shadow-[inset_0_5px_20px_rgba(0,0,0,0.05)] bg-white/90 border border-white">
                            <div ref={chartContainerRef} className="absolute inset-0" />
                            <ChartOverlays chart={chartInstance.current} series={candleSeries.current} trades={activeLiveTrade ? [...tradesHistory, activeLiveTrade] : tradesHistory} />
                        </div>
                    </div>
                  </div>
                </div>

                <div className="w-full md:w-[340px] lg:w-[380px] flex flex-col glass-panel-heavy rounded-3xl md:rounded-[2.5rem] overflow-hidden shrink-0 relative min-h-[50vh] md:h-full">
                  
                  <div className="border-b border-white/80 p-3 bg-gradient-to-r from-blue-100/60 to-transparent flex justify-center items-center shrink-0 min-h-[48px] shadow-sm relative z-10">
                    <div className={`text-base md:text-lg oswald-font tracking-widest flex items-center gap-2 text-center leading-none transition-all duration-300 w-full justify-center font-bold ${statusColorClass}`}>
                      {appPhase.includes('ПОДГОТОВ') ? (
                        <span className="text-amber-600 drop-shadow-[0_0_12px_rgba(217,119,6,0.4)] animate-pulse">{appPhase}</span>
                      ) : appPhase.includes('СНАЙПЕР:') ? (
                        <span className="text-blue-700 drop-shadow-[0_0_12px_rgba(29,78,216,0.4)] animate-pulse">{appPhase}</span>
                      ) : appPhase}
                    </div>
                  </div>

                  <div className="flex-1 flex flex-col p-3 md:p-4 gap-3 md:gap-4 overflow-y-hidden relative z-10">
                    
                    <div className="grid grid-cols-4 gap-2 glass-card rounded-2xl p-2 shrink-0 border-white bg-white/80">
                       <Speedometer value={metrics.structure} label="СТРУКТУРА" colorHex="#d97706" />
                       <Speedometer value={metrics.liquidity} label="ЛИКВИДНОСТЬ" colorHex="#2563eb" glow={true} />
                       <Speedometer value={metrics.filterLevel} label="АТР ФИЛЬТР" colorHex="#6366f1" />
                       <Speedometer value={metrics.smartMoney} label="SMART MONEY" colorHex="#06b6d4" />
                    </div>

                    <div className="flex gap-3 h-28 md:h-32 shrink-0">
                      <div className={`w-[35%] border rounded-2xl flex flex-col items-center justify-center relative transition-all duration-500 glass-card bg-white/90 ${signalPhase === 'ACTIVE' ? 'border-cyan-400 shadow-[0_0_20px_rgba(34,211,238,0.4)]' : 'border-white'}`}>
                        {signalPhase === 'ACTIVE' && signal ? (
                          <VolumetricArrow type={signal.type} />
                        ) : (
                          <div className="flex flex-col items-center opacity-70 px-1 text-center">
                              {signalPhase === 'COUNTDOWN' ? (
                                  <div className="text-4xl font-black text-cyan-600 drop-shadow-sm mb-1">{countdown}</div>
                              ) : (
                                  <Radar size={28} className={`text-slate-600 mb-2 ${(signalPhase === 'EXPLAINING' || signalPhase === 'DETECTED') ? 'animate-spin text-cyan-500' : ''}`} />
                              )}
                              <span className="text-[8px] md:text-[9px] tracking-widest font-bold text-slate-700 oswald-font leading-tight mt-1">
                                  {signalPhase === 'EXPLAINING' ? 'ОБЪЯСНЕНИЕ СИГНАЛА' : 
                                   signalPhase === 'COUNTDOWN' ? 'ПОДГОТОВКА К ВХОДУ' : 
                                   signalPhase === 'DETECTED' ? 'СИГНАЛ НАЙДЕН' : 'ОЖИДАНИЕ'}
                              </span>
                          </div>
                        )}
                      </div>
                      
                      <div className="w-[65%] rounded-2xl overflow-hidden glass-card p-1.5 bg-white border-white shadow-inner flex">
                        <OrderBookDepth price={currentPrice.current} />
                        <HftTape price={currentPrice.current} />
                      </div>
                    </div>

                    {/* FINANCES & MARTINGALE STATS PANEL */}
                    <div className="glass-card border rounded-3xl p-4 flex flex-col gap-2 shrink-0 relative overflow-hidden transition-all duration-700 bg-white/90 border-white">
                        <div className="absolute -right-4 -top-4 w-20 h-20 bg-gradient-to-br from-slate-100 to-slate-200 rounded-full blur-2xl pointer-events-none"></div>
                        
                        <div className="flex justify-between items-center mb-1 relative z-10">
                            <span className="text-slate-500 text-[10px] font-bold tracking-widest uppercase oswald-font">БАЛАНС</span>
                            <span className="text-lg font-black text-slate-900 oswald-font leading-none">{Math.round(finances.balance + finances.sessionPnl).toLocaleString('ru-RU')} ₽</span>
                        </div>

                        <div className="flex justify-between items-center mb-1 relative z-10 pb-2 border-b border-slate-200/60">
                            <span className="text-slate-500 text-[10px] font-bold tracking-widest uppercase oswald-font">СЕССИОННЫЙ PNL</span>
                            <span className={`text-base font-black ios-text leading-none oswald-font ${finances.sessionPnl >= 0 ? 'text-cyan-700' : 'text-rose-600'}`}>
                                {finances.sessionPnl > 0 ? '+' : ''}{Math.round(finances.sessionPnl).toLocaleString('ru-RU')} ₽
                            </span>
                        </div>
                        
                        <div className="flex justify-between items-center text-[10px] text-slate-500 font-bold uppercase oswald-font tracking-widest relative z-10 pt-1">
                            <span className="flex items-center gap-1.5">
                                <Activity size={12} className={finances.currentStep > 1 ? "text-amber-500 animate-pulse" : "text-cyan-600"}/> 
                                {finances.currentStep > 1 ? "RECOVERY MODE ACTIVE" : "СТАНДАРТНЫЙ РЕЖИМ"}
                            </span>
                            <span>ШАГ: {finances.currentStep}/7</span>
                        </div>

                        {finances.currentStep > 1 && (
                            <div className="flex justify-between items-center mb-1 relative z-10 mt-1">
                                <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">ПРОСАДКА СЕРИИ:</span>
                                <span className="text-xs font-black text-rose-600 bg-rose-100/50 px-2 py-0.5 rounded border border-rose-200">
                                    {Math.round(finances.recoveryDrawdown).toLocaleString('ru-RU')} ₽
                                </span>
                            </div>
                        )}
                        
                        <div className="grid grid-cols-7 gap-1 relative z-10 mt-1">
                            {[1, 2, 3, 4, 5, 6, 7].map(step => (
                                <div key={step} className={`flex flex-col items-center justify-center py-1 rounded border transition-colors ${finances.currentStep === step ? 'bg-gradient-to-b from-cyan-50 to-blue-50 border-cyan-400 shadow-[0_2px_4px_rgba(6,182,212,0.3)]' : (step < finances.currentStep ? 'bg-rose-50 border-rose-200 opacity-60' : 'bg-slate-50/50 border-slate-200')}`}>
                                   <span className={`text-[7px] font-black oswald-font ${finances.currentStep === step ? 'text-cyan-700' : 'text-slate-500'}`}>{step}K</span>
                                </div>
                            ))}
                        </div>
                        
                        <div className="flex justify-between items-center text-[9px] text-slate-400 font-bold uppercase mt-2 relative z-10 tracking-widest border-t border-slate-200/50 pt-2">
                            <span>СЛЕД. ЦЕЛЬ: {Math.round(getBetAmount(finances.currentStep)).toLocaleString('ru-RU')} ₽</span>
                            <span className="text-slate-600">ВИНРЕЙТ: {tradeStats.winRate}%</span>
                        </div>
                        <div className="text-[8px] text-slate-400 leading-tight oswald-font relative z-10 text-center mt-1 uppercase">
                            ИНФО: РИСК СЕРИИ СОХРАНЯЕТСЯ. СЛЕДУЮЩЕЕ КОЛЕНО РАССЧИТАНО НА ПЕРЕКРЫТИЕ ПРОСАДКИ.
                        </div>
                    </div>

                    {/* ENTRY AND EXPIRATION */}
                    <div className="glass-card rounded-2xl p-4 flex justify-between items-center shrink-0 relative overflow-hidden shadow-md border-white bg-gradient-to-r from-white to-cyan-50/80">
                       <div className="absolute right-0 top-0 bottom-0 w-2/3 bg-[radial-gradient(ellipse_at_right,_rgba(14,165,233,0.1),_transparent)] pointer-events-none"></div>
                       <div className="flex flex-col relative z-10">
                          <span className="text-[9px] md:text-[10px] text-slate-500 tracking-widest font-bold leading-none uppercase">ЦЕНА ВХОДА</span>
                          <span className="text-xl md:text-2xl text-slate-900 mt-2 font-black mono-font leading-none drop-shadow-sm">
                            {signalPhase === 'ACTIVE' && signal && signal.entryPrice ? formatPrice(signal.entryPrice) : '---.-----'}
                          </span>
                       </div>
                       <div className="flex flex-col items-end relative z-10">
                          <span className="text-[9px] md:text-[10px] text-slate-500 tracking-widest flex items-center gap-1.5 font-bold leading-none uppercase">
                            <Clock size={12} className="text-cyan-600"/> ЭКСПИРАЦИЯ
                          </span>
                          <span className="text-3xl md:text-4xl text-cyan-700 mt-1 font-black mono-font tracking-wider leading-none drop-shadow-sm">
                            {signalPhase === 'ACTIVE' && countdown !== null 
                                ? `${Math.floor(countdown/60).toString().padStart(2,'0')}:${(countdown%60).toString().padStart(2,'0')}` 
                                : (signalPhase === 'ACTIVE' && signal && signal.exp ? `${signal.exp}:00` : '--:--')}
                          </span>
                       </div>
                    </div>

                    {/* BROKER BUTTON */}
                    <div className="relative shrink-0 mb-1 mt-1 z-20">
                        <a href="https://intrade32.bar/311164" target="_blank" rel="noopener noreferrer" className="broker-btn group relative w-full py-3 md:py-3.5 rounded-2xl flex items-center justify-center overflow-hidden cursor-pointer no-underline block">
                            <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-[150%] group-hover:translate-x-[150%] transition-transform duration-700 ease-in-out skew-x-12"></div>
                            <span className="relative z-10 text-white font-black tracking-widest text-[11px] md:text-sm oswald-font uppercase drop-shadow-md flex items-center gap-2">
                                <Zap size={16} className="animate-pulse text-cyan-200" />
                                ТОРГОВАТЬ ЗДЕСЬ, ЧТОБЫ ЗАРАБОТАТЬ
                            </span>
                        </a>
                        
                        <div className="absolute -bottom-1.5 right-2 md:-right-1 z-50 pointer-events-none animated-cursor">
                            <MousePointer size={24} className="drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]" />
                            <div className="click-ripple"></div>
                        </div>
                    </div>

                    <div ref={logsContainerRef} className="flex-1 glass-card rounded-2xl p-4 overflow-hidden flex flex-col justify-start gap-2 border-white bg-white shadow-[inset_0_2px_15px_rgba(0,0,0,0.02)]">
                      {logs.map((l, i) => (
                        <div key={i} className={`text-[10px] md:text-xs leading-snug tracking-widest font-semibold mono-font ${i === 0 ? 'text-slate-900 font-bold border-l-4 border-cyan-500 pl-2 bg-cyan-50/50 py-1 rounded-r shadow-sm' : 'text-slate-500 pl-2'}`}>
                          {l}
                        </div>
                      ))}
                    </div>
                    
                  </div>
                </div>
              </main>

              <footer className="h-auto md:h-12 py-2 md:py-0 border-t border-white/50 flex flex-row items-center justify-between px-4 md:px-6 shrink-0 glass-panel z-40 bg-white/90">
                <div className="flex items-center gap-2 text-slate-500 text-[10px] md:text-xs tracking-widest font-bold uppercase oswald-font">
                  <Shield size={14} className="text-cyan-600 hidden sm:block" /> 
                  <span className="hidden sm:inline">256-BIT ШИФРОВАНИЕ СИСТЕМЫ • СОЕДИНЕНИЕ БЕЗОПАСНО</span>
                  <span className="inline sm:hidden">ЗАЩИТА АКТИВНА</span>
                </div>
                
                <div className="flex items-center gap-3 md:gap-4 oswald-font">
                  
                  {/* AUTHOR BADGE */}
                  <div className="silver-badge flex flex-col items-center justify-center px-2.5 py-1 rounded-lg">
                      <span className="text-[6px] md:text-[7px] text-slate-500 font-black tracking-[0.2em] uppercase leading-none mb-0.5">PRO MAX CREATOR</span>
                      <span className="text-[10px] md:text-[11px] font-black tracking-widest silver-text leading-none">SLAVA GORDEEV</span>
                  </div>
                  
                  <span className="text-slate-300 text-[10px] hidden md:block">|</span>
                  
                  <span className="text-slate-500 text-[10px] md:text-xs tracking-widest font-bold hidden sm:block uppercase">ЛИЦЕНЗИЯ:</span>
                  <span className="text-white text-[10px] md:text-xs px-3 py-1.5 rounded-lg bg-slate-900 tracking-widest font-bold text-center shadow-[0_4px_10px_rgba(15,23,42,0.2)] border border-slate-700">
                    КРИПТО ИНВЕСТ PRO MAX
                  </span>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
