<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Крипто Терминал Гордеева - PRO MAX (SMC)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Oswald:wght@300;400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
        
        body { 
            margin: 0; padding: 0; 
            background: #eef2f6;
            color: #0f172a; 
            overflow: hidden; 
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
            font-family: 'Montserrat', sans-serif;
        }
        
        .oswald-font { font-family: 'Oswald', sans-serif; letter-spacing: 0.05em; text-transform: uppercase; }
        .mono-font { font-family: 'JetBrains Mono', monospace; }

        /* Background & Depth */
        .bg-grid-pattern {
            background-image: 
                linear-gradient(to right, rgba(14, 165, 233, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(14, 165, 233, 0.04) 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        .bg-orb-1 {
            position: absolute; top: -10%; left: -5%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.2) 0%, rgba(37, 99, 235, 0.05) 50%, transparent 70%);
            border-radius: 50%; filter: blur(60px); animation: float 12s ease-in-out infinite alternate;
        }
        .bg-orb-2 {
            position: absolute; bottom: -15%; right: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, rgba(14, 165, 233, 0.05) 50%, transparent 70%);
            border-radius: 50%; filter: blur(80px); animation: float 15s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(2%, 4%) scale(1.05); }
            100% { transform: translate(-2%, -3%) scale(0.95); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-wrapper { display: flex; width: max-content; animation: ticker 40s linear infinite; }
        
        /* Premium Glass Classes */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
            z-index: 40;
        }
        
        .glass-panel-heavy {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(241, 245, 249, 0.7) 100%);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.08), inset 0 2px 15px rgba(255, 255, 255, 0.8);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.95) 0%, rgba(248, 250, 252, 0.7) 100%);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 8px 25px -5px rgba(15, 23, 42, 0.05), inset 0 1px 2px rgba(255, 255, 255, 1);
            backdrop-filter: blur(20px);
        }
        
        /* Buttons */
        .broker-btn {
            background: linear-gradient(to bottom, #1d4ed8, #1e40af);
            box-shadow: 0 6px 0 #1e3a8a, 0 15px 25px rgba(30, 58, 138, 0.4), inset 0 1px 1px rgba(255,255,255,0.3);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .broker-btn:hover {
            background: linear-gradient(to bottom, #2563eb, #1d4ed8);
            box-shadow: 0 6px 0 #1e3a8a, 0 20px 35px rgba(30, 58, 138, 0.5), inset 0 1px 1px rgba(255,255,255,0.4);
            transform: translateY(-1px);
        }
        .broker-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #1e3a8a, 0 5px 10px rgba(30, 58, 138, 0.4);
        }

        .launch-btn {
            background: linear-gradient(to right, #0ea5e9, #3b82f6);
            box-shadow: 0 8px 0 #1e3a8a, 0 20px 40px rgba(14, 165, 233, 0.4), inset 0 2px 2px rgba(255,255,255,0.4);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .launch-btn:hover {
            box-shadow: 0 8px 0 #1e3a8a, 0 25px 50px rgba(14, 165, 233, 0.6), inset 0 2px 2px rgba(255,255,255,0.5);
            transform: translateY(-2px) scale(1.01);
            filter: brightness(1.1);
        }
        .launch-btn:active {
            transform: translateY(8px) scale(0.99);
            box-shadow: 0 0px 0 #1e3a8a, 0 10px 20px rgba(14, 165, 233, 0.4);
        }

        /* Glass Trade Boxes */
        .glass-trade-box {
            position: absolute;
            z-index: 10;
            border-radius: 6px;
            transition: width 0.1s linear, left 0.1s linear, top 0.1s linear, height 0.1s linear, background 0.3s, box-shadow 0.3s;
            backdrop-filter: blur(2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            cursor: crosshair;
            pointer-events: auto; /* Allow hover */
        }
        .glass-trade-box:hover {
            z-index: 15;
            filter: brightness(1.1);
        }

        .glass-trade-box.active {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.5);
            border-left: 2px solid rgba(59, 130, 246, 0.9);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2) inset, 0 4px 15px rgba(59, 130, 246, 0.1);
        }
        .glass-trade-box.win {
            background: rgba(16, 185, 129, 0.18);
            border: 1px solid rgba(16, 185, 129, 0.6);
            border-left: 2px solid rgba(16, 185, 129, 0.9);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.25) inset, 0 0 10px rgba(16, 185, 129, 0.2);
        }
        .glass-trade-box.loss {
            background: rgba(244, 63, 94, 0.18);
            border: 1px solid rgba(244, 63, 94, 0.6);
            border-left: 2px solid rgba(244, 63, 94, 0.9);
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.25) inset, 0 0 10px rgba(244, 63, 94, 0.2);
        }

        /* Custom DOM Markers */
        .trade-entry-marker {
            position: absolute;
            width: 8px; height: 8px;
            background: #0ea5e9;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 10px rgba(14,165,233,0.8);
            transform: translate(-50%, -50%);
            z-index: 12;
            pointer-events: none;
        }
        .trade-exit-badge {
            position: absolute;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 8px;
            font-weight: 900;
            color: white;
            transform: translate(-50%, -150%);
            z-index: 12;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-family: 'Oswald', sans-serif;
            letter-spacing: 0.05em;
        }
        .trade-exit-badge.win { background: #10b981; border: 1px solid #059669; }
        .trade-exit-badge.loss { background: #f43f5e; border: 1px solid #e11d48; }

        /* Launch Screen Transitions */
        .launch-overlay {
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), backdrop-filter 0.8s ease, transform 0.8s ease;
        }
        .launch-overlay.fade-out {
            opacity: 0;
            backdrop-filter: blur(0px);
            transform: scale(1.05);
            pointer-events: none;
        }

        /* --- PREMIUM SMART SCANNER EFFECT CSS --- */
        .scanner-overlay {
            position: absolute;
            inset: 0;
            z-index: 5; 
            pointer-events: none;
            overflow: hidden;
            transition: opacity 0.4s ease;
        }
        .scanner-overlay.is-soft {
            opacity: 0.15; /* Subdued during active signals/trades */
        }
        .scanner-overlay.is-paused {
            opacity: 0; /* Fully hidden when locked */
        }
        
        .scanner-reticle {
            position: absolute;
            left: -32px;
            top: -32px;
            width: 64px;
            height: 64px;
            transform: translate3d(50%, 50%, 0);
            transition: transform 0.65s cubic-bezier(.25, .8, .25, 1);
            filter: drop-shadow(0 0 15px rgba(14,165,233,.5));
            opacity: 0; 
        }
        .scanner-reticle.is-scanning { opacity: 1; }
        
        /* Central rings */
        .scanner-reticle-ring {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            border: 1px solid rgba(14,165,233,.6);
            box-shadow: 0 0 15px rgba(14,165,233,.2), inset 0 0 15px rgba(14,165,233,.1);
        }
        .scanner-reticle-ring.ring-b {
            inset: 12px;
            border-color: rgba(16,185,129,.4);
        }
        
        /* Corner Brackets */
        .scanner-brackets {
            position: absolute;
            inset: -4px;
            animation: bracketsSpin 10s linear infinite;
        }
        .scanner-brackets::before, .scanner-brackets::after {
            content: ''; position: absolute; width: 10px; height: 10px; border-color: rgba(14,165,233,0.8); border-style: solid;
        }
        .scanner-brackets::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
        .scanner-brackets::after { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
        
        .scanner-brackets .bracket-tr { position: absolute; top: 0; right: 0; width: 10px; height: 10px; border-color: rgba(14,165,233,0.8); border-style: solid; border-width: 2px 2px 0 0; }
        .scanner-brackets .bracket-bl { position: absolute; bottom: 0; left: 0; width: 10px; height: 10px; border-color: rgba(14,165,233,0.8); border-style: solid; border-width: 0 0 2px 2px; }

        /* Radial Pulse */
        .scanner-radial-pulse {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid #0ea5e9;
            opacity: 0;
        }

        .scanner-reticle.is-scanning .ring-a { animation: scannerPulseA .9s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .scanner-reticle.is-scanning .ring-b { animation: scannerPulseB .9s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .scanner-reticle.is-scanning .scanner-radial-pulse { animation: scannerRipple 1.2s ease-out; }
        
        .scanner-dot {
            position: absolute;
            left: 50%; top: 50%;
            width: 4px; height: 4px;
            border-radius: 999px; background: #fff;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px 2px #0ea5e9;
        }
        
        .scanner-candle-glow {
            position: absolute; top: 0; bottom: 0;
            width: 40px; margin-left: -20px;
            border-radius: 999px; opacity: 0;
            background: radial-gradient(ellipse at center, rgba(14,165,233,.3), rgba(14,165,233,.05) 40%, transparent 70%);
            transition: transform .65s cubic-bezier(.25,.8,.25,1);
            mix-blend-mode: color-dodge;
        }
        .scanner-candle-glow.is-pulsing { animation: scannerCandleGlow .9s ease-out; }
        
        .scanner-label {
            position: absolute; padding: 4px 8px; border-radius: 4px;
            opacity: 0; font-size: 8px; font-weight: 800; letter-spacing: .15em; color: #fff;
            background: rgba(14, 165, 233, 0.8); border: 1px solid rgba(14,165,233,.4);
            box-shadow: 0 4px 15px rgba(14,165,233,.3); backdrop-filter: blur(8px);
            transition: transform .65s cubic-bezier(.25,.8,.25,1), opacity .2s ease;
        }
        .scanner-label.is-visible { opacity: 1; }

        /* Premium Cluster Scanner (Lens Effect) */
        .scanner-cluster-lens {
            position: absolute;
            top: 10px; bottom: 10px;
            background: linear-gradient(180deg, rgba(14, 165, 233, 0.05) 0%, rgba(14, 165, 233, 0.12) 50%, rgba(14, 165, 233, 0.05) 100%);
            border-left: 1px solid rgba(14, 165, 233, 0.6);
            border-right: 1px solid rgba(14, 165, 233, 0.6);
            border-top: 1px dashed rgba(14, 165, 233, 0.3);
            border-bottom: 1px dashed rgba(14, 165, 233, 0.3);
            border-radius: 6px;
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.2) inset, 0 0 15px rgba(14, 165, 233, 0.2);
            backdrop-filter: blur(1.5px) brightness(1.1);
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .scanner-cluster-lens.is-active { opacity: 1; transform: scale(1); }
        
        @keyframes scannerPulseA {
            0% { transform: scale(.6); opacity: .4; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: .6; }
        }
        @keyframes scannerPulseB {
            0% { transform: scale(.5); opacity: .2; }
            55% { transform: scale(1.2); opacity: .8; }
            100% { transform: scale(1); opacity: .4; }
        }
        @keyframes scannerRipple {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        @keyframes bracketsSpin {
            100% { transform: rotate(360deg); }
        }
        @keyframes scannerCandleGlow {
            0% { opacity: 0; transform: scaleX(.5); }
            40% { opacity: 1; transform: scaleX(1.3); }
            100% { opacity: 0; transform: scaleX(.9); }
        }

        /* Trade Tooltip */
        .trade-tooltip {
            position: fixed;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(248, 250, 252, 0.95) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 0.9);
            box-shadow: 0 15px 40px rgba(15, 23, 42, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            border-radius: 12px;
            padding: 14px;
            pointer-events: none;
            z-index: 1000;
            width: 250px;
            transition: opacity 0.15s ease-out;
            transform: translate(-50%, calc(-100% - 15px));
        }
        .trade-tooltip::after {
            content: '';
            position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%) rotate(45deg);
            width: 10px; height: 10px;
            background: rgba(248, 250, 252, 0.95);
            border-right: 1px solid rgba(226, 232, 240, 0.9);
            border-bottom: 1px solid rgba(226, 232, 240, 0.9);
        }

        .ticker-unavailable { color: #94a3b8 !important; }

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        // --- GLOBAL FLAGS & SAFE INIT ---
        const APP_FLAGS = {
            safeMode: false,
            cryptoTickerEnabled: true,
            premiumScannerEnabled: true
        };

        const SCANNER_CONFIG = {
            intervalMinMs: 1500,
            intervalMaxMs: 4000,
            clusterChance: 0.15,
            minClusterSize: 3,
            maxClusterSize: 8
        };

        function safeInit(name, fn, timeoutMs = 5000) {
            return new Promise((resolve) => {
                let finished = false;
                const timer = setTimeout(() => {
                    if (finished) return;
                    finished = true;
                    console.warn(`[SAFE INIT] ${name} timeout. Disabled.`);
                    resolve(false);
                }, timeoutMs);
                try {
                    Promise.resolve(fn())
                        .then(() => {
                            if (finished) return;
                            finished = true; clearTimeout(timer);
                            console.log(`[SAFE INIT] ${name} ready`);
                            resolve(true);
                        })
                        .catch((error) => {
                            if (finished) return;
                            finished = true; clearTimeout(timer);
                            console.warn(`[SAFE INIT] ${name} failed`, error);
                            resolve(false);
                        });
                } catch (error) {
                    if (finished) return;
                    finished = true; clearTimeout(timer);
                    console.warn(`[SAFE INIT] ${name} crashed`, error);
                    resolve(false);
                }
            });
        }

        // --- UTILS ---
        const delay = ms => new Promise(resolve => setTimeout(resolve, ms));
        
        const formatRubVisual = value => {
            const n = Math.round(Number(value) || 0);
            const sign = n > 0 ? "+" : "";
            return `${sign}${Math.abs(n).toLocaleString("ru-RU")} ₽`;
        };

        const formatPrice = (p) => {
            if (!p && p !== 0) return '0.00';
            if (p >= 1000) return p.toFixed(2);
            if (p >= 10) return p.toFixed(3);
            if (p >= 1) return p.toFixed(4);
            return p.toFixed(5);
        };

        function formatTime(ts) {
            if (!ts) return '--:--';
            return new Date(ts * 1000).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // --- MATH & PAYOUT ---
        const MONEY_CONFIG = {
            baseStake: 1000,
            payout: 0.70,
            martingale: [1000, 2430, 5900, 14330, 34800]
        };

        function calcLiquidityZones(data, period = 30) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) { res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low }); continue; }
                let high = -Infinity, low = Infinity;
                for (let j = 1; j <= period; j++) {
                    high = Math.max(high, data[i - j].high);
                    low = Math.min(low, data[i - j].low);
                }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;
        }

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { res.push({time: data[i].time, value: data[i].high - data[i].low}); continue; }
                let sumTR = 0, count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j]; const prevC = data[i - j - 1];
                    let tr = Math.max(c.high - c.low, Math.abs(c.high - prevC.close), Math.abs(c.low - prevC.close));
                    sumTR += tr; count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;
        }

        // --- SPEECH TRANSLATION HELPERS & DEDUPLICATION ---
        function pluralRu(n, one, few, many) {
            const abs = Math.abs(n), mod10 = abs % 10, mod100 = abs % 100;
            if (mod100 >= 11 && mod100 <= 14) return many;
            if (mod10 === 1) return one;
            if (mod10 >= 2 && mod10 <= 4) return few;
            return many;
        }

        function numberToRuWords(num) {
            num = Math.floor(Math.abs(Number(num) || 0));
            if (num === 0) return "ноль";
            const onesMale = ["", "один", "два", "три", "четыре", "пять", "шесть", "семь", "восемь", "девять"];
            const onesFemale = ["", "одна", "две", "три", "четыре", "пять", "шесть", "семь", "восемь", "девять"];
            const teens = ["десять", "одиннадцать", "двенадцать", "тринадцать", "четырнадцать", "пятнадцать", "шестнадцать", "семнадцать", "восемнадцать", "девятнадцать"];
            const tens = ["", "", "двадцать", "тридцать", "сорок", "пятьдесят", "шестьдесят", "семьдесят", "восемьдесят", "девяносто"];
            const hundreds = ["", "сто", "двести", "триста", "четыреста", "пятьсот", "шестьсот", "семьсот", "восемьсот", "девятьсот"];

            function triadToWords(n, female = false) {
                const words = []; const h = Math.floor(n / 100), t = Math.floor((n % 100) / 10), o = n % 10;
                if (h) words.push(hundreds[h]);
                if (t === 1) { words.push(teens[o]); } 
                else { if (t) words.push(tens[t]); if (o) words.push((female ? onesFemale : onesMale)[o]); }
                return words.join(" ").trim();
            }

            const parts = []; const millions = Math.floor(num / 1000000), thousands = Math.floor((num % 1000000) / 1000), rest = num % 1000;
            if (millions > 0) parts.push(triadToWords(millions, false), pluralRu(millions, "миллион", "миллиона", "миллионов"));
            if (thousands > 0) parts.push(triadToWords(thousands, true), pluralRu(thousands, "тысяча", "тысячи", "тысяч"));
            if (rest > 0) parts.push(triadToWords(rest, false));
            return parts.join(" ").replace(/\s+/g, " ").trim();
        }

        function formatRubSpeech(value) {
            const n = Math.round(Number(value) || 0);
            if (n === 0) return "ноль рублей";
            const sign = n > 0 ? "плюс " : "минус "; const abs = Math.abs(n);
            const words = numberToRuWords(abs); const rub = pluralRu(abs, "рубль", "рубля", "рублей");
            return `${sign}${words} ${rub}`;
        }

        function formatPercentSpeech(value) {
            const rounded = Math.round(Math.abs(value) * 10) / 10;
            const sign = value < 0 ? "минус " : "";
            const integer = Math.floor(rounded), decimal = Math.round((rounded - integer) * 10);
            if (decimal === 0) return `${sign}${numberToRuWords(integer)} ${pluralRu(integer, "процент", "процента", "процентов")}`;
            return `${sign}${numberToRuWords(integer)} целых ${numberToRuWords(decimal)} десятых процента`;
        }

        function formatUsdSpeech(price) {
            const rounded = Math.round(Number(price) || 0);
            const abs = Math.abs(rounded);
            const words = numberToRuWords(abs);
            const usd = pluralRu(abs, "доллар", "доллара", "долларов");
            return `${words} ${usd}`;
        }

        const speechQueue = {
          queue: [],
          speaking: false,
          spoken: new Map(), 
          say(text, options = {}) {
            const now = Date.now(); const key = options.key;
            if (key) {
                const prev = this.spoken.get(key);
                if (prev !== undefined && options.cooldownMs > 0 && (now - prev < options.cooldownMs)) return false;
                this.spoken.set(key, now);
            }
            this.queue.push({ text, priority: options.priority || 0, onDone: options.onDone || null });
            this.queue.sort((a, b) => b.priority - a.priority);

            const playTone = (freq, oscType, dur, vol, delay = 0) => {

                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
                    o.connect(g); g.connect(ctx.destination); o.start(ctx.currentTime + delay); o.stop(ctx.currentTime + delay + dur);
                } catch (e) {}

            if (type === 'scan') playTone(1200 + Math.random()*300, 'sine', 0.03, 0.005);

                  const xEntry = getRobustX(trade.entryTime);

                  if (xEntry === null || isNaN(xEntry)) return;

                  if (yEntry !== null && yExit !== null && !isNaN(yEntry) && !isNaN(yExit)) {

                      box.className = `glass-trade-box ${trade.type === 'PUT' ? 'put' : ''} ${resClass}`;

          const initChart = async () => {

                candleSeries.current = mainChart.addCandlestickSeries({ upColor: '#3b82f6', downColor: '#475569', borderVisible: false, wickUpColor: '#60a5fa', wickDownColor: '#94a3b8' });

          const evaluateSignal = (candles, idx, cUpper, cLower, cAtr, failedZones, diagStatsRef) => {
              const currCandle = candles[idx]; const prevCandle = candles[idx - 1];
              if (!currCandle || !prevCandle) return null;
              let isCall = false, isPut = false, signalReason = '', isTypeB = false;

              const sweepTop = currCandle.high > cUpper || prevCandle.high > cUpper;
              const sweepBot = currCandle.low < cLower || prevCandle.low < cLower;
              if (sweepTop || sweepBot) diagStatsRef.sweeps++;

              const reclaimTop = sweepTop && currCandle.close < cUpper;
              const reclaimBot = sweepBot && currCandle.close > cLower;
              if (reclaimTop || reclaimBot) diagStatsRef.reclaims++;

              const structBreakTop = currCandle.close < prevCandle.low || currCandle.close < currCandle.open;
              const structBreakBot = currCandle.close > prevCandle.high || currCandle.close > currCandle.open;

              if (reclaimTop && structBreakTop) { isPut = true; signalReason = 'SMC PRIMARY: SWEEP & RECLAIM'; }
              else if (reclaimBot && structBreakBot) { isCall = true; signalReason = 'SMC PRIMARY: SWEEP & RECLAIM'; }
              else if (reclaimTop || reclaimBot) { diagStatsRef.rejected++; }

              const bodyRatio = Math.abs(currCandle.close - currCandle.open) / (currCandle.high - currCandle.low || 1);
              const distTop = Math.abs(currCandle.close - cUpper) / cAtr;
              const distBot = Math.abs(currCandle.close - cLower) / cAtr;

              // SECONDARY RETEST
              if (!isCall && !isPut) {
                  if (reclaimTop && distTop <= 0.15 && bodyRatio >= 0.10 && diagStatsRef.rejected > 0) {
                      isPut = true; signalReason = 'SECONDARY RETEST: RECLAIM'; isTypeB = true;
                  } else if (reclaimBot && distBot <= 0.15 && bodyRatio >= 0.10 && diagStatsRef.rejected > 0) {
                      isCall = true; signalReason = 'SECONDARY RETEST: RECLAIM'; isTypeB = true;
                  }
              }

              // OLD TYPE B (From failed zones)
              if (!isCall && !isPut) {
                  for (let fz of failedZones) {
                      if (fz.used || currCandle.time > fz.expiryTime) continue;
                      const dist = Math.abs(currCandle.close - fz.price) / cAtr;
                      if (dist < 1.0) {
                          const body = Math.abs(currCandle.close - currCandle.open); const total = currCandle.high - currCandle.low;
                          const isRejectionPin = (total > 0) && (body / total <= 0.5); 
                          if (fz.type === 'PUT' && currCandle.high >= fz.price && currCandle.close < fz.price && isRejectionPin) {
                              isPut = true; isTypeB = true; fz.used = true; signalReason = 'TYPE B: SECOND CHANCE RETEST'; break;
                          }
                          if (fz.type === 'CALL' && currCandle.low <= fz.price && currCandle.close > fz.price && isRejectionPin) {
                              isCall = true; isTypeB = true; fz.used = true; signalReason = 'TYPE B: SECOND CHANCE RETEST'; break;
                          }
                      }
                  }
              }

              if (isCall || isPut) { diagStatsRef.finalSignals++; if (isTypeB) diagStatsRef.typeB++; return { type: isCall ? 'CALL' : 'PUT', reason: signalReason, isTypeB }; }
              return null;

          const startScannerLoop = useCallback(() => {

                      scannerTimerRef.current = setTimeout(loop, 1000);

                  const candles = chartDataRef.current;
                  if (candles && candles.length > 0 && chartInstance.current && candleSeries.current) {

                              const isCluster = Math.random() < SCANNER_CONFIG.clusterChance;
                              if (isCluster && source.length > SCANNER_CONFIG.maxClusterSize) {
                                  const clusterSize = Math.floor(Math.random() * (SCANNER_CONFIG.maxClusterSize - SCANNER_CONFIG.minClusterSize + 1)) + SCANNER_CONFIG.minClusterSize;
                                  const endIndex = Math.min(index + clusterSize, source.length - 1);
                                  const startCandle = source[index]; const endCandle = source[endIndex];
                                  const xStart = chartInstance.current.timeScale().timeToCoordinate(startCandle.time);
                                  const xEnd = chartInstance.current.timeScale().timeToCoordinate(endCandle.time);
                                  const y = candleSeries.current.priceToCoordinate(startCandle.close);
                                  if (xStart !== null && xEnd !== null && y !== null) {
                                      if (scannerReticleRef.current) scannerReticleRef.current.classList.remove("is-scanning");
                                      if (scannerBeamRef.current) scannerBeamRef.current.classList.remove("is-active");
                                      if (scannerGlowRef.current) scannerGlowRef.current.classList.remove("is-pulsing");
                                      if (scannerClusterRef.current) {
                                          const width = Math.max(xEnd - xStart, 20);
                                          scannerClusterRef.current.style.left = `${xStart - 10}px`; scannerClusterRef.current.style.width = `${width + 20}px`;
                                          scannerClusterRef.current.classList.add("is-active");
                                          setTimeout(() => { if (scannerClusterRef.current) scannerClusterRef.current.classList.remove("is-active"); }, 800);
                                      }
                                      if (scannerLabelRef.current) {
                                          scannerLabelRef.current.style.transform = `translate3d(${xStart + (xEnd-xStart)/2}px, ${y - 40}px, 0)`;
                                          const labels = ["ZONE SCAN", "LIQ CHECK", "RECLAIM TEST"];
                                          scannerLabelRef.current.textContent = labels[Math.floor(Math.random() * labels.length)];
                                          scannerLabelRef.current.classList.add("is-visible");
                                          setTimeout(() => { if(scannerLabelRef.current) scannerLabelRef.current.classList.remove("is-visible"); }, 800);
                                      }
                                  }
                              } else {
                                  let candle = source[index]; let globalIndex = candles.findIndex(c => c.time === candle.time);
                                  if (globalIndex === lastScanIndexRef.current && source.length > 1) {
                                      index = (index + 3) % source.length; candle = source[index]; globalIndex = candles.findIndex(c => c.time === candle.time);
                                  }
                                  lastScanIndexRef.current = globalIndex;
                                  const x = chartInstance.current.timeScale().timeToCoordinate(candle.time);
                                  const y = candleSeries.current.priceToCoordinate(candle.close);

              <header className="h-auto md:h-16 py-2 md:py-0 flex flex-col md:flex-row items-start md:items-center justify-between px-3 md:px-6 shrink-0 z-40 gap-1 md:gap-0 mt-2">
                <div className="flex flex-col justify-center w-full md:w-auto">
                  <div className="flex justify-between items-center md:block">

                        <Zap size={28} className="text-cyan-600 drop-shadow-[0_0_10px_rgba(6,182,212,0.4)]" />

                      </h1>
                      <div className="text-[10px] text-white px-3 py-1 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-lg flex items-center shadow-[0_0_15px_rgba(14,165,233,0.3)] oswald-font tracking-widest block md:hidden font-bold">{appPhase}</div>
                  </div>
                  <div className="text-[9px] md:text-xs text-slate-500 tracking-[0.2em] mt-1 font-bold leading-none uppercase">Алгоритм SMC • Анализ Ликвидности</div>

                <div className="flex flex-row md:flex-col items-center md:items-end justify-between w-full md:w-auto gap-1 md:gap-1.5">
                  <div className="text-xs md:text-sm text-white px-4 py-1.5 border border-white/50 bg-gradient-to-r from-blue-600 to-cyan-500 shadow-[0_5px_20px_rgba(14,165,233,0.3)] rounded-lg oswald-font tracking-widest hidden md:block font-bold transition-all duration-300">{appPhase}</div>
                  <div className="flex gap-4 items-center tracking-wider w-full md:w-auto justify-between md:justify-end">
                    <span className="text-[9px] md:text-[10px] text-slate-600 flex items-center gap-1.5 font-bold uppercase border border-slate-300 px-2 py-0.5 rounded-full bg-white/50">
                      <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(16,185,129,0.8)]" /> ПОДКЛЮЧЕНО К БИРЖЕ
                    </span>
                    <LiveClock />
                  </div>
                </div>
              </header>

              <main className="flex-1 flex flex-col lg:flex-row p-2 md:p-4 gap-3 md:gap-4 overflow-hidden z-10">
                <div className="w-full lg:flex-1 h-[45vh] lg:h-full glass-panel-heavy rounded-3xl md:rounded-[2.5rem] relative overflow-hidden flex flex-col shrink-0 border border-white/80 shadow-[0_15px_40px_rgba(15,23,42,0.1)]">
                  <div className="absolute inset-0 z-20 flex flex-col bg-transparent opacity-100">
                    <div className="absolute top-4 left-4 md:top-5 md:left-5 z-40 flex flex-col gap-2">
                      <div className="glass-card p-3 md:p-4 rounded-2xl min-w-[140px] md:min-w-[160px] border-white shadow-[0_15px_40px_rgba(14,165,233,0.15)] relative overflow-hidden">
                        <div className="absolute -right-10 -top-10 w-24 h-24 bg-cyan-400/20 rounded-full blur-xl pointer-events-none"></div>
                        <div className="text-[9px] md:text-xs text-slate-500 tracking-widest mb-1 flex items-center gap-2 font-bold uppercase">
                          <div className="w-2 h-2 bg-cyan-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(6,182,212,0.8)]"/> LIVE DATA
                        </div>
                        <div className="text-3xl md:text-4xl tracking-wider text-slate-900 leading-none font-black oswald-font drop-shadow-sm">{asset.name}</div>
                        <div className="mt-2 text-[10px] md:text-xs text-slate-700 tracking-widest font-bold flex items-center gap-2 uppercase">
                            ТАЙМФРЕЙМ: <span className="text-white bg-gradient-to-r from-blue-600 to-cyan-500 px-2 py-0.5 md:px-3 md:py-1 rounded-lg shadow-[0_4px_10px_rgba(14,165,233,0.4)] border border-white/50">{currentTF}</span>
                        </div>
                      </div>
                    </div>
                    
                    <div className="flex-1 relative w-full mt-24 md:mt-32 flex flex-col px-2 pb-2 md:px-4 md:pb-4">
                        <div className="flex-1 relative w-full rounded-2xl overflow-hidden bg-white/70 backdrop-blur-md border border-white/80 shadow-inner">
                            <div ref={chartContainerRef} className="absolute inset-0 z-10" />
                            <div ref={overlaysContainerRef} className="absolute inset-0 pointer-events-none z-20"></div>
                            
                            <div className={`scanner-overlay ${signal && signal.phase === 'TRADE_ACTIVE' ? 'is-soft' : ''}`}>
                                <div ref={scannerBeamRef} className="scanner-beam"></div>
                                <div ref={scannerReticleRef} className="scanner-reticle">
                                    <span className="scanner-reticle-ring ring-a"></span><span className="scanner-reticle-ring ring-b"></span>
                                    <span className="scanner-brackets"><span className="bracket-tr"></span><span className="bracket-bl"></span></span>
                                    <span className="scanner-radial-pulse"></span><span className="scanner-dot"></span>
                                </div>
                                <div ref={scannerGlowRef} className="scanner-candle-glow"></div>
                                <div ref={scannerLabelRef} className="scanner-label">SCAN</div>
                                <div ref={scannerClusterRef} className="scanner-cluster-lens"></div>
                            </div>
                            
                            {tooltipData && (
                                <div className="trade-tooltip" style={{ left: tooltipData.x, top: tooltipData.y }}>
                                    <div className={`text-sm font-black tracking-widest uppercase mb-1.5 oswald-font flex justify-between items-center ${tooltipData.result === 'WIN' ? 'text-emerald-600' : tooltipData.result === 'LOSS' ? 'text-rose-600' : 'text-blue-600'}`}>
                                        <span>{tooltipData.type}</span>
                                        <span className="bg-white/80 px-2 py-0.5 rounded shadow-sm border border-current opacity-90">{tooltipData.result}</span>
                                    </div>
                                    <div className="text-[10px] font-bold text-slate-500 mb-3 bg-slate-100/50 p-2 rounded border border-slate-200/50 leading-tight">
                                        Причина: <span className="text-slate-700">{tooltipData.signalReason}</span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-x-4 gap-y-1.5 text-[10px] mono-font border-t border-slate-200/60 pt-2.5">
                                        <span className="text-slate-400">СИГНАЛ</span><span className="font-bold text-slate-800 text-right">{formatTime(tooltipData.signalTime)}</span>
                                        <span className="text-slate-400">ВХОД</span><span className="font-bold text-slate-800 text-right">{formatTime(tooltipData.entryTime)} @ {formatPrice(tooltipData.entryPrice)}</span>
                                        <span className="text-slate-400">ВЫХОД</span><span className="font-bold text-slate-800 text-right">{tooltipData.exitPrice ? `${formatTime(tooltipData.exitTime)} @ ${formatPrice(tooltipData.exitPrice)}` : '---'}</span>
                                        <span className="text-slate-400 mt-1">СТАВКА</span><span className="font-bold text-slate-800 text-right mt-1">{formatRubVisual(tooltipData.bet).replace("+", "")} (Шаг {tooltipData.step})</span>
                                        <span className="text-slate-400">PNL</span><span className={`font-black text-right text-xs ${tooltipData.pnl > 0 ? 'text-emerald-600' : tooltipData.pnl < 0 ? 'text-rose-600' : 'text-slate-800'}`}>{formatRubVisual(tooltipData.pnl)}</span>
                                    </div>
                                    <div className="text-[9px] text-slate-400 mt-3 pt-2 border-t border-slate-200/60 text-center tracking-widest uppercase font-bold">Длительность: {tooltipData.exp} мин.</div>
                                </div>
                            )}
                        </div>
                    </div>
                  </div>
                </div>

                <div className="w-full lg:w-[360px] flex flex-col gap-3 shrink-0 relative overflow-y-auto lg:overflow-visible no-scrollbar pb-10 lg:pb-0 h-[50vh] lg:h-full">
                  <div className="glass-panel-heavy rounded-3xl p-3 shadow-md border border-white flex flex-col gap-3">
                     <div className="flex justify-between items-center bg-white/60 rounded-xl p-2 border border-white">
                        <div className="flex flex-col">
                            <span className="text-[9px] text-slate-500 font-bold tracking-widest uppercase">API СТАТУС</span>
                            <span className="text-xs font-black mono-font text-slate-800">BINANCE REAL-TIME</span>
                        </div>
                        <span className={`text-[10px] font-bold tracking-widest px-2 py-1 rounded border shadow-sm ${apiStatus === 'АКТИВЕН' ? 'bg-emerald-100/80 text-emerald-700 border-emerald-300' : 'bg-amber-100 text-amber-700 border-amber-300'}`}>{apiStatus}</span>
                     </div>

                     <div className="grid grid-cols-4 gap-1.5 bg-white/80 rounded-xl p-2 border border-white shadow-inner">
                       <Speedometer value={metrics.structure} label="СТРУКТУРА" colorHex="#d97706" />
                       <Speedometer value={metrics.liquidity} label="ЛИКВИДНОСТЬ" colorHex="#2563eb" glow={true} />
                       <Speedometer value={metrics.edgeZone} label="EDGE ZONE" colorHex="#6366f1" />
                       <Speedometer value={metrics.smartMoney} label="SMART MONEY" colorHex="#06b6d4" />
                     </div>

                     <button onClick={() => window.open('https://intrade32.bar/311164', '_blank', 'noopener noreferrer')} className="broker-btn relative w-full py-4 rounded-xl text-white font-black text-lg md:text-xl flex items-center justify-center gap-2 group cursor-pointer oswald-font tracking-widest overflow-hidden">
                        <div className="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                        <MousePointer size={20} className="relative z-10 drop-shadow-md" />
                        <span className="relative z-10 drop-shadow-md">ТОРГОВАТЬ ЗДЕСЬ</span>
                        <div className="absolute w-6 h-6 opacity-0 group-hover:opacity-100 transition-opacity z-20 pointer-events-none animate-bounce drop-shadow-md" style={{right: '10%', top: '50%', marginTop: '-12px'}}>⚡</div>
                     </button>
                  </div>

                  <div className="glass-panel-heavy rounded-3xl p-3 shadow-md border border-white flex flex-col gap-3">
                    <div className="flex gap-2 h-24 shrink-0">
                      <div className={`w-[35%] border rounded-xl flex flex-col items-center justify-center relative transition-all duration-500 bg-white/90 shadow-inner ${signal && signal.phase === 'TRADE_ACTIVE' ? 'border-cyan-400 shadow-[0_0_20px_rgba(34,211,238,0.4)]' : 'border-white'}`}>
                        {signal ? (
                          <VolumetricArrow type={signal.type} phase={signal.phase} />
                        ) : (
                          <div className="flex flex-col items-center opacity-40">
                              <Radar size={28} className="text-slate-600 mb-1" />
                              <span className="text-[9px] tracking-widest font-bold text-slate-600 oswald-font">ОЖИДАНИЕ</span>
                          </div>
                        )}
                      </div>
                      
                      <div className="w-[65%] rounded-xl overflow-hidden bg-white/80 border border-white shadow-inner flex p-3 justify-center flex-col items-center text-center backdrop-blur-md">
                        <span className="text-[10px] font-bold text-slate-500 tracking-widest oswald-font border-b border-slate-200 pb-1 w-full uppercase">Текущая цена</span>
                        <span className="text-xl md:text-2xl font-black text-slate-800 mono-font mt-1.5 drop-shadow-sm">{liveDisplayPrice ? formatPrice(liveDisplayPrice) : '---'}</span>
                      </div>
                    </div>

                    <div className="glass-card rounded-xl p-3 flex justify-between items-center relative overflow-hidden bg-gradient-to-r from-white to-cyan-50/80 border border-white">
                        {signal && signal.phase !== 'TRADE_ACTIVE' ? (
                            <div className="flex w-full justify-between items-center z-10 px-1 py-1">
                                <div className="flex flex-col">
                                    <span className={`text-[10px] tracking-widest font-bold uppercase ${signal.phase === 'TRADE_CANCELLED' ? 'text-rose-500' : 'text-blue-600 animate-pulse'}`}>
                                        {signal.phase === 'SIGNAL_PENDING' ? 'ОБЪЯСНЕНИЕ СИГНАЛА' : (signal.phase === 'COUNTDOWN' ? 'ПОДГОТОВКА К ВХОДУ' : 'СИГНАЛ ОТМЕНЁН')}
                                    </span>
                                    <span className="text-xs text-slate-600 font-bold mt-0.5">
                                        {signal.phase === 'SIGNAL_PENDING' ? 'Вход через 5 секунд' : (signal.phase === 'COUNTDOWN' ? 'Ожидайте...' : 'Условия не актуальны')}
                                    </span>
                                </div>
                                <div className="text-3xl text-blue-600 font-black mono-font drop-shadow-sm w-12 text-right">
                                    {signal.phase === 'COUNTDOWN' && countdown !== null ? countdown : ''}
                                </div>
                            </div>
                        ) : (
                            <>
                               <div className="flex flex-col z-10">
                                  <span className="text-[9px] text-slate-500 tracking-widest font-bold uppercase">ВХОД (СТАВКА {MONEY_CONFIG.martingale[0]}₽)</span>
                                  <span className="text-lg text-slate-900 mt-1 font-black mono-font leading-none">
                                    {signal && signal.entryPrice ? formatPrice(signal.entryPrice) : '---.-----'}
                                  </span>
                               </div>
                               <div className="flex flex-col items-end z-10">
                                  <span className="text-[9px] text-slate-500 tracking-widest flex items-center gap-1 font-bold uppercase">
                                    <Clock size={10} className="text-cyan-600"/> ЭКСПИРАЦИЯ
                                  </span>
                                  <span className="text-2xl text-cyan-700 mt-1 font-black mono-font leading-none drop-shadow-sm">
                                    {countdown !== null && signal && signal.phase === 'TRADE_ACTIVE' ? `${Math.floor(countdown/60)}:${(countdown%60).toString().padStart(2,'0')}` : (signal && signal.exp ? `${signal.exp}:00` : '--:--')}
                                  </span>
                               </div>
                            </>
                        )}
                    </div>
                  </div>

                  <div className="glass-panel-heavy rounded-3xl p-4 flex flex-col shadow-[0_10px_30px_-5px_rgba(15,23,42,0.1)] border border-white relative overflow-hidden">
                       <div className="absolute -right-4 -top-4 w-24 h-24 bg-cyan-200/50 rounded-full blur-2xl pointer-events-none"></div>
                       <div className="flex justify-between items-center z-10 relative mb-3">
                           <span className="text-xs text-slate-600 tracking-widest font-bold flex items-center gap-2 oswald-font uppercase">
                              <Activity size={16} className="text-cyan-600" /> Статистика 12H
                           </span>
                           <span className="text-2xl font-black tracking-wider oswald-font text-cyan-600 drop-shadow-sm">{tradeStats.winRate}%</span>
                       </div>
                       
                       <div className="grid grid-cols-4 gap-1 mb-3 z-10 relative">
                           <div className="bg-slate-100/60 rounded px-1.5 py-1 flex flex-col items-center justify-center border border-slate-200/50"><span className="text-[7px] font-bold text-slate-400">SWEEPS</span><span className="text-xs font-black text-slate-700">{diagStats.sweeps}</span></div>
                           <div className="bg-slate-100/60 rounded px-1.5 py-1 flex flex-col items-center justify-center border border-slate-200/50"><span className="text-[7px] font-bold text-slate-400">RECLAIM</span><span className="text-xs font-black text-slate-700">{diagStats.reclaims}</span></div>
                           <div className="bg-slate-100/60 rounded px-1.5 py-1 flex flex-col items-center justify-center border border-slate-200/50"><span className="text-[7px] font-bold text-slate-400">TYPE B</span><span className="text-xs font-black text-blue-600">{diagStats.typeB}</span></div>
                           <div className="bg-slate-100/60 rounded px-1.5 py-1 flex flex-col items-center justify-center border border-slate-200/50"><span className="text-[7px] font-bold text-slate-400">REJECTED</span><span className="text-xs font-black text-slate-400">{diagStats.rejected}</span></div>
                       </div>

                       <div className="flex justify-between items-center z-10 relative oswald-font">
                           <div className="flex flex-col items-center bg-white/90 px-2 py-2 rounded-xl border border-slate-200 w-[28%] shadow-sm">
                               <span className="text-[9px] text-slate-500 tracking-widest font-bold uppercase">WIN</span>
                               <span className="text-xl text-emerald-600 font-black leading-none mt-1">{tradeStats.wins}</span>
                           </div>
                           <div className="flex flex-col items-center bg-white/90 px-2 py-2 rounded-xl border border-slate-200 w-[28%] shadow-sm">
                               <span className="text-[9px] text-slate-500 tracking-widest font-bold uppercase">LOSS</span>
                               <span className="text-xl text-rose-600 font-black leading-none mt-1">{tradeStats.losses}</span>
                           </div>
                           <div className="flex flex-col items-center bg-gradient-to-br from-blue-50 to-cyan-50 px-2 py-2 rounded-xl border border-blue-200 w-[38%] shadow-md">
                               <span className="text-[9px] text-blue-600 tracking-widest font-bold uppercase">PNL</span>
                               <span className={`text-xl font-black leading-none mt-1 drop-shadow-sm ${tradeStats.pnl >= 0 ? 'text-blue-700' : 'text-rose-600'}`}>{formatRubVisual(tradeStats.pnl)}</span>
                           </div>
                       </div>
                  </div>

                  <div className="glass-panel-heavy rounded-3xl p-3 shadow-md border border-white flex flex-col gap-2 relative overflow-hidden bg-white/70">
                      <div className="text-[9px] text-slate-500 font-bold tracking-widest uppercase oswald-font border-b border-slate-200/50 pb-1 flex items-center gap-1.5">
                          <Activity size={10} className="text-cyan-600" /> EXP OPTIMIZER
                      </div>
                      <div className="grid grid-cols-5 gap-1 text-center mt-1">
                         {[15, 20, 25, 30, 35].map(exp => {
                             const st = expStats[exp]; const wr = st.trades > 0 ? Math.round((st.wins/st.trades)*100) : 0;
                             return (
                                 <div key={exp} className="flex flex-col bg-white/80 rounded-lg border border-slate-200 p-1.5 shadow-sm">
                                     <span className="text-[9px] font-bold text-slate-500 oswald-font">{exp}M</span>
                                     <span className={`text-[10px] font-black ${wr >= 60 ? 'text-emerald-600' : (wr >= 50 ? 'text-slate-700' : 'text-rose-500')}`}>{wr}%</span>
                                     <span className={`text-[9px] font-bold ${st.pnl > 0 ? 'text-emerald-600' : (st.pnl < 0 ? 'text-rose-600' : 'text-slate-500')} mt-0.5`}>{st.pnl > 0 ? `+${st.pnl}` : st.pnl}</span>
                                 </div>
                             );
                         })}
                      </div>
                      <div className="text-[9px] font-bold text-slate-600 bg-slate-100/50 p-2 mt-1 rounded-lg border border-slate-200/50 leading-tight text-center">{bestExpMsg}</div>
                  </div>

                  <div className="flex-1 min-h-[100px] glass-panel-heavy rounded-3xl p-3 overflow-hidden flex flex-col justify-start gap-1.5 border border-white shadow-inner bg-white/70">
                      <div className="text-[9px] text-slate-400 font-bold tracking-widest uppercase oswald-font mb-1 flex items-center gap-1.5 border-b border-slate-200/50 pb-1">
                          <Activity size={10} /> РАДАР СОБЫТИЙ
                      </div>
                      {logs.map((l, i) => (
                        <div key={i} className={`text-[9px] leading-tight tracking-widest font-semibold mono-font ${i === 0 ? 'text-slate-800 font-bold border-l-[2px] border-cyan-500 pl-2 bg-cyan-50/80 py-1 rounded shadow-sm' : 'text-slate-400 pl-2'}`}>
                          {l}
                        </div>
                      ))}
                  </div>
                </div>
              </main>
              
              <footer className="h-auto md:h-12 py-2 md:py-0 border-t border-white/50 flex flex-row items-center justify-between px-4 md:px-6 shrink-0 glass-panel z-40 bg-white/90">
                <div className="flex items-center gap-2 text-slate-500 text-[10px] md:text-xs tracking-widest font-bold uppercase oswald-font">
                  <Shield size={14} className="text-cyan-600 hidden sm:block" /> 
                  <span className="hidden sm:inline">256-BIT ШИФРОВАНИЕ СИСТЕМЫ • СОЕДИНЕНИЕ БЕЗОПАСНО</span>
                  <span className="inline sm:hidden">ЗАЩИТА АКТИВНА</span>
                </div>
                
                <div className="flex items-center gap-3 oswald-font">
                  <span className="text-slate-400 text-[9px] md:text-xs tracking-widest font-bold hidden sm:block uppercase">ЛИЦЕНЗИЯ:</span>
                  <span className="text-white text-[10px] md:text-[10px] px-3 py-1.5 rounded-lg bg-slate-900 tracking-widest font-bold text-center shadow-[0_4px_10px_rgba(15,23,42,0.2)] border border-slate-700">
                    SLAVA GORDEEV PRO MAX
                  </span>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
