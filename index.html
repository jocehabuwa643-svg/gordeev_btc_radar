<body>

    <script type="text/babel">
        // --- GLOBAL SPEECH QUEUE SYSTEM ---
        const speechQueue = {
          queue: [],
          speaking: false,
          lastByKey: new Map(),

          say(text, options = {}) {
            const now = Date.now();
            const key = options.key || text;
            const cooldownMs = options.cooldownMs || 0;

            if (cooldownMs > 0) {
              const last = this.lastByKey.get(key) || 0;
              if (now - last < cooldownMs) return;
              this.lastByKey.set(key, now);
            }

            this.queue.push({
              text,
              priority: options.priority || 0,
              onDone: options.onDone || null
            });

            this.queue.sort((a, b) => b.priority - a.priority);
            this.next();
          },

          next() {
            if (this.speaking) return;
            const item = this.queue.shift();
            if (!item) return;

            if (!window.speechSynthesis || !window.SpeechSynthesisUtterance) {
              if (typeof item.onDone === "function") item.onDone();
              setTimeout(() => this.next(), 150);
              return;
            }

            this.speaking = true;

            const utterance = new SpeechSynthesisUtterance(item.text);
            utterance.lang = "ru-RU";
            utterance.rate = 1.05;
            utterance.pitch = 0.98;

            utterance.onend = () => {
              this.speaking = false;
              if (typeof item.onDone === "function") item.onDone();
              setTimeout(() => this.next(), 120);
            };

            utterance.onerror = () => {
              this.speaking = false;
              if (typeof item.onDone === "function") item.onDone();
              setTimeout(() => this.next(), 120);
            };

            window.speechSynthesis.speak(utterance);
          },

          isBusy() {
            return this.speaking || this.queue.length > 0;
          }
        };
        window.speechQueue = speechQueue;


        const { useState, useEffect, useRef, useCallback } = React;

        const ASSETS = [
          { pair: 'BTC/USDT', symbol: 'BTCUSDT', name: 'Bitcoin', voiceName: 'биткоин' }
        ];

        const FALLBACK_BTC_NEWS = [
          "Крупный капитал формирует пулы ликвидности за локальными экстремумами.",
          "Паттерн снятия ликвидности подтверждает смену структуры рынка.",
          "Зафиксирован ложный пробой диапазона с последующим сломом структуры."
        ];

        const MARTINGALE_LADDER = [1000, 2430, 5900, 14330, 34800];
        const PAYOUT_RATE = 0.7;

        // Рабочий Data-Layer
        const ScannerAPI = {
          workingIndex: 0,
          failCount: 0,
          async getCandles(symbol, count = 250, interval = '5m') { 
            const bUrl = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`;
            const mUrl = `https://api.mexc.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`;

            const urlGenerators = [
                () => bUrl,
                () => `https://api1.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                () => `https://api2.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                () => `https://api3.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                () => `https://data-api.binance.vision/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`,
                () => mUrl,
                () => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(bUrl)}`,
                () => `https://api.allorigins.win/raw?url=${encodeURIComponent(bUrl)}`,
                () => `https://corsproxy.io/?${encodeURIComponent(bUrl)}`
            ];

            let order = [this.workingIndex];
            for (let i = 0; i < urlGenerators.length; i++) {
                if (i !== this.workingIndex) order.push(i);
            }
            
            for (let idx of order) {
                try {
                    let url = urlGenerators[idx]();
                    let response = await fetch(url);
                    if (response.ok) {
                        const data = await response.json();
                        if (Array.isArray(data) && data.length > 0 && Array.isArray(data[0])) {
                            this.workingIndex = idx; 
                            this.failCount = 0;      
                            return data.map(d => ({
                                time: d[0] / 1000,
                                open: parseFloat(d[1]),
                                high: parseFloat(d[2]),
                                low: parseFloat(d[3]),
                                close: parseFloat(d[4]),
                                volume: parseFloat(d[5])
                            }));
                        }
                    }
                } catch(e) {}
            }
            this.failCount++;
            return [];
          }
        };

        const formatPrice = (p) => {
            if (!p && p !== 0) return '0.00';
            if (p >= 1000) return p.toFixed(2);
            if (p >= 10) return p.toFixed(3);
            if (p >= 1) return p.toFixed(4);
            return p.toFixed(5);
        };

        function formatTime(ts) {
            if (!ts) return '--:--';
            return new Date(ts * 1000).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function calcLiquidityZones(data, period = 30) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) {
                    res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low });
                    continue;
                }
                let high = -Infinity, low = Infinity;
                for (let j = 1; j <= period; j++) {
                    high = Math.max(high, data[i - j].high);
                    low = Math.min(low, data[i - j].low);
                }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;
        }

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { 
                    res.push({time: data[i].time, value: data[i].high - data[i].low}); 
                    continue; 
                }
                let sumTR = 0;
                let count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j];
                    const prevC = data[i - j - 1];
                    let tr = Math.max(
                        c.high - c.low,
                        Math.abs(c.high - prevC.close),
                        Math.abs(c.low - prevC.close)
                    );
                    sumTR += tr;
                    count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;
        }

        const VolumetricArrow = ({ type }) => {

        const App = () => {
          const [launchState, setLaunchState] = useState('IDLE'); 
          const [loadingState, setLoadingState] = useState({ show: false, phase: '', text: '', fading: false });
          const [appPhase, setAppPhase] = useState('ГОТОВ К ЗАПУСКУ');
          const [asset, setAsset] = useState(ASSETS[0]);
          const [signal, setSignal] = useState(null);
          const [countdown, setCountdown] = useState(null);
          const [logs, setLogs] = useState([]);
          const [apiStatus, setApiStatus] = useState('ОЖИДАНИЕ');
          const [metrics, setMetrics] = useState({ structure: 0, liquidity: 0, edgeZone: 0, smartMoney: 0 });
          const [newsHeadlines, setNewsHeadlines] = useState(["ОБНОВЛЕНИЕ ДАННЫХ BTC..."]);
          const [tradeStats, setTradeStats] = useState({ wins: 0, losses: 0, winRate: 0, pnl: 0 });
          const [tooltipData, setTooltipData] = useState(null);
          const [currentTF, setCurrentTF] = useState('5M');
          const [diagStats, setDiagStats] = useState({ sweeps: 0, reclaims: 0, typeB: 0, rejected: 0, finalSignals: 0 });
          
          const [liveDisplayPrice, setLiveDisplayPrice] = useState(null);

          const chartContainerRef = useRef(null);
          const overlaysContainerRef = useRef(null);

          // Scanner Refs
          const scannerBeamRef = useRef(null);

          const scannerLabelRef = useRef(null);
          const scannerTimerRef = useRef(null);

          // Tracking for logic
          const completedTradesRef = useRef([]);
          const failedZonesRef = useRef([]);
          const lastZoneStateRef = useRef('OUT');
          const lastNewsTimeRef = useRef(Date.now());
          const lastProcessedClosedCandleTimeRef = useRef(0);

          const fetchNews = async () => {

                  if(res && res.ok) {

                          if(filtered.length > 0) {

          useEffect(() => { fetchNews(); setInterval(fetchNews, 20 * 60 * 1000); }, []);

          const addLog = (msg, isAi = false) => {
            const prefix = isAi ? 'ИНФО:' : 'СИСТЕМА:';

          };

          const playSound = (type) => {
            if (!audioCtx.current) return;
            const ctx = audioCtx.current;
            if (ctx.state === 'suspended') ctx.resume();
            
            const playTone = (freq, oscType, dur, vol, delay = 0) => {
                try {
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = oscType;
                    o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
                    g.gain.setValueAtTime(0, ctx.currentTime + delay);
                    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(ctx.currentTime + delay);
                    o.stop(ctx.currentTime + delay + dur);
                } catch (e) {}
            };

            if (type === 'scan') playTone(1200 + Math.random()*300, 'sine', 0.03, 0.005);
            if (type === 'found') { playTone(600, 'triangle', 0.1, 0.03); playTone(800, 'triangle', 0.1, 0.03, 0.1); }
            if (type === 'start') { playTone(523.25, 'sine', 0.4, 0.03); playTone(659.25, 'sine', 0.5, 0.03, 0.1); playTone(783.99, 'sine', 0.6, 0.04, 0.2); }
            if (type === 'win') { playTone(523.25, 'triangle', 0.4, 0.04); playTone(659.25, 'triangle', 0.5, 0.04, 0.1); playTone(783.99, 'triangle', 0.8, 0.05, 0.2); }
            if (type === 'loss') { playTone(300, 'sawtooth', 0.4, 0.03); playTone(250, 'sawtooth', 0.6, 0.04, 0.2); }
          };

          // --- CHART ENGINE & OVERLAYS ---
          const syncGlassBoxes = useCallback(() => {
              if (!chartInstance.current || !candleSeries.current || !overlaysContainerRef.current) return;
              const timeScale = chartInstance.current.timeScale();
              const series = candleSeries.current;
              
              overlaysContainerRef.current.innerHTML = '';
              
              completedTradesRef.current.forEach((trade, idx) => {
                  // LWC exact coordinate interpolation
                  const getRobustX = (ts) => {
                      let x = timeScale.timeToCoordinate(ts);
                      if (x === null || isNaN(x)) {
                          const sigX = timeScale.timeToCoordinate(trade.signalTime);
                          if (sigX !== null && !isNaN(sigX)) {
                              const diffSecs = ts - trade.signalTime;
                              x = sigX + (diffSecs / 300) * 10; 
                          }
                      }
                      return x;
                  };

                  const xEntry = getRobustX(trade.entryTime);
                  let xExit = getRobustX(trade.exitTime || (Date.now() / 1000));
                  
                  if (xEntry === null || isNaN(xEntry)) return;
                  if (xExit === null || isNaN(xExit)) xExit = timeScale.width();

                  const yEntry = series.priceToCoordinate(trade.entryPrice);
                  const yExit = series.priceToCoordinate(trade.currentPrice || trade.exitPrice || trade.entryPrice);
                  
                  if (yEntry !== null && yExit !== null && !isNaN(yEntry) && !isNaN(yExit)) {
                      // 1. Draw Glass Box
                      const top = Math.min(yEntry, yExit);
                      const height = Math.max(Math.abs(yEntry - yExit), 4);
                      const width = Math.max(xExit - xEntry, 4);
                      
                      const box = document.createElement('div');
                      let resClass = 'active';
                      if (trade.result === 'WIN') resClass = 'win';
                      else if (trade.result === 'LOSS') resClass = 'loss';

                      box.className = `glass-trade-box ${trade.type === 'PUT' ? 'put' : ''} ${resClass}`;
                      box.style.left = `${xEntry}px`;
                      box.style.top = `${top}px`;
                      box.style.width = `${width}px`;
                      box.style.height = `${height}px`;

                      // Attach hover event
                      box.onmouseenter = (e) => setTooltipData({ ...trade, x: e.clientX, y: e.clientY });
                      box.onmousemove = (e) => setTooltipData(prev => prev ? { ...prev, x: e.clientX, y: e.clientY } : null);
                      box.onmouseleave = () => setTooltipData(null);

                      overlaysContainerRef.current.appendChild(box);

                      // 2. Draw precise ENTRY marker
                      const entryMarker = document.createElement('div');
                      entryMarker.className = 'trade-entry-marker';
                      entryMarker.style.left = `${xEntry}px`;
                      entryMarker.style.top = `${yEntry}px`;
                      overlaysContainerRef.current.appendChild(entryMarker);

                      // 3. Draw precise EXIT badge
                      if (trade.result !== 'PENDING') {
                          const exitBadge = document.createElement('div');
                          exitBadge.className = `trade-exit-badge ${resClass}`;
                          exitBadge.style.left = `${xExit}px`;
                          exitBadge.style.top = `${yExit}px`;
                          exitBadge.innerText = trade.result === 'WIN' ? 'WIN' : 'LOSS';
                          overlaysContainerRef.current.appendChild(exitBadge);
                      }
                  }
              });
          }, []);

          const initChart = async () => {
            if (!chartContainerRef.current || chartInstance.current) return;
            if (!window.LightweightCharts) {
              await new Promise(resolve => {
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js';
                script.onload = resolve; document.head.appendChild(script);
              });
            }

            try {
                const mainChart = window.LightweightCharts.createChart(chartContainerRef.current, {
                  autoSize: true,
                  layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#64748b', fontFamily: 'JetBrains Mono' },
                  grid: { vertLines: { color: 'rgba(148, 163, 184, 0.08)' }, horzLines: { color: 'rgba(148, 163, 184, 0.08)' } },
                  timeScale: { borderVisible: false, timeVisible: true, secondsVisible: false, rightOffset: 12 },
                  rightPriceScale: { borderVisible: false },
                  crosshair: { mode: window.LightweightCharts.CrosshairMode.Normal }
                });

                candleSeries.current = mainChart.addCandlestickSeries({ 
                  upColor: '#3b82f6',       // Premium Steel Blue
                  downColor: '#475569',     // Graphite Gray
                  borderVisible: false,     
                  wickUpColor: '#60a5fa', 
                  wickDownColor: '#94a3b8'
                });
                
                upperSeriesRef.current = mainChart.addLineSeries({ color: 'rgba(244, 63, 94, 0.5)', lineWidth: 2, lineStyle: 2, title: 'BUY LIQ', lastValueVisible: false, priceLineVisible: false });
                lowerSeriesRef.current = mainChart.addLineSeries({ color: 'rgba(16, 185, 129, 0.5)', lineWidth: 2, lineStyle: 2, title: 'SELL LIQ', lastValueVisible: false, priceLineVisible: false });

                chartInstance.current = mainChart;

                mainChart.timeScale().subscribeVisibleLogicalRangeChange(syncGlassBoxes);
                mainChart.subscribeCrosshairMove(syncGlassBoxes);

            } catch(e) { console.error("Chart Init Error", e); }
          };

          // --- UNIFIED EVALUATION FUNCTION ---
          const evaluateSignal = (candles, idx, cUpper, cLower, cAtr, failedZones, diagStatsRef) => {
              const currCandle = candles[idx];
              const prevCandle = candles[idx - 1];
              if (!currCandle || !prevCandle) return null;

              let isCall = false, isPut = false, signalReason = '', isTypeB = false;

              // 1. Sweep & Reclaim check
              const sweepTop = currCandle.high > cUpper || prevCandle.high > cUpper;
              const sweepBot = currCandle.low < cLower || prevCandle.low < cLower;
              
              if (sweepTop || sweepBot) diagStatsRef.sweeps++;

              const reclaimTop = sweepTop && currCandle.close < cUpper;
              const reclaimBot = sweepBot && currCandle.close > cLower;
              
              if (reclaimTop || reclaimBot) diagStatsRef.reclaims++;

              // Structure Break / Rejection check (Smoothed for more signals: close below prev low OR close < open)
              const structBreakTop = currCandle.close < prevCandle.low || currCandle.close < currCandle.open;
              const structBreakBot = currCandle.close > prevCandle.high || currCandle.close > currCandle.open;

              if (reclaimTop && structBreakTop) { isPut = true; signalReason = 'SMC PRIMARY: SWEEP & RECLAIM'; }
              else if (reclaimBot && structBreakBot) { isCall = true; signalReason = 'SMC PRIMARY: SWEEP & RECLAIM'; }
              else if (reclaimTop || reclaimBot) { diagStatsRef.rejected++; }

              // 2. Type B / Retest Logic (If no primary signal)
              if (!isCall && !isPut) {
                  for (let fz of failedZones) {
                      if (fz.used || currCandle.time > fz.expiryTime) continue;
                      const dist = Math.abs(currCandle.close - fz.price) / cAtr;
                      // Max 1.0 ATR distance to catch returns
                      if (dist < 1.0) {
                          const body = Math.abs(currCandle.close - currCandle.open);
                          const total = currCandle.high - currCandle.low;
                          const isRejectionPin = (total > 0) && (body / total <= 0.5); // Max body 50% for pinbar retest

                          if (fz.type === 'PUT' && currCandle.high >= fz.price && currCandle.close < fz.price && isRejectionPin) {
                              isPut = true; isTypeB = true; fz.used = true; signalReason = 'TYPE B: SECOND CHANCE RETEST'; break;
                          }
                          if (fz.type === 'CALL' && currCandle.low <= fz.price && currCandle.close > fz.price && isRejectionPin) {
                              isCall = true; isTypeB = true; fz.used = true; signalReason = 'TYPE B: SECOND CHANCE RETEST'; break;
                          }
                      }
                  }
              }

              if (isCall || isPut) {
                  diagStatsRef.finalSignals++;
                  if (isTypeB) diagStatsRef.typeB++;
                  return { type: isCall ? 'CALL' : 'PUT', reason: signalReason, isTypeB };
              }
              return null;
          };

          // --- SMART SCANNER LIFECYCLE ---
          const startScannerLoop = useCallback(() => {
              if (!engineActive.current || isScannerRunningRef.current) return;
              isScannerRunningRef.current = true;
              
              const loop = () => {
                  if (!engineActive.current || !isScannerRunningRef.current) return;
                  const candles = chartDataRef.current;

                  if (candles && candles.length > 0 && chartInstance.current && candleSeries.current) {
                      const recent = candles.slice(-140);
                      const pool = recent.length ? recent : candles;
                      
                      if (pool.length > 0) {
                          const useLatestZone = Math.random() < 0.7;
                          const source = useLatestZone ? pool.slice(-45) : pool;
                          
                          if (source.length > 0) {
                              let index = Math.floor(Math.random() * source.length);
                              let candle = source[index];
                              let globalIndex = candles.findIndex(c => c.time === candle.time);

                              if (globalIndex === lastScanIndexRef.current && source.length > 1) {
                                  index = (index + 3) % source.length;
                                  candle = source[index];
                                  globalIndex = candles.findIndex(c => c.time === candle.time);
                              }
                              
                              lastScanIndexRef.current = globalIndex;

                              const x = chartInstance.current.timeScale().timeToCoordinate(candle.time);
                              const y = candleSeries.current.priceToCoordinate(candle.close);

                              if (x !== null && y !== null && x > 0 && y > 0) {
                                  if (scannerReticleRef.current) {
                                      scannerReticleRef.current.style.transform = `translate3d(${x}px, ${y}px, 0)`;
                                      scannerReticleRef.current.classList.remove("is-scanning");
                                      void scannerReticleRef.current.offsetWidth;
                                      scannerReticleRef.current.classList.add("is-scanning");
                                  }
                                  if (scannerBeamRef.current) {
                                      scannerBeamRef.current.style.transform = `translate3d(${x}px, 0, 0)`;
                                      scannerBeamRef.current.classList.add("is-active");
                                  }
                                  if (scannerGlowRef.current) {
                                      scannerGlowRef.current.style.transform = `translate3d(${x}px, 0, 0)`;
                                      scannerGlowRef.current.classList.remove("is-pulsing");
                                      void scannerGlowRef.current.offsetWidth;
                                      scannerGlowRef.current.classList.add("is-pulsing");
                                  }
                                  if (scannerLabelRef.current) {
                                      scannerLabelRef.current.style.transform = `translate3d(${x + 16}px, ${y - 28}px, 0)`;
                                      scannerLabelRef.current.textContent = Math.random() > 0.5 ? "LIQ CHECK" : "SCAN";
                                      scannerLabelRef.current.classList.add("is-visible");
                                      setTimeout(() => {
                                          if(scannerLabelRef.current) scannerLabelRef.current.classList.remove("is-visible");
                                      }, 620);
                                  }
                              }
                          }
                      }
                  }

                  const delay = 700 + Math.random() * 900;
                  clearTimeout(scannerTimerRef.current);
                  scannerTimerRef.current = setTimeout(loop, delay);
              };

              loop();
          }, []);

          const updateChartAndData = (data) => {
              chartDataRef.current = data;
              const lastCandle = data[data.length - 1];
              currentPrice.current = lastCandle.close;
              setLiveDisplayPrice(lastCandle.close); // Sync UI price

              if (candleSeries.current) {
                  candleSeries.current.setData(data);
                  
                  // CRITICAL: Sort native markers exactly by time before applying, LWC drops unsorted arrays.
                  const nativeMarkers = markersRef.current.sort((a, b) => a.time - b.time);
                  candleSeries.current.setMarkers(nativeMarkers);
                  
                  syncGlassBoxes();
              }
          };

          const runTerminalEngine = async () => {
            if (engineActive.current) return;
            engineActive.current = true;

            if (audioCtx.current && audioCtx.current.state === 'suspended') await audioCtx.current.resume();

            setLoadingState({ show: true, phase: 'CONNECTING', text: 'Проверяю соединение...', fading: false });
            setApiStatus('ПОДКЛЮЧЕНИЕ');
            setAppPhase('АНАЛИЗ SMC ЗА 12 ЧАСОВ...');
            
            const curAsset = ASSETS[0];
            
            await new Promise(r => setTimeout(r, 600));
            setLoadingState({ show: true, phase: 'FETCHING', text: 'Загружаю котировки BTCUSDT 5M...', fading: false });
            
            const initialData = await ScannerAPI.getCandles(curAsset.symbol, 250, '5m');
            
            if (initialData && initialData.length > 150) {
                setLoadingState({ show: true, phase: 'PREPARING', text: 'Подготавливаю график и исторические сделки...', fading: false });
                setApiStatus('АКТИВЕН');
                
                await initChart(); 

                const liqZones = calcLiquidityZones(initialData, 24); 
                const atrSeries = calcATRSeries(initialData, 14);
                const liqMap = new Map(liqZones.map(i => [i.time, {upper: i.upper, lower: i.lower}]));
                const atrMap = new Map(atrSeries.map(i => [i.time, i.value]));

                let tempWins = 0, tempLosses = 0, tempPnl = 0, mStep = 0;
                let localDiag = { sweeps: 0, reclaims: 0, typeB: 0, rejected: 0, finalSignals: 0 };
                
                const startIdx = initialData.length - 144; 
                const endIdx = initialData.length - 6; 

                for (let idx = startIdx; idx <= endIdx; idx++) {
                    const currTime = initialData[idx].time;
                    const zones = liqMap.get(currTime);
                    const cAtr = atrMap.get(currTime) || (initialData[idx].close * 0.002);

                    if (zones) {
                        const sig = evaluateSignal(initialData, idx, zones.upper, zones.lower, cAtr, failedZonesRef.current, localDiag);

                        if (sig) {
                            const signalTime = currTime;
                            const entryTime = currTime + 6; // Historic approx 6s delay
                            const entryPrice = initialData[idx].close; // Approximate
                            
                            const exitCandle = initialData[idx + 5]; // +25 mins
                            if(!exitCandle) continue;
                            
                            const exitPrice = exitCandle.close;
                            const isWin = (sig.type === 'CALL' && exitPrice >= entryPrice) || (sig.type === 'PUT' && exitPrice <= entryPrice);
                            const tradePnl = isWin ? MARTINGALE_LADDER[mStep] * PAYOUT_RATE : -MARTINGALE_LADDER[mStep];

                            markersRef.current.push({ 
                                time: signalTime, 
                                position: sig.type === 'CALL' ? 'belowBar' : 'aboveBar', 
                                color: sig.type === 'CALL' ? '#3b82f6' : '#64748b', 
                                shape: sig.type === 'CALL' ? 'arrowUp' : 'arrowDown', 
                                text: sig.isTypeB ? 'TYPE B' : 'SIGNAL', 
                                size: 1.5 
                            });

                            completedTradesRef.current.push({
                                type: sig.type,
                                signalReason: sig.reason, signalTime, entryTime, exitTime: exitCandle.time, exp: 25,
                                signalPrice: initialData[idx].close, entryPrice, exitPrice, currentPrice: exitPrice,
                                bet: MARTINGALE_LADDER[mStep], step: mStep + 1,
                                result: isWin ? 'WIN' : 'LOSS', pnl: Math.round(tradePnl)
                            });

                            if (isWin) { tempWins++; tempPnl += tradePnl; mStep = 0; } 
                            else {
                                tempLosses++; tempPnl += tradePnl;
                                failedZonesRef.current.push({ price: sig.type === 'CALL' ? zones.lower : zones.upper, type: sig.type, expiryTime: exitCandle.time + 7200, used: false });
                                mStep = Math.min(mStep + 1, MARTINGALE_LADDER.length - 1);
                            }
                            idx += 5; // Skip inside trade duration
                        }
                    }
                }

                    </div>
                    
                    <div className="flex-1 relative w-full mt-24 md:mt-32 flex flex-col px-2 pb-2 md:px-4 md:pb-4">
                        <div className="flex-1 relative w-full rounded-2xl overflow-hidden bg-white/70 backdrop-blur-md border border-white/80 shadow-inner">
                            <div ref={chartContainerRef} className="absolute inset-0 z-10" />
                            {/* Overlays Container (Glass Boxes) */}
                            <div ref={overlaysContainerRef} className="absolute inset-0 pointer-events-none z-20"></div>
                            
                            {/* Smart Cinematic Scanner Overlay */}
                            <div className={`scanner-overlay ${signal ? 'is-soft' : ''}`}>
                                <div ref={scannerBeamRef} className="scanner-beam"></div>
                                <div ref={scannerReticleRef} className="scanner-reticle">
                                    <span className="scanner-reticle-ring ring-a"></span>
                                    <span className="scanner-reticle-ring ring-b"></span>
                                    <span className="scanner-dot"></span>
                                </div>
                                <div ref={scannerGlowRef} className="scanner-candle-glow"></div>
                                <div ref={scannerLabelRef} className="scanner-label">SCAN</div>
                            </div>
                            
                            {/* Premium Tooltip */}
                            {tooltipData && (
                                <div className="trade-tooltip" style={{ left: tooltipData.x, top: tooltipData.y }}>
                                    <div className={`text-sm font-black tracking-widest uppercase mb-1.5 oswald-font flex justify-between items-center ${tooltipData.result === 'WIN' ? 'text-emerald-600' : tooltipData.result === 'LOSS' ? 'text-rose-600' : 'text-blue-600'}`}>
                                        <span>{tooltipData.type}</span>
                                        <span className="bg-white/80 px-2 py-0.5 rounded shadow-sm border border-current opacity-90">{tooltipData.result}</span>
                                    </div>
                                    <div className="text-[10px] font-bold text-slate-500 mb-3 bg-slate-100/50 p-2 rounded border border-slate-200/50 leading-tight">
                                        Причина: <span className="text-slate-700">{tooltipData.signalReason}</span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-x-4 gap-y-1.5 text-[10px] mono-font border-t border-slate-200/60 pt-2.5">
                                        <span className="text-slate-400">СИГНАЛ</span><span className="font-bold text-slate-800 text-right">{formatTime(tooltipData.signalTime)}</span>
                                        <span className="text-slate-400">ВХОД</span><span className="font-bold text-slate-800 text-right">{formatTime(tooltipData.entryTime)} @ {formatPrice(tooltipData.entryPrice)}</span>
                                        <span className="text-slate-400">ВЫХОД</span><span className="font-bold text-slate-800 text-right">{tooltipData.exitPrice ? `${formatTime(tooltipData.exitTime)} @ ${formatPrice(tooltipData.exitPrice)}` : '---'}</span>
                                        <span className="text-slate-400 mt-1">СТАВКА</span><span className="font-bold text-slate-800 text-right mt-1">{tooltipData.bet}₽ (Шаг {tooltipData.step})</span>
                                        <span className="text-slate-400">PNL</span><span className={`font-black text-right text-xs ${tooltipData.pnl > 0 ? 'text-emerald-600' : tooltipData.pnl < 0 ? 'text-rose-600' : 'text-slate-800'}`}>{tooltipData.pnl > 0 ? '+' : ''}{tooltipData.pnl}₽</span>
                                    </div>
                                    <div className="text-[9px] text-slate-400 mt-3 pt-2 border-t border-slate-200/60 text-center tracking-widest uppercase font-bold">
                                        Длительность: {tooltipData.exp} мин.
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                  </div>
                </div>

                <div className="w-full lg:w-[360px] flex flex-col gap-3 shrink-0 relative overflow-y-auto lg:overflow-visible no-scrollbar pb-10 lg:pb-0 h-[50vh] lg:h-full">
                  <div className="glass-panel-heavy rounded-3xl p-3 shadow-md border border-white flex flex-col gap-3">
                     <div className="flex justify-between items-center bg-white/60 rounded-xl p-2 border border-white">
                        <div className="flex flex-col">
                            <span className="text-[9px] text-slate-500 font-bold tracking-widest uppercase">API СТАТУС</span>
                            <span className="text-xs font-black mono-font text-slate-800">BINANCE REAL-TIME</span>
                        </div>
                        <span className={`text-[10px] font-bold tracking-widest px-2 py-1 rounded border shadow-sm ${apiStatus === 'АКТИВЕН' ? 'bg-emerald-100/80 text-emerald-700 border-emerald-300' : 'bg-amber-100 text-amber-700 border-amber-300'}`}>
                            {apiStatus}
                        </span>
                     </div>

                     <div className="grid grid-cols-4 gap-1.5 bg-white/80 rounded-xl p-2 border border-white shadow-inner">
                       <Speedometer value={metrics.structure} label="СТРУКТУРА" colorHex="#d97706" />
                       <Speedometer value={metrics.liquidity} label="ЛИКВИДНОСТЬ" colorHex="#2563eb" glow={true} />
                       <Speedometer value={metrics.edgeZone} label="EDGE ZONE" colorHex="#6366f1" />
                       <Speedometer value={metrics.smartMoney} label="SMART MONEY" colorHex="#06b6d4" />
                     </div>

                     <button 
                        onClick={() => window.open('https://intrade32.bar/311164', '_blank', 'noopener noreferrer')}
                        className="broker-btn relative w-full py-4 rounded-xl text-white font-black text-lg md:text-xl flex items-center justify-center gap-2 group cursor-pointer oswald-font tracking-widest overflow-hidden"
                     >
                        <div className="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                        <MousePointer size={20} className="relative z-10 drop-shadow-md" />
                        <span className="relative z-10 drop-shadow-md">ТОРГОВАТЬ ЗДЕСЬ</span>
                        <div className="absolute w-6 h-6 opacity-0 group-hover:opacity-100 transition-opacity z-20 pointer-events-none animate-bounce drop-shadow-md" style={{right: '10%', top: '50%', marginTop: '-12px'}}>⚡</div>
                     </button>
                  </div>

                  <div className="glass-panel-heavy rounded-3xl p-3 shadow-md border border-white flex flex-col gap-3">
                    <div className="flex gap-2 h-24 shrink-0">
                      <div className={`w-[35%] border rounded-xl flex flex-col items-center justify-center relative transition-all duration-500 bg-white/90 shadow-inner ${signal ? 'border-cyan-400 shadow-[0_0_20px_rgba(34,211,238,0.4)]' : 'border-white'}`}>
                        {signal ? (
                          <VolumetricArrow type={signal.type} />
                        ) : (
                          <div className="flex flex-col items-center opacity-40">
                              <Radar size={28} className="text-slate-600 mb-1" />
                              <span className="text-[9px] tracking-widest font-bold text-slate-600 oswald-font">ОЖИДАНИЕ</span>
                          </div>
                        )}
                      </div>
                      
                      <div className="w-[65%] rounded-xl overflow-hidden bg-white/80 border border-white shadow-inner flex p-3 justify-center flex-col items-center text-center backdrop-blur-md">
                        <span className="text-[10px] font-bold text-slate-500 tracking-widest oswald-font border-b border-slate-200 pb-1 w-full uppercase">Текущая цена</span>
                        <span className="text-xl md:text-2xl font-black text-slate-800 mono-font mt-1.5 drop-shadow-sm">{liveDisplayPrice ? formatPrice(liveDisplayPrice) : '---'}</span>
                      </div>
                    </div>

                    <div className="glass-card rounded-xl p-3 flex justify-between items-center relative overflow-hidden bg-gradient-to-r from-white to-cyan-50/80 border border-white">
                       <div className="flex flex-col z-10">
                          <span className="text-[9px] text-slate-500 tracking-widest font-bold uppercase">ВХОД (СТАВКА 1000₽)</span>
                          <span className="text-lg text-slate-900 mt-1 font-black mono-font leading-none">
                            {signal && signal.entryPrice ? formatPrice(signal.entryPrice) : '---.-----'}
                          </span>
                       </div>
                       <div className="flex flex-col items-end z-10">
                          <span className="text-[9px] text-slate-500 tracking-widest flex items-center gap-1 font-bold uppercase">
                            <Clock size={10} className="text-cyan-600"/> ЭКСПИРАЦИЯ
                          </span>
                          <span className="text-2xl text-cyan-700 mt-1 font-black mono-font leading-none drop-shadow-sm">
                            {countdown !== null ? `${Math.floor(countdown/60)}:${(countdown%60).toString().padStart(2,'0')}` : (signal && signal.exp ? `${signal.exp}:00` : '--:--')}
                          </span>
                       </div>
                    </div>
                  </div>

                  <div className="glass-panel-heavy rounded-3xl p-4 flex flex-col shadow-[0_10px_30px_-5px_rgba(15,23,42,0.1)] border border-white relative overflow-hidden">
                       <div className="absolute -right-4 -top-4 w-24 h-24 bg-cyan-200/50 rounded-full blur-2xl pointer-events-none"></div>
                       <div className="flex justify-between items-center z-10 relative mb-3">
                           <span className="text-xs text-slate-600 tracking-widest font-bold flex items-center gap-2 oswald-font uppercase">
                              <Activity size={16} className="text-cyan-600" /> Статистика 12H
                           </span>
                           <span className="text-2xl font-black tracking-wider oswald-font text-cyan-600 drop-shadow-sm">
                             {tradeStats.winRate}%
                           </span>
                       </div>
                       
                       {/* Strategy Pipeline Diagnostics */}
                       <div className="grid grid-cols-4 gap-1 mb-3 z-10 relative">
                           <div className="bg-slate-100/60 rounded px-1.5 py-1 flex flex-col items-center justify-center border border-slate-200/50"><span className="text-[7px] font-bold text-slate-400">SWEEPS</span><span className="text-xs font-black text-slate-700">{diagStats.sweeps}</span></div>
                           <div className="bg-slate-100/60 rounded px-1.5 py-1 flex flex-col items-center justify-center border border-slate-200/50"><span className="text-[7px] font-bold text-slate-400">RECLAIM</span><span className="text-xs font-black text-slate-700">{diagStats.reclaims}</span></div>
                           <div className="bg-slate-100/60 rounded px-1.5 py-1 flex flex-col items-center justify-center border border-slate-200/50"><span className="text-[7px] font-bold text-slate-400">TYPE B</span><span className="text-xs font-black text-blue-600">{diagStats.typeB}</span></div>
                           <div className="bg-slate-100/60 rounded px-1.5 py-1 flex flex-col items-center justify-center border border-slate-200/50"><span className="text-[7px] font-bold text-slate-400">REJECTED</span><span className="text-xs font-black text-slate-400">{diagStats.rejected}</span></div>
                       </div>

                       <div className="flex justify-between items-center z-10 relative oswald-font">
                           <div className="flex flex-col items-center bg-white/90 px-2 py-2 rounded-xl border border-slate-200 w-[28%] shadow-sm">
                               <span className="text-[9px] text-slate-500 tracking-widest font-bold uppercase">WIN</span>
                               <span className="text-xl text-emerald-600 font-black leading-none mt-1">{tradeStats.wins}</span>
                           </div>
                           <div className="flex flex-col items-center bg-white/90 px-2 py-2 rounded-xl border border-slate-200 w-[28%] shadow-sm">
                               <span className="text-[9px] text-slate-500 tracking-widest font-bold uppercase">LOSS</span>
                               <span className="text-xl text-rose-600 font-black leading-none mt-1">{tradeStats.losses}</span>
                           </div>
                           <div className="flex flex-col items-center bg-gradient-to-br from-blue-50 to-cyan-50 px-2 py-2 rounded-xl border border-blue-200 w-[38%] shadow-md">
                               <span className="text-[9px] text-blue-600 tracking-widest font-bold uppercase">PNL</span>
                               <span className={`text-xl font-black leading-none mt-1 drop-shadow-sm ${tradeStats.pnl >= 0 ? 'text-blue-700' : 'text-rose-600'}`}>
                                   {tradeStats.pnl > 0 ? '+' : ''}{tradeStats.pnl}₽
                               </span>
                           </div>
                       </div>
                  </div>

                  <div className="flex-1 min-h-[100px] glass-panel-heavy rounded-3xl p-3 overflow-hidden flex flex-col justify-start gap-1.5 border border-white shadow-inner bg-white/70">
                      <div className="text-[9px] text-slate-400 font-bold tracking-widest uppercase oswald-font mb-1 flex items-center gap-1.5 border-b border-slate-200/50 pb-1">
                          <Activity size={10} /> РАДАР СОБЫТИЙ
                      </div>
                      {logs.map((l, i) => (
                        <div key={i} className={`text-[9px] leading-tight tracking-widest font-semibold mono-font ${i === 0 ? 'text-slate-800 font-bold border-l-[2px] border-cyan-500 pl-2 bg-cyan-50/80 py-1 rounded shadow-sm' : 'text-slate-400 pl-2'}`}>
                          {l}
                        </div>
                      ))}
                  </div>
                </div>
              </main>
              
              <footer className="h-auto md:h-12 py-2 md:py-0 border-t border-white/50 flex flex-row items-center justify-between px-4 md:px-6 shrink-0 glass-panel z-40 bg-white/90">
                <div className="flex items-center gap-2 text-slate-500 text-[10px] md:text-xs tracking-widest font-bold uppercase oswald-font">
                  <Shield size={14} className="text-cyan-600 hidden sm:block" /> 
                  <span className="hidden sm:inline">256-BIT ШИФРОВАНИЕ СИСТЕМЫ • СОЕДИНЕНИЕ БЕЗОПАСНО</span>
                  <span className="inline sm:hidden">ЗАЩИТА АКТИВНА</span>
                </div>
                
                <div className="flex items-center gap-3 oswald-font">
                  <span className="text-slate-400 text-[9px] md:text-xs tracking-widest font-bold hidden sm:block uppercase">ЛИЦЕНЗИЯ:</span>
                  <span className="text-white text-[10px] md:text-[10px] px-3 py-1.5 rounded-lg bg-slate-900 tracking-widest font-bold text-center shadow-[0_4px_10px_rgba(15,23,42,0.2)] border border-slate-700">
                    SLAVA GORDEEV PRO MAX
                  </span>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
